front:
  text: 南華真經註疏重刋道藏輯要牛集十一
  hash: sha256:234116eed5301979de9d370f02568bfdb6ba203c629a3d9059e111bc39929eb1
  markers:
  - {type: page-break, offset: 6, content: '', id: CK-KZ_KR5i0036_04p001a}
body:
  text: 南華眞經周漆園吏莊周著海陽復圭子程以甯注疏外篇達生第十九達生命之情其𦂳要在棄事而遺生其養氣全神忘外守中則達生之功夫也達生之情者不務生之所無以爲人知生之當養一有徇外之心非養也無以爲而已之則凡可已者皆不爲也達命之情者不務知之所無奈何人知命之當安一有僥倖之心非安也知無奈何而安之則凡所安者無求於外也達生則足以知天達命則足以知人養形必先之物物有餘而形不養者有之矣備物可養形而不能養神故富貴而夭折者恆有有生必先無離形形不離而生亡者有之矣生與形原不相離形雖能全屋在而主人去則生亡生之來不能却其去不能止悲夫世之人以爲有形足以存生而養形果不足以存生則世奚足爲哉形如屋養形者譬如屋宇整齊外體也而以此爲足以存生恐屋雖好而屋主人不能住則世間人備物何足以養形哉雖不足爲而不可不爲者其爲不免矣養形雖不足爲而衣食交際又不可不爲則爲之在所不免爲累大矣夫欲免爲形者莫如棄世棄世則無累無累則正平正平則與彼更生更生則幾矣事奚足棄而生奚足遺棄世非避世也斷緣𥳑事不以世情爲念也世人生生之厚故不正不平而生理以斷不爲物累則心無高下决擇而與造物相爲始終便死他不得故曰則更生事奚足棄二句是問詞棄事則形不勞遺生則精不虧復自答云云恐勞其形故棄其事也恐搖其精故遺其生也夫形全精復與天爲一與天地合其德也天地者萬物之父母也合則成體散則成始形精不虧是謂能移精而又精反以相天天與我本同一氣合則聚而成形天之未始不爲人散則反於無始人之未始不爲天也舉造化之機轉移在我不惟合天而反以相天矣子列子問關尹關門令尹名喜曰至人潛行不窒音執蹈火不𤍠行乎萬物之上而不慄請問何以至於此關尹曰是純氣之守也軀殼脫盡獨存元氣非知巧果敢之列居予語女音汝凡有貌象聲色者皆物也物與物何以相遠夫奚足以至乎先是色而已則物之造乎不形而止乎無所化夫得是而窮之者物焉得而止焉貌象聲色物也我亦物也物與物不相遠焉能不窒不𤍠而遊於萬物之土乎惟無物而後能不物於物我旣先不離乎色則物之不形不化者皆得以勢而窮我安得止而不入乎先卽未物之先造物之始也彼將處乎不淫之度大藥一得丹房器皿便委而棄之不可戀也而藏乎無端之紀藏神淵默其端倪不可測識遊乎萬物之所終始根抵造化樞紐萬物出機入機在我也壹其性養其氣合其德以通乎物之所造夫若是者其天守全其神無郤物奚自入焉一性養氣乃致虛之極守靜之篤神氣子母抱一無離合者一而不分之義天者物之所由以造者德通於天則天者全而神無所卻矣物焉得而窒之𤍠之慄之哉所謂奚自而入也夫醉者之墜車雖疾不死骨節與人同而犯害與人異其神全也乘亦不知也墜亦不知也死生驚懼不入乎其胸中是故𨕣音悟物而不慴彼得全於酒而猶若是而况得全於天乎聖人藏於天故莫之能傷也以神全故氣全雖病而不死神全於酒猶然而况神全於天乎天只是箇虛靜恬淡寂寞無爲聖人藏神正藏於此藏神正所以守氣也復讎者不折鏌千雖有忮心者不怨飄瓦是以天下平均故無攻戰之亂無殺戮之刑者由此道也鏌干飄瓦皆傷人者而不折不怨以物無心也無心之不取忤於世人人而鏌千飄瓦之無心則天下平矣何有攻戰殺戮之慘不開人之天而開天之天開天者德生開人者賊生天一也有天之天乃接命之正道吾開之則長生有人之天乃採取之旁門吾開之適賊生矣不厭其天不忽於人民幾乎以其眞天人合一此乃全眞保命之道仲尼適楚出於林中見痀音傴僂音縷曲背人也者承持竿而黏蜩音條小蟬也其爲物舍卑穢趨高潔其鳴以時不食而無求得形解之道者是所以託之承蜩也猶掇音奪以手拾物之易之也仲尼曰子巧乎有道邪音耶曰我有道也五六月累丸二而不墜五六月黏蜩時也累彈丸於竿首用手停審二丸在竿首不落則失者錙銖其承蜩所失者不過錙銖之間也累三而不墜停審愈精則失者十一所失愈少累五而不墜停審之至猶掇之也猶手拾物而無復失吾慮身也若橛音掘株拘吾執臂也若槁木之枝承蜩之時外體欲直橛株斷木也身若橛株之拘雖天地之大萬物之多而惟蜩翼之知吾不反不側不以萬物易蜩之翼何爲而不得内志欲甯心一於蜩而不知蜩之外復有他物葢雖小技而亦有妙理内忘我外忘物物我兩忘奚啻承蜩孔子顧謂弟子曰用志不分乃凝於神志分則神散用志專一而不分則其神完固凝聚而不散其痀僂丈人之謂乎引此以明藏神守氣之用顏淵問仲尼曰吾嘗濟乎觴深之淵津人操舟若神吾問焉曰操舟可學邪音耶曰可善游者數音朔能若乃夫沒人則未嘗見舟而便操之也吾問焉而不吾告敢問何謂也仲尼曰善遊者數能忘水也習以成性遂若自然若乃夫沒人則未嘗見舟而便操之也彼視淵若陵視舟之覆猶其車却也視舟覆於淵如車却於坡覆舟之覆却車之却萬方陳乎前而不得入其舍心者神明之舍也惡往而不暇幽閒也以瓦注者巧注射而賭物也以鉤注者憚以黃金注者㱪音昏其巧一也而有所矜憐惜也則重外也凡外重者内拙不止於注亦不止於操舟大凡以外物爲重者必喪其中之所存操舟乃志不可分之喻而復舉若陵車却爲注三事以喻之此喻中之喻也莊子之文類此田開之見周威公威公曰吾聞祝腎音脤學生學養生之道吾子與祝腎遊亦何聞焉田開之曰開之操拔篲音惠把連茹之草以爲篲謙言供弟子灑掃之職也以侍門庭亦何聞於夫子威公曰田子無讓不必謙遜寡人願聞之開之曰聞之夫子曰善養生者若牧羊然視其後者而鞭之羊巳前行者不須鞭惟其在後者鞭之以喻旣養其内者不必更用工於内但當養其外旣養其外者不必更用工於外但當養其内威公曰何謂也田開之曰魯有單音善豹者巖居而水飲不與民共利不爭利於民行年七十而猶有嬰兒之色不幸遇餓虎餓虎殺而食之有張毅者高門縣音懸薄門首懸帷薄之簾閭閻小戸也無不走也往來奔競行年四十而有内𤍠之病以死豹養其内而虎食其外毅養其外而病攻其内此二子者皆不鞭其後者也旣先養内則其後當養外旣先養外則後當養内二子之養生皆猶牧羊而不鞭後也仲尼曰無入而藏内不入卽壺子之杜德機也無出而陽外不出卽壺子之衡氣機也柴立其中央三者若得其名必極柴立者獨立也中央者氣海也只是凝聚那點陽神下藏于氣穴之中此穴有内外兩竅識得此竅中之竅乃藏神之府化胎之源擒制鉛汞而大藥產于其中不入不出爲柴立三者若得法其造修道之名必到至極之處始而得藥得丹旣而脫胎換骨可作飛天仙矣夫畏塗者道路戒嚴險於山川十殺一人則父子兄弟相戒也必盛卒徒而後敢出焉不亦知乎衞生之知人之所取畏者袵席之上飲食之間食色二者人之所不能無亦人之所易受其害而不知爲之戒者過也知有形之畏塗可畏而不知宴安鴆毒其可畏猶甚噫民不畏威大威至矣祝宗人祭祀之官玄端禮服以臨牢豕室筴音策木栅也說音稅彘曰汝奚惡死吾將三月㹖音患養也汝十日戒三日齊音齋藉白茅以白茅爲藉加汝肩尻音翹豕尻也乎彫爼之上則汝爲之乎爲彘謀曰不如食以糠糟而錯之牢筴之中自爲謀則苟生有軒冕之尊死得於腞音篆有文縷之案楯音盾之上聚僂音吕筐筥也之中則爲之爲彘謀則去之以生爲樂自爲謀則取之以富貴爲榮雖死不顧所異彘者何也所以謀身不同於謀彘者何也欲累之也意謂逆性命之理以居富貴不若順性命之理而樂貧賤莊子自喻以龜而喻世人以彘其意可知桓公田獵也於澤管仲御見鬼焉公撫管仲之手曰仲父音甫何見對曰臣無所見公反誒音熙詒音怡倦怠失魂之貌爲病數日不出齊士有皇子告敖者曰公則自傷鬼惡能傷公夫忿滀音旭鬱結畜於中也之氣散而不反則爲不足上而不下則使人善怒下而不上則使人善忘不上不下中身當心則爲病桓公曰然則有鬼乎曰有沈有履水神名竈有髻音詰竈神名其狀如美人而衣赤衣戸内之煩壤戸内糞掃之餘積雷霆鬼名處之東北方之下者倍阿鬼名狀如小兒長尺四黑衣赤幘大冠帶劍持㦸鮭蠪鮭音蛙蠪音龍亦鬼名躍之西北方之下者則泆音逸陽鬼名豹頭馬尾處之水有罔象水神名狀如小兒黑色赤爪大耳長臂𨚑有崒音臻邱神狀如狗而有角文身五采山有䕫山神名狀如鼓而一足野有方音傍皇音皇野神名狀如蛇兩頭而文五采澤有委蛇大澤中之神正桓公所見者公曰請問委蛇之狀何如皇子曰委蛇其大如轂其長如轅紫衣而朱冠其爲物也惡聞雷車之聲則捧其首而立見之者殆乎霸桓公囅音軫大笑貌然而笑曰此寡人之所見者也於是正衣冠與之坐不終日而不知病之去也皇子在在處處說箇鬼物亦中庸體物而不可遺之義桓公欲伯之心素所畜積一聞此言遠駕長馭之心勃然何病不巳除哉紀渻子爲王養鬬雞此亦凝神守氣之喻十日而問雞已乎已乎言亦可用否也曰未也方虛憍而恃氣虛憍則傲恃氣則凌雖未見雞能無懼而已十日又問曰未也猶應響景音影聞響而應見影而逐此心猶爲外物所動矣十日又問曰未也猶疾視而盛氣疾視則其神不甯盛氣則其心不平雖不鬬而欲鬬之意未忘十日又問曰幾矣雞雖有鳴者巳無變矣望之似木雞矣其德全矣異雞無敢應者反走矣木雞則内忘其氣外忘其形他雞雖竦而鳴我不聞其聲矣不爭之德莫全於此天下之雞惟有望風而潰耳古之立大德養大勇者未始不自凝神守氣中來而又不可以輕試必須養之又養以待其全然後動無不利也孔子觀於吕梁河水有石絶處曰梁此與汨人操舟同意縣音懸水三十仞從高而急下流沬音末四十里激水濺而成沬黿鼉魚鼈之所不能遊也見一丈夫遊之以爲有苦而欲死也使弟子並流沿流也而拯之數百步而出被髮行歌而游於塘下河塘之下孔子從而問焉曰吾以子爲鬼察子則人也請問蹈水有道乎曰亡吾無道吾始乎故長乎性成乎命與齊俱入與汨偕出司馬云齊回水如磨齊也汨水涌波也從水之道而不爲私焉任水而不任巳此吾所以蹈之也孔子曰何謂始乎故長乎性成乎命曰吾生於陵而安於陵故也因習而成卽始乎故長於水而安於水性也習久而成自然長乎性也不知吾所以然而然命也與水相忘不知其所以然成乎命也梓慶削木爲鐻音據鐘鼓之縣也鐻端多有刻縷鐻成見者驚猶鬼神以爲非人所能削魯侯見而問焉曰子何術以爲焉對曰臣工人何術之有雖然有一焉臣將爲鐻未嘗敢以耗氣也耗損也氣耗則心動心動則神不專故不敢耗必齊音齋以靜心齊三日而不敢懷慶賞爵祿忘利也齊五日不敢懷非譽巧拙忘名也齊七日輙然忘吾有四枝形體也忘我也當是時也無公朝視公朝若無忘勢也其巧專而外滑音骨消如是則吾之知巧專而物之滑心盡消冺矣然後入山林取材也觀天性形軀至矣察木之天性與木之形體巳至爲鐻之材然後成見鐻然後加手焉不然則巳未削之先吾目中先成一現鐻然後加削不然則已而不削也則以天合天器之所以疑神者其是與音余因物付物以已之天合物之天此器之所以疑於神也東野稷以御見莊公進退中繩言直也左右旋中規言圓也莊公以爲文弗過也使之鉤百而反善御者直中繩圓中規如組織文繡然所謂文弗過也百往百返皆復故迹回旋如鉤也顏闔遇之入見曰稷之馬將敗公宻而不應少焉果敗而反公曰子何以知之曰其馬力竭矣而猶求焉故曰敗鉤百謂圓驅不止而至於百故知其必敗韓嬰日舜工於使人造父工於使馬不究其民故無逸民不窮其馬故無逸馬馬之蹶敗由策御之過分民之知竭由政教之苛察故達命者不務知之所無奈何也工倕音垂堯工名也旋而葢規矩蓋猶過也但以手旋而過於規矩精巧之至也指與物化而不以心稽故其靈臺一而不桎指與物化全不留心雖不以心稽而心未嘗不在但一而不受其桎耳靈臺心也心不爲外物所繫日不桎陸西星曰此言純熟自然之妙只以手旋物自合規矩第指與物化而不以心稽心亦未嘗不在但一而不受其桎耳使其用志一分則雖熟而亦不能合規矩矣復圭子曰學問最怕分心又怕有心分心則雜而不精有心則物而不化故一而不桎者乃能入妙看莊子到純熟處字字句句皆爲奥旨况學通三教而且聞性命金丹之大道者乎忘足屨之適也忘要音腰帶之適也知忘是非心之適也不内變不外從事内純一而不變外應物而不知所事會之適也始乎適而未嘗不適者忘適之適也陸西星曰上說一箇化字此又說箇忘字忘則入於化矣故履適則忘足帶適則忘腰心適則忘是非境適則忘内外故始於適而未嘗不適者斯則忘適之適而後能入於化矣有孫休者踵門而詫謂以異謂吿於子扁子扁慶子曰休居鄉不見謂不修臨難不見謂不勇然而田原不遇𡻕事君不遇世賓音擯於鄕里逐於州郡則胡罪乎天哉休惡遇此命也扁子曰子獨不聞夫至人之自行邪忘其肝膽則内虛遺其耳目則外靜總爲墮支黜聰之意芒然彷徨乎塵垢之外虛靜恬淡之境逍遙乎無事之業寂寞無爲之道是謂爲而不恃長而不宰任其自爲非有恃而爲之任其自長非故宰而長之雖爲而爲之以不爲也今汝飾知以驚愚矜已之知以驚人之愚修身以明汙修己之身以明人之汙昭昭乎若揭日月而行也言其過於炫露汝得全而形軀具而九竅無中道天於聾盲跛音頗蹇而比於人數亦幸矣又何暇乎天之怨哉子往矣孫子出扁子入坐有間仰天而歎弟子問曰先生何爲歎乎扁子曰向者休來吾吿之以至人之德吾恐其驚而遂至於惑也弟子曰不然孫子之所言非邪先生所言是邪彼固惑而來矣彼固懷惑而來非先生惑之也又奚罪焉扁子曰不然昔者有鳥止於魯郊魯君說音悅之爲具大牢以饗之奏九韶以樂之鳥乃始憂悲眩視不敢飲食此之謂以己養養鳥也若夫以鳥養養鳥者宜棲之深林浮之江湖食之以委蛇音威移從容自得之貌則平陸而已矣今休欵啟所見之小寡聞之民也吾吿以至人之德譬之若載鼷以車馬樂鴳以鐘鼓也鼷鼠鴳鷃借小物以鄙之彼又惡能無驚乎哉鳥聞九韶而驚休聞至言而惑王雱曰全生之道非至人莫能知之非至人而與語全生之道是養鳥以大牢樂鳥以九韶鳥必驚扁子所以慮孫休之惑也復圭子曰生有理有情理者生之所有情則能養生亦能喪生惟達人務生之所有而養生不務生之所無而喪生斯之謂達生命有性有情性者命之所可奈何若情則可保命亦可殘命惟達人務命之可奈何而完命不務知之無所奈何而殘命斯之謂達命人知備物以養形何世人物有餘而形不養者有之人知借形以寄生何世人形存而生亡者亦有之哀哉養形者多而存生者少聽其自來自去而不能止也信養形之無益吾以爲莫若棄世謝絶人事之因緣別尋世外之天地無憂也無累也金丹大道流戊就巳取坎塡離至正至平得藥不過一年便與造化更生而庶幾長生久視矣然則何事之不足棄而何生之不足遺哉形勞而不巳則蹶故欲無勞爾形非棄事不可精搖而不已則竭故欲無搖爾精非遺生不可夫形全精復者乃内外交養之人與天爲一者也天地者萬物之父母眞人者天地之肖子靜而合則得天地成體之理天之未始不爲人也動而散則得天地成始之用人之未始不爲天也形固精完是謂能移所謂其始也以栽接爲工夫其究也以脫胎換骨爲了當精而又精者所謂再安爐重立鼎煉神還虛天地亦包於虛空豈非反以相天乎若而人也可以潛行可以火走可以遊乎萬物之上而不窒不𤍠不慄者何也則軀殼脫盡獨存元神所謂純氣之守者也若有貌象聲色之物皆屬後天而不能至乎先天必物之造乎無形而止乎無化者爲不物於物而有物之物焉能禦之彼將不色中色而處乎不淫之度不空中空而藏乎無端之紀萬物各自爲終始而至人先萬物之始而始後萬物之終而終不過一其性養其氣合乎天地之德而通乎造物之機緘耳若而人也其天渾全其神不虧聲色之物焉能礙之哉試觀醉者之墜車猶能全其神而况聖人之全其天者物焉能傷之乎復仇者不折鏌于雖有忮心者不怨飄瓦使人人而盡如鏌瓦之無心則天下無攻戰之亂矣人之天矯揉造作旁門也天之天金丹大道正理也開天者採其先天無損於彼而有益於我德生也開人者採其後天有損於彼而不能益我賊生也賊生者天必厭而棄之吾果能不厭其天乎賊生者人必忽而絶之吾果能不忽於人乎不庶幾爲宇宙一眞人也哉承蜩有道未學承蜩而先學累丸卽學射者未學射先學視之理也累丸漸精則承蜩漸不失此實理也非喻言也承蜩時外體欲直身臂有如橛株槁木内志欲一惟知有蜩而不知有天地萬物何患承蜩不猶掇之也孔子顧謂弟子曰用志不分乃凝於神豈惟承蜩卽爲聖爲賢亦此道也痀僂丈人得之以承蜩有志者得之以作仙作佛何不可乎觴深之津人操舟若神若沒人則不必見舟而便操之者何耶彼水不能溺利害不入其胸次故能齊淵陵一舟車不惟不知有舟覆車却且不知有萬物之介吾懷也惡往而不暇則外輕也亦猶賭者巧於瓦注憚於鉤注㱪於黃金注非巧有不同也則鉤金能令其智昏徒見金而忘巧也豈非外重者内拙乎莊老加一凡字甚妙聖賢仙佛只是内重而外輕凡人不敢以聖人自居者因外重以致内拙爾羊與陽同音仙家多以養羊爲寓言蓋本莊老養生若牧羊然視其後者而鞭之句來此句極難會心内外交養原是大修行者之的派第此有所先則彼必有所後鞭者着意策勵之謂也羊之前者旣行故不必鞭前而鞭後單豹先養内而後外張毅先養外而後内皆坐不鞭後之病以死然則養生將奈何吾以爲莫如煉已煉已莫如定息凡人氣有吐納則有出入無入而藏則内不入矣無出而陽則外不出矣無出無入此是閉息工夫柴立其中央者存神於玄牝也卽悟眞篇云鑑形閉息思神法也能閉十二息爲小道百二十息爲大道至千息去仙不遠三者若得其道必名爲眞人人知十步殺一人爲畏塗不知畏塗不在道塗而在食色之間故袵席之上飲食之間而能知戒則爲仙爲佛不知戒者未有不喪生者也人之所惡莫如死爲彘謀者必願食糠糟而居牢筴不願加肩尻于雕爼之上胡人爲軒冕則不畏死於腞楯之上爲彘謀則知避死而趨生自爲謀不能如爲彘謀者何也則惡死之心奪於爲功名之心也人知生爲人而死爲鬼人鬼二途也不知鬼神體物而不遺視之而不見者偶見於桓公焉因而致病有皇子告敖者曰公則自傷鬼惡能傷公似以鬼神爲無矣又曰忿滀之氣散而不反則爲不足隨其氣之上下能令人怒能令人忘不上不下中身當心則能令人病似又以鬼神爲有矣旣曰有則無所不有豈惟沈竈戸内雷霆東北西北皆有鬼神也水邱山野亦有鬼神也澤有委蛇見之者殆足以霸桓公與之坐談不終日而不知病之去也正見公不自傷鬼惡能傷公也若此者皆由氣不足之故爾故有紀渻子爲王養鬬雞之喻此是凝神養氣之至理凡學道者須潛心理會而後大有進益無論養德卽養勇者十日而虛憍恃氣其剛易折也又十日而猶應影響其燥易撓也又十日而疾視盛氣其猛易柔也又十日而致虛極守靜篤不可以利誘不可以譎取不可以怒激望之似木雞其神完也察之其德全德全者氣全也於虛實戰守之道無不了了於心胸誰敢有與我敵者總見輕試者取敗積養者氣足也氣足則橫行天下可矣呂梁丈人之蹈水行歌能遊黿鼉魚鼈之所不能遊不知者以爲鬼物知之者以爲蹈水有道也道不外乎故與性命吾始乎故未狎水也長乎性則與水習矣成乎命則與水相忘矣偕入偕出止於從水之道而不爲私焉吾以安於陵爲故無奈其生於陵何也以安於水爲性無奈其長於水何也以不知所以然而然無奈其死生制於命而不制於水也水性且以順其自然而生况人性哉削木爲鐻小技也梓慶猶能以養氣而全神三日齋忘利也五日齋忘名也七日齋忘我也不知有公朝忘勢也然後外滑消而巧專然後入山林而木性得然後成鐻完而可加手焉不然不輕爲也此之謂以吾心純一之天而合物自然之天器之形而下者得神之形而上者以造作之卽不謂之人而謂之神也亦宜東野稷以御而中繩中規圓驅鉤百而後反顏闔預知其必敗者爲其馬力竭也然則養生而務乎生之所無以爲併務乎知之所無奈何者必無成矣卽一御猶有心以合規矩者又有工倕得之心而應之手以手旋物而自中規矩指與物化而不以心稽者不知指之爲物物之爲指也其靈臺一而不桎於規矩者忘乎規矩之規矩也履適則忘足帶適則忘腰心適則忘是非境適則忘内外故一適則無所不適者而後爲忘適之適乃眞適也孫休之自反者以修身已潔赴難已勇而所遇不時未免有怨天尤人之念扁子詔之曰夫至人者其肝膽耳目與人同而忘肝膽遺耳目與人異居塵垢之中而遊塵垢之外入有事之境而逍遥無事之業雖内有所作爲而不恃其能與汝飾知以驚愚異矣雖尺有所長而不倚之以自任與汝修身以明污昭昭乎揭日月而行者又異矣汝得保爾形骸全爾九竅亦幸矣又何暇怨天哉若孫休之所問皆入世之情而扁子之所言則出世之法以入世爲是者不可告以出以出世爲是者不可告以入孫休聞至人全生之語毋乃爲養鳥以太牢欵鳥以九韶乎又非載鼷以車馬樂鴳以鐘鼓乎吾恐其驚而無當也外篇山木第二十此篇論全身遠害之道其要只在虛巳順時而去其自賢之心當與人間世並看莊子行於山中見大木枝葉盛茂伐木者止其旁而不取也問其故曰無所可用莊子曰此木以不材得終其天年世之以材累者多矣莊生數數言之昭炯鑑也夫子出於山舍於故人之家故人喜命豎音恕子殺鴈而烹之豎子請曰其一能鳴其一不能鳴請奚殺主人曰殺不能鳴者鴈以不能鳴取殺者凡夫也言外見鳳鳴於丹邱者眞人也明日弟子問於莊子曰昨日山中之木以不材得終其天年今主人之鴈以不材死先生將何處莊子笑曰周將處夫材與不材之間材與不材之間似之而非也故未免乎累有材而不自見人旣不得以無材棄我又不得以有材忌我以此混世而求自免是亦似矣然而非道也故不免於累何者謂其有心也無心則無累矣若夫乘道德而浮游則不然無譽無訾大道本無物我世人妄有分別是非蜂起而道德離矣無譽無訾不可得而貴賤也一龍一蛇不可得而聖凡也與時俱化而無肯專爲消息盈虛與時變遷也一上一下以和爲量或升或潛位無常居自和其光也浮游乎萬物之祖游心於混沌之天太始之初猶云眾父父也物物而不物於物則胡可得而累邪音耶物物猶言生物不物於物猶言不生於物也則物焉得而累我耶此神農黃帝之法則也若夫萬物之情人倫之傳情性情也物賤而人貴功名暫而性命永此萬物之情也倫類也傳傳習也有入於世者則傳入世之法有出於世者則傳出世之法此人倫之傳也則不然合則離合則勢聚必有間而離之者成則毁成則功高必有忌而毀之者廉則挫廉則圭角露必有抑而挫之者尊則議尊則觀望者多必有從旁議之者有爲則虧有爲則功成故有從而虧之者賢則謀賢則多智人必有惡而謀之者不肖則欺不肖則愚人必有易而欺之者胡可得而必乎哉材則如木不材則如鴈均之不能以自免又胡可得而必乎哉不能必無患也悲夫弟子志之其惟道德之鄕乎不炫才不韜能無肯專爲與世和同此道德之鄉也市南宜僚見魯侯魯侯有憂色市南子曰君有憂色何也魯侯曰吾學先生之道修先君之業吾敬鬼尊賢親而行之無須臾離居然不免於患吾是以憂學道修業國無廢夗夕野無遺賢可無患矣而居然不免是以可憂市南子曰君之除患之術淺矣夫豐狐文豹棲於山林伏於巖穴靜也夜行晝居戒也雖饑渴隱約猶且胥疏於江湖之上而求食焉定也然且不免於罔羅機辟之患是何罪之有哉其皮爲之災也俛而喙仰而四顧深居而間出以避患也而竟不免繒繳䧟阱之虞以皮自累也今魯國獨非君之皮邪音耶吾願君刳音枯形去皮形不遺則國得爲之累刳形所以去皮洒心去欲心不白則欲得爲之染洒心所以去欲而遊於無人之野内不見已外不見人天下之大解脫也又何累之足患此段借狐豹身上發出箇靜戒定加一慧字遂爲不二法門之宗旨有志學道者誠能刳形去皮以淨其外洒心去欲以淨其内而仙佛可立成矣又何必更求秘密語哉南越有邑焉名爲建德之國無物之始卽所謂淨土也其民愚而朴少私而寡欲無文彩也知作而不知藏無私蓄也與而不求其報無爾我也不知義之所適無分別也不知禮之所將無往來也猖狂妄行乃蹈乎大方任意而行暗合大道其生可樂音洛其死可葬吾願君去國捐俗與道相輔而行生可樂卽詩云樂土也死可葬卽文王澤及枯骨也國與俗糜之所以有累去之捐之則無爲矣君曰彼其道遠而險又有江山我無舟車奈何市南子曰君無形倨音據無留居以爲君車君曰彼其道幽遠而無人吾誰與爲鄰吾無糧我無食安得而至焉市南子曰少君之費寡君之欲雖無糧而乃足君其涉於江而浮於海望之而不見其岸愈往而不知其所窮送君者皆自崖而反君自此遠矣陸西星曰又爲孱弱之夫沈溺愛河不能解脫者加一鞭策蓋人無車則困無糧則飢皆爲形骸所累若能外其形骸寡其嗜欲坦然由之而無礙故曰無倨傲爾形無留戀爾居則無車之車行矣少君之私寡君之欲則無糧之糧足便是遊于逍遙之墟食于苟𥳑之田立于不貸之圃從此涉江浮海溯流窮源愈造愈深愈往愈遠彼送者到岸而反君自此獨行入于寥天去人遠矣去人遠則與道爲鄰尙何離羣索居之足患哉故有人者累得眾而有國則有有國之累見有於人者憂見有於人而爲君則憂民之憂故堯非有人寄之百官委之萬物非見有於人也因民任物而不役已吾願去君之累不有人除君之憂不見有於人而獨與道遊於大莫之國大莫之國猶言廣莫之野卽無何有之鄕也方舟而濟於河有虛船來觸舟雖有惼音揙急也心之人不怒有一人在其上則呼張歙音翕之一呼而不聞再呼而不聞於是三呼邪音耶則必以惡聲隨之向也不怒而今也怒向也虛而今也實人能虛已以遊世孰能害之無人虛也有人實也向也無人則不怒今也有人則怒矣故去累虛巳可免憂患北宫奢爲衞靈公賦歛以爲鐘爲壇乎郭門之外三月而成上下之縣音玄王子慶忌見而問焉曰子何術之設朝受命而夕趨事臣之職也三月成懸必有藏仁要人者如所謂厚施得眾之意故問子何方術之設而爲此奢曰一之間無敢設也自一乃心志之外何敢更設他術奢聞之旣彫旣琢復歸於朴人之生理本無造作加以雕琢純朴散矣吾今雖當人爲之後復思返乎太朴之始侗乎其無識冺其知識也儻乎其怠疑去其心思也萃乎芒乎猶言紛紛紜紜也其送往而迎來來者勿禁往者勿止任其來者往者之在彼無將迎也從其彊梁從其强梁而不罪其背我者隨其曲傳隨其曲傳而不私其附我者因其自窮因其力之自盡而不强其所不堪者故朝夕賦歛而毫毛不挫而况有大塗者乎任物之自然而巳無容私故朝夕賦而毫毛不挫猶言無私毫之曲也而况道德之有於身者乎大塗猶云大道北宫奢未必知道而其所言似近道也孔子圍於陳蔡之間七日不火食太公任往弔之曰子幾死乎曰然子惡死乎曰然任曰予嘗言不死之道東海有鳥焉其名曰意怠玄鳥也其爲鳥也翂翂音紛翐翐音秩而似無能引援而飛與眾羣飛迫脇而棲近人爲巢進不敢爲前退不敢爲後往來不爭也食不敢先嘗必取其緒不爲人所餌也是故其行列不斥其行成列而人亦不斥逐之而外人卒不得害是以免於患直木先伐甘井先竭子其意者飾知以驚愚修身以明汙昭昭乎若揭日月而行故不免也此段卽鳥之遠害喻炫才者之難免患也昔吾聞之大成之人曰自伐者無功自矜伐者必不能成功名功成者隳卽成功而亦必隳名成者虧卽成名而亦必損孰能去功與名而還與眾人道流行而不明居道無一口不流行推以與人則有而不居矣得行而不名處顯行而不自明其所處則人莫見其功莫聞其名矣純純常常乃比於狂純一其心平常其行與猖狂不知所之者同也削迹杜門掃軌無轍環之迹也捐勢不事王侯無遊說之行也不爲功名如此則不爲天下立功不爲萬世立名是故無責於人人亦無責焉至人不聞子何喜哉平生無求備於人故人亦不得以備善責之此至人之不求聞達者也而子抑何以聞爲喜哉孔子曰善哉以下非實事設言以見意辭其交遊去其弟子逃於大澤衣裘褐食杼音杼栗入獸不亂羣入鳥不亂行不起分別之心而亂鳥獸之羣鳥獸不惡而况人乎巳不惡人人亦不惡之矣孔子問子桑雽音戶曰吾再逐於魯伐樹於宋削迹於衞窮於商周圍於陳蔡之間吾犯此數患親交益疏徒友益散何與音余子桑雽曰子獨不聞假地名人之亡與音余林回亡者姓名棄千金之璧負赤子而趨或曰爲其布泉貨謂之布以其流布如泉也與音余赤子之布寡矣謂赤子可市則赤子之布寡於千金爲其累與音余赤子之累多矣若以千金之璧爲累則赤子之累多於金璧棄千金之璧負赤子而趨何也林回曰彼以利合此以天屬也夫以利合者迫窮禍患害相棄也指璧以天屬者迫窮禍患害相收也指赤子夫相收之與相棄亦遠矣且君子之交淡若水小人之交甘如醴君子淡以親小人甘以絶彼無故以合者則無故以離喻弟子之相依者要皆一時之交利合之徒常則相聚其聚也非天屬也無故而合者亦無故而離何惑乎交益疏而友益散也孔子曰敬聞命矣徐行翱佯而歸絶學捐音員書弟子無挹於前不爲揖讓之虛禮於前其愛益加進虛文去而眞意流此弟子之親愛益加進也異日桑雽又曰舜之將死眞冷舜之生也有天下而不與冷于性也及其將死天下傳賢不傳子冷於情也非眞冷乎命禹曰汝戒之哉以下絶學棄書之尤至者形莫若緣無逆也卽有緣之緣情莫若率眞率則𥳑便緣則不離合也率則不勞逸也不離不勞則不求文以待形任其質之自然至讓無文奚用求文以待形哉不求文以待形固不待物旣不求文矣又何假於物哉物卽所謂名以命之器以別之者莊子衣大布而補之正緳音絜結帶也係履而過音戈魏王魏王曰何先生之憊音敗病困也邪音耶莊子曰貧也非憊也士有道德不能行憊也衣弊履穿貧也非憊也此所謂非遭時也王獨不見夫騰猿乎善騰躍之猿其得柟音南梓豫章也攬音覽蔓音萬攬枝而蟠結之如蔓之附木然其枝而王長精神雄壯也其間雖羿逢蒙不能睥睨也睥睨猶邪視也及其得柘棘枳枸音矩之間也危行側視振動悼慓此筋骨非有加急而不柔也加急下着一不柔字便見其筋骨之硬處勢不便未足以逞其能也今處昏上亂相之間而欲無憊奚可得邪音耶此比干之見剖心徵也夫證驗昭然孔子窮於陳蔡之間七日不火食左據槁木几也右擊槁枝策也而歌焱音標氏之風有其具而無其數以槁枝擊槁木故曰有具無節奏音響故曰無數有其聲而無宫角不合五音木聲與人聲犁然有當於人之心擊者之聲與歌聲犁然而可聽顏回端拱還音旋目而窺之仲尼恐其廣已而造大也恐其推已而至於過大愛已而造哀也愛已而至於過哀曰回無受天損易貧而樂也天能損我之遇而不能損我之道故無受爲易無受人益難富原非本來爲人益驕則受其益矣不驕不淫爲不受益甚難無始而非卒也於今爲始於昨爲卒則所謂始者卽是卒矣言變化之無窮也人與天一也夫今之歌者其誰乎歌者人而所以致我歌者人耶天耶吾不知其爲誰耶回曰敢問無受天損易仲尼曰饑渴寒暑窮桎不行天地之行也運物之泄也言與之偕逝之謂也爲人臣者不敢去之執臣之道猶若是而况乎所以待天乎飢渴寒暑窮桎不通此天之損我者天之所行非人所得止運之所泄非人所能塞吾惟與之偕行與之偕泄不敢以其損而去之也臣不敢以違君人其敢以違天乎何謂無受人益難仲尼曰始用四達爵祿並至而不窮物之所利乃非已也人自有生以後凡非本來之物皆外加也其名爲益吾不守四端而用四達之途以邀爵祿於物爲有利於已爲喪我吾命有在外者也君子不爲盜不畏人耳目而强取功名曰盜故君子不爲賢人不爲竊猶畏人知而密地取功名日竊故賢人不爲吾若取之何哉有性命之命則在内爲吾故物此命乃窮通之命旣爲在外吾若取之是盜竊而不知命者也故曰鳥莫知於鷾鴯燕也目之所不宜處不給視雖落其實棄之而走其畏人也而襲諸人間社稷存焉爾目所不宜之處則不視口所難食之實則棄之雖畏人而反居人間之堂上則以春社來秋社去一往一來氣之所使或南或北若或驅之而不能自主爾何謂無始而非卒仲尼曰化其萬物而不知其禪之者焉知其所終焉知其所始正而待之而已耳禪者造化代謝之義造者造無而使有化者化有而歸無旣不知其禪之者又惡知其終始我方觀化化且及我不敢與化爭也惟有守正以待化耳何謂人與天一邪音耶仲尼曰有人天也有天亦天也人者天之所生故曰有人天也然天之所以爲天則又造化爲之主宰故曰天亦天也非謂人與天一耶人之不能有天性也有人天也而人之不能有天則何故哉只在性分上有了加損至於以人而滅天以故而滅命爾聖人晏然體逝而終矣聖人晏然卽所謂粹然見於面盎於背體逝而終卽所謂惟聖人然後可以踐形也莊周遊乎彫陵之樊樊籬覩一異鵲自南方來者翼廣七尺目大運寸周回一寸感觸也周之顙而集於栗林莊周曰此何鳥哉翼殷大也不逝翼大逝難目大不覩目大覩希褰裳躩步執彈而留之覩一蟬方得美蔭而忘其身螳螂執翳音意執草自蔽而搏音博之指蟬見得而忘其形異鵲從而利之見利而忘其眞見螳螂之利而不逝不覩忘其眞性莊周怵音出然曰噫物固相累二類相召也蟬召螳螂螳螂召鵲捐彈而反走虞人逐而誶音𡻕之以周犯其栗林之禁故逐而誶責之莊周反入三月不庭不出戶庭藺音吝且音疽從而問之夫子何爲頃間甚不庭乎莊周曰吾守形而忘身吾爲守形之學忽因逐鵲之故而忘其身觀於濁水而迷於淸淵動與物交卽濁水靜而玄覽卽淸淵且吾聞諸夫子曰入其俗從其俗言已不當違俗而犯栗林之禁今吾遊於彫陵而忘吾身異鵲感吾顙遊於栗林而忘眞栗林虞人以吾爲戮吾所以不庭也戮辱也不出戸庭葢悔之也陽子之宋㝛於逆旅逆旅人有妾二人其一人美其一人惡惡者貴愛之也而美者賤憎之也陽子問其故逆旅小子對曰其美者自美自美則有驕妒之心吾不知其美也其惡者自惡自惡則有謙遜之意吾不知其惡也陽子曰弟子記之行賢而去自賢之行吾安往而不愛哉驕盈矜伐人神之所不與虛已循理天下之所樂推復圭子曰山木以不材終其天年前已累言無用之用也今重言之又曰鴈以不能鳴取殺則涉世者奈之何周將處夫材與不材之間似可免禍也然而非道德之正也乘道德而浮游者則不然凡物有成虧斯有毁譽而至人無成與虧則亦無譽無訾凡物分聖凡斯有龍蛇而至人聖凡莫測則龍耶蛇耶皆不得而名時有消息吾亦與之爲消息而不專主於進時有盈虛吾亦與之爲盈虛而不專主於退而惟以太和爲運用身在後天神遊先天豈惟爲眾父父且爲萬物祖矣豈惟物物而不物於物且有物者不得而累我矣古之人有行之者神農黃帝是也此皆出世法也不知入世之法安知萬物之情人倫之傳乎合不與離期成不與毁期然未有合而人不離之成而人不毀之也廉不與挫期尊不與議期然未有廉者不招挫尊者不招議也天下無爲不虧巳方有爲圖其成人且從旁撓之利其虧天下賢無全德已方好修而慕乎賢人且乘間謀之汙其行天下不肖亦有一得之長已方附乎與能之例人且多方凌之阻其進惟遊於道德之鄕者超乎萬物之上不與萬物伍而物焉能礙之彼魯侯者以學道修業敬鬼尊賢求免患而不得此其所以見譏於南宜僚也夫豐狐文豹山棲穴處靜也夜行晝居戒也間出求食定也然猶不免於網者其皮爲之災也今魯國獨非君之皮耶胡不外淨爾身毋與接爲搆内淨爾心毋日以心鬬而遊於無人欲之天則天不能禍而地不能災矣今天下人人有皮毛也人人有情欲也讀南華者盍不自省焉南越有建德之國猶釋氏所云西方極樂之國也此一段寓言爲釋氏諸經之鼻祖皆就人之一身而言天下未有愚朴之民而不少私寡欲者亦未有寡藏之民而不忘人之報者不知義不知禮人以爲猖狂而妄行孰知古有亡於義之義亡於禮之禮乃所以爲蹈乎大方其生可樂而元神不損也其死可葬視形骸如委蛻也非去國捐俗安能與道相輔而行哉魯君慮其道險而無舟車則於冗費而甯知節用卽我之法車也又慮其無鄰而無糧食則溺於愛河而甯知寡欲卽我之慈航也知節用則不喪我之元氣知寡欲則不琢我之元精元氣元精固而神愈王任其涉江浮海皆神行也江海無崖吾之所往亦無崖而不知其終窮吾今悟道則昔之少費寡欲皆爲送君之舟車旣已得道則今之舟車皆可自崖而返而釋氏所謂到岸不須船者蓋本於此君其遊於寥天一而與凡遠矣惟與凡遠者乃與道鄰不然非負有人之累卽抱見有於人之憂安能與道遊於廣莫之國哉其國有至寶無心於寶者得之不觀虛舟觸舟雖惼心之人不怒如以有人之舟而相觸未有不怒者怒不怒而係乎虛不虛舟虛且無礙况人能虛已任其遊世内世外未有不免害也衞之北宮奢賦歛爲鐘三月而後成上下之懸王子慶忌疑其有自利之心而問曰子何術之設奢曰自爲一鐘之外吾無敢設他念也奢聞之大道剖而爲器器猶朴也自雕琢施則朴散矣吾今雖當旣彫旣琢之後猶思復歸於朴侗乎其無識不知有文彩也儻乎其怠疑不肯多着工也知之者以爲此鐘不雕不琢不知者以爲萃乎芒乎而爲此鐘也不過爲送往逆來之號爾孰知來者勿禁其擊也往者亦勿止其擊也强梁者以爲不必擊吾從之曲傳者以爲當擊吾亦隨之因其自起自止故朝夕賦歛而毫毛不挫猶云不妄費作無益以害有益也而况有大道者可無復朴之志乎孔子圍於陳蔡之間七日不火食大公任往弔之曰吾與子言不死之道夫鳥之畏人者其常性也獨東海有鳥其名曰意怠飛必以羣棲必依人宜其不免於患也然而彼進不前而退不後則網羅無可害食不先而取必緒則藥餌不能害其行列必處主人之堂則外人不能害意怠非能不死也第合不死之道耳直木先伐甘井先竭誰不知之子今之被圍也意者飾知以驚愚修身以明汙則陳蔡之庸人駭昭昭揭日月而行則陳蔡之賢知忌宜其不免此患也昔吾聞之大成之人曰功名者眾人之功名也故一人可得而立之不可得而伐之與其以伐而致其墮與虧不若以功名而還之眾人之爲得也窮則道明雖爲有道之流而不明居達則道行卽爲立名之人而不名處猶然無知也無能也爲純純常常之人耳間有比之爲狂者彼又削迹捐勢功成而退已無責備於人人亦惡乎責備於我焉此至人之不求聞達者也吾又何以聞爲喜哉孔子曰善哉以下孔子不必有是事恰爲大修行者苦志了道之標的也故辭交遊去弟子逃大澤粗衣菓食深山所居之人類如此至于入獸不亂羣入鳥不亂行則得道以後事異類且可化而况同類乎孔子不得志於魯宋衞周陳蔡之間而親交疏問於子桑雽子桑雽曰假人有亡者曰林回棄千金之璧負赤子而趨爲赤子可以市所市能幾何吾知其非爲布也爲千金之璧爲吾累赤子之累甚於璧也則或人之所未解矣林回曰尺璧雖重利也赤子雖輕天也夫以利合者迫窮禍患害之時而不能保其利必相棄也以天屬者迫窮禍患害之時而天不可解必相收也相棄之與相收奚待智而後辨哉天下有君子淡若水之交卽有小人甘若醴之交有淡以親之君子卽有甘以絶之小人彼親友人也非天也無故而合者則無故而離散以人也非散以天也孔子于是絶學捐書令弟子不爲揖讓之虛文而情愛彌篤昔舜之命禹曰天下凡有形者皆有情形易離而情易勞故形莫若緣而因之則不離情莫若率而易之則不勞又何必文物以紀之聲名以發之哉似併虞夏之書亦絶而捐之矣莊子衣大布之衣補結繫履而見魏王魏王曰何先生之憊也莊子曰有道德而不能行者之謂憊衣弊履穿士之不得志於時者之所爲貧也非憊也君獨不見夫騰猿乎其王長於柟梓豫章也雖善射者無所施其巧及其危行側視於柘棘枳枸也筋骨非加急而不柔也處勢不便雖便捷者未足以展其能也今周所遇非時而欲無憊奚可得耶此比干之見剖心徵也夫孔子困於陳蔡七日不火食所缺者火也故以槁枝擊槁木而歌焱氏之風其歌雖有具而無數有聲而無音木聲與人聲犁然有當於人心識者咸知其不怨不尤也仲尼恐顏回之推已而至於過大愛已而至於過哀乃曰凡人有眞宰本至完也天定之矣此先天也而無爲後天所損猶易也亦至足也人成之矣此眞人也而毋爲世人所益則甚難也今日吾困於陳蔡於事爲始俄而變遷又爲局之卒矣人事之不停與天道之周流一也夫今之歌者其歌誰耶歌天乎而吾不受天損歌人乎而吾不受人益始信吾命有所制矣何謂無受天損易夫飢渴寒暑天地有推移而吾亦與之爲推移後天而奉天時也臣且不敢以逆君而人其敢違天乎何謂無受人益難夫名位爵祿乃外加已之所無非益已之所有人不明盜之卽暗竊之君子賢人之所不爲也而吾何爲取之哉故曰鳥莫知於鷾鴯非其所處則目不妄視非其所食則口不妄食戊已不爲巢知天也畏人而襲人知人也春社來而秋社去知時也何謂無始而非卒夫造化之禪代往過來續吾不知其禪安知其終始吾方觀化而不敢與造化爭衡惟有守正以待陳蔡人之自退爾何謂人與天一耶天非人不因今日所遇之人而皆天之所使故曰有人天也人非天不成今日所遇之天而人不能貪其功故曰有人天也有天亦天也而人之不能有其天此何以故性存則天存性亡則天亡也惟聖人生知安行與天偕行體逝而終與天偕往天人無分世之爲聖人能有幾哉莊周遊於彫陵之樊有異鵲自南方來感周之顙而集於栗林莊周曰此何鳥哉翼大逝難目大覩希褰裳躩步執彈而留之覩一蟬方得美蔭而忘其身不知螳螂之在後也螳螂執翳而摶之見利而忘其形不知異鵲之在後也異鵲快螳螂之在前見利而忘其眞不知莊周執彈之在後也莊周徒知蟬召螳螂螳螂召鵲二類相召也而竟忘犯栗林虞人之禁以取其誶責也乃省悟曰吾聞守身者内外交養今吾守吾形焉耳爲一鵲之故而忘身犯其禁何異覩濁水者不知其濁迷淸淵者不知其迷乎人能鑑於淸淵卽知利爲害之所倚矣而美中有惡亦猶是也陽子之宋㝛於逆旅逆旅人有二妾其一美而一惡惡者寵貴而美者疏賤陽子問其故逆旅人對曰美者不忘美自以爲美則有驕心吾不知其美也惡者不忘惡自以爲惡則有謙心吾不知其惡也陽子曰弟子識之天下無往非道也無往非學也使人行賢而去自賢之行安往而不爲人之所愛哉其庶幾遊於道德之鄉乎未有不免於患也外篇田子方第二十一全德之人目擊而道存視四肢爲塵垢等死生爲晝夜不假修爲而自能物物明乎臧丈人不釣之釣伯昬無人不射之射凡有不存之存而始可與言道矣田子方文侯之師待坐於魏文侯數音朔稱谿工賢人文侯曰谿工子之師邪音耶子方曰非也無擇子方名之里人也稱道數音朔當與之論道理往往當於人心故無擇稱之文侯曰然則子無師邪子方曰有曰子之師誰邪子方曰東郭順子文侯曰然則夫子何故未嘗稱之子方曰其爲人也眞無假也人貌而天貌雖與人同而心則純乎天理虛緣而葆音保眞凡人之心未始須臾不緣物眞人則虛已而順物靜虛以養眞也淸而容物物無道淸者多大察而不足以容物彼則淸而能容物之無道者正容以悟之則所告者不在諄諄之間使人之意也消則所攺者不在事爲之迹無擇何足以稱之言其無得而名之也子方出文侯儻然自失之貌終日不言召前立臣而語之曰遠矣全德之君子指順子始吾以聖知之言仁義之行爲至矣吾聞子方之師吾形解而不欲動口鉗而不欲言二句摹寫儻然自失之意求諸行而不得故形解而不欲動求諸言而不得故口鉗而不欲言吾所學者眞土梗耳此非學之所及故知其所學爲土梗耳土梗土木所爲之人也與眞人異夫魏眞爲我累耳温白雪子適齊舍於魯魯人有請見之者温伯雪子曰不可吾聞中國之君子明乎禮義而陋於知人心言其習於未學而昧於本體也吾不欲見也至於齊反舍於魯是人也又請見温伯雪子曰往也蘄音祈見我今也又蘄見我是必有以振動也可振動我心也我也出而見客入而歎明日見客又入而歎其僕曰每見之客也必入而歎何邪曰吾固告子矣中國之民明乎禮義而陋乎知人心昔之見我者進退一成規一成矩威儀動容周中規折中矩從容一若龍一若虎從容動容也若龍有變化也若虎有文章也其諫我也似子其道音導我也似父交淺而言深則非得我於眉睫之間此所謂明於禮義而陋於知人心也是以歎也仲尼見之而不言子路曰吾子欲見温伯雪子久矣見之而不言何邪仲尼曰若夫人者目擊而道存矣亦不可以容聲矣以目寓目至道盡在神會之中不待言語而意已喻矣維摩詰與諸菩薩論不二法門獨文殊默而無言維摩詰亦無言正得目擊道存之意顏淵問於仲尼曰夫子步亦步夫子趨亦趨夫子馳亦馳步趨馳以馬爲喻也夫子奔逸絶塵而回瞠音撑直視貌若乎後矣夫子曰回何謂邪曰夫子步亦步也夫子言亦言也夫子趨亦趨也夫子辯亦辯也夫子馳亦馳也夫子言道回亦言道也及奔逸絶塵而回瞠若乎後者步趨馳辯求之言語文章之間可追而及也至奔逸絶塵瞠乎其後則大可爲也化不可爲也夫子不言而信不比而周無器而民蹈乎前而不知所以然而已矣不期於信而人信之不期於親而人親之無名位而民歸之所謂神化也莫之然而然此正瞠乎其後處仲尼曰惡可不察與音余謂密察此心之存否夫哀莫大於心死而人死亦次之此以本來之良心不存爲心死故可哀若人死特形死而良心未必俱死故次之與玄門以死其情慾之心爲心死者不同日出東方而入於西極萬物莫不比方由東西以定南北也有目有趾者待是而後成功是出則存是入則亡人之有心如天之有日萬物待是以定方向不獨有目有趾者待是而後成功以出作人息也萬物亦然有待也而死有待也而生人待日之出入以爲出入造化之於萬物亦如是待日行柳十一度萬物之入者機死也待日行虛一度萬物之出者機生也吾一受其成形而不化以待盡效感也物而動日夜無隙而不知其所終一受造化之爐鑄便爲軀殼所累而不能解蛻以待其自盡皆由心逐於物日夜無一隙之暇則又安能知造化之終始哉此之謂不知命薰然其成形知命不能規乎其前𨚑以是日徂凡人之有形者皆有命也不知命者皆在規矩範圍之中徂者往也雖至大盡之日而未必合乎規矩邱當薰然成形之始知命之後無往而非規也何必以規立乎吾前而爲待徂之日哉吾終身與汝交一臂而失之可不哀與音余交臂得其象貌也失之失其眞宰也汝殆著乎吾所以著也彼已盡矣而汝求之以爲有是求馬於唐肆也著者形骸也所以著者不規之圓神也著者有盡雖滯於有而所以著者無盡不落於有彼得吾有著之已盡矣而遂求之於有如上文言亦言辯亦辯言道亦言道所以絶塵之後而不可追是求馬於唐肆而未必得馬猶求道於有而不能得道也肆爲市馬之處唐爲無壁之屋以便馬出入吾服汝也甚忘汝服吾也亦甚忘服佩服也墮體黜聰是甚忘也吾嘗語汝使佩服矣女亦嘗服膺勿失於吾甚忘之言矣雖然汝奚患焉雖忘乎故吾吾有不忘者存雖然汝奚以瞠乎其後爲患忘之中有不忘者存忘者陳迹也不忘者眞性也忘其所忘不忘其所不忘則無得之得卽眞得矣卽吾所待以生之物也孔子見老聃老聃新沐方將被髮而乾音干慹音湼然似非人㗳然似喪其采禺也孔子便而待之少焉見曰邱也眩與音余其信然與音余旣疑其爲目眩不明又信其爲眞然也向者先生形體掘若槁木似遺物離人而立於獨也藏精藴神忘一身心而後外物去也老聃曰吾遊心於物之初物初乃未始有物之先遊心於此所以慹然似非人孔子曰何謂邪曰心困焉而不能知口辟焉不能言擬知而心己困欲言而口又辟辟卷不開也離心忘言斯近之矣欲其得之於意言之外也嘗爲女音汝議乎其將將者將來且然而未必然之辭謂至近也至陰肅肅陰慘之氣至陽赫赫陽舒之氣肅肅出乎天陰根陽也赫赫發乎地陽根陰也兩者交通成和而物生焉陰陽媾精萬物化生或爲之紀而莫見其形物生之大綱可見而其細紀莫可見消息滿虛滿虛卽盈虛也一晦一明日攺月化日有所爲而莫見其功生有所乎萌死有所乎歸始終相反乎無端而莫知乎其所窮非是也且孰爲之宗消息有數晦明有常謂其有作爲也而不覩其功用生則萌於慌惚死則歸於𥥆㝠無端則莫知其始無窮則莫知其終非有爲物之初者孰爲之主張乎是哉孔子曰請問遊是請問遊心於物之初者何若老聃曰夫得是至美至樂也得至美而遊乎至樂謂之至人命者天下之至美道者天下之至樂先了命而後了道故能有美則可以有樂二者必至人斯能兼之孔子曰願聞其方曰草食之獸不疾易藪水生之蟲不疾易水行少變而不失其大常也其於死生如獸易藪魚易水暫爾小變又何疾焉喜怒哀樂不入於胸次人莫不有大常知大常者喜怒哀樂不能入矣夫天下也者萬物之所一也得其所一而同焉則四支百體將爲塵垢而死生終始將爲晝夜而莫之能滑音骨而况得喪禍福之所介乎凡人每以生爲常死爲變至人旣視死生爲大常而喜怒哀樂不能入豈惟死生凡天下萬物之出機入機視之皆一道也得其一則萬物之榮枯亦與吾之生死同耳且等四支百體爲塵垢等死生終始爲晝夜而莫能滑吾之大常也而况得喪禍福之小者何足以介吾意乎棄隸皂臣隸賤職也者若棄泥塗知身貴於隸也凡人棄軒冕者猶有爲名之心而未必眞知我之貴惟棄隸如泥塗必知我身之貴於隸矣貴在於我而不失於變且萬化而未始有極也夫孰足以患心已爲道者解乎此隸可棄而身不可棄身常也常在我則我貴雖有小變豈以所賤而失吾所貴哉萬化無極亦奚足以累吾心已爲道者解乎此故也則得至美而遊至樂矣孔子曰夫子德配天地而猶假至言以修心古之君子孰能說音脫焉孰有能離言論以求道老聃曰不然夫水之於汋音酌也無爲而才自然矣水之善利萬物豈有所造爲惟順其才之自然而已至人之於德也不修而物不能離焉不假修爲而自能物物若天之自高地之自厚日月之自明夫何修焉此種學問無修無證若天自高地自厚日月自照臨川澤酌之而自潤何假於修習而能之哉至人不事作用墮體黜聰所以亦能物物或問不修之義曰學如元凱方成癖文似相如始類俳獨立孔門無一事只輪顏氏得心齋孔子出以告顏回曰邱之於道也其猶醯雞與音余微夫子之發吾覆也吾不知天地之大全也醯雞乃醋中蠛蠓也覆在甕中非夫子啟而發之何以見天地之寥廓哉莊子見魯哀公哀公曰魯多儒士少爲先生方者莊子曰魯少儒哀公曰舉魯國而儒服何謂少乎莊子曰周聞之儒者冠圜音員冠者知天時履句音矩方也履者知地形緩佩玦音决有决斷之義者事至而斷君子有其道者未必爲其服也爲其服者未必知其道也公固以爲不然何不號於中國曰無此道而爲此服者其罪死於是哀公號之五日而魯國無敢儒服者獨有一丈夫暗指孔子儒服而立乎公門公卽召而問以國事千轉萬變而不窮莊子曰以魯國而儒者一人耳可謂多乎按莊子與魏惠王同時去魯哀公百二十年此云爾者特寓言耳以下錯舉數事備言無心感人之妙百里奚爵祿不入於心奚之飯牛自適已事未嘗有干祿之心故飯牛而牛肥使秦穆公忘其賤與之政也有虞氏死生不入於心完廩濬井而不以死生動心故足以動人成邑成都師錫堯禪皆是動人宋元君將畫圖眾史畫工皆至受揖而立舐筆和墨在外者半有一史後至者儃儃音但然舒閒貌不趨受揖不立因之舍公使人視之則解衣槃音盤箕踞貌臝音裸解衣見形君曰可矣神閒志定意在筆先也是眞畫者也胸中有全畫文王觀於臧地名見一丈夫釣太公望也而其釣莫釣謂直釣也託釣待時非持其釣有釣者也非持其釣釣有所以釣乃釣國也常釣也常常如此持釣自適而已文王欲舉而授之政而恐大臣父兄之弗安也欲終而釋之而不忍百姓之無天也不忍生民之無主於是旦而屬音燭諸大夫曰昔者寡人夢見良人黑色而髯音髯乘駁馬而偏朱蹄一蹄偏赤號命曰寓而政於臧丈夫庶幾乎民有瘳音抽治也乎諸大夫蹵然驚動貌曰先君王也文王曰然則卜之諸大夫曰先君之命王其無他言當遵先王之命而不可他疑又何卜焉遂迎臧丈夫太公望也而授之政典法無更不變法度也偏令無出無專令也三年文王觀於國則列士壞植散羣壞其所樹之黨不養徒眾長官者不成德不使民見德螤音庾量名斛不敢入於四境他國庾斛不敢入其境内列士壞植散羣則尙同也無偏無黨長官者不成德則同務也不居功也螤斛不敢入於四境則諸侯無二心也不懷疑也文王於是焉以爲太師北面而問曰政可以及天下乎有心及天下則非自然臧丈人昧然而不應泛然而辭朝令而夜遁終身無聞太公之遁恐不知順天命之自然而一以有心爲之則損德多矣顏回問於仲尼曰文王其猶未邪又何以夢爲乎仲尼曰默汝無言夫文王盡之也任諸大夫而不自任巳盡道也而又何論刺焉彼直以循斯須也文王至德不可譏議彼直循人清於斯須耳蓋循情以用人乃聖人之大權而下不敢以議上又臣子之盛節也列御㓂爲伯昬無人射引之盈貫貫鏑也引弓滿鏑射之法也措杯水其肘上前手直而肘平可置杯水于上言定也發之適矢復㳫方矢復寓發矢適去而後矢復撘撘者纔去而方來之矢又寓于弦上言神速也當是時猶象人也當射之時而身之不動如木偶人然用志之不分也伯昬無人曰是射之射以巧用非不射之射也以神用嘗與汝登高山履危石臨百仞之淵若能射乎於是無人遂登高山履危石臨百仞之淵背逡音皺巡足二分垂在外揖御㓂而進之山之高石之危淵之深而不爲動者神全而氣定也御㓂伏地汗流至踵伯昬無人曰夫至人者上闚靑天下潛黃泉揮斥八極神氣不變天之上泉之下極之八極且斥之而不變非强之也中有養耳此所以能審安危之機而自得所謂不射之射也今女怵然有恂音荀目之志爾於中也殆矣夫恂目者外巧也中殆者神氣不充足也肩吾問於孫叔敖曰子三爲令尹而不榮華三去之而無憂色吾始也疑子今視子之鼻間栩栩音許然鼻踵息而不粗有養之意子之用心獨奈何孫叔敖曰吾何以過人哉吾以其來不可却也其去不可止也吾以爲得失之非我也而無憂色而已矣知來去之無常知得失之非我也我何以過人哉且不知其在彼乎其在我乎不知可貴者在彼在我其在彼邪亡乎我貴若在令尹則與我無預在我邪亡乎彼可貴若在我則與令尹無預方將躊躇方將四顧何暇知乎人貴人賤哉高視追想于天地之問安知人貴人賤哉仲尼聞之曰古之眞人知者不得說不爲言詞所窮美人不得濫不爲聲色所淫盜人不得刦音刼不爲威武所屈伏戲黃帝不得友不爲富貴所動死生亦大矣而無變乎已况爵祿乎若然者其神經乎大音泰山而無介入乎淵泉而不濡處卑細而不憊音敗充滿天地旣以與人已愈有審乎無假而不與物遷其神可以經山人淵充滿天地與人愈有言道之無窮也楚王與凡國名君坐少焉楚王左右曰凡亡者三言凡國有三亡徵凡君曰凡之亡也不足以喪吾存夫凡之亡不足以喪吾存則楚之存不足以存存由是觀之則凡未始亡而楚未始存也君子所性大行不加窮居不損凡雖亡矣而不足以喪吾存此凡君見道之言也由是觀之凡亡不足以喪存楚未亡甯足以存存乎凡固未嘗亡而楚固未嘗存也明乎凡楚之存亡則世之得喪禍福皆外物矣此是學問切實受用語復圭子曰田子方數稱谿工之賢於魏文侯而不稱東郭順子者何也以東郭順子之爲人眞人也具人之形而全天之德視萬綠皆虛幻也葆本來爲眞切也太虛之中何所不容藏垢納汙不足貴也而能消垢汙爲淸淨斯爲順子之天行也文侯於是儻然自失始悟夫聖知之言仁義之行爲未至乃形解而不欲動思欲行滿天下無身過也口鉗而不欲言思欲言滿天下無口過也謂昔之所學者爲土梗思欲化臭腐爲神奇不人貌而天行不已也進乎此者其温伯雪子乎適齊舍魯而不見魯請見之人謂中國之人明乎禮義似彬彬質其有文也而陋於知人心則不能盡巳之性以盡人之性也後疑其有以振我而見之果不出雪子始之所言矣夫昔之見我者能方能員而未能忘于方員能陽能陰而未能超乎陰陽徒以口舌昭道德而不能以忘言證道德此其所以見客而歎也仲尼曰夫人以耳聞道不如雪子之以目擊道以聲闡道不如雪子之以目存道也天下之不可以容聲而求道者幾人哉卽敏如顏子猶求夫子於步趨馳驟言語之間而夫子奔逸絶塵非步趨馳驟之所能及也夫子不言而信不比而周無位而民歸又非言語文章之所能及也意者道不在口而在心乎故夫子曰人知氣聚則生氣散則死而不知心聞道則生不聞道則死心死甚於人死也人之有心如天之有日日出東方而入於西極人因之以作息夫人一日之存亡也春日行虛一度冬日行氐四度動植待之以卷舒萬物一𡻕之生死也夫苟吾爲軀殼之吾惟與物爲役役且不知其所自始安知其所自終今吾爲知命之吾規方由我而出何前途之不可往夫道有著者則有矣有所以著者則非有矣而必求之於有是求馬於唐肆也安得有馬乎故吾不患不得道而患不能忘道不患一人不忘道而患不能與汝俱忘道蓋故吾爲成形之吾不變不化者也不可不忘而眞吾爲知命之吾無始無終者也忘者忘而不忘者自不忘孔子見老聃老聃新沐似喪其耦而孔子以爲遺物離人而立於獨老聃曰吾遊心於物之初何也人能見巳然不能見將然故必屏心知杜口言方可與汝議乎其將至人不言已往而言將來未言人道而先言天道至陰肅肅愁慘之象也至陽赫赫發舒之象也肅肅不出於地而出於天自夏至而下降也赫赫不發乎天而發乎地自冬至而上升也陰陽和而萬物生大綱著而細紀藏消息盈虛其造化之宻移乎晦明日月其造化之彰著乎有天道卽有人道生不生於生之日而必有所萌待之以生也死不死於死之地而必有所歸待之以死也一生一死相爲終始無端而莫知其始無窮而莫知其終不有爲物之初者孰能主張乎是哉天下之至美莫如命而至樂莫如道惟至人先了命而後了道故得至美而遊至樂孔子曰願聞其方老聃曰凡人每以生爲常死爲變而至人視死生爲大常而不動念豈以喜怒哀樂而易心謂天下有萬物而卽有吾吾爲萬物中之一物其與之同者榮枯死生之理而不與之同者忘形骸超死生之見而又何有乎得喪禍福棄隸者猶知身貴於隸豈以貴在我者而爲變故所失乎不見有得喪禍福則必不知有喜怒哀樂無心患者自有妙解足徵爲道之至樂矣孔子曰夫子德配天地而猶假至言以修心古之君子其孰能說此道者老聃曰不然天地間無往而非水也人日取酌焉彼之才自然而然無爲也而無不可爲也至人之德亦猶水之利萬物無修也無證也而物不能離天地不修而自高厚日月不修而自照臨至人不修而道同天地日月孔子出而告顏回曰夫人所處小則知亦小所聞大則知亦大始吾之於道也其猶醯雞與止知其中之廣耳向微老子之發吾覆也安知天地之大全也幾虛吾一生矣魯本多儒而莊子對魯哀公曰魯少儒以儒自有眞不在服也公亦知儒服之所取乎冠員冠以象天者知天時履方履以象地者知地利帶佩玦以解紛者事至而斷有其道者多懷玉而被褐無其道者往往服之不衷也公盍號於國曰無儒道而有儒服者殺無赦而魯果無敢儒服者獨有一丈夫子儒服而立公門公問以國事隨叩隨應無不叩而無不應卽千萬而不能窮莊子曰然則以魯國而儒者一人耳餘皆僞儒也可謂魯多儒乎吾以是知千古以上惟眞則能動人也古有爵祿不入於心者飯牛牛肥而致秦穆公與之政百里奚是也古有死生不入於心者以完廩浚井之餘而致陶唐氏之推位虞舜是也古有畫史未䑛筆和墨而動宋元君嘆其爲眞畫解衣槃裸是也古有持其釣有釣而不釣者常釣也臧丈人是也文王欲授之政恐大臣父兄之弗安欲置而棄之又不忍百姓之無天日之所思者臧丈人也故夜之所夢者亦臧丈人也於是旦而屬之大夫曰昔者寡人夢見良人命曰寓而政於臧丈人庶幾民其有瘳乎遂不卜而授之政無變法無專令三年而列士壞植散羣足徵無偏無黨上下之大同也長官者不成德足徵公爾忘私視國事如家事也螤斛不敢入於四境足徵諸侯信其不欺視吾國如彼國也文王於是尊之爲太師問之曰此政可以及天下乎文王乃無心爲民之言而臧丈人則疑其有利天下之心遂不應而夜遁顏回曰文王其猶非至德耶又何必以夢爲言也仲尼曰凡人見其偏不見其全斯可譏議而文王聖人也慮無不周巳盡之也又何可論剌焉彼直以順人情於斯須耳而其深意固非末學之所能識也列御㓂爲伯昬無人射引弓滿鏑肘平矢速身如木偶自謂得射之道矣伯昬無人曰射有巧有神汝今是射之射巧也汝得之矣有不射之射神也汝猶未也試與汝登高履危虛實相半若能射乎御㓂伏地流汗安敢射也伯昬無人曰夫至人者無天於上無地於下橫無八極故安危不入於心而能爲不射之射今汝猶以目而窺見上下四方神氣不足故安危皆得以入汝之中而不免於殆矣孫叔敖三爲令尹而寵辱不驚以致肩吾之問孫叔敖曰吾非能過人也獨聽來者之自來不得而卻之則得非我也去者之自去不得而止之則失非我也此其所以不喜不憂也且忘貴賤亦忘彼我貴果在令尹耶則不有我矣貴果在我耶則不有令尹矣方將躊躇凡物之去來猶是也方將四顧凡人之得喪猶是也何暇知乎人貴人賤哉仲尼聞之曰古之眞人忘言語忘聲色忘威武忘帝王視死生如旦暮也况爵祿乎若而人也其神可透山入淵其氣可充天滿地其養可處瑣尾而不挫此特不失其先天之元神元氣耳眞人以此道教人而神愈王楚王與凡君坐楚人謂凡有三亡徵凡君曰凡之亡也有不與之俱亡者不足以喪存楚之存也而有不存者不足以並存由是觀之凡之亡中有存而楚之存中有亡則謂凡未始亡而楚未始存也亦宜明乎凡楚之存亡小則齊得喪大則亡死生視墮支體如委蛻也非目擊而道存者安可與語此理哉外篇知北遊第二十二通篇以無知無爲無修爲主其斷言語絶名相釋氏諸經多宗此意知知與無爲謂狂屈皆假設之名也北遊於玄水玄水乃產藥之川源卽黃帝所遊赤水之北是也之上登隱弅音紛之邱而適遭無爲謂焉設爲無言之人名以形容直超頓悟之旨知謂無爲謂曰予欲有問乎若汝也何思何慮則知道何處何服佩服也則安道何從何道則得道三問而無爲謂不答也非不答不知答也此不答正所謂不言若使知答則是墮於疑網落於言筌起於知識生於見解而去道遠矣知不得問反於白水之南登狐闋音缺之上而睹狂屈焉知以之言也猶是言也問乎狂屈狂屈曰唉音苔應聲也予知之將語若汝也中欲言而忘其所欲言雖未答而答念未忘知不得問反於帝宮見黃帝而問焉黃帝曰無思無慮始知道無處無服始安道無從無道始得道道之爲物何名何相無有知者無不知者故不可以思慮知無有安者無不安者故不可以服而安無有得者無不得者故不可以從而得知問黃帝曰我與若汝也知之彼指無爲謂與彼指狂屈不知也以不答之故其孰是邪三人者孰爲是耶黃帝曰彼無爲謂眞是也達摩西來不立文字直指人心見性成佛卽是此意狂屈似之以其有答之心故僅得其似我黃帝自指與汝指知終不近也以其答言筌之障夫知者不言言者不知出道德經故聖人行不言之教道不可致德不可至致者招之使來之謂道無方體何可致也至者自彼至此之義德本在我何從至也仁可爲也義可虧也禮相僞也故曰失道而後德失德而後仁失仁而後義失義而後禮禮者道之華而亂之首也德則無爲而仁猶可爲也義則分別太甚虧之可也禮則奸雄借之以文奸所謂亂之始也故曰爲道者日損損之又損之以至於無爲損者削而去之之謂先損其知後損其不知以至於無知無損而復無爲則仁義禮樂孰非道耶無爲而無不爲也今已爲物也樸散爲器欲復歸根反於道德不亦難乎其易也其惟大人乎惟大人者損之又損反於道德所以易也生也死之徒死也生之始孰知其紀生死之大綱道理人亦知之而其紀之細微處則不知也人之生氣之聚也聚則爲生散則爲死若死生爲徒吾又何患生死相爲循環而其所以生死者造化爲之綱紀也自非至人僅知大綱耳安知生死細微之理哉氣有聚散則人有生死而其所以聚散者亦造化主之也與死生爲徒者卽是與人爲徒未有人而能逃生死者也吾又何必慮其有此患哉故萬物一也是其所美者爲神奇其所惡者爲臭腐臭腐復化爲神奇神奇復化爲臭腐豈惟人有生死萬物出機入機亦與之爲一萬物本無無能生有豈不神奇而可美有者不恒有俄而歸無豈不臭腐而可惡此特死生爲徒之變態耳故曰通天下一氣耳聖人故貴一天地得此一氣以升降萬物得此一氣聚散以生死聖人得此一氣守而聚之不使之散故長生不死豈不貴一哉知謂黃帝曰吾問無爲謂無爲謂不應我非不我應不知應我也吾問狂屈狂屈中欲告我而不我告非不我告中欲告而忘之也今子問乎若若知之奚故不近又設爲知再問所以翻起下文不知爲是忘之爲似不近爲知之故也黃帝曰彼其眞是也以其不知也此其似之也以其忘之也予與若終不近也以其知之也狂屈聞之以黃帝爲知言無爲謂無言者狂屈忘言者黃帝有言者所以有近不近之分天地有大美而不言四時有明法而不議萬物有成理而不說聖人者原天地之美而達萬物之理是故至人無爲大聖不作觀於天地之謂也天地無爲而無不爲有大美也四時進退有漸而先後不紊有明法也萬物雖多而道無不在有成理也凡人有大美則言之法則議之理則說之而天地不然者無爲而常自然也聖人效法於天地取象于四時觀變于萬物所謂觀也今彼神明至精與彼百化物已死生方圓莫知其根也死生萬變方圓異象莫有知其根者扁音篇然而萬物無物之不有自古以固存無時之不然所謂萬古此天地萬古此造化人物沖漠無朕又何所容吾言說哉六合爲巨未離其内秋毫爲小待之成體天下莫不沈浮終身不故陰陽四時運行各得其序惽然若亡而存油然不形而神萬物畜而不知此之謂本根可以觀於天矣大不過六合而道包之六合不能離小不過秋毫道亦入之而始成體物有浮沈而道無新故有陰陽卽有四時其運行有序道運序之也道無體若亡而實存道無迹不形而實神萬物爲道所畜而忘其畜安得而知之誠哉道爲萬有之本根而本根非從地出其原皆出于天人能觀天之道則知歸根復命之理可與天地合其德與四時合其序矣齧缺問道乎被音披衣被衣曰若正汝形無勞爾形一汝視不見可欲天和將至如是則專氣致柔而元氣自復攝汝知無思無爲一汝度不益不損也神將來舍眞主人翁常存德將爲汝美道將爲汝居德美則粹而同於初道居則止而集乎虛汝曈焉如新生之犢而無求其故新生之犢止知巳生之知覺運動而不求未生之前之故舊爲何如所以形容有道者無心之氣象言未卒齧缺睡寐被衣大說音悅行歌而去之曰形若槁骸心若死灰眞其實知眞人實知此理不以故自持温故而知新不泥乎故舊也媒媒晦晦無心而不可與謀彼何人哉媒媒晦晦卽良賈深藏若虛至人盛德若愚之謂無心而不可與謀者不可以知知不可以識識也舜問乎丞前凝後丞以道佐人主者曰道可得而有乎道之與我異名同實卽道卽我何有差殊如可得而有是道與我爲二矣舜之此問將以道擅而有之身也曰汝身非汝有也汝何得有夫道舜曰吾身非吾有也孰有之哉曰是天地之委形也委積聚也人之一身乃地水火風四大積聚而成形天地一氣耳氣無形氣聚則有形也生非汝有是天地之委和也二五之精妙合成和而後始有生氣故曰生亦非汝有性命非汝有是天地之委順也性者生之理命者生之氣旣有生則性命自附麗焉所謂不期其順而自委順也然而主之者天地也非人也孫子非汝有是天地之委蛻也形形相禪無有窮盡如蟬蛻然故行不知所往處不知所持食不知所味天地之彊陽氣也又胡可得而有耶剛健之氣動而爲陽天地以之生物者人之行止飲食皆此氣爲之皆非我有也又安得有乎道哉孔子問於老聃曰今日晏間音閒敢問至道老聃曰汝齊音齋戒疏瀹音藥而心疏通不滯澡音早雪而精神洗滌舊染掊擊而知屏絶智識夫道窅音杳深奧之義然難言哉將爲汝言其崖略夫昭昭生於㝠㝠無生有虛生實故曰昭昭生於㝠㝠有倫生於無形倫理也有倫有象者皆自無形中出精神生於道二五之精太極之神皆自無極道中來形本生於精形質之凝由於陰陽之媾精而萬物以形相生知其生則知性之所由出命之所由立矣故九竅者胎生九陽數也陽氣赫赫發乎地故得九數者胎生而地走八竅者卵生八少陰也陰氣肅肅出乎天故得八數者卵生而天飛其來無迹其往無崖無門無房四達之皇皇也此道往來無蹤跡出入無門戸四通八達皇皇然而無一息之停止邀於此者四枝彊健也思慮恂音荀達耳目聰明其用心不勞其應物無方人能邀得此道者肢體强健思慮通達耳目聰明心不勞無爲也應物無方則無不爲矣天不得不高地不得不廣日月不得不行萬物不得不昌此其道與音余四句只是形容徹上徹下無非此道耳且夫博之不必知聞見之多名理之障也辯之不必慧智慧之開大道之鑿也聖人以斷之矣斷其博以歸于約斷其辨以還于默若夫益之而不加益損之而不加損者聖人之所保也若人有知有慧而不加益無知無慧而不加損者其人必爲聞道之人乃聖人之所保舉也淵淵乎其若海魏魏音巍乎其終則復始也大道如海之淵深而無損益又如海之周旋而無終始運量萬物而不匱則君子之道彼其外與音余道運萬物而不窮則君子此道顯然在外人之所可得而見者也萬物皆往資焉而不匱此其道與音余萬物皆往資無形之君而不竭則君子此道渾然皆在内人之所不可得而見者也中國有人至人焉非陰非陽跳出陰陽之外處於天地之間直且爲人將反於宗自本宗也觀之生者喑音蔭醷音意物也喑醷氣聚貌生者氣之聚如人之有喑醷雖有夀夭相去幾何同歸于散須臾之說也奚足以爲堯桀之是非至人不受陰陽之陶鑄形雖猶然人也彼且反宗而遊於物之初則得與冥冥合矣彼視有生之人特氣之暫聚爾卽有夀夭皆須臾也聖狂同盡堯不必是而桀不必非也果蓏有理木實日果草實日蓏音裸人倫雖難所以相齒人道之大雖難與果蓏比倫然所以相齒之序則固無異聖人遭之而不違過之而不守如父子之無所解君臣之無所逃盡其所當盡者不違也然過之而卽化不苦節以爲貞非過之而不守乎調而應之德也有心於調和善處是有以爲者德也偶而應之道也偶而應之自然恰當無心爲之者也道也帝之所興王之所起也帝以道而王以德此道德之升降也人生天地之間若白駒之過郤隙同忽然而已白駒小馬也非光影之謂隙空隙之處以白駒而過空隙何甚速也注然勃然莫不出焉狀人瞬息而生之易油然漻然漻音流莫不入焉狀人瞬息而死之易巳化而生出也又化而死入也生物哀之人類悲之解其天弢音韜墮音隳其天袠音執弢弓囊也袠衣囊也人有軀殼如天以弢袠拘之去而之死卽解之墮之也紛乎宛乎解墮之貌魂魄將往乃身從之乃大歸乎魂魄去而軀殼不能留人知死爲大歸則死不必畏也不形之形形之不形形色身也幻相也假合者也不形之形眞身也實相也無假者也所謂常住不滅者是人之所同知也非將至之所務也非學道而將至者之所從事也此眾人之所同論也眾人之所能知能言皆非道大同也彼至則不論論則不至大凡可以言論者道之粗也不可以言論者道之極至也故道之所至則不落言詮而不論纔有議論則涉影響而道不必至明見無值兩物相遇曰值見道明則與之爲一故無值辯不若默道不可聞聞不若塞此之謂大得言者無言聞以無聞方爲深造自得之境東郭子問於莊子曰所謂道惡乎在莊子曰無所不在夫道無不在問道者每每求之於高遠故莊子因其問而以愈下者答之東郭子曰期而後可指定所在而名之莊子曰在螻蟻曰何其下邪曰在稊稗曰何其愈下邪曰在瓦甓音辟曰何其愈甚邪曰在屎溺螻蟻未雨先出穴知陰陽也稊稗不種而自生爲五穀之賊喻人欲爲大道之賊也知五穀之不可有稊稗則知大道之不可有私欲矣瓦甓從窑頭坯中來已經水火煅煉過體質干年不攺喻學道者亦當水火旣濟也屎溺非道也而屎溺之竅則修道者之得力處屎卽谷道其穴在任督二脈中間上通天谷下達湧泉眞陽初生之時一撞三關直透頂門非拘畜禁門之力與吕祖云尋天握地見天光種得金花果是强以此思之則屎溺亦道矣東郭子不應莊子曰夫子之問也固不及質取正也正獲司市之官名獲之問於監市市魁今當行者履豨音喜也豨大豕也以足蹙其股則知豕之肥瘠也每下愈况履豨愈下比况愈明也汝惟莫必無乎逃物期必也謂不必指定道在何處天下何物非道何道非物道器原不相離豈有逃乎物而謂之道乎至道若是大言亦然周徧咸三者異名同實其指一也周徧咸三字雖異其實一也以爲言異理一之喻嘗相與遊乎無何有之宫同合而論無所終窮乎嘗相與無爲乎淡而靜乎漠而淸乎調而間音閑乎我以言言道子以問問道皆非也必遊乎無何有之宫合同而論無何有之道方無終窮庶乎相與於無爲乎淡且靜乎相與於漠而淸乎調且間乎我無言子亦無問矣寥巳吾志寥虛也究竟至虛一之妙則吾之志已矣無往焉而不知其所至吾志不逐物則無所往焉而寂然不知所至也去而來不知其所止卽去而來而無貪着留止也吾已往來焉而不知其所終吾已往來于斯道之中而孰知其始終哉彷音傍徨音皇乎馮音憑閎音宏惟徘徊于閒曠之野大知入焉而不知其所窮入于大道之中相忘于不知其終窮也物物者道也與物無際道無在而無不在故與物無邊際而物有際者所謂物際者也有際則謂之物故曰物有際者斯謂物際際猶言遇也不際之際際之不際者也道則不際之際然非離此物而別謂之道也特際之不際者皆實際語謂盈虛衰殺彼爲盈虛非盈虛彼爲衰殺非衰殺彼爲本未非本未彼爲積散非積散也非字作無字盈與消對虛與長對有盈虛則有消長無盈虛則無消長矣衰與盛對殺與隆對有衰殺則有隆盛無衰殺則無隆盛矣本爲始末爲終有本未則有終始無木末則無終始矣未得道時積聚其精神旣得道時放無極光明積散也然有積散猶屬有爲積散而非積散則無爲矣釋氏下一語便下一掃塵語下一掃塵語便下一掃掃塵語本此孰謂南華爲玄伯而非禪門之所取宗哉妸音阿荷甘與神農同學於老龍吉懷道人也神農隱几闔戶晝瞑音眠妸荷甘日中奓音賒開也戸而入曰老龍死矣神農隱几擁杖而起嚗音剝笑貌然放杖而笑曰天推尊老龍知予僻陋慢訑音移故棄予而死已矣夫子無所發予之狂言而死矣夫言無復以大言振我弇音掩堈弔聞之曰夫體道者天下之君子所繫焉今於道秋毫之端萬分未得處一焉而猶知藏其狂言而死又况夫體道者乎藏者正是收視返聰知而不言所謂冥冥者神農於道萬未處一猶知藏其言况體道而化者乎視之無形聽之無聲於人之論者謂之冥冥所以論道而非道也體道者有見于此是以收視返聽若與人論道而謂之冥冥直言筌耳冥冥豈爲道耶何也冥冥無也知有之爲無不若并無無之也於是泰淸問乎無窮曰子知道乎無窮曰吾不知又問乎無爲無爲曰吾知道曰子之知道亦有數乎曰有曰其數若何無爲曰吾知道之可以貴可以賤可以約可以散此吾所以知道之數也無窮以不知答泰淸之問是矣旣問無爲問非所問也爲失問無爲舉道之數以爲知道不知道無名數凡可舉者皆强名也泰淸以之言猶是言也問乎無始曰若是則無窮之弗知與無爲之知孰是而孰非乎無始曰不知深矣知之淺矣弗知内矣知之外矣道原不可以强而名不知是得道而忘于道亦忘于知故曰深知之是見乎道而未能忘也故日淺弗知是弗知道之底裏也故日内矣知之不過知道之散殊也故日外矣於是泰淸中而歎曰弗知乃知乎知乃不知乎孰知不知之知無始曰道不可聞聞而非也道不可見見而非也道不可言言而非也道屬無聞見言皆屬有故涉此三者皆非知形形者之不形乎形自形耳形形者竟無物也道不當名無始曰有問道而應之者不知道也雖問道者亦未聞道問之而答我巳離道彼之問者所問亦非道矣道無問問無應無問問之是問窮也無應應之是無内也道無可問亦無可應故問不過窮于外而應則窮于内矣以無内待間窮若是者外不觀乎宇宙卽有有也者太極也内不知乎太初卽未始有有也無極也是以不過乎崑崙不遊乎太虛崑崙中天下而立其頂到天之半神人之所居也太虛又包天地之外光曜問乎無有曰夫子有乎其無有乎光曜不得問而孰視其狀貌窅然空然終日視之而不見聽之而不聞搏音博之而不得也光曜曰至矣其孰能至此乎予能有無矣而未能無無也及爲無有矣何從至此哉吕吉甫曰光曜者泰宇發光而能照無有則無照矣此光曜所以不知其爲有爲無問之而不得問也窅然空然視聽搏之所不及此所以爲無有也惟其有無所以爲光曜不能無無也是以未能無有也及我爲無之所有矣何從至于窅然空然之境乎大馬大司馬也之捶音箠鍛也鉤劍名者年八十矣而不失毫芒大馬曰子巧與音余有道與音余曰臣有守也臣之年二十而好捶鉤於物無視也非鉤無察也是用之者假不用者也以長得其用而况乎無不用者乎物孰不資焉陸西星曰大司馬之屬有善捶鉤者老而精絶無毫芒之失臣有守也守卽所謂純氣之守非鉤無察用志不分假不用者以爲用之是以長得其用蓋用者技也不用者神也神則無所不用况小技乎萬事萬物莫不資焉冉求問於仲尼曰未有天地可知邪仲尼曰可古猶今也知古之猶今則可以已有天地之後而推未有天地之先也冉求失問而退明日復見曰昔者吾問未有天地可知乎夫子曰可古猶今也昔日吾昭然今日吾昧然敢問何謂也仲尼曰昔之昭然也神者先受之今之昧然也且又爲不神者求邪求始虛心以問虛則神生先能領會添了見解已不神矣且又爲不神者求神無古無今無始無終未有子孫而有子孫可乎冉求未對仲尼曰已矣未應矣冉求所問而欲知者未有天地之前問先天也不知有古今有終始有子孫皆後天也夫子所答者無古今無始終無子孫皆先天也故冉求不解而未對仲尼曰已矣未應矣猶云不必言說而道存矣何也未有天地乃五行不到處父母未生前止惟一無此一無也卽太易者未見氣也旣無氣安有古今始終又安有子孫及至無名爲天地之始乃有古今始終有名爲萬物母乃有子孫人必參得後天透乃可與證先天矣陸西星曰未有天地之先在人則爲思慮未起鬼神莫知之時冉求以是爲問蓋有難于言者而夫子直曰可知蓋今日之今卽往日之古未有有今而無古者有天地卽今也未有天地卽古也使其無古則亦做今不出矣而冉求未喻初問覺有些領悟爲虛明之宇後生疑見如虛中起雲此箇不神最易遮障本體而又爲求之則障中起障故夫子于古今始終子孫而歸之無則遮障盡徹矣不以生生死不以死死生死生有待邪皆有所一體本無死也因生而死本無生也因死而生死生各有一體皆不相待也一體猶一本也一理也造化之自然也有先天地生者物耶物物者非物物出不得先物也猶其有物也凡此生死變化皆屬後天復提起詰問有先天地生之物而後能物物也此物物不可以物名之旣名爲物便是有物不得爲在天地之先矣所以猶涉于物也猶其有物也無已聖人之愛人也終無已者亦乃取於是者也所以不得先者有物故也有物則以物相物終無窮已聖人于性空之中添了愛緣古今輾轉相續不絶此箇聖人還有意必固我亦大道之所不取顏淵問乎仲尼曰回嘗聞諸夫子曰無有所將無有所迎回敢問其遊將迎則有心矣敢問何以無將無迎而遊于無心之天仲尼曰古之人外化而内不化今之人内化而外不化外化者應感無迹也内不化者不與物遷也然必有箇不化者存然後能化物如人内有定守不化也而後外可輕富貴齊死生外化也今之人内無眞宰爲人欲所化外爲習染所定而不能一貴賤忘生死外不化也與物化者一不化者也安化安不化安與之相靡必與之莫多有等生死忘窮通之人此與物俱化者也而外或有所不化吾以一而一不一不化者亦化夫一者何物卽金丹也大道也故無化無不化其體至剛不與世而相靡者此物其形至微不與人而兢多者亦此物乃物物而不物于物者也豨韋氏之囿黃帝之圃有虞氏之宮湯武之室君子之人若儒墨者師故以是非相音齎五味相奪曰也而况今之人乎囿圃宮室道益衰而遊之者益少其居益狹矣至於儒墨之師皆不能盡内不化之道故有是非之事也聖人處物不傷物不傷物者物亦不能傷也惟無所傷者爲能與人相將迎聖人善處萬物與之相忘于是非同異之辨猶天之藏垢納汙老氏之和光同塵也此之謂不傷物小則愛人人愛敬人人敬大則過化存神而物焉能傷之與人相將迎非有將迎也乃人將而我不墮其將人迎而我不墮其迎所謂人將亦將人迎亦迎而我無將迎也山林與音余皋壤與音余使我欣欣然而樂與音余樂未畢也哀又繼之哀樂之來吾不能禦其去弗能止悲夫世人眞爲物逆旅耳世人爲外境所役故哀樂得以入其舍遊山林皋壤之間始必怡然而樂樂極生哀循環之理也其來莫禦其去莫止哀樂全不自由直以吾身爲物之旅舍耳物常在而吾身不常矣夫知遇而不知所不遇知能能而不能所不能無知無能者固人之所不免也陸西星曰今人但知今日之遇而不知他日之不遇但知今日之能遊能樂而不知他日之不能夫是無知無能者固人之所不免也夫務免乎人之所不免者豈不亦悲哉至言去言至爲去爲齊知之所知則淺矣不能知而免以爲知不能然而免以爲能庸可得乎爲計日拙爲心日勞又自悲巳所以至言不落于筌蹄至爲不牽于世故順其自化聽其自然必欲齊其知之所知而不能養其所不知則其知亦淺矣復圭子曰此章發明無名天地之始一句及知者不言言者不知二句知者有知之人也而無爲謂則不言之人也知問于無爲謂曰天地間一道也以何思何慮而知之何處何服而安之何從何道而得之而無爲不答者不知答也又問于狂屈狂屈欲言而忘言答之念未忘也問於黃帝黃帝曰道之爲物無知無不知不可以思慮知無安無不安不可以處服安無得無不得不可以從道得不然何以知者不言而言者不知也故聖人行不言之教知道無方體不可以人力致德本在我未嘗從外至道德仁義禮遞失而遞降也至於禮之名興樸散爲華天下始得以僞亂眞矣故爲道者日損損其知又損其不知以至於無知斯無爲而無不爲也待樸散爲器之後欲復歸根不亦難乎惟大人與天爲徒無生無死若凡人則方生方死方死方生聽其氣之聚散以生死特與人爲徒耳豈惟人爲然萬物之出機入機亦與之爲一也生則神奇死則臭腐俄而今者之臭腐化爲來者之神奇俄而來者之神奇復化爲後日之臭腐物異而氣不異故曰通天下一氣耳凡人得此一氣聽其自聚自散故有生死聖人得此一氣聚之而不使散故貴一耳非黃帝不能達不知者之合道忘言者之近道而有問有答者之離道故狂屈聞之以黃帝爲知言天地忘美四時忘功萬物忘成聖人通天地四時萬物於一身無爲也無作也而實無不爲也無不作也天下有神明斯有百化有至精者而後有死生方圓之粗者無物不有無時不然六合不爲巨無大不包秋毫不爲小無細不入天下有浮沉四時有運行似亡也而實存似形也而實神莫之爲而爲乃大道之本根也齧缺問道於被衣被衣曰汝形不欲勞視不欲妄而天和自至知不欲起度不欲亂而神自來舍德將讓汝美道將讓汝居祇覺今是而昔非何必復求其故哉齧缺睡寐巳遊于忘言之天矣被衣大悅而去曰齧缺形若槁骸而心若死灰似無知也然非實知此理者安能與日並新與月同晦無心而行天行也而不可以人謀參之彼何人者耶舜問乎丞曰道可得而有乎丞曰汝身非汝有安得有夫道獨不知有身則有生有生則有性命有性命則有子孫天地大父母也身非汝有乃地水火風四大假合而成天地之委形也生非汝有乃二五之精妙合成和而後有此生天地之委和也性命非汝有乃造化以理着之爲性以氣凝之爲命兩相附而後成是天地之委順也孫子非汝有乃薪火之傳不知其盡是天地之委蛻也卽人之行止飲食亦天地之彊陽運動人不得而有之安得有夫道耶孔子問道於老聃老聃曰汝齋戒非祭祀之齋乃心齋也先須疏瀹而心不留一物也澡雪而精神不染一塵也掊擊而知不着一識也方可與言其崖略夫道徹隱徹顯昭昭顯也冥冥隱也天下未有顯而不根於隱者道徹内徹外有倫外也無形内也天下未有外而不從内出者充滿宇宙悉精神也精神藏則無形無象而道爲太始精神露則有名有物而形爲精子九陽數也眞陽起于地故有九竅者胎生而地走八陰數也眞陰降于天故有八竅者卵生而天飛此道往來無形迹出入無門戸四通八達而不止息至人得之形王而神靈無爲也而無不爲也造化得之天地常高廣日月萬物常行昌故與其用知慧而爲聖人之所斷毋甯黜知慧而爲聖人之所保也其廓無涯其運無端萬物資始資生焉而不窮不有至人非陰非陽而跳出陰陽之外安能遊無物之初乎惟反於宗乃可以齊夭夀一聖狂遭之而不違者不如過之而不守有心於調停之德不如無心偶應之道此帝王之別也人生天地間光陰如白駒之過隙俄而出于機俄而入于機俄而死者生俄而生者死物方哀其化吾謂天爲之解其𡸅人方悲其死吾謂天爲之墮其失衣亠魂魄旣往而身亦同歸孰知有身形也有不形之形與身俱來不與身俱去學可得而務論不可得而至故以目遇不以口說以耳聞不如以心聞聞無所聞而得無所得此之謂大得東郭子必欲問道之所在則螻蟻道也知陰陽也稊稗道也不以僞亂眞也瓦甓道也從水火煅煉來也屎溺道也從此竅可化爲神奇也道雖不着物亦不離物第求道於有不若求道於無故相與於無爲者淡且靜也漠且淸也調且閒也往來無迹始終無端道其物物乎物有際也而道無際際以有盈虛衰殺本末積散而不際之際則無盈虛衰殺本末積散阿荷甘與神農同學於老龍吉而老龍吉之死以無言傳無言之教也神農得之矣弇堈弔之曰道無形聲視之聽之非道也謂之冥冥亦非道也以道不啻無而實無無也然則無窮之不知合無言之教而無爲欲知道以數於貴賤約散之間是乎非乎無始曰不知深矣知之淺矣何也知則露而無藴故爲淺不知則蓄而不發故爲深弗知内矣知之外矣何也知之僅得其象故爲外弗知獨含其神故爲内然則道豈惟不可聞見亦不可言故强問道者不過窮于外而强應之者則窮于内矣故惟見徹宇宙者然後能神遊乎太初下視崑崙與太虛爲體我且包乎天地之外矣光曜問乎無有曰夫子有乎無乎光曜視之無可視聽之無可聽搏之無可搏曰夫子其至矣乎我能有無矣而未能無無及爲無所有何從而至窅然空然之境哉吾觀大司馬之捶鈎者且以有用而假不用之神况乎無不用者未有無所假而能資萬物者也冉求欲求知於未有天地之先始猶以虛心而神存旣着一識神反爲識障甯知未有天地無古今又安有終始無祖父又安有子孫總之皆無也知無則知有矣無能生有天地間本無死也因生而死本無生也因死而生知死生之無待則知死生之之體矣有先天地生之物物而後有後天地生之物物之相物也無已而聖人教之以人倫其添愛緣也亦無已顏回欲以無將無迎而遊於無心之天仲尼曰古之人知外與時俱新無不變也無不化也而内有不變不化之持操今之人中移于窮通内化也而外非逃貧賤則趨富貴矣外不化也故必以我之與物俱化者而後可一其所不化化不知也不化亦不知也吾無委靡而退亦不求多而進此之謂遊於無將無迎之天豨韋氏至黃帝囿改而爲圃矣有虞氏至湯武宫改而爲室矣道益衰而遊之者益少君子之與儒墨各是其所是而非眞所非况於今之人乎有是非則有相傷惟聖人不傷物而物亦不能傷人將亦將人迎亦迎所謂不墮其將迎而我無將迎也吾獨嗟世人以身爲萬物之逆旅山林皋壤能使之欣然樂而外感亦能使之悲哀樂之來不能禦去弗能止知有其遇而不知有不遇知有知能而不知有無知無能此人生之所不免也而欲免以爲能遊能禦豈不悲哉故至言無言至爲無爲大知無知不能養其所不知而欲以小知齊大知大失無爲謂不答知問之意矣雜篇庚桑楚第二十三夫道不欲多多則雜故名曰雜篇首言至人託之高深乃能自全次言至人内揵外揵之兩忘如冰解而凍釋能知未始有物斯爲知之至而移是不足言矣故必忘人而後可以爲天人怒出於不怒爲出於無爲而後爲聖人之道老聃之役執弟子之役有庚桑楚者偏獨也得老聃之道以北居畏壘畏纍山名之山其臣之畫然知者去之其妾之絜然仁者遠之左右之事楚者以經畫爲知以慈柔爲度皆去之遠之卽絶仁棄知之意也擁腫之與居醜陋貌鞅掌之爲使鄙樸不修容儀居三年畏壘大穰畏壘禹貢之羽山也其民化楚之道無所事知而致力于衣食所以大穰畏壘之民相與言曰庚桑子之始來吾灑然異之楚之氣象不凡故怪異之今吾日言之而不足𡻕計之而有餘無旦夕之利却有久遠之謀庶幾其聖人乎子胡不相與尸而祝之社而稷之乎敬之如神明欲尊楚以爲君也庚桑子聞之南面而不釋然介懷而不樂也弟子異之怪之也庚桑子曰弟子何異於予夫春氣發而百草生正得秋而萬寶成夫春與秋豈無得而然哉大道已行矣楚之所以不釋然者以天道自任也夫春生秋成天地有大美而不居其功不過行其大道之所當行而已矣吾聞至人與道爲體者尸居環堵周園小墻也之室而百姓猖狂不知所如往至人情虛無爲在環堵之内而百姓任天而行不知所往乃所以爲道也今以畏壘之細民而竊竊焉欲爼豆予于賢人之間我其杓音的之人邪音耶吾是以不釋於老聃之言爼豆字自尸祝上生來今畏壘之民相與尸祝社稷由我之戔戔有以自見而愧于至人多矣老聃之道絶仁棄知而不尙賢我安能釋然予其言弟子曰不然夫尋八尺常倍尋之溝巨魚無所還音旋其體而鯢音倪鰌音秋爲之制步六尺仞七尺之邱陵巨獸無所隱其軀而㜸音業狐爲之祥妖㜸之狐以小邱爲善喻地無小大皆有所尊也且夫尊賢授能先善與利自古堯舜以然而况畏壘之民乎夫子亦聽矣堯舜大聖尚不能以一人治天下而必假于賢能况畏壘乎夫子亦聽其尸視可也而奚以不釋然哉庚桑子曰小子來夫函音含車之獸介音戒獨行也而離山則不免於罔之患吞舟之魚碭音蕩而失水則蟻能苦之故鳥獸不厭高魚鼈不厭深夫全其形生之人藏其身也不厭深𦕈而已矣深居𥳑出自托于高深者物之所以自全况全形之人而反不逮此乎喻名見于世必害其身也且夫二子者又何足以稱揚哉二子指堯舜是其於辯也將妄鑿垣墻而殖蓬蒿也鑿垣墻是雕墻也則渾朴傷植蓬蒿則生類亂堯舜之遠於道也若此𥳑髮而櫛音節數米而炊喻其所爲者鄙細而非大道竊竊乎又何足以濟世哉一句道了下却解此理不經而語甚奇舉賢則民相軋音乙皆以賢相尙任知則民相盜皆以知相欺相奪之數物者不足以厚民民之於利甚勤揣盡末世好利之民情下二句皆好利之流弊子有殺父臣有殺君知有利不知有君父爲人君者何樂以利而爲民倡也正晝爲盜日中穴阫音裴墻也吾語女大亂之本必生於堯舜之間其末存乎千世之後其必有人與人相食者也莊老尊無爲賤有爲舉賢任知末免有生利之萌芽故大亂之本兆于堯舜之時特隱而未見耳後世奸臣賊子民蠧盡不出莊老之先見何過激之有哉南榮趎音疇庚桑弟子蹵然正坐曰若趎之年者已長矣將惡乎托業以及此言邪德過堯舜而不爲其無迹也至矣我將何所托業而及無爲之治耶庚桑子曰金汝形抱汝生無使女音汝思慮營營若此三年則可以及此言也體其受而不虧守其性而不離去其知識而不鑿積久而純乃幾於道南榮趎曰目之與形吾不知其異人已也而盲者不能自見耳之與形吾不知其異也而聾者不能自聞心之與形吾不知其異也而狂者不能自得形之與形今吾之形與人之形亦辟近也矣而物或間之邪欲相求而不能相得形相近也爲物欲所間則心相遠矣此其以心求心而不能相得也趎其有愧于踐形之學也乎今謂趎曰全汝形抱汝生勿使汝思慮營營趎勉聞道達耳矣僅達于耳而未能渾化庚桑子曰辭盡矣曰奔蜂小蜂不能化藿蠋豆中靑虫越雞不能伏鵠卵魯雞固能矣越雞小而魯雞大鵠亦鳥之大者雞之與雞其德非不同也有能與不能者喻小不可以化大其才固有巨小也今吾才小不足以化子奔蜂越雞喻巳之才力尙小不足以默化之也子胡不南見老子南榮趎嬴糧七日七夜至老子之所老子曰子自楚之所來乎南榮趎曰唯老子曰子何與人偕來之眾也道本一致趎心懷三言而來紛亂之幾形于眉睫故謂其偕來之眾正釋氏所謂汝胷中正閙也南榮趎懼音遽然顧其後不悟所謂偕來之意老子曰子不知吾所謂乎南榮趎俯而慙仰而歎曰今者吾忘吾答因失吾問忘答失問乃迷覺之一大幾刮人不小迷不能得大覺老子曰何謂也南榮趎曰不知乎人謂我愚知乎反愁我軀不仁則害人仁則反愁我身不義則傷彼義則反愁我巳老子之道絶聖棄知絶仁棄義趎欲爲其道故首舉三者以問我安逃此而可此三言者趎之所患也絶之不可不絶不可將安所逃願因楚而問之老子曰向吾見若眉睫音接目上毛也之間神人觀人之眉目便知其心吾因以得女矣得其情也今女音汝又言而信之聞其言而益信眉睫之所得爲不爽若規規然失神貌若喪父母失所天揭竿而求諸海也言以短小之物而測深大之域汝亡人哉喪亡性情之人惘惘乎心無所歸之貌女欲反女情性而無由入可憐哉欲見自然之道而不可得正所謂貧人不知袖裏有牟尼珠也眞可憐憨哉南榮趎請入就舍假館而卒業召其所好求其所是去其所惡離其所非十日自愁好惡交戰于中而不能决非人制我乃我之自困而自愁也復見老子老子曰汝自灑濯孰哉言子洒濯身心功夫還熟也未鬱鬱乎然而其中津津乎猶有惡也功夫純熟者愁無可愁安得有鬱又安得有好惡今汝鬱鬱而自愁津津而自好且猶有惡也細宻功夫尙有未到此南榮趎之所以欲速而不逮也夫外韄音獲事障者不可繁而捉持也將内揵音蹇韄者以皮束物制縛之意建者門牡關閉之意制其外者繁多而不可把捉則將拒閉之於内内韄埋障者不可繆綢繆也而捉束縛也將外揵制其内者謬亂而不可把捉則將拒閉之于外内外韄者其病若此耳目外也心術内也夫全形抱生者内忘其心術外遺其耳目若乃聲色韄于外則心術必塞于内今外亂而思治内無定見也欲惡韄于内則耳目必喪于外今内亂而思治外無定守也外内韄者道德不能持而况放道而行者乎方制于内又束于外内外交韄則雖道德有諸身者尙不能以自持况遵道而行者乎南榮趎曰里人有病里人問之病者能言其病然其病病者猶未病也能知以病爲病者其病未甚也若趎之聞大道譬猶飲藥以加病也此病自十日自愁上得來喻巳欲聞大道而不自知受病之處雖有所聞愈自惑矣趎願聞衞生之經而已矣此正佛經所謂願樂小法者不知衞生之經非道德不能也老子曰衞生之經能抱一乎能勿失乎卽道德經載魂魄抱一能不離也能無卜筮而知吉凶乎卽不出戶知天下不窺牖知天道也能止乎能已乎知止知足也能舍諸人而求諸已乎急于自治而不暇及人也能翛音蕭然乎無所累也能侗然乎無所知也能兒子乎專氣致柔如嬰兒也兒子終日嗥音號長哭也而嗌音益咽也不嗄音夏聲啞也和之至也終日握卷手而手不掜音藝手屈而不伸也共其德也言人之手久握而不伸則伸時必有窒礙小兒則不然自然之性箇箇如此德之共也終日視而目不瞚音瞬偏不在外也目動日瞬精有所移日偏小兒視而無視不知有外物也知有外物則偏矣行不知所之居不知所爲言無心也與物委音威蛇音移而同其波波順而無忤也是衞生之經巳道德之厚比于赤子則衞生之經孰有外于此哉南榮趎曰然則是至人之德巳乎曰非也是乃所謂冰解凍釋者至人之德無能所去執着如上數箇能字便有能所與執着矣人心湛然如水非有非無及爲物欲所蔽結如水凍而成冰聞道悟理則解且釋矣夫至人者與人同相與交食乎地人食亦食而交樂音洛乎天人樂亦樂與人異不以人物利害相攖不相與爲怪不立詭異不相與爲謀不相與爲事以有爲爲應跡以無事爲自然翛然而往侗然而來往來自適是謂衞生之經已曰然則是至乎曰未也吾固告汝曰能兒子乎兒子動不知所爲行不知所之身若槁木之枝而心若死灰若是者禍亦不至福亦不來禍福無有惡有人災也禍福生于失得人災由于愛惡今槁木死灰無情之至則愛惡失得無自而來卽佛乘之所謂二乘做死心工夫者尙有捉摸亦趎之身分所易及者是汝衞生之常道宇泰定者發乎天光宇心宇也卽天君也定則生慧誠精故然也發乎天光者人見其人天光旣發人雖見其爲人而已自同于天所謂人貌而行天也人有修者乃今有恒人有修此泰定而至于天者則可久有恆者人舍之天助之舍止也歸也不離人羣獨成其天人之所舍謂之天民天民以其非人所得而民言非常人也天之所助謂之天子天子以其繼天而出愛之如子也學者學其所不能學也行者行其所不能行也辯者辯乎其所不能辯也知止乎其所不能知至矣凡物之可以知知者則可學可行可辯而道不可以知知故學不能學行不能行辯不能辯精而至于人所不能知則天也吾人當以所知養所不知故止其所不能知至矣若有不卽是者天鈞敗之卽就也天鈞卽鴻鈞也不卽是則拂造化之理而逆天矣天鈞必敗而棄之備物以將形藏不虞以生心敬中以達彼將之爲言奉也言人備物以奉其身思患豫防常恐有不測之事而又存諸中者敬應于彼者通所謂敬以直内義以方外也若是而萬眾也惡至者皆天也而非人也非人之自致不足以滑音骨成不可内音納於靈臺惡有自人召者未免爲德之累君子當反之於心今眾惡交至天而非人何足以滑吾之盛德而以之入其心哉靈臺心也靈臺者有持而不知其所持而不可持者也有持猶言有主而不知其所持則主而忘乎其爲主矣畢竟人心無主則虛主而不可持之以爲主也不見其誠已而發每發而不當業入而不舍舍作捨每更爲失君子修辭立誠然後言而有中今也不見其誠已而發但見每發而不當于事理之情實則亦妄發而已使舍舊而圖新猶之可也今也業巳誤入不能舍舊從新又轉更轉失所謂過而不改是謂過矣爲不善乎顯明之中者人得而誅之爲不善乎幽間音閒之中者鬼得而誅之明乎人明乎鬼者然後能獨行明有人誅幽有鬼責其能逃乎則惟愼獨而巳學與吾儒戒斯同劵内者行乎無名劵外者志乎期費劵内外卽老子所謂左右契也藏劵于内者務實而不務名行劵于外者志存乎務外而期于廣求行乎無名者唯庸有光志乎期費者唯賈音古人也劵内不求名而名自至惟庸有光所謂實大盛宏也若劵外則志于求人之費而巳期費則賈人之事也盜誇之徒也人見其跂音其猶之魁然與物窮者物入焉與物且者其身之不能容焉能容人不能容人者無親無親者盡人跂高而自立之貌人見外之富貴過人則以爲魁然可尊而不知良賈深藏若虛盛德容貌若愚不識不知是之謂與物窮者然虛則能容故物莫不入焉萬物皆備於我矣若役役于物者苟且求得至于喪身而不悔則身且不能容安能容人哉夫無容人之量者人將離之故無親無親則與物暌絶而盡人之類不能與之爲徒矣兵莫憯於志鏌音莫鋣音耶爲下心之所之謂之志一念不謹則貽莫大之禍所謂情欲之攻慘干戈㦸是也冦莫大於陰陽無所逃於天地之間非陰陽賊之心則使之也冦大賊也猶或可逃袵席之上飲食之間乃生殺之機一或失節卽善趨避者不能逃陰陽之冦于天地之間非陰陽之賊我也乃吾心失養琢喪其精神始也水火未濟而不能旣濟究也日剝日消陽氣剝盡而爲純陰則死矣是自冦自賊也道通其分也其成也毁也所惡乎分者其分也以備所以惡乎備者其有以備道本大通無分無成無毁無備而無不備何言乎通也猶百川之通海山澤之通氣道通之也通乃無所不到之謂待分則有徧有不徧矣通乃其起無首之謂見成則有完有未完矣通乃其卒無尾之謂如毁則限于數而不能超乎數矣大凡力量有不能到之處者不得不分力以備之待備而後精神貫焉設備稍有不周則偏枯矣故君子惡分者惡備也非惡備也惡其精神必待撿點而後周也若大道則自然貫通也旣無分安有成㓂乎又安見其備不備乎故出而不反見其鬼人稟陰陽之氣以生是出也有先天眞陽之氣一兩每一𡻕長一兩至十五年長十五兩合成一斤眞陽之氣所謂純陽也及至情竇開而眞陽耗于袵席之上矣故奇男子不惜貲財訪仙師尋侶伴求一接命之術以反純陽而出陽神不知道者其眞陽知出而不知反則淪于鬼趣矣故所見莫非鬼也出而得是謂得死滅而有實鬼之一也知道者旣出于人世而得是反還元陽之道則死而不死謂之得死凡物有生輒有滅惟得道者生無其生而滅無其滅無其滅歸于虛苟滅而實歸于滅則人與鬼一矣以有形者象無形者而定矣凡人只見有形之成毁而不見所以成毁者非有形也故此心營營而不定如能煉精還氣煉氣還神煉神還虛是以有形象無形也必定能逃乎陰陽之外矣出無本入無竅出乃道之顯諸仁萬物之出有本而道無本也入乃道之藏諸用萬物之入有竅而道無竅也有實而無乎處有長而無乎本剽剽與標同道本虛也虛能生實不可以方所求無處也長于上古而不老無本也遠傳來世而不窮無剽也有所出而無竅者有實有出而無竅則人疑于虛而不知虛而不屈動而愈出則又實矣有實而無乎處者宇也有長而無本剽者宙也上下四方曰宇果有處所乎往古來今日宙果有終始乎有乎生有乎死有乎出有乎入入出而無見其形是謂天門生死出入皆實有也而無形象之可見旣云有矣則必有生死出入之門所謂天門卽眾妙之門也天門者無有也萬物出乎無有有不能以有爲有必出乎無有而無有一無有聖人藏乎是有不能爲有必出于無有所謂天下之物生于有有生于無有所謂無有則非無有而無有一皆無之乃所謂無有也聖人有見乎此人法雙忘能所俱遺其藏神于是也而萬有之根基立又何有陰陽之患哉古之人其知有所至矣惡音烏乎至以爲未始有物者至矣盡矣弗可以加矣未始有物卽太易者未見氣也安得有物乎語至于無物更無有出其上者弗可以加矣其次以爲有物矣將以生爲喪也以死爲反也是以分已次焉者有物卽太始有形之始也有形則有生死出亡在外曰喪歸根復命曰反其次曰始無有旣而有生生俄而死以無爲首以生爲體以死爲尻音翹尾也喻物之終也孰知有無死生之一守者吾與之爲友又其次曰有生則有我矣雖知有我能以有無死生爲一而守之知其分而又知其不分者也吾將與之爲友矣是三者雖異公族也昭景也著戴也甲氏也著封也非一也三者指無爲首生爲體死爲尻是三者雖次第不同而皆未離于宗譬則楚之公族昭氏也景氏也以人所推戴而著也甲氏也以有封邑而著也三氏雖分本之則一公族而已非一也而亦何嘗不一哉有生黬音闇也披然曰移是釜底烟氣所凝聚曰黬猶人聚精氣以生倘人厭其黬披而去之曰移是與人之氣散而死換屋移居者何異嘗言移是非所言也雖然不可知者也移是之說釋氏以爲奪胎投舍玄門以爲抛身入身總之皆換屋移居也人所不當言雖然此亦大㮣道理耳然而有可知者亦有不可知者也臘祭名者之有音皮牛百葉也胲音該牛足指也可散而不可散也移是有可知不可知譬如臘祭之有胲有可散之于爼豆者有不可散之于爼豆者觀室者周徧也於寢廟又適往也其偃偃息之所焉爲是舉移是又譬如觀室者觀寢廟則肅然起敬而生移其祖考于是之心觀偃所則弛然起怠而生移其晦息于是之心皆移易之不可不定者也請嘗言移是是以生爲本以知爲師因以乘是非果有名實移是之說起于有生出于有知因以相乘而是非滋起孰爲名乎孰爲實乎因以已爲質使人以爲巳節因以死償節不知道者認虛爲實因以名實爲已之體質使人以已爲中節而法之直至鐘鳴漏盡以死償節而猶不悟亦甘心焉若然者以用爲知以不用爲愚以徹爲名以窮爲辱移是今之人也以用不用分知愚常情也徹者明也人以巳爲徹而用之故爲名不用則窮也人以巳爲愚而不用故爲辱此今人之移是者也若古人則不作是觀是蜩與鷽音學鳩同於同也蜩與鷽鳩乃同一見喻其所見之小而我見又與之同故曰同於同卽今人移是之見也蹍音碾踏也市人之足則辭謝也以放驁音敖兄則以嫗音須大親指父母則已矣踏市人之足則必以放傲自責而辭謝之恐其怒也兄踏弟足則以氣噓嫗拊之而已無容謝也若父母而踏子之足則併嫗拊而忘之親之至自相孚矣故曰至禮有不人至義不物至知不謀至仁無親至信辟金蹍足辭謝禮也禮以飾僞者若至禮則無人已之分忘其揖遜也至義則不待物物而哉制得宜至知則自然先覺而無容謀度至仁則不見相愛之迹至信則不待金玉之質矣辟屏而去之也徹徹乃透徹之徹非撤去之撒也志之勃解心之謬與繆同去德之累達道之塞心之曰志勃悖亂也勃與謬皆德之累道之塞也苦于不自知耳人能透徹其志之勃解悟其心之謬則德之累自去而道之塞自達矣富貴顯嚴名利六者勃志也君子之志道德奪于外誘則吾之志因以亂矣容動色理氣意六者謬心也六者綢繆盤結不能自解繫其心也惡欲喜怒哀樂六者累德也德者渾淪不分淆之以情則竅鑿矣故累其自得之眞去就取與知能六者塞道也道以通于一爲達若以心知才能爲累爲道之障矣此四六者不盪音蕩胸中則正正則靜靜則明明則虛虛則無爲而無不爲也去此四者之六害不以蕩其心則適得吾體矣性命各正則攻取不得而奪之故靜靜則定而慧生矣故明明則表裏瑩然渣滓渾化故虛虛則恬淡寂寞無爲而無不爲也道者德之欽也生者德之光也性者生之質也性之動謂之爲爲之僞謂之失陸西星曰天下莫不尊道而貴德故道者爲德之欽降本流末人物乃生生則品物咸章而光輝發越矣故生爲德之光有生者有生生者故性爲生之質率性而動則百爲出焉故性動爲爲夫爲而根于性雖爲而實無爲也加之以人爲則僞僞則失失卽老子失道失德失仁失義之失知者接也知者謨也知者之所不知猶也動以不得已之謂德動無非我之謂治名相反而實相順也天下有有知有不知智者之所知與接爲搆日以心鬬其所能者謨謀也不若其所不知渾然無我如赤子之睨視無分別見迫而後動不得已而後起故不動則已動皆我德性之作用以我自然之知而治人穿鑿之知似與人不合而實良藥苦口而利于病忠言逆耳而利于行于名則相反于實爲順道也羿工乎中微而拙乎使人無已譽聖人工乎天而拙乎人夫工乎天而俍音良乎人者唯全人能之俍善也善中則善取譽聖人不能逃名猶是也任其自然天也有心爲之人也工于天卽拙于人矣全人卽至人非此人不能天人兩工唯蟲能蟲唯蟲能天蟲有四部人爲毛蟲之長鳳爲羽蟲之長龍爲鱗蟲之長龜爲介蟲之長能蟲者各盡其蟲之所當然也能天者名爲四部蟲而實天使其然故毛羽鱗介四蟲皆不能離乎天也四蟲之中較重毛蟲故下文曰全人惡天全人惡天全人者盡人之技巧惡天者是惡天地之無全功也惡人之天而况吾天乎人乎天之天不雕不琢純乎自然誰敢惡天人之天未免貪天功以爲已力君子猶惡之而况吾而敢干盜天工以爲人力而不惡之乎一雀適羿羿必得之威也雀亦畏之以天下爲之籠則雀無所逃是故湯以庖音炮人籠伊尹秦穆公以五羊之皮籠百里奚是故非以其所好籬之而可得者無有也羿以威力得雀湯與穆公以霸王之業得伊尹百百奚若使胸中洒洒一無所好惡得而有之哉介者兀足之人拸音侈畫外非譽也胥靡刑徒之人登高而不懼遺死生也畫華服也拸者棄意介者以外毁譽猶能去華服而弗服胥靡以遺死生猶能登高而不懼况忘人者乎夫復育服謵習同不餽贈送也而忘人忘人因以爲天人矣夫人不能忘情于人於是始有餽遺不餽而忘人則無人之情矣有人之形無人之情非天人乎故敬之而不喜侮之而不怒者唯同乎天和者爲然出怒不怒則怒出於不怒矣出爲無爲則爲出於無爲矣天和者造物中和之氣人得之以生者無喜無怒與天爲一矣然非無喜無怒也怒而不怒是其怒者本自不怒非有心之怒也見至人出而有爲于世無所容心雖爲亦無爲也欲靜則平氣欲神則順心欲靜則平氣此二句乃道學人門之要緊工夫平氣卽調氣也調之人而閉息心不期靜而自靜矣心之本性原好靜常動則逆其心而神亦不甯惟順守其心使常在腔子裏而不以接搆滑之自所存者神矣有爲也欲當則緣於不得已不得已之類聖人之道有爲而欲當者蓋緣于不得已而應之而出爲於無爲也不得已者自然也聖人之道類是也復圭子曰絶聖棄知絶仁棄義思欲返仁義而遊道德爲無爲之學乃太上之教也庚桑楚獨得其道居畏壘之山不與仁知者爲伍卽絶聖棄知之意也以其道少試於畏壘使畏壘大穰可也使畏壘之民疑其爲聖尸而祝之社而稷之不可也故南面而不釋然獨不觀於天乎春氣至而百草生秋氣至而萬寶成天何意生成哉不過行其大道而已矣夫至人亦猶天也不出環堵一室而百姓自化不知有至人也今庚桑楚猶使畏壘之民欲爼豆彼於賢人之間有爲也而非無爲也𣺌乎小矣不爲杓之人耶與絶仁棄義之道異矣所以不能釋然于老氏之言也胡南榮趎止知巨魚之不可脫於淵巨獸之不可離於山堯舜不能廢尊賢使能以利天下而不知函車之獸介而離山豈惟無所隱其軀且有罔之患矣吞舟之魚蕩而失水豈惟鯢鰌爲之制卽螻蟻能苦之矣故全其形生之人藏其身於深𣺌也亦猶鳥獸之不厭高魚鼈之不厭深而已矣堯舜之道而猶未至不足以稱揚也恐令後世之人必生穿鑿之事而長蓬蒿之見何異於𥳑髮而櫛數米而炊安足以濟世哉夫堯舜之所推重者賢知也舉賢則民以賢相尙而彼此分任知則民以知相角而盜賊起此二者非以厚民乃教民之知有利也况民之好利本自甚勤利端一開將來必有弒父弒君之禍正晝爲盜之事人與人相食之慘未必不自堯舜生之也南榮趎欲托業以及無爲之治必全汝形抱汝生無使汝思慮營營而後可胡爲以目耳與盲聾者比見聞以心形與狂者比得失不能踐形盡性而欲聞道耶故庚桑子曰子亦知物化乎夫奔蜂與越雞物小且不可以化大况吾之才小安足以化子子胡不南見老子南榮趎至老子之所神人見人不但見其貌而直見其心老子曰子何與人偕來之眾也其所以提撕之者至矣南榮趎懼然顧後尙不知其所謂也致疑於知愚之間而不能棄知也致疑於仁不仁之間而不能絶仁也致疑於義不義之間而不能棄義也胸中紛紛而未决果偕來者之眾也老子曰向吾已見若於眉睫之間奚必汝之言而後得其情哉世之亡人未有不思反今汝亡性情欲反而無由入吾甚爲子憐也南榮趎於是召好去惡十日自愁復見老子老子曰子亦洗濯而心乎夫洗心者無鬱亦無惡子猶未免有惡也外爲聲色所韄而不能屏思欲杜之於内内爲欲惡所韄而不能塞思欲制之干外外内交韄有道德者尙亦不堪况子方倣道而行乎南榮趎曰人苦於不自知耳里人有病而以病爲病猶未甚病也今趎不敏欲聞大道譬如飲藥者前病未去而新病復生趎不願聞也惟願聞衞生之經而巳矣老子曰子能載魂魄抱一而無離乎能未卜先知而誠精故明乎能知止不辱知足不殆乎能舍人求已翛然無累侗然無知乎全生莫如嬰兒故衞生者其能不失兒子之故物乎則長生矣何以明其然也兒子終日嗥與人同而彼獨咽不啞其和至也終日握與人同而彼獨指不屈其德共也終日視與人同而彼獨目不瞬神不在外也行行止止而無意必可方可圓而無固我衞生孰有過於此哉若而人也昔爲物欲所蔽如水凍爲冰今甫頓悟所謂冰解凍釋者德猶未至也夫至人者外内無韄亦無外内揵豈直與人同食地之毛同爲普天之樂而巳哉夫虛中無物不有亦無利害怪異能攖其所有以有爲爲應跡以無事爲自然其往無執着其來無能所是爲衞生之經已如求其至惟爲兒時行動任天身槁木而心死灰不知有禍福故禍福亦不及若非兒子須定能生慧慧則人貌而天行天則可久而有恒人歸之天與之窮而在下謂之天民達而在上謂之天子人之所能學能行能辯者人也所不能學不能行不能辯者天也故必以知養其所不知而後爲至矣彼有内外交盡其備藏彼此敬謹而無失猶有不調于眾心者天也非人也何足以累吾德而納于靈臺哉夫靈臺也者操之則存又必操而忘其操然後反身而誠不誠則言行皆妄雖欲寡過其道無由矣故必明無人非幽無鬼責者然後能獨往獨來譬之於券藏之於内者雖無名而充實自有光輝藏之于外者志在于廣費第爲賈人之事已耳孰知中無一物何其窮也天下惟無物者爲能物物故物莫不入焉彼有苟且而役役於物者身親交喪人物兩失君子不可不愼立志也不觀兵刃之下所殺能幾人若以計攻則屠戮之慘甚于鏌鎁况又有以學術殺人者其流毒尤無窮也此小冦也知幾者猶能避之冦莫大於陰陽無常日到而智巧窮安能逃于天地之間非陰陽之能賊人也夫人之心有生殺之權能殺人者亦能自殺非殺之于名利飲食之間卽殺之于袵席之上胡不捐人間之財以求長生之藥轉殺機爲生機以跳出陰陽之外而反坐待陰陽之賊我也哀哉豈知道無成毁而分則成毁矣道無備無不備而分則有備有不備矣人又何必於求備哉若而人也止知求備於外而不知求備於内一身之元陽琢喪殆盡旣已出矣猶愛貲財而不思訪道友以反還元陽甘與鬼爲鄰而不悔也不知出而得反還之道者死而不死謂之得死滅而實歸於滅者卽是鬼道矣何也天下未有有形者而不歸於無形者此一定之理若道則不然萬物之出機本於道而道之出豈有本乎萬物之入機入於道而道之入豈有竅乎出則實矣然而無處所則又虛虛則循環不窮而無本標第上下四方曰宇果有處所乎往古來今曰宙果有終始乎天門恢恢有影無形萬物生死出入所不能逃非無非有所謂無有也况并其無有而亦無之乃聖人藏神之所而陶鑄乎陰陽者此古人之知必爲未始有物之先而爲知之至也若其次有物則有生死生果爲喪亡而死果爲返眞乎未免有生死之分已又其次認無爲首生爲體死爲卒渾有無生死而一之者乃爲吾友也此三者有首體尻之異譬乎楚之公族分之爲三而實則不一而一也人以一氣凝聚而生何異釜底之烟凝結而爲黬俄然披去之其名曰移是知道者以爲換屋移居然而有可知者亦有不可知者釋氏之奪胎投舍玄門之抛身入身皆本乎此譬如臘祭之有胲此不可散之於爼豆者亦有可散之於爼豆者以不可知而并疑其所可知是因其不可散而㮣疑其可散者也又譬如觀室者觀寢廟則起敬而生移祖考於是之心觀偃所則起怠而生移晦息於是之心皆移易之不可不知者也况冥冥之中昭昭之上豈無主宰乎移是者其說以生爲本人咸知師知就是而避非狥名求實而死節移愚爲知移辱爲名此今人之移是也何異蜩同鷽鳩之見也譬如無心而蹍人之足者疏則必謝而親漸亡者禮可加于疏而不必加于親也故曰至禮不人至義不物至知不謀至仁無親至信辟金總之皆道德也人能徹志勃而解心謬則德之累去而道之塞通矣君子不見可欲則志不亂不爲誘所惑則心不迷不爲情所牽則德不損不爲才所使則道不壅而胸中正矣正生靜生明生虛虛則無爲而無不爲也道尊則德貴生茂則德輝性附於生而彰於爲爲而僞則性失是純任知謀與接爲搆矣若德性之知則動而無動耳目悉化而爲精神羿工乎中微其可能者人也拙乎使人無巳譽其不可能者天也聖人則不然工乎天而拙乎人全人非惡天也惡人之天開而賊生豈肯以吾之天而加人乎羿之威能加乎雀湯與秦穆公能以霸王而籠伊尹百里奚安能籠心中一無所好之人哉介者以外毁譽而去華服胥靡以遺死生而忘臨高况忘人者而不爲天人乎天下惟無喜無怒者爲能同乎天和亦惟怒而不怒者爲而同歸於無爲若而人也談何容易欲靜莫先於平氣氣平則無所不平矣欲神莫始於順心心順則無所不順矣欲有爲而怡當莫如迫而後動不得已而後起自然合乎聖人之道矣奚止衞生之經而已哉雜篇徐無鬼第二十四此篇以嗜欲起性命分明爲性命而發由魏無眞人所以武侯不聞眞人之言胡不近反之性命而乃遠思愛民偃兵知牧馬與牧民一道卽知士品雖殊而踐形盡性則不殊儒墨楊秉之各自爲君也不如調瑟者以一弦爲二十五弦之君知暖妹濡需卷婁之不同而於失性殘命則同知物與物之相守如磁石之吸鐵一知則無不知又能以不知爲知此之謂眞人之知徐無鬼魏隱士也因女商見魏武侯武侯勞慰勞之也之曰先生病矣苦於山林之勞居廟掌者不知山林之適而反以爲勞故乃肯見於寡人徐無鬼曰我則勞於君君有何勞於我徐無鬼乃借其意而反之謂山林非勞廟堂爲勞君將盈嗜欲長好惡則性命之情病矣逐物喪眞内者病矣君將黜嗜欲掔音牽好惡則耳目病矣耳目無聞見則外者病矣我將勞君君有何勞於我内外交病君之可勞莫甚焉武侯超然不對超然猶悵然不悅其言也少焉有間也徐無鬼曰武侯之性中材也不可卒告以至道而當于所好通之此所以有狗馬之言以喻已無求之意嘗語君吾相狗也下之質執飽而止是狸德也以搏執求飽得飽則止喻士之最下者中之質若視日視日謂上視高違而心若有所思者喻中士上之質若亡其一一身也精神不動若無其身喻上土吾相狗又不若吾相馬也吾相馬直者中繩曲者中鈎方者中矩圓者中規是國馬也馬走曲直方圓動合規矩喻國士也而未若天下馬也喻天下士也天下馬有成材才自已足不須教習若䘏音恤若失音逸磬悾惟人所馭可騁可止也若喪其一凝神定氣之意若喪其耦非止亡而已若是者超軼音逸過也絶塵言其走之速而塵不揚也不知其所所以然也武侯大說音悅而笑徐無鬼出女商曰先生獨何以說吾君乎吾所以說吾君者橫說之則以詩書禮樂從說之則以金版六韜反覆操縱其說謂之從橫太公兵法藏於金版𡸅音韜六韜也奉事而大有功者不可爲數而吾君未嘗啟齒今先生何以說吾君使吾君說音悅若此乎徐無鬼曰吾直告之吾相狗馬耳女商曰若是乎曰子不聞夫越之流人乎流罪之人去國數日見其所知而喜舊相知者去國旬月見所嘗見於國中者喜僅識面者及期年也見似人者而喜矣似其鄕人不亦去人滋久思人滋深乎此段曲揣人情以喻武侯久不聞人言今又幸遇其人分明笑魏國無人夫逃虛空卽空谷也者藜藋柱塞也乎鼪音生鼬音由之逕山溪之間鼪鼬所由之處而藜藋塞之荒涼可知踉音良欲行貌位處也其空聞人足音跫音空然而喜矣而况乎昆弟親戚之謦欬音磬克其側者乎跫然行人之聲也喉中之聲日謦欬久矣夫莫以眞人之言謦欬吾君之側乎以腐儒之空談與國士之勦說人主厭聞久矣宜魏侯之不啟齒今狗馬之喻乃獨見之言以之相士則得士以之養心則得心誠哉眞人之言空谷之謦欬也焉得不跫然而喜大悅而笑乎徐無鬼見武侯武侯曰先生居山林食芧栗厭葱韭音久以賔寡人久矣夫今老邪其欲營酒肉之味邪其寡人亦有社稷之福邪先生老矣若肯就養則當備酒肉以養之若有意于寡人則相與以圖社稷之利徐無鬼曰無鬼生於貧賤未嘗敢飲食君之酒肉將來勞君也君曰何哉奚勞寡人曰勞君之神與形武侯曰何謂邪徐無鬼曰天地之養也一無貴賤之分登高不可以爲長居下不可以爲短貴賤所養之同猶登高居下不可以爲長短君獨爲萬乘之主以苦一國之民以養耳目鼻口夫神者不自許也夫神者好和而惡姦養神與養耳目鼻口異神好淸靜耳目鼻口好嗜欲萬乘之君竭一國之力以供嗜欲第魄許之而神魂不自許也夫神好淸淨惟淸淨則與五官調和而百體莫不從令視聲色臭味皆姦賊也神惡之不容而豈肯爲其所牽引也哉夫姦病也故勞之唯君所病之何也今以聲色臭味賊其天和不謂之病而何夫是數者皆有生之養所不能免人則不病也而君獨病之何哉於此可以深思而自得矣武侯曰欲見先生久矣吾欲愛民而爲義偃息也兵其可乎徐無鬼曰不可愛民害民之始也爲義偃兵造兵之本也愛民仁也偃兵義也但不可有心爲之有心愛民則姑息之政行雖曰愛之其實害之故曰始有心偃兵則備禦之防弛雖曰偃之適以造之故日本君自此爲之則殆不成殆危也君以有心爲仁義反危殆而不成凡成美惡器也卽欲成美名享其利者少䝉其害者多非惡器乎君雖爲仁義幾且僞哉形固造形甚哉仁義之不可僞爲也君欲爲偃兵之形而適以造啟釁之形成固有伐變固外戰啟釁之形一成未有不招人之伐生變而外戰者君亦必無盛鶴列於麗譙之間無徒驥於錙壇之宮鶴列陳兵也麗譙宮樓名徒步卒也驥騎射也錙壇社稷之地也人心本自淸虛若忽然起念則是鶴列于麗譙之間徒驥于錙壇之宮一室攢于戈矛而方寸之内皆戰塲矣無藏逆於得無以巧勝人無以謀勝人無以戰勝人夫殺人之士民兼人之土地以養吾私與吾神者其戰不知孰善原其愛民偃兵之初心不過藏仁要人以爲强國之計是謂藏逆于得巧機心也智謀自機巧而出戰爭自智謀而生以此求勝快耳目之私是及與交戰吾神受傷亦已多矣形疲神勞其戰也果孰爲勝乎勝之惡乎在君若勿已矣修胸中之誠以應天地之情而勿攖夫民死已脫矣君將惡乎用夫偃兵哉去其仁義之僞而反修道德之眞誠則與天地之眞情自相應與萬物之眞情不相拂民自脫于死又惡用夫偃兵哉黃帝將見大隗音委乎具茨之山大隗大道也不見之干坦途而見之具茨之山是有茅茨以塞心故命七聖偕往或可不迷耳方明爲御一聖諱方寓言道之方所也二聖諱明寓言道之昭著也爲御者賴二人知若啟而行若翼也昌寓驂乘二日爲昌寓者宇宙也三聖何以名昌寓謂口在西爲將沉在東爲方升命昌寓驂乘斯爲永日而不畏道阻且長耳張若謵朋前馬四聖爲張若若者順也順乎道之自然也謁者習也雙月爲朋五聖名謂朋者謂諳盈虛消息之理故命若與朋前焉以爲引道之人也昆閽滑音骨稽後車六聖昆閽以司守爲名七聖滑稽多辯之人談言微中或可以合道命在後車將以載道使道而可載也七聖莫不載之而歸矣至於襄城之野七聖皆迷襄者除也乃厯盡山城而至坦塗也仍望坦塗走爲大道若走邪徑則旁門矣七聖者七竅也今七聖皆迷非迷于行路也迷于長生之大道耳無所問塗適遇牧馬童子問塗焉無所問塗非路無行人也無知道之人耳童子乃未雕未琢全眞者之別號乾爲馬坤爲牛不言牧牛而言牧馬者謂其能觀天之道執天之行也問塗非問路也暗指金丹大道言不知是遵何道而爲長生之塗也曰若知具茨之山乎曰然知茅茨之塞心也若知大隗之所存乎曰然知大道之端的也黃帝曰異哉小童非徒知具茨之山又知大隗之所存請問爲天下小童曰夫爲天下者亦若此而已矣牧民與牧馬同又奚事焉不必多事予少而自遊於六合之内予適有瞀音務病有長者仙師也教予曰若乘日之車而遊於襄城之野今予病少痊乘伺也日車日輪也襄城大道也日輪豈可乘仙師教我伺口車晝夜輪轉將吾身之河車亦與日車同轉而不息必從大道中過而不明之瞀病始少痊矣與易曰天行健君子以自强不息同旨童子以長者指吾之迷而因以指七聖之迷凡釋經起語皆云如是我聞意本此予又且復遊於六合之外夫爲天下亦若此而已予又奚事焉黃帝曰夫爲天下者則誠非吾子之事雖然請問爲天下小童辭黃帝又問小童曰夫爲天下者亦奚以異乎牧馬者哉亦去其害馬者而已矣今之牧馬者不知鞭策之爲害字民者昧乎決令之生奸乃謂馬難調民難治非也黃帝再拜稽首稱天師而退知音智士無思慮之變則不樂音洛辯士無談說之序則不樂察士無凌誶音𡻕凌鑠訊問也之事則不樂皆囿於物者也人情樂于自見而喜于有所試一無所試則才無自見矣故不樂獨樂其性之所偏故爲物所囿招世之士興朝以天下爲巳事招搖自見而立于朝廷之上中民之士榮官庸常之士以爵祿爲榮筋力之士矜難有力之士勝人之所難勝舉人之所難舉勇敢之士奮患自奮于憂患中而威武不能屈兵革之士樂戰槁枯之士㝛名士之任金革者皆以戰爲樂土之昔節者得名而止法律之士廣治禮樂之士敬容仁義之士貴際法家之上長于治世者章縫之士飭其容止者仁義之士貴于際時而行道士之品不同而志之所存各異農夫無草萊之事則不比商賈音古無市井之事則不比庶人有旦暮之業則勸百工有器械之巧則壯比合也農夫食力商賈歸市故非兩者則不比庶人有常居之業則旦暮勸百工有一藝之精則精神王通前後所論皆易于物者錢財不積則貪者愛權勢不尤尤甚也則夸音誇者悲勢謂權勢物謂物力之徒樂變謂喜于更張以自炫者此去虛靜恬淡寂寞無爲者何啻天壤遭時有所用不能無爲也此皆順比於𡻕不物於易者也馳其形性潛之萬物終身不反悲夫聖人遭時之用則轉無爲而爲有爲後天而奉天時也比於𡻕功四時之序有變有易而化工元氣不隨物而易存此便是爲而無爲之意若夫外馳其形内馳其性汨沒于萬物之中而無所歸復則逐物喪眞矣莊子曰射者非前期而中謂之善射天下皆羿也可乎惠子曰可莊子曰天下非有公是也而各是其所是天下皆堯也可乎惠子曰可射以的爲前期必中的而後爲巧若非前期則中者皆羿矣人之是非以理爲準若非有公是而各是其是則人人皆堯矣莊子曰然則儒墨楊秉四楊楊朱也秉公孫龍名與夫子爲五果孰是邪或者若魯遽者邪其弟子曰我得夫子之道矣吾能冬爨鼎而夏造履也冰矣魯遽曰是直以陽召陽以陰召陰冬至陽生故人喜𤍠而當爨不煩夏至陰生故人喜冷而履沐不栗非吾所謂道也吾示子乎吾道於是乎爲之調瑟廢置也一於堂廢一於室鼓宫宫動鼓角角動音律同矣夫陰陽相召未奇也堂室兩處各置一瑟鼓此瑟之官聲則彼瑟之宫聲自動鼓此瑟之角聲則彼瑟之角聲自動似爲奇矣然以律相同故聲相應亦未奇也夫或改調一弦於五音無當也鼓之二十五弦皆動未始異於聲而音之君巳且若是者邪凡鼓瑟者必鼓一弦則一弦動爲其非音之君也若別改調一弦於五音無所主而鼓之二十五弦皆動此一弦者乃是爲眾音之主故鼓之而眾弦莫不聽命耳六十四謂皆起于黃鍾之宫其宫爲君故能役他律此亦正理不足爲奇且若是耶惠子曰今夫儒墨楊秉且方與我以辯相拂以辭相鎭以聲而未始吾非也則奚若矣抗其詞以相諍厲其聲以相壓而未始吾非則吾之是何如耶莊子曰惠子不知道以無諍爲貴相抗相鎭非道也無有是處莊子且不說破直連舉三事作譬以戲劇齊人蹢音擲子於宋者其命閽也不以完古人以刖足守門故子欲爲閽則必摘其足而不欲其完其求鈃音刑鍾也以束縛巳子不欲其完而求鈃鐘則束之縛之必求其完譏惠子之辯恕于巳而求備于物也其求唐子也而未始出域有遺類矣唐亡也子亡在外則當遠求他國而乃求不出境終亦遺亡而已譏惠子不知深究精徵遠討訓典徒執規規之辯終亦必失也夫楚人寄而蹢閽者夜半於無人之時而與舟人鬬未始離於岑而足以造於怨也楚有蹢其足而寄跡爲閽人者不能自歸附舟而返夜之半足未離岸而與舟人鬬忘其濟已之恩適足以造怨果可以爲是乎譏惠子亡其眞宅之歸而與人强爭是非爭勝負不足以有濟徒與物不適而巳莊子送葬過惠子之墓顧謂從者曰郢人堊音惡曰泥也漫其鼻端若蠅翼漫其鼻端若蠅翼薄之甚也使匠石斵之匠石運斤成風瞑目恣手聽而斵之盡堊而鼻不傷郢人立不失容宋元君聞之召匠石曰嘗試爲寡人爲之匠石曰臣則嘗能斵之雖然臣之質死久矣自夫子之死也吾無以爲質矣吾無與言之矣立不失容不惟不動且顏色不變是郢人者匠石之質也質如繪事以素爲質之質非立不失容之人則匠石無以施其巧故郢人死而匠石無爲質矣無可與言運斤之道矣莊子抱道世無知音可與言之人惟一惠子之雄辯差足以引發生平胸中之奇載道鴻文亦或在是今過其墓而憶之其感慨可知管仲有病桓公問之曰仲父之病病矣可不謂云至於大病死也則寡人惡乎屬音燭托也國而可管仲曰公誰欲與公曰鮑叔牙曰不可其爲人潔廉善士也其於不已若者不比之潔廉之人多無有容之度又一聞人之過終身不忘使之治國上且鉤乎君束約其君以致聲譽下且逆乎民强人以所難而逆乎民其得罪於君也將弗久矣公曰然則孰可對曰勿已則隰朋可其爲人也上忘而下畔上忘人之勢而下忘人之畔我惟知反已愧不若皇帝而哀不已若者以德分人謂之聖以財分人謂之賢以賢臨人未有得人者也以賢下人未有不得人者也其於國有不聞也其於家有不見也不事察察以爲明隰朋之行勿已則隰朋可吳王浮于江登乎徂之山眾狙見之恂然棄而走逃於深蓁有一狙焉委音威蛇音移自得之貌攫音却抓音搔便捷之狀見巧乎王賣弄便㨗王射之敏給搏㨗矢狙之摶其捷矢者亦甚給王命相者趨射之狙執死狙死而見執矣王顧謂其友顏不疑曰之狙也伐其巧恃其便以敖音傲予以至此殛也戒之哉嗟乎無以汝色驕人哉顏不疑歸而師董梧以鋤其色師其道德以鋤去驕傲之色去樂音洛辭顯三年而國人稱之南伯子綦隱几而坐仰天而噓顏成子入見曰夫子物之尤最也也形固可使若槁骸心固可使若死灰乎曰吾嘗居山穴之中矣當是時也田禾齊君一覩我而齊國之眾三賀之賀其得賢我必先之先有以自見于外彼故知之我必賣之自衒自售彼故鬻之若我而不有之彼惡得而知之若我而不賣之彼惡得而鬻之嗟乎我悲人之自喪者人之徇名而喪實者吾悲之吾又悲夫悲人者悲人之喪而不知自悲其喪者吾又悲之吾又悲夫悲人之悲者吾又悲夫悲人而爲人所悲者吾又悲之其後而日遠矣其後道日加進不爲物累則形其有不槁心其有不灰乎仲尼之楚楚王觴之孫叔敖執爵而立市南宜僚受酒而祭曰古之人乎於此言已古人因餘酒而陳善納誨曰丘也聞不言之言矣聞聖人有不言之教未之嘗言未嘗以語人於此乎言之市南宜僚弄丸而兩家之難解孫叔敖甘寢秉羽而郢人投兵市南有熊宜僚者善弄丸鈴楚與宋戰宜僚披胷受刄于軍前弄丸鈴一軍停戰遂勝之孫叔敖安寢恬卧養德于廟堂之上敵國不敢犯郢人投兵無攻我也敖在孔子前僚在孔子後蓋寓言也𨚑願有喙音諱三尺凡鳥喙長者多不能言彼之謂不道之道二子所爲此之謂不言之辯夫子自反故德總乎道之所一識得一萬事畢而言休乎知之所不知至矣道之所一者德不能同也大知不知故知之所不知爲至道無異名而德有四端故道之所一而德不能同知之所不能知者辯不能舉也雖有强辯不能舉不知以示人名若儒墨而凶矣名雖儒而實不儒則儒之賊名雖墨而實不墨則墨之賊謂之凶人也亦可故海不辭東流大之至也聖人并包天地澤及天下而不知其誰氏是故生無爵死無諡實不聚名不立此之謂大人狗不以善吠爲良人不以善言爲賢而况爲大乎夫爲大不足以爲大而况爲德乎蓋大無名相有心爲之尚不足以爲大而况爲德乎哉德則指仁義聖知而言大則道也德則道之降焉者也爲德則所謂下德執德其可謂德乎哉夫大備矣莫若天地然奚求焉而大備矣知大備者無求無失無棄卽孟子曰萬物皆備於我矣之備何假於外而求何所遺亡何所舍置不以物易巳也反已而不窮循古而不摩大人之誠誠卽釋氏所謂實際之理子綦有八子陳諸前召九方歅音因曰爲我相吾子孰爲祥九方歅曰梱也爲祥子綦瞿然喜曰奚若曰梱也將與國君同食以終其身子綦索然出涕曰吾子何爲以至於是極也九方歅曰夫與國君同食澤及三族而况父母乎今夫子聞之而泣是禦福也非望禦福有道之憂惟知者能知之此子綦之所以憂也子則祥矣父則不祥子綦曰歅汝何足以識之而梱祥耶盡於酒肉入於鼻口矣而汝也何足知其所自來酒肉也吾未嘗爲牧牧養羊也而牂音賍牝羊也生於奥室西南隅未嘗好田畋獵也而鶉音純生於宎音要室西北隅若勿怪何邪酒肉牂鶉非所致而皆爲怪吾所與吾子梱也遊者遊於天地與天地爲徒不與世俗爲伍吾與之邀樂音洛於天吾與之邀食於地吾不與之爲事事功也不與之爲謀慮也不與之爲怪吾與之乘天地之誠自然也而不以物與之相攖吾與之一委音威蛇音移而不與之爲事所宜今也然有世俗之償焉有功于物物乃償之此其常也今吾無事功無謀慮無怪異乘天地之自然而不與物相攖委委蛇蛇不見有宜人之事而反以世俗之福償之殆怪徵也凡有怪徵者必有怪行世俗之福卽怪徵也殆乎非我與吾子之罪殆非我有怪行而得此俗償之罪幾天與之也吾以是泣也無幾何而使梱之於燕盜得之於道全而鬻之則難不若刖之則易於是乎刖而鬻之於齊適當渠公之街終身食肉而終鬻於齊爲蹢閽者食肉之相果驗而怪徵之說不誣矣渠公總屠者也當其街故常食肉齧缺遇許由曰子將奚之曰將逃堯曰奚謂耶曰夫堯畜畜然仁吾恐其爲天下笑後世其人與人相食與音餘治貴無爲而有心不免有知有知適以滋僞而害生夫民不難聚也愛之則親利之則至譽之則勸致其所惡則散知此四者則可以聚民愛利出乎仁義捐仁義者寡利仁義者眾夫仁義之行唯且無誠仁義之流弊必且無誠心行之者惟假之以濟其貪欲之私耳且假夫禽貪者器譬若貪禽者假以網之器其害物也滋甚是以一人之斷制利天下譬之猶一覕音𣩵也一人操刀斧斵制物料以利天下譬之纔一割耳而生意已絶矣覕割也斷者不可復續以器之不能復返爲朴喻仁義之不能復返爲道德也夫堯知賢人之利天下也而不知其賊天下也夫惟外乎賢者知之矣外賢不以賢爲尙也則賢不僞乃絶聖棄知之意有暖柔貌姝音樞柔貌者有濡音儒需者需音須謂偷安須臾者有卷音權婁拘攣也者所謂暖姝者學一先生之言則暖暖姝姝而私自說音悅也自以爲足矣而未知未始有物也是以謂暖姝者也柔妖自足之人旣以自媚因以媚人是以暖爲足以姝爲美不知天下有至足至美者在而太虛之中一物不着亦未之知也濡需者豕蝨是也濡滯而有需待貪于勢利安于卑汙而不知禍故以豕蝨名之擇疏𩯡自以爲廣宫大囿奎蹄曲隈豕之毛曰𩯡蹄之曲曰隈乳間股脚自以爲安室利處不知屠者之一旦鼓臂布草操烟火而已與豕俱焦也喻人之托身于權勢而一旦與之同禍患猶豕蝨也此以域進此以域退由此塗而進者與之同福亦必由此塗而退者與之同禍也此其所謂濡需者也卷婁者舜也卷婁自苦之貌言修德之人人歸而已勞苦也羊肉不慕蟻蟻慕羊肉羊肉羶也舜有羶行百姓悅之故三徙成都至鄧之墟而十有萬家堯聞舜之賢舉之童土之地山不生草木曰童曰冀得其來之澤舜舉乎童土之地年齒長矣聰明衰矣而不得休歸所謂卷婁者也肉必羶也而後蟻聚之舜之行亦羶也而後堯舉之冀可以保我子孫黎民而舜日兢業于萬幾之煩不得休息則爲所苦矣是以神人惡眾至眾至則不比不比則不利也眾至眾人所歸也情不一則不比而難和同矣不和同必思以同之則有所損故無所甚親無所甚疎抱德焬音樣養也和以順天下此謂眞人言無心于天下庶得以養德而全眞於蟻棄知於魚得計於羊棄意蟻微物也而有慕羶之知是不能忘情于物矣羊至愚也猶以氣羶而聚蟻則不能無意矣必如魚之相忘于江湖斯得矣三喻可稱奇絶表眞人之忘情也以目視目以耳聽耳以心復心若然者其乎也繩其變也循以目視目不過見其所見以耳聽耳不過聞其所聞惟以目視者而復吾心視以耳聽者而復吾心聽此之謂以心復心若然者其常也如繩之平而人無參差之嗟其變也如循環然而我無怨尤之念古之眞人以天待之不以人入天無爲自然而不以巳與之古之眞人得之也生失之也死得之也死失之也生得者得何物得此不生不死之道也其得生而失死宜矣何以曰得死而失生哉葢凡人心生則神死故曰得生失死眞人心死則神活故曰得死失生藥也均之爲藥其實堇音說鳥頭也也桔梗也雞壅芡實也豕零猶零也是時爲帝者也帝君也用藥有君臣佐使之宜故藥亦遞爲君用者得不用者失矣何可勝言謂不止于上三品之藥物而巳也句音鉤踐也以甲楯音盾三千棲於會稽唯種姓文名種也能知亡之所以存唯種也不知其身之所以愁知國之存亡而不知其身之生殺豈尺有所短耶故曰鴟音笞目有所適夜能撮蚤而晝不見泰山目有所適也鶴脛有所節解之也悲鶴脛長而解之則悲足有所節也節者止而不過之意故曰風之過河也有損焉日之過河也有損焉謂只風與日相與守河而河以爲未始其攖也恃源而往者也風與日吹而晒之則水易涸皆於河有損使風日守此河而不去而河終不爲損而攖拂以水有本源故也故水之守土也審影之守人也審物之守物也審水生于土而不離土影生于人而不離人審猶定也物則各以氣類相守如磁石吸鐵狸犬守鼠陽燧取火方諸取水要皆一定而不移故日物之守物也審知其審則守其審而天下無不安之分矣故目之於明也殆五色令人目眩耳之於聰也殆聲令耳聲心之於殉也殆物交物則引之而巳所謂人心惟危也凡能其於府也殆靈府瑩然一物不着一有所能皆足以殆吾之府釋氏以能所爲障礙障礙非殆乎殆之成也不給及也改禍之長也茲萃其反也緣功其果也待久而人以爲已寶不亦悲乎及其未殆而改之可也殆成將不及改而禍日滋萃矣然物豈能殆人哉由人自取以爲功能故不覺狗象而喪心耳殆之成也又非一朝一夕之故世人溺于聲色心思之欲如寶然自安其危而利其災不亦悲乎故有亡國戮民無已不知問是也身爲國精爲民精太用則竭氣太用則耗神太用則罷戮民無已者耗其精而不知止也其國必亡而身從之喪也不問是者謂不講求於是而莫之救也故足之於地也踐雖踐恃其所不蹍而後善博也蹍亦踐也足之所踐雖無幾然必有餘地而後可以致遠若容足之外視爲無用而削去之其何以縱步而前以收善博之功耶人之知也少雖少恃其所不知而後知天之所謂也人之知不過聞見而其知有限然必無知者而後能無所不知德性人人所本有吾不恃聞見而恃不知之中有心頒神會德性之根源則知天矣知大一一卽太極也渾淪巳判卽太初氣之始是也知大陰卽無極也渾淪未判一團純陰所謂陰含陽也而爲大陰乃混沌世界纔有陽便分陰而爲太極天地闢矣知大目一生二二生三三生萬物件件有名目矣萬物各具一太極也知大均天地間飛濳動植無一物無陰陽而爲大均所謂萬物統體一太極是也知大方八方之風氣不同師曠考鍾聲而知運之盈虧歌南風而卽知楚之不競是也知大信識盈虛消息之理進退存亡之道知大定造化有密移者有一定而不易者如四時之不爽治亂之循環至矣人能知此上七者則無所不知而知無以加矣大一通之大一道也一以貫萬也大陰解之天地問陽明而陰暗然暗中藏明乃眞陽也明中藏暗乃眞陰也故火外明而内暗水外暗而内明楞嚴經云處明不見暗中之一物處暗能見明中之萬形本此大目視之兩目所見能幾何太上云不出戸知天下不窺牖見天道卽大目也大均緣之緣因也釋氏以兩人相遇爲有緣何其小也不知道非一人之道乃天下之所同得而爲大均凡志同道合者爲有緣無論天下卽尙論古人亦爲大均之緣大方體之大方無隅渾然與我爲一體然天地無體以太虛爲體我心能包虛空是虛空無體又以我爲體也大信稽之小信或以言語爲期或以命令稽考若大信則人之一身與造化通修道者有一分行持則有一分效驗十分行持則有十分效驗皆可稽考大定持之吾儒以知止爲定釋氏先戒而後定此之大定卽玄門靜處煉氣以定爲定閙處煉神以不定爲定非大定持之乎盡有天凡學道者陰不盡則與天遠惟陰盡而後陽純天命不在天而在我矣循有照誠則明矣吾儒以誠爲照釋氏戒定慧以定爲照莊老之照照於盡有天之後乃循其天神天明自然不卜而知吉凶禍福矣冥有樞始有彼夫樞所以主宰乎造化者彼卽昭昭之外有倫類卽知北遊所謂有倫生于無形是也則其解之也似不解之者其知之也似不知之也不知而後知之凡物之解與知皆可以着其才情知識而道則無所用其才情知識故以不解解之而後爲眞解以不知知之而後爲眞知其問之也不可以有涯而不可以無涯又爲初學立箇方便法門蓋問則自外而入與不解而解不知而知者何啻天壤但下學鈍根非問則無門可入耳造化之理放之則瀰六合不可以有崖卷之則退藏於宻又不可以無涯頡音絜滑音骨有實頡謂升降上下滑謂流動旋轉實卽化育流行造化之妙若無而實有也古今不代而不可以虧從古至今只是一箇造化初無更代而用之不窮何有虧損則可不謂有大揚搉音角商確也乎闔不亦問是巳何不問是造化之理奚惑然何以惑爲哉爲以不惑解惑復於不惑是尙大不惑以此不疑之理而解天下之疑又復歸於不疑之地則庶乎至於大不疑矣復圭子曰居廟堂者以廟堂爲適以山林爲勞此魏武侯之所以勞徐無鬼也而不知山林非勞廟堂爲勞何也君將任嗜欲則耳目快而性命病矣君將黜嗜欲則性命全而耳目病矣武侯鈍根不可與言性命此其所以不對也徐無鬼於是以相狗馬之說進狗有下質中質上質之殊馬有國馬天下馬之異夫士亦有國有天下也武侯不知而女商亦不知也謂吾君不可以詩書禮樂說亦不可以金版六𡸅說此其所以不啟齒而笑而反笑於狗馬之說也徐無鬼曰吾聞越之流人去國漸久其見人也愈疏而愈喜非好疏也去人滋久思人滋深也夫逃虛空者山逕之間不聞人聲而聞足音亦其所喜况有兄弟親戚之謦欬于側其喜又當何如今魏侯廟堂之上羣臣皆凡品久矣夫魏無眞人而性命喪故亦無眞人之言與吾君道而性命之學莫傳矣魏武侯欲以酒肉而養賢爲社稷之福可謂能養賢乎徐無鬼曰凡人皆以君居廟堂爲樂吾以君爲神瘁而形疲也蓋人有貴賤而養無貴賤亦猶登高者不可以爲長居下者不可以爲短何也形濁而神淸君竭一國之物力而養形于形爲一時之快于神爲拂其淸淨之常久之神瘁而形亦疲矣故君非勞我而我勞君也武侯求其說而不得以愛民爲仁偃兵爲義可乎徐無鬼曰不可愛民害民之始也爲姑息者慮也偃兵造兵之本也爲防弛者危也此二者不惟不成其爲仁義卽欲成美而受其利者少䝉其害者多非惡器乎甚哉仁義之不可僞爲也君欲偃兵而適以啟釁其形一成未有不招伐生變而外戰者雖然兵固不可偃而亦不可生也君無以麗譙之間而起戰陣無以錙壇之宮而布騎射夫兵爲凶器亦逆事也巧計也詭謀也勝負之機也君豈可以此而取勝哉天下未有不緣戰而殺人士民兼人土地者戰而不勝其禍不可言卽戰而勝而君之形神亦已弊矣故與其决勝負于郊原不若决勝負于方寸使欲消理完渾然眞誠應天順人而民自無死地矣又何必偃兵哉黃帝將見大隗於具茨之山七聖輔之而迷其大道寓言人有七竅聖智且迷見大道不可以知知也而遇童子童子無知也惟無知者爲能知道故黃帝因問治天下之道小童曰子少而有迷瞀之病有長者教予乘日之車則不倦矣遊於襄城之野則不迷矣告若以牧馬去其害馬者而已矣黃帝因牧馬而知牧民亦去其害民者而巳矣夫人情之所偏亦有害也知士樂變辯士樂序察士樂紛皆喜於自見其長者也又有招世之士願興於朝與中民之士以官爲榮者無以異筋力之士矜人所難與勇敢之士不畏憂患者無以異戰危事也而兵革之士則樂之名虛幻也而枯槁之士願㝛之民難齊也而法律之士思廣治之修容止者必其好禮樂者也欲乘時者必其負仁義者也此數者盡乎士之品農夫囿于草萊故其所比亦草萊商賈囿于井市故其所比亦市井庶人有常業則安于生百工有精技則壯于氣貪夫狥財夸者慕勢與人爲徒者樂更張紛紛然内外馳而不思其性命之情也哀哉莊子與惠子曰射不必中的則人皆可羿也是不必公是則人皆可堯也然則儒墨楊秉四者與夫子爲五其孰是耶抑若魯遽耶彼謂其弟子冬爨鼎而夏造冰者爲以陽召陽以陰召陰非道也乃堂室各置一瑟鼓此宮而彼宮動鼓此角而彼角動猶爲音律之同也又改調一弦而二十五弦皆動者以黃鍾一聲爲眾聲之君也且亦若是耶惠子猶然不知其非而與儒墨楊秉抗也可乎譬之齊人爲子求閽不欲完子而欲完鐘求亡子不出乎方域而聽其遺失楚之閽者忘舟人濟已之恩而反與之爲仇也甚矣惠子之强辯也他日莊子過惠子之墓顧謂從者曰郢人有以堊漫其鼻如蠅翼使匠石斵之運斤成風堊盡而鼻不傷郢人不失容宋元君聞之欲使試其技匠石曰吾能運斤以郢人爲質非立不失容者無與施其巧自若人之死吾亡吾質亦無可與言運斤之道矣今惠子已死與吾對談者何人乎管仲有病桓公問之曰寡人欲屬國於鮑叔牙管仲曰其爲人廉潔善士也不如已者不能容人有過者不能忘恐上之倖乎君而下之繩乎民君將罪之何可使之治國也勿已則隰朋可其爲人也上忘其賢而下忘其畔恥其君之不如皇帝而哀人之不已若以德分人謂之聖以財分人謂之賢世之以賢臨人視朋之以賢下人者其得失遠矣國有所不聞慮民窮也家有所不見憂國䘏也吳王登乎狙之山眾狙皆逃有一狙焉以見巧于王而被執嗟乎狙猶以伐能而取殛况乎人可以色驕人哉顏不疑於是歸而師董梧以鋤其色南伯子綦隱几而坐顏成子入見曰夫子物之尤也形可使如槁木而心如死灰乎南伯子綦曰吾嘗居山穴之中自以爲人不知也齊君一見我而齊國人三賀之我不怪彼之知之而怪我之先自見也不怪彼之鬻之而怪我之先自賣也不然則彼惡從而知之又惡從而鬻之哉嗟乎名之著實之喪也吾悲人之喪實者又悲人之悲人者又悲人之悲人而不自悲其悲者與道爲愈遠矣仲尼之楚楚王觴之孫叔敖執爵市南宜僚祭酒曰古人嘗以此進言仲尼曰𨚑聞有不言之言市南宜僚弄丸而兩家難解孫叔敖甘寢秉羽而郢人投兵皆未嘗言也𨚑願有喙三尺烏容言哉彼二子爲不道之道此之謂不言之辯道雖散之而爲萬而總歸于德之一言之所知有限而休乎知之所不知無窮道止于一而德則不能不分途也知極于不知而辯則不能以恍惚逞也吾恐儒墨分而學術裂矣惟聖人者出而與造化爲徒有大美而不居其功其道大故其人亦大觀之狗不以善吠爲良人不以善言爲賢乃知聖人不自大愈增其大夫大則備矣胸中包羅萬象萬物不爲有餘一已不爲不足一時可也千古可也而大人之誠與之爲不磨子綦以八子問九方歅孰爲祥九方歅曰梱也祥將食與國君同子綦出涕而九方歅以綦爲禦福子綦曰歅亦知酒食之所自來耶吾未嘗牧養而牂生于奥未嘗田獵而鶉生于宎且得謂之怪耶不得謂之怪耶夫人有世俗之功卽宜有世俗之賞今梱也有事功乎有謀慮乎相與於無相與相爲於無相爲無其功而獲其福殆怪徵也而我與吾子未嘗有怪行吾是以泣無何而梱爲盜所得刖其足而鬻於齊爲閽者終身食肉而終九方歅之皮相雖有驗而怪徵之說果不誣矣許由當堯之世而思以逃之曰堯之爲人也藏仁以要人吾恐適以啟後世不仁之端今之聚民者不過愛之利之譽之去其所惡而已皆仁義也仁義可行之以示公亦可竊之以濟私譬之假貪禽者以網罟其爲害也不滋甚耶亦猶一人初操刀制器以利天下不知覕爲一割之頃朴散爲器而利之之時已寓賊之之機矣非絶聖棄知不尙賢者安知此道哉莊老看天下三品人雖有暖姝濡需卷婁之不同以言乎失性殘命則一也所謂暖姝者學一先生之言自媚媚人而不知道無我相亦無人相暖暖姝姝爲此柔妖胡爲者也有濡需者猶豕蝨擇疏𩯡乳股而處之自以爲安不知屠者一旦鼓臂操烟火而蝨與豕俱焦也然則天下有托身豪門由此域而進與之同福亦由此域而退與之同禍遲滯觀望爲此濡需胡爲者也卷婁者舜也羊肉不慕蟻蟻慕羊肉羶也舜有羶行故人歸之而招堯之舉至于衰老形勞心瘁而不得休息兢兢業業何乃自苦爲此卷婁胡爲者也是以神人不可得而親亦不可得而疏棄蟻知棄羊意同魚忘故目内視耳内聽心内存其準如繩之直其變如環之循純如天運之自然而不以人參之古之眞人知心生則神死得非眞得而失爲眞失甯心死則神活得爲一得永得而失非果然有所失也猶藥有君臣佐使之宜且時爲帝也况於人乎大夫種能知越之以亡爲存不知敵國破謀臣亡乃其身之所以愁也故曰鴟目雖明不能晝見鶴脛雖長不可使解風日雖有損于河而不能涸有源之泉水之守土也人知之影之守形也人知之至于物之守物如磁石之吸鐵也乃一氣之制服也非知道者曷敢言之世有目窮于明耳窮于聰猶其小也至心窮於狥則未有不爲靈府之累者視外誘之攻我不以爲巳賊而反以爲已寶聽其精竭身亡而不知講求性命之道也哀哉知足有不踐之地而後可以壯人之踐則知人有不及知之知而後謂之爲知天道原於一大一道之始也道含於陰大陰道之母也道竅於明大目道之神也道統於同大均道之布也道散於方大方道之殊也道應於時大信道之徵也道司於契大定道之止也故知大一則數者皆知矣故物有通必有不通而大一則無通而無不通物有解必有不解而大陰則無解而無不解視有到必有不到而大目則無視無不視凡緣有遇有不遇而大均則無遇無不遇凡物有體有不體而大方以太虛爲體無體而無不體凡信有可稽有不可稽而大信則無稽而無不稽凡定有持有不可持而大定則不出中央以應無窮無持而無不持此之謂人盡天純定後生照冥冥有主宰斯昭昭有倫類似解不解似知不知故以有涯求之不得而以無涯求之亦不得俯仰上下莫非造化之昭著也進退古今不見造化之成虧也疑其無則惑於有疑其有則惑於無非有非無有不惑也者而後能大不惑雜篇則陽第二十五此篇引求富貴人於道德之中欲其以聖人爲師而見本來面目甯自埋於民而陸沈毋離性滅情而亡神甯爲由中出者虛而不着毋爲自外入者執而無主天地間一陰陽而已非相照相蓋相治卽相代相生相殺非謂莫之爲而爲卽謂爲若或使之二者一偏于虛一偏于實不知非虛非實非默非語乃爲道之極則陽姓彭名陽字則陽周初時人遊於楚夷節楚臣言之於王王未之見夷節歸彭陽見王果楚賢人曰夫子何不譚我於王王果曰我不若公閱休隱士彭陽曰公閱休奚爲者邪音耶曰冬則擉觸捉二音刺也鼈于江夏則休乎山樊有過而問者曰此予宅也夫夷節已不能而况我乎吾又不若夷節不屑爲之意夫夷節之爲人也無德而有知無恬退之德有干進之知不自許以之神其交不以名節自許神交惟勢利之人固顚冥乎富貴之地非相助以德相助消也皆迷于富貴若與之相與無益而有損夫凍者假衣於春暍音渴者反冬乎冷風言人苦凍而無衣則假于陽春以爲衣而自暖傷暑而成暍則披於冷風而自寒人之相與必以有餘濟其不足則陽好進故以恬退規之也夫楚王之爲人也形尊而嚴其於罪也無赦如虎非夫佞人正德其孰能撓焉楚王自處嚴處人刻非有辯才正德不能動之當時以佞爲賢加以正德則爲有用之才惟正人能撓君之佞惟佞人能撓君之正撓屈也故聖人其窮也使家人忘其貧其達也使王公忘爵祿而化卑惟聖人進退隱見無所不宜忘其爵祿而能下士則化尊爲卑矣其於物也與之爲娛矣其於人也樂物之通而保巳焉故或不言而飲人以和於物樂與之羣而無猜忌之心於人樂其通而無自失之意其和氣之所薰蒸人不飲而自醉與人並立而使人化父子之宜彼其乎歸居而一間其所施彼其歸而居乎家父子以正恩義以篤間其所施親親而仁民仁民而愛物卽不混于所施意其於人心者若是其遠也言休則如此陽如彼其人之度量相越之遠也故曰待公閱休待此人而與之以見楚王則彼必上化乎君下助于友豈予之所能及哉聖人達綢繆周盡一體矣而不知其然性也復命摇作而以天爲師人則從而命之也綢繆乃纒綿補葺也賢知之士達此理不過多力補塞家國之空疏以救國家之危殆聖人達此理則知情氣神稍有不滿皆吾體之有未盡也必煉精還氣煉氣還神而一體始周盡矣聖人亦不知其然而然也乃先天之性本如是耳惟了性者能了命而歸根復命凡所動作而以天爲師觀天之道執天之行也未周盡時吾身一行持一與天體而同運已周盡時吾身之精氣神必與天體而同虛所謂煉神還虛也至于虛空莫測人則從而命之曰聖人而聖人曷常自知其爲聖哉憂乎知而所行恒無幾時其有止也若之何承上言聖人師天庸人師心常以百年而懷千年之憂不知百年之中所行幾何我方欲行而生時又止矣我若之何哉不若師天而順應之爲得也生而美者人與之鑑不告則不知其美於人也若知之若不知之若聞之若不聞之其可喜也終無已人之好之亦無已性也妍生于𡟎若不與之鑑不爲之告則不自知其爲妍矣知若不知聞若不聞而其美者終不因之爲加損也以喻聖人不自知其能愛聖人之愛人也人與之名不告則不知其愛人也若知之若不知之若聞之若不聞之其愛人也終無已人之安之亦無已性也聖人不自知其愛觀鑑可以喻矣舊國舊都望之暢然雖使𨚑陵草木之緡音昏入之者十九猶之暢然况見見聞聞者也以十仞之臺縣音玄眾間者也久旅而歸舊都凡入吾目者十忘其九猶爲之暢然况入道之人見所自見聞所自聞皆吾心固有之物能不暢然喜乎本來面目卽舊都也喻以明覺性得復之喜興感愴也又喻見性者猶以十仞高臺懸眾樂而間作之則聲容四達耳目一新其暢何如冉相氏得其環中以隨成與物無終無始無幾無時日與物化者一不化者也闔嘗舍之冉相氏古之得道聖人也環中不是虛說環中卽玄牝所謂天上三十六地下三十六有人知此竅打破黃婆屋也故得此竅則道可以隨成年與天齊安有終始乎無幾無時猶言不多時也且精化爲氣氣化爲神與物俱化矣猶有一不化者幻身也闔嘗舍此幻身則可以登雲天矣夫師天而不得師天與物皆殉師天者無心而順應殉物者有情而私感殉物則不得謂之師天矣其以爲事也若之何夫聖人未始有天未始有人未始有始未始有物天無爲也人有爲也非惟無有爲無無亦無何天何人何始何物與世偕行而不替所行之備而不洫其合之也若之何凡與人同者多不耐久涉世應接不暇者必多失足今雖與世並行而不疲弊雖應事接物所行周備而不陷溺其合干道也若之何言自然合道也湯得其司御猶司牧也門尹登恆恒作衞言湯爲司御尹登陽衞爲之傅之從師而不囿得其隨成爲之司其名伊尹爲傳而不局于規矩隨寓而成功其所成者不過爲愓司其名夫名者實之賓有實乃有名也之名嬴音盈法得其兩見音現仲尼之盡慮爲之傅之之作此嬴作餘實正也名餘也法當先正而後餘今尹爲愓司此名特操其法之餘不過欲愓得其名因以求其實使兩者並見耳後仲尼之徒盡其思慮爲時君之師傅亦無出于名實而已矣容成氏曰除日無𡻕無内無外容成卽黃帝所命造厯者三百六十有零積日成𡻕若除一日則不成𡻕外之名因内而生無内則無外矣魏瑩音英惠王也與田侯牟齊威王約田侯牟背之魏瑩怒將使人剌之犀首魏官名公孫衍爲之聞而恥之曰君爲萬乘之君也而以匹夫從讎衍請受甲二十萬爲君攻之以萬乘之君而行剌是盜賊之事故衍恥而願攻之虜其人民繫其牛馬使其君内熱發於背然後拔其國忌也出走畏忌而走然後抶音秩擊也其背折其脊抗吭拊背之意季子魏臣聞而恥之曰築十仞之城城者旣十仞矣則又壞之此胥靡之所苦也今兵不起七年矣此王之基也衍亂人不可聽也魏誠非齊敵而衍顧爲誇大之言此季子耻之而以築城爲喻華子魏臣聞而醜之醜其未聞道也曰善言伐齊者亂人也善言勿伐者亦亂人也謂伐之與不伐亂人也者又亂人也君曰然則若何曰君求其道而已矣罪莫大于可欲善言伐齊則見利之可欲固亂人也善言勿伐則見善之可欲亦亂人也謂伐與不伐亂人也者不免于有見又亂人也惟求其道則不滯于一偏之見亂之所由息也惠子惠施聞之而見戴晉人梁賢人惠子薦之於王戴晉人曰設喻有所謂蝸音瓜蝸牛也者君知之乎曰然有國於蝸之左角者曰觸氏有國於蝸之右角者曰蠻氏時相與爭地而戰伏尸數萬逐北旬有五日而後反蝸牛小矣而左右兩角之觸蠻則又小之小者知所爭之至小則進于不爭矣君曰噫其虛言與音余曰臣請爲君實之君以意在四方上下有窮乎君曰無窮太虛之間也曰知遊心於無窮而反在通達之國人跡所及爲通達謂四海之内也若存若亡乎今以四海爲大以太虛視之若有若無至微𦕈矣故日若存若亡乎君曰然曰通達之中有魏於魏中有梁於梁中有王以中國而視魏魏小矣梁其所都于魏之中而覩所都之地則梁又小矣於所都之中而觀王之一身則又愈小矣王與蠻氏有辨乎君曰無辨天下固蝸也王固一觸蠻也奚以異哉故曰無辨客出而君惝音敝然若有亡也茫然自失者始知所爭之不足爭也客出惠子見君曰客大人也聖人不足以當之惠子曰夫吹管也猶有嗃音涸也吹劍首者吷音血而已矣管猶有竅比之簫笛雖無音節吹之猶有嗃然之聲若劍首之環吹之吷然過矣全無聲也堯舜人之所譽也道堯舜於戴人之前譬猶一吷也堯舜聖人也道聖人于大人之前則聖者失其爲聖安得有聲乎哉堯舜且無聲况蠻觸乎大晉人止以小梁國也孔子之楚舍於蟻邱之漿賣漿之家其鄰有夫妻臣妾登極乘屋也者子路曰是稯稯音宗髮亂不整子路異之何爲者邪仲尼曰是聖人僕也隱爲僕隸是自埋於民自藏於畔埋于民則不爲可見之行藏于畔則不居中正之德其聲銷其志無窮其口雖言其心未嘗言方且與世違而心不屑與之俱是陸沈者也聲消志無窮退藏于宻而遊方之外欲無言而不能無言與世違而不屑與俱將欲逃世而去也以聖德遊人間而人莫知猶處陸而沈人莫見也是其市南宜僚邪子路請往召之孔子曰已矣彼知邱之著於已也知邱之適楚也以邱爲必使楚王之召已也彼亦知吾之知彼也必將屬王召之矣彼且以邱爲佞人也夫若然者其於佞人也羞聞其言而况親見其身乎彼將以我爲多言而佞矣有德之人其遠佞也惟潛藏之不出而肯我見乎而何以爲存言其必去而不留矣子路往視之其室虛矣挈妻子而去之絶人逃世也長梧封人問子牢曰君爲政焉勿鹵莽鹵剛鹵之地人多倦耕而草生莽草莽也治民焉勿滅裂田中無水而有裂文昔予爲禾耕而鹵莽之則其實亦鹵莽而報予芸而滅裂之其實亦滅裂而報予予來年變齊盡易耕耘之法深其耕而熟耰之其禾繁以滋予終年厭飱音孫封人治田喻政莊子又因以喻學也莊子聞之曰今人之治其形理其心多有似封人之所謂遁其天離其性遁其自然之天而離其無生之性滅其情亡其神滅其順應之情而亡其思慮之神以眾爲如此之人甚眾也故鹵莽其性者欲惡之孼爲性雈葦蒹音兼葭音加始萌以扶助也吾形尋漸也擢吾性欲惡始萌之時謂可以扶吾形隨卽擢亂吾性始字與尋字相呼應並潰漏發不擇所出精氣散逸上潰下漏不知所出漂疽疥癰所謂潰也内𤍠溲膏所謂漏也是也性得其養則形神俱妙失養則形神俱病理之常也此便是鹵莽之報呂志甫曰爲道日損以至無爲是所以治形理心者也而乃遁天離性滅神亡情以眾爲而不知止則鹵莽之甚矣内之欲惡爲雈葦外之蒹葭扶吾形尋擢吾性天理滅矣於是時而欲治之可得乎並潰漏以下皆欲惡爲孼奪其眞之所爲也栢矩有道之人學於老聃曰請之天下遊老聃曰已矣天下猶是也又請之老聃曰汝將何始曰始於齊至齊見辜人焉推而强之解朝服而幕之號天而哭之矩遊至齊見罪人而哀矜之故幕之泣之也曰子乎子乎天下有大菑子獨先離之曰莫爲盜莫爲殺人莫疑詞言子之罹此辜者莫是爲盜乎莫是殺人乎所以致此者必有其由榮辱立然後覩所病貨財聚然後覩所爭今立人之所病聚人之所爭窮困人之身使無休時欲無至此得乎太古之治不尙賢不貴難得之貨今尙名則榮辱立尙利則爭端起人之所病莫如辱莫如貧所爭莫如榮莫如貨自聖人立之軌物以辨貴賤而天下因有貧富病者爭者日甚一日以就窮困而無休時欲其不盜不殺庸可得乎古之君人者以得爲在民以失爲在已以正爲在民以枉爲在已故一形有失其形者退而自責古之人君得與正本不在民也而以爲在民失與枉本不在已也而以爲在已一物之失其則則曰匹夫不獲時予之辜其責已也如此今則不然匿爲物而愚不識大爲難而罪不敢重爲任而罰不勝遠其塗而誅不至四者皆末世苛刻之政民知力竭則以僞繼之日出多僞上之人士民安取不僞下之人夫力不足則僞知不足則欺財不足則盜盜竊之行於誰責而可乎夫僞也欺也盜也皆不足之故也民之所以不足誰之責也蘧伯玉行年六十而六十化未嘗不始於是之而卒詘之以非也凡人是在事始覺非在事卒未知今之所謂是之非五十九非也伯玉行年五十而知四十九年之非猶末化也至六十而化安知六十之化非五十九年之非耶萬物有乎生而莫見其根有乎出而莫見其門人皆尊其知之所知而莫知恃其知之所不知而後知可不謂大疑乎萬物生出非無根無門但虛寂而有所不覺耳所知卽有名有狀者物也所不知卽無名無狀者物物者也根也門也已乎已乎且無所逃巳乎巳乎誰能逃此而獨爲知乎陰符經云人知其神之神而不知不神之所以神意蓋如此此則所謂然與然乎始乎自疑終乎自决卽非與曰非也之意仲尼問於太史大弢音韜人名伯常騫狶韋二人名曰夫衞靈公飲酒湛音耽樂音洛不聽國家之政田獵畢弋不應諸侯之際其所以爲靈公者何邪何以諡之爲靈大弢曰是因是也因國人之同是而諡之伯常騫曰夫靈公有妻三人同濫而浴史鰌奉御猶今之召對也而進所所居之處搏幣而扶翼以鰌爲賢而奉御之勞故搏幣而扶翼之使其不得終禮此其所以爲肅賢也其慢若彼之甚也見賢人若此其肅也是其所以爲靈公也狶韋曰夫靈公也死卜塟於故墓不吉卜塟於沙邱而吉掘之數仞得石槨焉洗而視之有銘焉曰不馮音憑其子靈公奪而埋之子孫不可憑藉遂爲靈公所奪見未生之前此名巳定夫靈公之爲靈也久矣之二人何足以識之呂吉甫曰大𡸅伯常騫則以人論之狶韋則以天論之以天論則雖名諡固非人之所能爲也少知問於太公調曰何謂𨚑里之言太公調曰𨚑里者合十姓百名而以爲風俗也人物雖異風俗則同合異以爲同合姓名爲𨚑里異爲同也散同以爲異散𨚑里爲姓名同爲異也非如一家之言異不能合同不能散也今指馬之百體而不得馬而馬係於前者立其百體而謂之馬也譬之馬散爲百體指其一處不可言馬總其百體合而爲一方可謂馬喻異不見道合而爲同方始見道是故𨚑山積卑而爲高江河合水而爲大大人合并而爲公𨚑山積卑江河合水大人合公亦不外乎此理蓋能合邱里而得宜則合天下之物情亦猶是也在乎公之一字而已是以自外入者有主而不執由中出者有正而不距外人者聽言者也中出者立言者也聽人之言吾心雖有所主而不可執定一已之見立言垂訓吾心雖有取正而不可距逆他人之意四時殊氣天不賜故𡻕成五官殊職君不私故國治四時運行而天無私厚故成𡻕五官効職而君無私人故國安文武大人不賜故德備萬物殊理道不私故無名凡人已所無之物或天賜之或君賜之皆外增其所未備惟文武俱全之大人不待賜而德備于已故文武惟其所用析萬物而觀之殊性則殊理似有私厚于其間而道則萬物統體一太極渾然而無名未常私厚一物也無名故無爲無爲而無不爲時有終始世有變化禍福湻湻至有所拂者而有所宜自殉殊面有所正者有所差凡物有名者必有所作爲作爲多私伎倆窮而不能爲矣惟道無名故無爲所以不能窮其爲而無不爲矣此何故以時有終始而道無終始世有變化而道無變化禍福湻湻似無分別天下禍福有不當至者是爲有所拂然而禍福亦有合應者則爲有所宜猶人之面相雖殊有禍當禍福當福而爲正者亦有不當禍而禍不當福而福爲差者君子甯德備而未必獲福適值其拂不爲無德而徼福冀天之差比于大澤百材皆度觀乎大山木石同壇百材雖異而同度于大澤之中木石雖異而同萃乎大山之上則同中有異而異之未始不歸于同此之謂𨚑里之言少知曰然則謂之道足乎言于𨚑里則天下可知少知便以同中之異異中之同而爲道太公調曰不然今計物之數不止于萬而期曰萬物者以數之多者號而讀之也物不止于萬而以萬稱約而言之也是故天地者形之大者也陰陽者氣之大者也道者爲之公因其大以號而讀之則可也形氣奚止天地陰陽舉其大者耳道本無名强名之公又强名之大人因以大號之已有之矣乃將得比哉則若以斯辯譬猶狗馬其不及遠矣道本無名而以名稱之則已有矣乃將得與無名者比哉若以斯而辨道不猶狗馬之大小遠不相及哉少知曰四方之内六合之裏萬物之所生惡起少知聞不得與道比故疑于無物而問萬物之所生從何而起太公調曰陰陽相照相蓋相治四時相代相生相殺調從起處說起太極旣判陰陽乃分懸象著明照也陰陽互藏其宅蓋也陽舒陰慘治也四時之氣代謝生克循環不窮欲惡去就於是橋高起之義起雌雄片合於是庸有萬物乘氣機以化生有生則有情矣欲惡取舍突然而起雌雄分合動靜有常矣安危相易禍福相生緩急相摩聚散以成此名實之可紀精之可志也情欲旣起則不能無事故安危禍福緩急聚散因之名實精微件件可紀而志也隨序之相理先後相隨之謂序相理而不亂也橋運之相使橋則乘之以行運則因之以濟升降屈伸若或使之也窮則反終則始此物之所有窮反爲通終則必始造化如此物理亦然言之所盡知之所至極物而已言到盡處知到至處總來只說得個物字故日極物覩道之人不隨其所廢不原其所起此議之所止然以言言道以知知道非實覩道者也惟覩道之人不隨物之終不原物之始歸之無有此辯論之所以息也直到未始有始也者處方爲究竟少知曰季眞人名之莫爲接子人名之或使二家之議孰正於其情孰偏於其理莫爲謂莫之爲而爲無以宰之也或使謂若或使之然者有以宰之也二家孰當孰否求以决之太公調曰雞鳴狗吠是人之所知造化之妙非若雞鳴狗吠之易知也雖有大知不能以言讀其所自化又不能以意其所將爲旣不能以言論究其自化又不能以臆度測其將爲斯而析之精至於無倫大至於不可圍或之使莫之爲未免於物而終以爲過若將此理精而析之小無倫而大不禦豈二人之說所能盡乎或之使莫之爲是論物而非以論道也論物則未免爲物所囿而終有失言之過矣或使則實莫爲則虛有名有實是物之居無名無實在物之虛可言可意言而愈疏言或使明明說有箇主使之者太說實了言莫爲全是偶然聚散適然生死太說虛了故謂其有則名實俱有而囿于物之居後天也謂其無則名實俱無而在乎物之虛先天也大抵曰有無皆可以言傳可以意度以此求道而道愈遠矣此段大是禪宗釋氏之經典意語多本乎此未生不可忌巳死不可阻死生非遠也理不可覩或之使莫之爲疑之所假造化鼓出機則生乎不得不生吾不可忌之而不生鼓入機則死乎不得不死吾不可阻之而不死死生相去不遠死生可覩而所以生死之理不可覩冥冥之中疑其若或使之又疑其莫之爲總之皆假也吾觀之本其往無窮吾求之末其來無止無窮無止言之無也與物同理吾觀道之本往無窮則迎不見首吾求道之末來無止則隨不見後是物之理非物之形也或使莫爲言之本也與物終始言莫爲或使者其立言之本旨始終要在物上見道終不能離物所以不得道不可有有不可無道之爲名所假而行謂道爲有則着于色相謂道爲無落于邊見道不可名强而名之其所名者皆假而已或使莫爲在物一曲夫胡爲於大方曲偏也二者之論皆局于一偏胡足以語大方乎言而足則終日言而盡道言而不足則終日言而盡物同一言也若果有所見雖謂之言亦可以盡道希言自然也若無所見則言不足以盡道第盡物而已多言數窮也道物之極言默不足以載非言非默議有所極自物觀之道本無物自道觀之無物非道言之不可默之不可非言非獸之中自有至極之議復圭子曰甚矣古今人之不相及也以今人兢進古人恬退也而則陽之爲人則古而今也始因夷節求見楚王而不果旣又因王果而求見王果曰我不若公閱休彼其爲人也以山水之間而自娛吾之所有志而不逮者也而夷節則不然富貴中人也非道德中人也其知識神情與之相助以求富貴則有餘與之相助以樂道德則不足譬之凍者必假衣衣雖厚不若春和而凍解也暍者必願風風雖冷不若冬至而暍消也慕進者必假資于權門權門雖焰不若恬退者之自貴也以楚王之勢威而且猛非佞人而有正德者安能撓其不正以歸于正乎故聖人者出窮而能化家人達而能化王公與人常樂道而塞兌不言人亦飲其和而自醉况與之並立而父子不各正與之同居而設施不咸宜者乎若楚王之勢不啻冬之寒暍之𤍠故曰待公閱休與之同見楚王上有助乎君下有益于友蓋規之也人知聖人以萬物爲一體不知聖人止於能自盡其性靜處見其復命動處見其煉神謂聖人與天爲徒也可謂聖人爲倫類中之眞人也亦可何世人不滿百年而懷千𡻕之憂大夢未完而鐘鳴漏盡付之於無可奈何者多也人有美色爲人所喜猶聖人之愛人爲人所譽鑑與告並能彰人之美而彼若不知不聞美卒不因之有損則好好色者人之性也若聖人則無愛而無乎不愛有其實者必有其名雖至仁無譽聖人不自知其愛而人莫不安者好德亦人之性也夫旅棲者返故國見故物而喜况内照者得見本來面目其可喜又當何如故古之冉相氏得環中之竅則道隨之而成其年雖永能化精氣而不能化幻身何不舍此幻身而作飛天仙乎師天而不狥物惟聖人爲能忘天忘人忘始忘物正行而不倚旁行而不流不聞湯爲司御尹執權衡以爲萬民傅乎彼其革夏命也不囿于規矩也不過成湯之功以著千秋之名耳孰知名乃剩物也君得臣見爲知人臣得君見爲擇主而仲尼之徒猶罄其思慮以爲萬世之師傅也亦聖人愛人之心不欲萬古如長夜仲尼日也千古若少一仲尼必不成世界三百餘日而除一日亦不成𡻕功内有賢師傅立於下而後外有明良興于上若無仲尼之徒以師于内安得外有碩輔以佐聖主乎公孫衍因齊侯背約而欲興師以雪恥此季子又恥衍之恥也猶壞已成之城而徒爲胥靡苦耳衍亂人不可聽也華子醜其不聞道乃曰君子之事其君甚不可以有心爲也善言伐齊者似太多事亂人也善言勿伐者又似不事事亂人也謂伐之與不伐亂人者又似無歸着亦亂人也然則若之何君亦求之道而已矣道何物也所謂不顯惟德百辟其刑之者也惠子聞之而見戴晉人曰環天下之大猶一蝸也環天下之各國其國猶國於蝸之左右角者曰觸氏曰蠻氏相與爭地而戰伏尸數萬逐北旬日且爲虛言乎爲實事乎君知以意在四方上下爲無窮則知遊心于無窮而反于四通八達之國甚𦕈小也君日然曰通達之中有魏則魏小于魏中有梁則梁亦小于梁中有王則王亦小信斯言也則王與蝸角之蠻氏有辨乎無辨乎君始自失乃悟其所爭之不足爭也客出惠子日夫吹管也猶有聲吹劍首者吷然而已矣無聲也堯舜人之所譽也道堯舜于戴晉人之前譬猶一吷也安得有聲譽乎孔子之楚見有夫妻爲人臣妾而登極者子路曰是人髮亂而稯稯何爲者耶仲尼曰是有聖人之德而隱于僕隸也自埋而自藏聲銷而志大雖言而不言入世而玩世是陸沈者耶抑爲市南宜僚耶子路往請召之孔子曰彼何人者耶不卜而先知知𨚑之揚已且惡聞其言而况肯目擊之乎子路往視之其室已虛矣長梧封人問子牢曰愼終如始政之經也撫字心勞民之主也耕耘而鹵莽滅裂者且有鹵莽滅裂之報况爲政治民乎莊子聞其言而得治形理心之道焉彼眾人之遁天離性滅情亡神者皆鹵莽其性也内之欲惡爲雈葦蒹葮似以扶吾形不知欲惡熾而天理滅矣上潰下漏將安所底止乎栢矩學老聃之道請之天下遊之齊見一辜人解衣衣之號而哭之曰天下有大菑子何爲而先離莫是爲盜耶莫是殺人耶天下有大榮而爲人所趨斯有大辱而爲人所病貨有大聚而爲人所積斯有大散而爲人所爭今之爲政者以所病招所爭欲其不盜不殺人此必不得之數也古之君人者有善則歸之于民有不善則歸之于已凡有所失必退而自責而可望于今之人哉匿爲物而愚不識猶小試之也大爲難而罪不敢則責人以不堪矣重爲任而罰不勝猶薄處之也遠其塗而誅不至則死者不可復生矣羣知屈羣愚羣力又屈羣知民之知力竭惟有欺僞而巳矣欺僞不巳竊盜生焉爲民上者胡不自責自非如蘧伯玉之行年六十而六十化安知今之所謂是非五十九年之非耶凡物有生者有生生者根也有出者有出出者門也有知者生與出也有知其知之所不知者根與門也天下有大知斯有大疑吾欲已乎已乎而不爲大疑逃不知而爲獨知豈知不知之知乃深於知者也衞靈公無道之君也而何以諡之爲靈太史弢曰此亦因眾人之所是而是之者也伯常騫曰夫靈公雖縱于色欲而肅于見賢不以人欲蔽天理也此其所以爲靈也狶韋曰夫靈公死而卜葬掘得石槨有銘焉曰死者之子孫不得憑藉有靈公奪而埋之則靈公之爲靈也久矣天也非人也二子何足以識之少知問於太公調曰何謂𨚑里之言太公調曰方殊氣則殊風殊風則殊俗此五方之風俗也然而有一方之𨚑里合十姓百名而成一方之風俗人心雖異而民俗則同不殊風也習染雖同而趨向各別其流分也亦猶指馬之一體不可以爲馬必合百體而後成其馬𨚑山積卑可使之高江河積氷可使之大大人聚天下邱里之言可合私以成其公不知大人至公亦至虛也有時而聽言自外入未嘗以有主之心而自執有時而立言自中出未嘗以持正而外距天無私氣故𡻕成君無私人故國治大人不私才故德備道無私物故無名無名故無爲惟無爲而後能無不爲卽時有終始世有變化而總不出禍福二端卽塞翁失馬禍兮福所倚故以拂而得宜者有之若自殉殊面之見以爲正矣而反獲差者亦有之又福兮禍所倚也譬之大澤之百材合而爲匠石之用異而同也大山之木石散而爲天下之用同而異也若冥理而歸于道復何同異之辨哉夫同異不足以盡道亦猶物數稱萬不足以盡物各以其大者言之耳夫形之大者天地統之氣之大者陰陽統之道又以統天地陰陽其大詎可量耶然旣有道之名又安可與無名者比哉少知因疑于無物故問萬物之所生從何而起太公調從起處說起太極分兩儀便有日月相照也陽升陰降陰降陽升相葢也陽消而陰長陰消而陽長相治也四時遞更相代也盈虛消長互爲生剋相生相殺也萬物有生則有情而欲惡之最初起者莫如雌雄之分合然而皆良知也故曰庸有卽安危禍福緩急聚散之不齊不知者以爲名實之可紀精神之可志而知之者以爲物態之次第氣運之驅使也惡知窮則必通終則必始物之常理乎况言與知到至處止能盡物而見道者直究夫物之未始有始也者而辨論息矣故謂道爲莫爲又謂道爲或使兩者皆偏孰知道無言言之非也道無意意之非也無小無大杳杳冥冥其中有神可謂爲或使可謂爲莫爲乎將以涉有名實爲是墮于物也將以涉無名實爲是又墮于虛也大抵不可言不可意者道之精也一着于有無則可以言言可以意意者道之粗也有無莫大于生死未生不得不生巳死不得不死死生一氣也死生可覩而理不可覩世有以或使莫爲起見者皆疑情也假設也吾欲觀道之本先天地之始而無始本可觀乎吾欲觀道之末後天地之終而無終末可觀乎有窮有止者物也無窮無止者理也物有終始而言斯亦有本道不可有以其無有也有不可無以其自無非我無之也然則道本無名不得已而假名之耳彼或使莫爲二者之論皆非大方也同一言也若言足以達意則一言亦盡道况終日言乎言不足以達意多言數窮祇盡物耳終日言奚益乎故欲窮道物之極言之不是默亦不是吾言而未嘗言非言也默而未嘗默非默也非言非默乃爲議道之極而無以加矣太公調其知道乎道藏輯要牛集十一終
