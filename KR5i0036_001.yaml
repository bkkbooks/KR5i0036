front:
  text: 南華真經注疏南華真經注疏序豫友復圭子既疏道德經矣識者咸喜太上之嫡派出始知其淵源然南華為道德而發明也其文辭浩蕩其旨歸邃邈其底裏直探混溟始無始而終無終學者又恨途迷復圭云齊諧者志怪也則鯤魚鵬鳥吾惡知其説安可踵前人之妄注數載以來復圭時潛心南華癸酉春頓悟其為丹經之祖鯤魚即丹經之水虎鵬鳥即丹經之火龍二語參破一部南華莫不迎刃而解矣昔注自郭象向秀而下迄今焦猗園所集老莊翼而上何啻百種不知道德豈知南華經中有説禪處惟陸西星得其皮肉至聖諦中之真色不色真空不空仙佛殊途同歸乃骨隨也雖陸西星亦茫然矣莊子慨千載而下道術分裂而世界缺陷不以太古無為之道提醒之必不能返有為於渾噩躋仁義為道德况鬬心之習熾而功利之學盛將安所底止乎其曰無為也用天下而有餘有為也為天下用而不足即吾儒君逸臣勞之道也其曰無入而藏無出而陽柴立其中央即玄門食毋之道也其曰以生死為一條可不可為一貫即釋氏不生不滅之道也學者細味南華之注疏非惟道釋二家不可一日無即吾儒達而在上者有復古之志必以無為之治為最上窮而在下者有進取之心必以道德為勝仁義惡可以其理不必耳目經語不必古今道掊擊聖智殫殘名法而訾議之乎大抵南華一經十萬餘言皆先行其言也故言言皆閫奧昔人注南華豈惟不必行且未知而言故其所注多剿説而於道德性命如嚼蠟然豫玩南華注疏有如食蜜中邊皆甜可謂前無古而後無今矣胡膂力方剛輒棄科場而訪道注疏大得南華之神後有讀之而朝徹者不可忘先知先覺開來學之功也昔朱紫陽注經書為千古之的解今復圭子注疏道德南華亦為千古之玄解兩者皆新安人故豫序之為並不朽云
