body:
  text: 晉陵友弟鄒忠允頓首拜序南華眞經註疏自序復圭子曰道德經爲三教之祖太上憫人不悟性命之學無傳不得不化身作南華以洩其秘凡爲寓言猶詩之比體教人全性保命也重言亦借重於古人而欲人信彼保全性命之說也巵言千變萬化膾炙其詞使人悅於口因悅於心而索彼立言之正意自欲跳出世網而遊神於性命之域也其津筏後學者可謂至矣南華之註始於郭象繼之向秀終於焦猗園之老莊翼百有餘家尙隔山萬重卽聰明如李青蓮讀南華而賦鯤鵬且認虛爲實其詞愈縱恣而背眞意愈遠無怪世儒指鸞鳳爲山雞視神龍爲妖幻也竊思易之所謂老夫得其女妻如枯楊生稊也妙法蓮花經佛受龍女之獻珠寶也維摩經云不入煩惱大海則不能得一切智寶也雲巖禪師云百花叢内過一葉不黏身卽丹經取坎塡離之旨其有不合也有不同也入門煉已之異也易之所謂殊途也其無不合也無不同也成功究竟之一也易之所謂殊途而同歸也佛祖云我娘生我我還先仙師云先有吾身後有天夾水園先生之作南華蓋身在天地之先也予今之註疏南華敢云身在天地之先特知九天九地積氣積塊之所以然耳或問何物爲生天地予曰混沌以前不惟無天地且無五行獨有一乾金耳此金有氣無質乃造化之根也故能生天地因而生水爲五行之始仙家之金丹釋氏之金剛不過竊先天之乾金耳學者須知金水爲凡鉛水中金爲眞鉛但得有眞鉛以制木火之飛騰何愁無眞汞以制金水之沈重故鉛汞交而内丹結矣然則搬運一身之鉛汞者不知靜裏孤修氣轉枯也偏倚採取之術者不知眞空不空眞色不色也旣聞大道之人當訪外護覓雲朋尋福地三者缺一必爲羣魔作障緣若果三千八百功行與天齊自然有鼎烹龍虎矣予先人程兩峯翁酷好讀南華每有超見因予過庭而輒以垂訓予曷敢忘焉昔人謂南華爲道德之註疏予今本道德而註疏南華眞醉者之初醒而夢者之忽覺乎予之不敢秘而以註疏授剞劂氏也其不敢獨醒而欲與天下共醒不敢獨覺而欲與天下共覺乎倘太上與南華仙翁嘉予註疏之勞早爲予作外護侶伴之合則赴龍沙之會爲有期異日召予以供呼鸞駕鶴之役未可知也然而不敢必也則予作註疏之心也夫海陽程以甯薰沐拜撰南華眞經注疏題詞夫道德南華二經之在天地間也猶珠藏澤媚玉韞山輝而人間之有此經也猶抱璞於山而懷蚌於淵也得寶而不見寶眞千古之一大恨予友復圭子南生而北學入齊魯之科場而蹶於齊魯不知者以爲時命大謬也知之者以爲太上與仙翁正不欲其立功名於一時而欲其立言於百世爾故復圭得以知命之年而遊方外以性命之學而註疏道德南華經數年晝夜不倦非仙翁累顯神通復圭安能壯其精神愈鼓而愈旺乎然則世之僞儒有心怖二氏而口稱爲異端者有行無儒行而陽黜二氏以附儒者覩此註疏不愧欲死乎然則二經信爲三教之全經而人間有藏二經之註疏者無論其知與不知何異剖璞見玉開蚌得珠乎何異太空一旦雲開霧撤而三教中人今日始得見太上與南華之眞面目乎天下倘有因面目而知索其精神者則傳神集之名爲不虛矣同邑道友了凡汪伯修頓首拜題
