body:
  text: 晉陵友弟鄒忠允頓首拜序南華真經注疏自序復圭子曰道德經為三教之祖太上憫人不悟性命之學無傳不得不化身作南華以泄其祕凡為寓言猶詩之比體教人全性保命也重言亦借重於古人而欲人信彼保全性命之説也巵言千變萬化膾炙其詞使人悅於口因悅於心而索彼立言之正意自欲跳出世網而遊神於性命之域也其津筏後學者可謂至矣南華之注始於郭象繼之向秀終於焦猗園之老莊翼百有餘家尚隔山萬重即聰明如李青蓮讀南華而賦鯤鵬且認虛為實其詞愈縱恣而背真意愈遠無怪世儒指鸞鳳為山雞視神龍為妖幻也竊思易之所謂老夫得其女妻如枯楊生稊也妙法蓮花經佛受龍女之獻珠寶也維摩經云不入煩惱大海則不能得一切智寶也雲巖禪師云百花叢內過一葉不黏身即丹經取坎填離之旨其有不合也有不同也入門煉已之異也易之所謂殊途也其無不合也無不同也成功究竟之一也易之所謂殊途而同歸也佛祖云我娘生我我還先仙師云先有吾身後有天夾水園先生之作南華蓋身在天地之先也豫今之注疏南華敢云身在天地之先特知九天九地積氣積塊之所以然耳或問何物為生天地豫曰混沌以前不惟無天地且無五行獨有一乾金耳此金有氣無質乃造化之根也故能生天地因而生水為五行之始仙家之金丹釋氏之金剛不過竊先天之乾金耳學者須知金水為凡鉛水中金為真鉛但得有真鉛以制木火之飛騰何愁無真汞以制金水之沈重故鉛汞交而內丹結矣然則搬運一身之鉛汞者不知靜裏孤修氣轉枯也偏倚採取之術者不知真空不空真色不色也既聞大道之人當訪外護覓雲朋尋福地三者缺一必為羣魔作障緣若果三千八百功行與天齊自然有鼎烹龍虎矣豫先人程兩峯翁酷好讀南華每有超見因豫過庭而輒以垂訓豫曷敢忘焉昔人謂南華為道德之注疏豫今本道德而注疏南華真醉者之初醒而夢者之忽覺乎豫之不敢祕而以注疏授剞劂氏也其不敢獨醒而欲與天下共醒不敢獨覺而欲與天下共覺乎倘太上與南華仙翁嘉豫注疏之勞早為豫作外護侶伴之合則赴龍沙之會為有期異日召豫以供呼鸞駕鶴之役未可知也然而不敢必也則豫作注疏之心也夫海陽程以寧薰沐拜撰南華真經注疏題詞夫道德南華二經之在天地間也猶珠藏澤媚玉韞山輝而人間之有此經也猶抱璞於山而懷蚌於淵也得寶而不見寶真千古之一大恨豫友復圭子南生而北學入齊魯之科場而蹶於齊魯不知者以為時命大謬也知之者以為太上與仙翁正不欲其立功名於一時而欲其立言於百世爾故復圭得以知命之年而遊方外以性命之學而注疏道德南華經數年晝夜不倦非仙翁纍顯神通復圭安能壯其精神愈鼓而愈旺乎然則世之偽儒有心怖二氏而口稱為異端者有行無儒行而陽黜二氏以附儒者覩此注疏不愧欲死乎然則二經信為三教之全經而人間有藏二經之注疏者無論其知與不知何異剖璞見玉開蚌得珠乎何異太空一旦雲開霧撤而三教中人今日始得見太上與南華之真面目乎天下倘有因面目而知索其精神者則傳神集之名為不虛矣同邑道友了凡汪伯修頓首拜題
