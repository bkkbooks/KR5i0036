front:
  text: 南華真經註疏南華眞經注疏序予友復圭子旣疏道德經矣識者咸喜太上之嫡派出始知其淵源然南華爲道德而發明也其文辭浩蕩其旨歸邃邈其底裏直探混溟始無始而終無終學者又恨途迷復圭云齊諧者志怪也則鯤魚鵬鳥吾惡知其說安可踵前人之妄註數載以來復圭時潛心南華癸酉春頓悟其爲丹經之祖鯤魚卽丹經之水虎鵬鳥卽丹經之火龍二語參破一部南華莫不迎刃而解矣昔註自郭象向秀而下迄今焦猗園所集老莊翼而上何啻百種不知道德豈知南華經中有說禪處惟陸西星得其皮肉至聖諦中之眞色不色眞空不空仙佛殊途同歸乃骨隨也雖陸西星亦茫然矣莊子慨千載而下道術分裂而世界缺陷不以太古無爲之道提醒之必不能返有爲於渾噩躋仁義爲道德况鬬心之習熾而功利之學盛將安所底止乎其曰無爲也用天下而有餘有爲也爲天下用而不足卽吾儒君逸臣勞之道也其曰無入而藏無出而陽柴立其中央卽玄門食毋之道也其曰以生死爲一條可不可爲一貫卽釋氏不生不滅之道也學者細味南華之註疏非惟道釋二家不可一日無卽吾儒達而在上者有復古之志必以無爲之治爲最上窮而在下者有進取之心必以道德爲勝仁義惡可以其理不必耳目經語不必古今道掊擊聖智殫殘名法而訾議之乎大抵南華一經十萬餘言皆先行其言也故言言皆閫奥昔人註南華豈惟不必行且未知而言故其所註多剿說而於道德性命如嚼蠟然予玩南華註疏有如食蜜中邊皆甜可謂前無古而後無今矣胡膂力方剛輙棄科場而訪道註疏大得南華之神後有讀之而朝徹者不可忘先知先覺開來學之功也昔朱紫陽註經書爲千古之的解今復圭子註疏道德南華亦爲千古之玄解兩者皆新安人故予序之爲並不朽云
