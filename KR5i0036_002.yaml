body:
  text: 南華真經周漆園吏莊周著海陽復圭子程以寧注疏內篇逍遙遊第一昭昭生於冥冥有倫生於無形此內篇之所由名也必內觀心無其心外觀形無其形遠觀物無其物斯可造逍遙之域如列子之御風而行是也凡學道人雖靜坐一室神遊六合之外九天之上打破生死關世網不能羅解脫之後入金石不得礙蹈水火無所傷何所往而非逍遙遊也北冥有魚其名為鯤鯤之大不知其幾千里也北方屬水北冥者北海也於卦為坎於人為腎為水為鉛大修行人晝夜不寐魚則亦然故曰有魚所謂𥥆兮冥兮其中有精是也人之命根藏於腎鯤之右有日比字暗含腎竅陰中藏陽故魚名鯤不知其幾千里者喻腎至小能為至大也天一生水人亦先生腎故首寓言腎神之象化而為鳥其名為鵬鵬之背不知其幾千里也腎藏精能變化上升似飛故曰化而為鳥所謂恍兮惚兮其中有物是也鵬之左有兩月字暗含心竅陽中藏陰故鳥名為鵬鵬之背不知其幾千里者喻心變化更大於腎也地二生火人亦次生心故次寓言心神之象怒而飛其翼若垂天之雲是鳥也海運則將徙於南冥上二段第腎心之光景而未有工夫至此方為修道者著實用力處怒而飛狀其提起腎水無翼而飛也鳥鵬鳥也海即北冥海運者腎水運動也怒字飛字運字徙字甚有力是意行即神行也南冥者南海也於卦為離於人為心為火為汞自腎而徒至心水在火之上也乃靜工顛倒坎離之旨凡曰冥者𥥆冥恍惚之義腎與心可想象而不可窺看故不曰北海南海而曰北冥南冥南冥者天池也丹經云人腎中之水有真火心中之火有真水南冥者人心神水所自出之處故曰天池又云煉丹無別法但引神水入華池此之謂也齊諧者志怪也諺云人事參差為不齊幹事未濟為不諧今水火同宮而既濟所以書名齊諧火上而水下者道其常也今水反上而火下故曰志怪如下文所言三千里九萬里六月息皆怪徵也諧之言曰鵬之徙於南冥也水擊三千里摶音團扶搖而上者九萬里去以六月息者也鵬徙南冥寓言修道者之進陽火一月三千刻刻刻有河車運轉腎水上升之象乃一月之火候非水擊而上三千里乎遞年除月小六日一年止有三百五十四日五年再閏分派閏月六十日於五年之內每年該加十二日半年加六日共一百八十三日冬至一陽從地起每日上升四百五十九里至來年夏至升八萬四千里而到天故曰摶扶搖而上者九萬里言九萬者舉成數也寓言人身自腎至心有八寸四分在人為一身之天地水火之升降在天地為半年之火候也一年十二月有十二卦值符十一月建子復卦一陽丑月臨卦二陽寅月泰卦三陽卯月大壯四陽辰月夬卦五陽巳月乾卦六陽而陽止矣非六月息乎丹家倣之以進陽火五月建午姤卦一陰未月遁卦二陰申月否卦三陰酉月觀卦四陰戌月剝卦五陰亥月坤卦六陰而陰止矣亦以六月息也丹家倣之以退陰符天地以冬至夏至春分秋分為火候而丹家以子午卯酉之時月為火候乃一年之大火候也野馬也塵埃音哀也生物之以息相吹也野馬天地間之遊氣塵埃日中之飛塵野馬塵埃之或聚或散乃天地之大呼翕為一息相吹人身之一呼一吸為小呼吸亦為一息大修行人有閉息工夫此包天地人而言故曰生物之以息相吹也南華自北冥至此為靜工以起手築基到神凝則淸淨功成矣天之蒼蒼其正色邪其遠而無所至極邪其視下也亦若是則已矣蒼蒼非正色第自凡眼觀之下之視上遠而無所至極故見其蒼蒼若自道眼觀之乃上之視下不免有仙凡之隔亦若是之遠而無至極也故曰亦若是則已矣且夫水之積也不厚則負大舟也無力覆杯水於坳堂之上則芥為之舟置杯焉則膠水淺而舟大也水積之厚方有力而負大舟寓言人腎水要積之滿方能起真火而全真覆杯水與置杯焉則膠水淺而舟大喻以卻病小術而冀延年此必不得之數矣風之積也不厚則其負大翼也無力故九萬里則風斯在下矣而後乃今培音裴風背負青天而莫之夭閼音遏者而後乃今將圖南廣成子謂風者火也則積風為積火明矣風之積也二句分明寓言火候不到羽翼不生汞屬火故必八兩汞與半斤鉛相配而後可以圖南南為火圖南是進陽火也進進不已斯火候到而無南北無東西矣故釋氏曰南無阿彌陀佛則火候完而道成矣蜩與鷽鳩笑之曰我決音血起而飛槍音鏘榆枋時則不至而控於地而已矣奚以之九萬里而南為蜩與鷽鳩喻旁門卻病之小術而望長生大難大難適莽蒼者三餐而反腹猶果然適百里者宿舂糧適千里者三月聚糧之二蟲又何知適往也莽蒼近郊之邑果然飽貌行有遠近是以食有多寡亦如見有大小故志趣有遠近二蟲指蜩與鷽鳩也何知不知鯤與鵬也小知音智不及大知小年不及大年奚以知其然也朝菌音窘不知晦朔蟪蛄不知春秋此小年也楚之南有冥靈者以五百歲為春五百歲為秋上古有大椿者以八千歲為春八千歲為秋而彭祖乃今以久特聞衆人匹之不亦悲乎此段又自二蟲何知上生下小知大知又自小知大知上生下小年大年二句意亦相承朝菌糞芝也暮生見日則死寒蟬夏生秋死即蟪蛄此因年有大小故知亦因之為大小即冥靈之與大椿其年亦有限而不可以久聞惟彭祖能以北冥之魚化而為鳥圖南而飛上九萬里者也衆人欲以旁門小術而擬長生也哀哉湯之問棘也是巳窮髮之北有冥海者天池也有魚焉其廣數千里未有知其修者其名為鯤有鳥焉其名為鵬背若泰山翼若垂天之雲摶扶搖風名羊角風勢屈曲而上者九萬里絶雲氣負青天然後圖南且適南冥也斥鴳音晏笑之曰比且奚適也我騰躍而上也不過數仞而下翺翔蓬蒿之間此亦飛之至也而彼且奚適也此小大之辨也陸西星以為既説齊諧又引湯問語有變化是他文字妙處不知齊諧乃金丹祕旨莊老非重出也恐人真以為怪而不究心故言之又言欲人深思而得之耳窮髮不毛也羊角風之旋者斥鷃斥澤之小鳥喻旁門小術取效之速自以為道在是矣而不知金丹大道無近功邇則二年遠則九載飛必九萬里而圖南與旁門小術大懸絶矣故夫知音智效一官行比一鄉德合一君而徵一國者其自視也亦若此矣而宋榮子猶然笑之且舉世而譽之而不加勸舉世而非之而不加沮定乎內外之分辨乎榮辱之境斯已矣彼其於世未數數音朔然也雖然猶有未樹也夫列子御風而行泠音零然善也旬有五日而後反彼於致福者未數數然也此雖免乎行猶有所待者也若夫乘天地之正而御六氣之辨以遊無窮者彼且惡音烏乎待哉故曰至人無已音紀神人無功聖人無名此承上文小大之辨來知效一官者才堪一官也行比一鄉者行為一鄉之望也德合一君者德足以為人君也徵一國者德足以取信於民也若而人也其自視滿足亦猶斥鷃數仞之飛自以為飛之至也不知一步更進一步有宋榮子者能齊是非內外榮辱而猶不能有特操列子能駕空乘風行無轍迹而猶不能不有待乎風猶未也必乘天地之正而御六氣之辨所謂朝遊北海暮蒼梧者而後可以言遊無窮真聚則成氣散則成風者彼且惡乎待哉此之謂逍遙遊惟彭祖乃今以久特聞者其庶幾丹家以子午卯酉為四正之時而用功非乘天地之正乎春餐朝霞日將出黃氣也夏餐正陽南方日中氣也秋餐淪陰日已暮赤黃氣也冬餐沆瀣北方夜半氣也并天元地黃之氣是為六氣至人神人聖人無大分別須知總是一人第自其造行之極而言名曰至自其變化不測而言名曰神自其不涉杳幻而言名曰聖無己無我相也無功無人相也無名無可得而名也堯讓天下於許由曰日月出矣而爝火不息其於光也不亦難乎時雨降矣而猶浸灌其於澤也不亦勞乎夫子立而天下治而我猶尸之吾自視缺然請致天下許由曰子治天下天下既已治也而我猶代子吾將為名乎名者實之賓也吾將為賓乎鷦音焦鷯音僚巢於深林不過一枝偃鼠飲河不過滿腹歸休乎君豫無所用天下為庖人雖不治庖尸祝不越樽俎而代之矣此承上文堯聖人也許由至人也藐姑射之山神人也雖無高下而卻有一步深一步意自堯讓天下至陶鑄堯舜止重言巵言疊出無非細天下忘名實用其精以治身視治天下為緒餘也堯以日月時雨喻許由其尊許由亦至矣致天下者為何覺天下輕而身重也許由不肯受天下者非逃名也逃實也巢一枝飲滿腹之喻視天下更細於堯也謂堯之讓天下猶庖人之不治庖也以尸祝所以主祭祀性命所以主一身而許由之不肯代庖者言外便含吾身更有所主當世為民之尸祝而何有乎傳舍之天下是堯雖欲逍遙而不得許由庶可以無往而不逍遙矣肩吾肩擔當也猶肩任也問於連叔曰吾聞言於接輿大而無當往而不反吾驚怖其言猶河漢而無極也大有徑庭徑門外路庭堂內地言相去遠不相及也不近人情焉連叔曰其言謂何哉曰藐姑射音亦之山在北海中有神人居焉肌膚若冰雪淖音綽約若處子室女也不食五穀吸風飲露乘雲氣御飛龍而遊乎四海之外其神凝使物不疵癘而年穀熟吾以是狂音誑而不信也連叔曰然瞽者無以與乎文章之觀聾者無以與乎鐘鼓之聲豈惟形骸有聾盲哉夫知亦有之是其言也猶時汝也猶是汝之謂也之人也之德也此等人之德將旁礡萬物以為一世蘄音祈乎亂孰弊弊盡瘁貌焉以天下為事之人也物莫之傷大浸稽天而不溺大旱金石流土山焦而不熱是其塵垢秕粳將猶陶鑄堯舜者也孰肯以物為事此承上許由之不受天下蓋弛於負擔者也若肩吾則有負荷之責故驚怖神人不以天下萬物為己任而天下自治萬物自育之言殆凡人之不聾瞽於耳目而聾瞽於心知者也豈知神人有外天下之分量而後能治天下有超萬物之識見而後能育萬物故連叔然肩吾之所聞而鄙肩吾之所見天下譬如一甕也萬物譬如甕中之醋雞也人必身在甕外方能運甕發覆而出醋雞藐姑射之神人身在天下之外萬物之上其工夫全在神凝二字得來旁礡萬物是萬物皆備於我也神人不弊弊焉以天下為事故能治乎亂堯舜亦巍巍焉有天下而不與故能治天下然堯舜猶以物為事而物於物也之人也之德也入水不溺入火不焚而不物於物也彼其神奇精髓方且宇宙在乎手跳出陰陽之外而陶鑄萬物者也孰肯以物為事堯舜雖聖亦陰陽內中人唐虞之事業不過塵垢秕粳爾安能離其陶鑄乎何所往而不逍遙也此實事也亦實理也宋人資章甫而適諸越越人斷音短髮文身無所用之堯治天下之民平海內之政往見四子藐姑射之山汾音焚水之陽窅音𥥆然喪其天下焉陸西星云此數語結上兩段文意許由無用天下為猶越人不用章甫資貨也章甫殷冠名往見猶云聞見也所云心往者非也四子亦神人不可考泥之王倪齧缺被衣許由非之非也汾水堯都也堯聞見藐姑射山之神人如此故窅然自失喪其天下者心喪也惠子謂莊子曰魏王貽我大瓠音互之種我樹之成實也而實藏也五石以盛音成水漿其堅不能自舉也剖之以為瓢則瓠落音廓落無所容非不吁音囂然大也吾為其無用而掊音剖之莊子曰夫子固拙於用大矣宋人有善為不龜手之藥者冬月入水手折如龜文用此藥則手不龜也世世以洴澼音平僻絖音曠為事客聞之請買其方百金聚族而謀曰我世世為洴澼絖不過數金今一朝而鬻技百金請與之客得之以説音稅吳王越有難吳王使之將冬與越人水戰大敗越人裂地而封之能不龜手一也或以封或不免於洴澼絖則所用之異也今子有五石之瓠何不慮以為大樽而浮乎江湖而憂其瓠落無所容則夫子猶有蓬之心也夫惠子乃莊子之舊友也問答皆莊子一人之寓言惠子曾作梁相止知貪富貴而不知有性命之道故莊子以大瓠之虛中自全大樗之深根自固兩般道理提醒之蓋虛中之與深根皆長生之道其説長不及贅世儒俗學惟知拘泥字句而不知其寓言者遠也五石者五藏也以盛水漿指前北冥之坎水也其堅不能自舉者何也既不能坎水上升化而為鳥又不能怒而飛以圖南言內以有用之大瓠而掊之為無用言外見彼以無用之富貴而寶之為有用蓋造化之理盡具之於指掌仙師亦云掌上起風雲愚獨云龜手猶言縮手也造化吉凶消長之理古之名將多從掌上算而得之客得之以為吳將可進而不可退其得志於越此善於不龜手也視冬月用之以漂絮者懸矣惠子惟知相梁而不明宇宙在手之理惟知廟堂上之顯達而不知江湖上之間適皆蓬蒿塞其心也故曰何不慮以為大樽而浮乎江湖在江湖則逍遙矣惠子謂莊子曰吾有大樹人謂之樗音樞其大本擁腫而不中繩墨其小枝卷音權曲而不中規矩立之塗匠者不顧今子之言大而無用衆所同去也莊子曰子獨不見狸狌乎卑身而伏以候敖者東西跳梁不避高下中於機辟死於網今夫斄音狸牛其大若垂天之雲此能為大矣而不能執鼠今子有大樹患其無用何不樹之於無何有之鄉廣莫之野倣音旁徨音皇倣徨猶云徘徊也乎無為其側逍遙乎寢臥其下不夭斤斧物無害者無所可用安所困苦哉釋氏謂身為菩提樹則大樹非草木也六祖謂菩提本無樹則樗木為寓言也云大本擁腫而不中繩墨者喻語大德則滅聖棄智而不可以禮儀三百之繩墨責之云小枝卷曲而不中規矩者喻語細行則杜聰返照而不可以威儀三千之規矩律之玉蟾祖師云記得通衢展手處千家説慚愧即立之塗匠者不顧也莊子已教惠子將五石之瓠慮以為大樽而浮乎江湖惠子猶然不悟而曰大而無用衆所同去也得無以小智小術可以善吾生乎不知世之好用機械者即狸狌之小而有用不免於禍也孰若斄牛之大而無用物莫之害乎莊子又教惠子以無用之大樹為有用之遮蔽何不樹之於無何有之鄉廣莫之野釋氏之所謂無生國裏也倣徨乎無為其側逍遙乎寢臥其下釋氏之所謂大自在菩薩也仙師云無影樹下吟風弄月無縫塔下安身立命是也佛祖云將頭臨白刃猶如斬春風即不夭斤斧物無害者之謂也大道以多歧亡羊學者以多方喪生道家愛惜精神故其精神長存豈非無所可用安所困苦哉復圭子曰一部南華其精神全在逍遙遊而此一篇大旨其主意總領在神凝其教人用力處在北冥坎水南冥離火其著實得力處在鯤魚變化鵬鳥圖南河車運轉周流而不息也以日月計則有日日月月之工有一歲之工所謂三千里九萬里六月息皆以月歲計者也坎為鉛為水屬人身之腎腎者水也水不厚則不能負大舟所以喻人當積腎水而變化鯤魚也離為汞為火屬人身之心風者火也風不厚則不能負大翼所以喻人當積離火而圖南鵬鳥也易曰天行健君子以自強不息乃作聖作仙之旨兹曰北冥鯤魚丹經代之以水虎曰南冥鵬鳥丹經代之以火龍也未聞以丹經為怪者胡為莊老先以志怪自鳴哉蓋長生之道開闢於道德而發泄於南華恐泄天機故以志怪二字籠絡英雄非宿有仙骨而得真人口訣者必不解也三千六百旁門皆小知也能以鯤魚化鵬鳥而圖南此大知也小知之與大知其分量自别不有彭祖以久持聞其人安肯信北冥之水可以上升化鵬而圖南湯問豈虛語哉故有不安於一官一鄉一君一國之事業而忘是非明內外辨榮辱者雖賢於善涉世之人而水烹火鍊之工夫未到故曰猶未有樹也列子御風而行此得道以後之事不嫌於有待若真氣滿足以我之真氣而奪天地之正氣可也御乾坤之六氣可也入藥鏡云一日內十二時意所到皆可為也彼且惡乎待哉堯聖也聖人推天下而不去則不能逍遙矣許由至人也至人卻天下而不受則志在逍遙矣藐姑射之山神人也神人先凝神而後神凝無心於治天下而天下自治真其精以治身而塵垢秕粳陶鑄萬物者也堯舜特陶鑄中之首出者耳神人何往而不逍遙哉莊子與惠子最善凡其所問答皆莊子一人之寓言也若將虛中深根二意而明白言之便無餘味况南華為丹書之祖尤不敢顯露乎實五石之大瓠寓言人具五藏之軀殼也其堅不能自舉喻人為血肉所纍而不能沖舉也不知造化之理具於指掌心不通造化者往往縮手無策大才而小用之若有道氣之人掌上起風雲大敗越人者即大小無傷兩國全戰罷方能見聖人之謂也豈其猶有蓬之心不能脫世網而歸江湖乎處江湖則逍遙矣夫慮以為大樽空則空矣猶涉於器也浮乎江湖適則適矣猶墮於有也故更有進焉其曰大本不中繩墨者喻其不可律以大間也小枝不中規矩者喻其不可責以細行也大本與小枝俱不中用暗含有深根固蒂之道人莫之知大而無用衆所同去則出世之人宜與世人落落而難合矣莊子對惠子寫出一箇方外有道之氣象若著一見解則是狸狌之小而有用不免於禍患不如斄牛之大而無用物莫之害也苟能知無用之用斯進乎道矣人居天地之中誰不於有處樹立顧畢竟歸于無所以南華仙翁教惠子于無中尋出有來窄處尋出寬來故曰樹之于無何有之鄉廣莫之野為其無何有所以為廣莫乃先天清虛之體不落後天形氣之方所謂倣徨乎無為其側則動容周旋必於是也逍遙乎寢臥其下則夙興夜寐必於是也若而人也方且出入金石故斤斧不得而夭方且物物而不物於物故物不得而害凡人皆知有用不免為用所苦而至人物無可用又安得而困苦之哉結局八語乃描寫仙翁之逍遙處自北冥有魚以至圖南鍊精還氣也自知效一官至陶鑄堯舜鍊氣還神也自魏王遺我至末鍊神還虛也讀南華者須要會悟得此大旨他日方可並與逍遙遊矣內篇齊物論第二天地是物中之最大者人是物中之與我對者我是天地人中之一物物論不齊而思以齊之也是非特人我中之橫生意見耳不若兩忘而歸之自然然後為真能齊物也南郭子綦音其隱憑也几而坐仰天而噓嗒音塔焉似喪其耦謂形與為神耦猶人與我為耦喪耦是無人相也顏成子遊立侍乎前曰何居乎猶言何意見也形固可使如稿木外無威儀猶稿木之無枝葉也而心固可使如死灰乎內無火性猶死灰之無煙焰也今之隱几者非昔之隱几者也子綦曰偃子遊名不亦善乎而問之也今者吾喪我汝知之乎喪我是無我相也一篇齊物主意全在喪我二字上立根基此人必不從形骸上起意見也女音汝聞人籟而未聞地籟女聞地籟而未聞天籟夫陸西星曰籟簫管也比竹而成管有長短聲有高下吹萬不同正以暗喻物論之不齊者乃人所為故曰人籟地籟則木之衆竅感噫氣而成聲者天籟則無聲而能聲天下之聲者故歸之曰天子遊曰敢問其方子綦曰夫大塊天地也噫氣其名為風天地間因何有風如人之噫氣一動滿世皆是是且就大木一竅言之是唯無作作則萬竅怒呺音號風聲也聲隨竅異言出心竅亦然道一而已而汝也獨不聞之翏翏音流長風聲也乎山林之畏音偉佳音萃林木搖貌大木百圍之竅穴似鼻兩孔似口一孔似耳孔斜入似枅音雞孔方似圈杯圈也似臼杵臼也似窪者形曲似污者瀦水以上竅穴之狀激者如水激聲謞者如箭去聲叱者出而聲粗吸者入而聲細呌者高而聲揚譹者下而聲濁宎音杳者深而聲留咬音狡者吠而聲續已上竅聲前者唱于于輕唱也而隨者唱喁音愚重和也前後風之前後陳也已上風入竅穴之聲冷風則小和小風飄風則大和疾風厲風猛風也濟止也則衆竅為虛不聞聲也而獨不見之調調之刁刁乎前曰不聞任耳也此日不見任目也試看調調刁刁則林木整齊而不動搖矣子遊曰地籟則衆竅上文竅聲是巳人籟則比竹簫管是己敢問天籟子綦曰夫吹萬不同天下之聲萬有不同而使其自已也使其自已出者咸其自取怒者其誰邪夫竅異則聲異故曰吹萬不同然有竅而後有聲使風之來自己也咸竅之自取耳如竅而果能有聲也則怒而號之者其果風耶非風耶是必有所以主張之者不謂之天籟不可大知間間行所無事小知間間人我籓籬大言炎炎精光上燭小言詹詹整齊前後其寐也魂交魂與魄交而為夢其覺也形開覺則魂與形開而應事與接為搆日以心鬬巧於涉世之人也縵音慢者柔人也窖音教者險人也密者細人也小恐惴惴心事不寧大恐縵縵緩散自失其發若機括用計謀如機弩如箭括其司是非之謂也操縱由我其留如詛盟誓不敢動其守勝之謂也固執已見其殺如秋冬純陰用事以言其日消也天真漸琢其溺之所為之不可使復之也猶言載胥及溺不可挽回其厭也如緘音燕祕也以言其老洫也洫深也言其機心愈老愈深近死之心莫使復陽也陽明用事之人一片生意陰謀用事之人一團殺機陸西星曰先以大知小知起語亦自前篇中小知不及大知透來此下摹寫人心許多變態與上風木形聲同一意旨喜怒哀樂慮嘆變慹音摺姚佚音逸啓態樂出虛喜怒哀樂以下等件共十二字人雖如此實不由人如樂出於虛乍作乍止蒸成菌音窘如蒸成菌倐生倐死日夜相代乎前即吹萬不同而莫知其所萌即怒者其誰已乎已乎我知之矣旦暮得此其所由以生乎此指造化言雖不知其萌然旦暮之間得乎此物之所由以生也非彼無我非造化則我不能自成非我無所取然非我去取他則造化亦不能以自見是亦近矣造化不離已身而不知其所為使是使之者若有真宰而特不得其朕真宰主張之者朕朕兆也可行己信而不見其形然造化所行信乎實有之只為不見其形故無朕可得有情而無形情實也蓋實有而無形象之可見耳有情故能使人無形故不得其朕禪家有言水中鹽味色中膠青決定是有不見其形百骸九竅六藏賅音該備也而存焉吾誰與為親數件何者最親厚汝皆悅之乎其有私焉最厚者為私如是皆有為臣妾互相役為用乎其臣妾不足以相治乎其遞音第相為君臣乎其有真君存焉真君即真宰能役百骸九竅而不遞相為役者也如求得其情與不得無益損乎其真情即真君之情真君與我旦暮不離不以求得而有不以不得而無真即上真君之真真君於人本無益損但悟之則聖迷之則凡耳一受其成形受之於造化也不亡以待盡與物相刃相逆也相靡相順也其行盡如馳恣其所行而奔馳之而莫之能止不亦悲乎不知內重外輕所謂以珠而彈鵲反裘而負薪不亦悲乎終身役役而不見其成功薾音涅然疲役而不知其所歸可不哀邪終身役役於涉世而不能成出世之功徒然疲役而不知歸根復命吾不哀其死哀其不知歸也人謂之不死奚益其形化此二句引世俗之言腐儒謂真人之不死奚益於形化不知俗人皆知愛惜皮毛真人獨愛惜精神形骸無不化之理而精神有長存之道腐儒之所謂奚益者此其精神之所以日損而待盡也其心與之然可不謂大哀乎人或口是而心不以為然猶在半疑半信之間今口言而心然之安其死而樂於趨也始而哀之哀其一人不知歸也既而大哀之哀其倡為不死奚益之言而率天下人盡不知所歸也可不謂大哀乎人之生也固若是芒乎行盡如馳人之芒也其我獨芒此芒字乃天行健君子以自強而不息也而人亦有不芒者乎安得不芒於涉世而芒於自強者乎夫隨其成心而師之誰獨且無師乎奚必知代而心自取者有之愚者與有焉止聞師古不聞師心况成心乎成心乃習染一定之心也隨其成心而師之即人人自以為稷契家家自以為臯陶之謂也知代知陰陽遞運五行更代也奚必若而人有成心之師即愚而好自用者有心師也未成乎心而有是非是今日適越而昔至也上文成心是一偏之心也此之未成乎心是並其一偏之見而無之東西南北必莫知所向往矣猶今日適越而以為昔至安保其不以多歧而迷途也是以無有為有強不知以為知無有為有雖有神禹且不能知吾獨且奈何哉萬物原自無中來有中歸無所以名篇齊物今以無為有物愈不齊故雖行所無事之禹必不能知夫言非吹也夫言非風聲之比言者有言言者有是非之辨其所言者其所言之是非特未定也未定得他是何等言語果有言耶果有心於司是非而言者耶其未嘗有言耶豈任天之便雖言而未嘗有言耶其以為異於鷇音寇將出卵之鳥音音亦有辨乎其無辨乎夫有言而未嘗有言者任天之言也非成心之言也亦似鷇音有音而若無音辨者説也亦有説乎其無説乎蓋任天之音同鷇音亦與吹等即天籟也道惡音惡乎隱而有真偽真者金丹之正道也偽者三千六百之旁門也真者自真偽者自偽而未嘗隱言惡乎隱而有是非夫有道則有言矣有真偽則有是非矣是非非言不顯然是者自是非者自非是非惡乎隱乎道惡乎往而不存真是道偽别是一種道故曰道惡乎往而不存言惡乎存而不可言真者以真為是而非偽則真存矣言偽者以偽為是而非真則偽存矣然是非無定評也故曰言惡乎存而不可道隱於小成金丹大成而難遇非宿有道氣者必不信旁門小成而易遇稍有貪生之念者往往獲效焉言隱於榮華言所以顯道也未有道而不忘榮者人慕榮華則道喪而言亦隱矣故有儒墨之是非以是其所非而非其所是欲是其所非而非其所是則莫若以明當戰國時儒墨並行儒道以厚為是而非墨墨道以薄為是而非儒誰能折衷其是非乎故莊老引而進之於則莫若以明此明字即書經哉生明之明字也丹經之月出庚也欲學長生者未明人道當先明天道以天道與人道合也物無非彼物無非是天上太陰一月一度人間少陰一月一經此二物字指少陰言謂人間之少陰無非與彼太陰合也無非是彼太陰一月一現也自彼則不見每一月少陰大藥將生時精華微露自彼不能自見自知則知之至期腹內光景如前月一般則大藥生矣惟自已則知之故曰彼出於是彼天上之太陰初三日生於庚方則出於是也是亦因彼是字乃人間之少陰亦因太陰一月一度而現一經也彼是方生之説也彼指上文明字月出於庚乃始生明之説也雖然方生方死方死方生雖然月出於庚方不知月現丁月盈甲十五日以前皆月方生十六日以後月退辛月消丙月滅乙月晦壬則月方死也然死者生之根前月三十月方死矣來月初一月朔癸矣初三又出庚也非方死方生乎乃藥生之時候也方可方不可方不可方可此火候之老嫩有可而不可不可而可之分别因是因非因非因是火候之來不惟有老嫩亦有真偽乃一定之是非也學人惟因一定之是非而是非之不得以偏見而是非之也是以聖人不由而照之於天不由是不由己見也照之於天者即陰符經觀天之道執天之行也亦因是也人道火候之老嫩亦因天道之盈虧不敢妄著已見是亦彼也彼亦是也是不差也彼天道也不差固天道矣而天道果不差也以其盈虧有一定也彼亦一是非此亦一是非果且有彼是乎哉果且無彼是乎哉彼天道也此人道也知火候者以善言天者必有驗於人人固一是非也不知火候者以天道遠人道邇又一是非也果且有彼是則人非天不因果且無彼是則天自天而人自人矣彼是莫得其偶謂之道樞樞始得其環中以應無窮是亦一無窮非亦一無窮也故曰莫若以明彼天道也偶即耦也月與日為偶然止可代明而不可並出故曰莫得其偶謂之道樞猶門之有樞杻也門非樞不轉造化非道樞不運得其環中以應無窮即萬物之統體一太極也知火候而觀天道者必能長生造福亦無窮也不知火候而昧天道者雖有旁門流毒亦無窮也故曰莫若以明明莫明於日月日之常明人易知之而月始生明之理非得真仙口訣安能吞其日精月華乎以指喻指之非指不若以非指喻指之非指也以馬喻馬之非馬不若以非馬喻馬之非馬也指形也吾欲忘形喻指之非指終涉於形不若自父母未生以前論則形無其形安得有指乎馬物也吾欲忘物喻馬之非馬終著於物不若自萬物未芽以前論則物無其物安得有馬乎天地一指也萬物一馬也陰符云宇宙在乎手邵堯夫亦云指節可以觀天掌文可以察地故曰天地一指也經云萬化生乎身豫亦云萬物生於天地曲成不由天地而由盡性參贊之人亦由馬負人向往不由馬而由馭馬之人故曰萬物一馬也可乎可不可乎不可指馬之説可者自可不可者自不可道行之而成若而人也實能掌上起風雲其神凝使物不疵癘而年穀熟則指馬非口説矣非道行之而成乎物謂之而然人亦信其指馬之説操縱由我矣惡乎然然於然然吾指馬之説以為是也惡乎不然不然於不然不然吾指馬之説以為未必然也物固有所然物固有所可然而然其説者多物固有所然也可其説者亦多物固有所可也無物不然無物不可至於無物不然無物不可則天地一指萬物一馬之理人人咸知其為實事矣故為是舉莛橫梁與楹直柱厲醜人與西施美人恢大也恑音詭譎音決怪道通為一莛楹橫直異材也厲與西施惡美異品也恢恑橘怪坦險異念也然而莛楹終歸於朽腐厲施終歸於白骨恢怪終歸於無何有豈非道通為一乎其分也成也其成也毀也凡物無成與毀復通為一分則有人物之殊而隨有成之之道既成其為人物即必有毀之之理凡物有成與毀者以形體而言無成與毀者以道妙而言即物物而不物於物者故復通為一一即中庸之不二不二則生物不測豈有成毀乎惟達者知通為一惟達天德者知縱橫美惡常怪成毀皆通一而無二為是不用而寓諸庸庸也者用也用也者通也通也者得也適得而幾矣因是已已而不知其然謂之道庸即順生人庸常之道吾不用而未嘗不寓諸庸之中不用之中又用之用則變而通之通順為逆也通則得逆即成仙之道矣夫此大道皆仙師之所己試者也吾因是而得之丹房器皿便已不用一朝老而復少亦不知其所以然也故謂之大道豈旁門之小術哉勞神明為一而不知其同也謂之朝三何謂朝三曰狙鉏公賦芧序曰朝三而暮四衆狙皆怒曰然則朝四而暮三衆狙皆悅名實未虧而喜怒為用亦因是也是以聖人和之以是非而休乎天均是之謂兩行一即道也豈勞神明而為者哉今勞神明以為一則與不一者亦無以異矣狙獮猴也狙公養狙者也朝三暮四朝三升暮四升也三與四合共成七也尚欠三而無十諺云割七補三之術此即名實未虧而喜怒為用之語亦因是也即猶是已猶是朝四暮三之術也所以籠落豪傑豪傑亦墮其術中而不覺莊老看天下人之為名實所牽而易喜易怒者種種皆衆狙類也寓言恐人不悟復明言之笑貪名利者如獮猴之在人舞弄中任有道之是非而不覺聖人亦末如之何故和之以是非均陶均也休乎天均者聽天之陶均聖人在名實之外是一行若人在名實之中又一行是之謂兩行古之人其知有所至矣惡乎至有以為未始有物者至矣盡矣不可以加矣其次以為有物矣而未始有封也其次以為有封焉而未始有是非也是非之彰也道之所以虧也道之所以虧愛之所以成果且有成與虧乎哉果且無成與虧乎哉林希逸曰此固自天地之初説來然會此理者眼前便是且如一念未起是未始有物此念既起便是有物因此念而有物有我便是有封因物我而有好惡喜怒便有是非回思一念未起之時但見胸次膠擾便是道虧而愛成及此念一過依然無事何嘗有成與虧有成與虧故昭氏之鼓琴也無成與虧故昭氏之不鼓琴也昭文工於琴者之鼓琴也師曠工於樂者之枝策擊樂器也惠子工於辨者之據梧憑梧而談也三子之知幾乎皆其盛有盛名者也故載之末年惟其好之也以異於彼自以為異於人其好之也欲以明之誇於人彼非所明而明之人未分曉乃強以我之所見曉之故以堅白之昧終公孫龍曰堅為石言石不必又言堅白為馬言白不必又言馬而其子又以文之綸終綸琴絃也昭文之子不能傳昭文之業止能調和其綸而巳陸西星曰大抵有成則有虧亦定數之不可逃者昭氏以鼓琴名其子終身彈不成聲師曠恁他聰明其人卻以盲廢枝策而行兩人便是有成與虧的樣子惠子與莊子同時即惠施也極有才辨而以堅白之昧終皆是道虧也終身無成若是而可謂成乎雖我亦成也若是而不可謂成乎物與我無成也是故滑音骨疑之耀上文成與虧就鼓琴枝策與據梧言此無成即虧也成與不成以知道與不知道言終身不知道尚可謂成乎若我則已知道矣尚不可謂成乎然自謂成者還是無成是物與我皆無成也意者在疑信之間故曰滑疑之耀滑者捉不住疑者見不透耀則見徹到底矣疑耀指火候而言聖人之所圖也為是不用而寓諸庸此之謂以明聖人句承上帶下圖謀也圖此疑耀本庸常而又著明也分明是順則生人逆則生仙之道此理甚庸而人不知用況莫若以明凡三言之而茲曰此之謂以明欲明人道必先明天道當于哉生明哉生魄之理而講求之吕祖云有人問我長生訣遙指天邊月一輪達磨祖師云有人問我西來意水在長江月在天即以明之旨也今且有言於此言此之謂以明之道也不知其與是類乎其與是不類乎類與不類相與為類則與彼無以異矣是字指上明字也丹經曰坤與乾為類織女與牽牛為類女與男為類不知其與日月類乎不類乎易經云物以類聚皆丹旨也類中有不類陰陽之分也不類之中實為類一物各具一陰陽也知女以男為類者則知與彼月與日為類無以異矣雖然請嘗言之有始也者有未始有始也者有未始有夫音扶未始有始也者有有也者有無也者有未始有無也者有未始有夫未始有無也者俄而有無矣而未知有無之果孰有孰無也今我則己有謂矣而未知吾所謂之其果有謂乎其果無謂乎始太始也有未始有始更有夫未始有始總之為無始也非無始之上又有無無始也有有也者太極也有生於無故有有無也者有未始有無更有有未始有夫未始有無總之為無極也非無極之前又有無無極也太上云天地間凡有形者皆幻也幻則有者俄而無矣然必有主張是者故未知有無之果孰有孰無也今我則己有説類與不類矣不知人亦知吾之所謂果有謂乎無謂乎天下莫大於秋毫之末而泰山為小莫夀乎殤子而彭祖為夭天地與我並生而萬物與我為一既已為一矣且得有言乎既已謂之一矣且得無言乎一與言為二二與一為三自此以往巧厯不能得而况其凡乎故自無適有以至於三而况自有適有乎無適焉因是已承上有謂之言議論不凡非人之所狎見狎聞者也大秋毫而小泰山者非秋毫果大而泰山果小也以秋毫有包藏而泰山無包藏也夀殤子而夭彭祖者凡有生則有滅無生則無滅殤子巳遊無生之國而彭祖夀止八百非殤子夀而彭祖夭乎天地人稱三才今我既與天地並生則天地不獨夀而我不獨夭人雖萬物中之一物今萬物既與我為一則萬物非有餘而我非不足此皆莊老躬行實踐之事與天地萬物為一也何待言哉既己落言詮矣又不能無言也一生二二生三三生萬物生生無窮雖巧厯不能紀其數適往也以無適有可至於無算况以有適有寧有窮乎天地間無有而不歸於無無中能藏萬有故曰無適焉因是已此六字為一部南華之胚胎有無極而後有太極凡言道者當從無字上起手仙佛皆能因其無以立根清靜經云內觀其心心無其心金剛經云無所住而生其心故能長生吾儒惟於有上著腳不知有之究竟將安歸乎夫道未始有封言未始有常為是而有畛音軫也請言其軫有左有右有倫有義有分有辨有競有爭此之謂八德夫道無人而不可學未始有封畛以域之也亦猶言之未始有常也當戰國時談道者紛紛矣各立門戶自為標榜有儒墨之是非有諸子百家之是非有金丹大道與旁門邪境之是非有左有右各執一偏之見也有倫有義别有一種道理也有分有辨歧路之中又有歧也有競有爭人宗一家而不相下也彼自謂之為八德我乃謂之為八畛六合之外聖人存而不論六合之內聖人論而不議春秋經世先王之志聖人議而不辨故分也者有不分也辨也者有不辨也曰何也聖人懷之衆人辨之以相示也故曰辨也者有不見也東西南北上下為六合仙佛遊於六合之外聖人遊於六合之內其存而不論者經世之人不肯為出世之語也其論而不議者經世之術不可為激世之談也春秋經世之書所以代先王之志有議論而無分辨一字之褒貶上至王公下至夷狄而不少假借焉即道無往而不在未始有封畛之謂也然有分辨之中有不分辨不分辨之中又有分辨皆衆人之見也而其不見者目在也夫大道不稱名也大辨不言大仁不仁大廉不嗛音謙大勇不忮大道無名不稱也大辨若訥不言也大仁無親不仁也大廉不讓不嗛也大勇不殺不忮也道昭而不道言辨而不及仁常而不成廉清而不信勇忮而不成道惟不稱則不昭矣冥冥無非道若以昭為道斯道有不到非大道也不言則不辨矣斯無所不及若恃其多言未免數窮非大辨也仁者有時而不必仁若必以仁為常反不成其仁非大仁也廉者信理不必清若必以清為廉則不信矣非大廉也勇者以止戈為武若有忮害之心則勇傷矣非大勇也五者園音形園之象也而幾向方矣有形迹則露圭角故謂之方道原可方可圓而不拘於一定前五者不稱不言不仁不嗛不忮皆圓如轉環後五者必昭必辨必常必清必忮則向方而不可轉矣故知止其所不知至矣孰知不言之辨不道之道若有能知此之謂天府注焉而不滿酌焉而不竭而不知其所由來此之謂葆光方者易知非至極也圓則人未必知故知止其所不知至矣孰知以不言為辨不道為道者乎而仁廉勇不待言矣若有能知豈淺衷之所可測哉此之謂天府注不滿而酌不竭真一粒粟中藏世界半邊鍋內煮乾坤者也而人安知其所自出有道之士養愈厚而鋒不露道益高而神益藏此之謂葆光即韜晦之意故昔堯問於舜曰我欲伐宗句膾句胥敖南面而不釋然其故何也舜曰夫三子者猶存乎蓬艾之間若不釋然何哉昔者十日並出萬物皆照而况德之進乎日者乎天子當陽猶天之有日也今堯欲伐此蓬艾之小國即日光之不照此三國也天無二日豈有十日乎不知天上無一日無日第十方有有雲無雲之異故日光有照不照耳今十方無雲乃十處日並出則萬物皆照矣而况聖人進德於日何獨不照此蓬艾之間而不釋然於宗膾胥敖也齧音臬缺問乎王倪音霓曰子知物之所同是乎曰吾惡乎知之子知子之所不知邪曰吾惡乎知之然則物無知邪曰吾惡乎知之雖然嘗試言之庸詎知吾所謂知之非不知邪庸詎知吾所謂不知之非知耶物有是與非斯人亦有知不知今並知與不知而相忘則是非混同物我可齊矣且吾嘗試問乎汝民溼音濕寢則腰疾偏死鰌音鰍然乎哉木處則惴栗恂懼猿音猿猴然乎哉三者孰知正處民食芻豢麋鹿食薦草也蝍蛆音疽蜈蚣也甘好食也帶蛇也鴟音癡鴉嗜鼠四者孰知正味猿猵音偏狚音旦以為雌猵狚似猿狗頭其雄喜與雌猿牝牡麋與鹿交鰌與魚遊毛嬙音祥麗姬人之所美也魚見之深入鳥見之高飛麋鹿見之決血驟四者孰知天下之正色哉自我觀之仁義之端是非之塗樊然殽亂吾惡能知其辨起居食色人物各異物得其偏人得其正特對物言之耳而以道眼視之必無處之處無味之味無色之色乃為得起居食色之正也自我觀之有仁義則有是非又有是非中之是非不啻如人物起居食色之殽亂也吾惡乎齊之齧缺曰子不知利害則至人固不知利害乎王倪曰至人神神全矣大澤焚而不能熱河漢沍音互凁也而不能寒疾雷破山風振海而不能驚若然者乘雲氣騎日月而遊乎四海之外死生無變於已而况利害之端乎是非猶其小也死生利害則是非之變凡有起居食色者未有不得之若驚失之若驚者也其惟至人乎至人已出有而入無獨以元神而遊乎無何有之鄉寒暑不能加風雷不能振淩駕雲氣馳驟日月方且跳出陰陽而又何有生死方且齊乎順逆而又何有乎利害瞿鵲子問乎長梧子曰吾聞諸夫子聖人不從事於務不以世故為事不就利不違害不喜求不緣道無謂有謂不言之言有謂無謂言而不言而遊乎塵垢之外夫子以為孟浪不著實之言而我以為妙道之行也吾子以為奚若長梧子曰是黃帝之所聽熒也言妙道之行惟黃帝耳曾聽之目曾燭之蓋受之於廣成子也而邱也何足以知之且汝亦大早計其人到妙道尚早子輕易許之見卵而求時夜雞未出卵求其呼更見彈而求梟音梟炙方見彈丸求梟為炙豫嘗為女妄言之未可作真語女以妄聽之未可作真聽奚如何也旁日月旁其生明之理挾宇宙挾其造化之運為其吻音吻合與日月宇宙不忒置其滑涽置捨也滑涽至暗也以隸相尊隸人至卑也衆人役役小知間間也聖人愚芚音屯若無知也參贊也萬歲而一成純即道德經立天子置三公之意萬物盡然而以是相藴豫惡乎知悅生之非惑邪豫惡乎知惡死之非弱喪而不知歸者邪吕吉甫曰聖人不知利害故無就避無不足故不喜求無非道故不緣道有謂乃所以無謂無謂乃所以有謂惟吾心者始足以與此自幼出亡為弱喪久滯他鄉為不歸復圭子曰遊塵垢之外乃出世之事妙道之行乃無欲以觀其妙也妙中有竅必先得其竅者而後可以行妙道軒轅黃帝蓋聽熒於廣成子者也胡今之修道者甫一入門輒謂長生不死不猶見卵而求時夜見彈而求梟炙者乎妄言妄聽指見卵見彈二事而言奚旁以下則非妄言也汝豈為妄聽乎若何而旁日月盈虛之理以修身若何而挾宇宙消息之運以善性必與之符契而後已置其滑涽以隸相尊者須捨乎至暗而後能登高必自卑也猶云脫凡近以遊高明也何衆人日以涉世為事役役而生者未免役役而死芚草之初芽也聖人愚芚保全其元精元氣元神也萬歲天子也大修行人入丹房而採藥必參贊一主持丹道者奉其命令如天子而後行持有驗不日必有一人成其純陽而得妙道矣萬物盡然而以是相藴言人人皆藴蓄此道可仙可佛苦於不自知耳其所悅者止知悅生而不知所以長生惑也其所惡者止知惡死安知喪失其本來而不知歸求其真吾又惑之惑也麗之姬艾封人之子也晉國之始得之也涕泣沾襟及其至於王所與王同筐牀食芻豢而後悔其泣也豫惡乎知夫死者不悔其始之蘄音祈生乎此段借麗姬之悔以顯死者之樂而生者之苦非謂死者為真樂第形容名利中人皆以起居食色為樂自有道視之皆塵囂腐臭不可一日處也死且勝之况不死者乎上段以前如曰莫若以明曰道樞曰天府曰妙道曰萬歲而一成純是以金丹而發明道德皆出世語也所以點化上根之士此段以下如曰悔蘄生曰夢覺曰辨之勝不勝曰景無持操曰周與蝴蝶則必有分是以塵勞而警醒衆生皆入世語也所以點化中根與下根之士夢飲酒者旦而哭泣夢哭泣者旦而田獵方其夢也不知其夢也夢之中又占其夢焉覺而後知其夢也且有大覺而後知此其大夢也而愚者自以為覺竊竊然知之君乎牧乎固哉邱也與汝皆夢也豫謂汝夢亦夢也是其言也其名為弔至也詭萬世之後而一遇大聖知其解者是旦暮遇之也飲酒屬陽哭泣屬陰田獵亦屬陽夢乎陽者必變而為陰所以哭泣應之也夢乎陰者必變而為陽所以田獵應之也此不惟陰陽之理亦悲喜之符也夢覺一關千古無人知解被莊老數語喝破文人誦過如看一場戲局非借之以資口談即藉之以助筆陳信是夢者比肩而覺是夢者有人乎無人乎豈知至人與嬰孩俱在混沌之境孔竅未鑿無覺亦無夢聖人仙佛跳出網籠之外獨清獨醒有覺而無夢狂者志脫凡近而行未逮亦半覺而半夢今名韁利鎖中人為造物所愚弄而不悔致後人哀前人復有後後者夢夢相踵一哀去又一哀來哀哀相續吾不知何時而後覺也何人而能覺也宜以其言為弔詭萬世之後而一遇大聖人何必親見其面哉凡知解夢覺之理者即為遇也旦暮遇之猶所謂見堯於羹見舜於墻也既使我與若辨矣若勝我我不若勝若果是也我果非也耶我勝若若不吾勝我果是也若果非也邪其或是也其或非也邪其俱是也其俱非也邪我與若不能相知也則人固受其黮音坦暗吾誰使正之使同乎若者正之既與若同矣惡能正之使同乎我者正之既同乎我矣惡能正之夢覺之説萬世而後方許有知解之人宜當時辨之者紛紛而不屈也若者彼也若勝若不勝我勝我不勝其是非無一定亦猶夢中説夢其或是或非俱是俱非無有知夢覺之解者以人皆在黮黑之夢中也將欲正之於覺者不知若是覺而我是覺也若與我既不可以為覺則同乎若與我者俱不可以為正使異乎我與若者正之既異乎我與若矣惡能正之使同乎我與若者正之既同乎我與若矣惡能正之然則我與若與人俱不能相知也而待彼也邪我與若既在夢中而異乎我與若者未必非夢也惡能正之况同乎我與若者猶然未覺之人也惡能正之不相知不能知夢覺之解也更將何待耶何謂和之以天倪曰是不是然不然是若果是也則是之異乎不是也亦無辨然若果然也則然之異乎不然也亦無辨化聲之相待若其不相待和之以天倪因之以曼音萬衍所以窮年也忘年忘義振於無竟故寓諸無竟夢覺之異同人我各自相負而不肯相下也以其具屬於人也人非天不因至於和之以天倪乃性命之端也必有一定之是不是一定之然不然如謂是不是然不然而無辨也則性命之變化聲色不必待主張之者而自能化聲色有是理耶故知其解者必自性命上索其端倪認得端倪既真則任其變化曼衍至於窮年吾惟和之以天倪而不變也忘年則死生為一條忘義則可不可為一貫竟者終也猶云究竟也振於無竟即無何有之鄉也故寓諸無竟即逍遙乎寢臥其下也二祖求安心之法達磨曰將心來與汝安二祖曰覔心了不可得達磨曰吾與汝安心竟即此旨罔兩問景音影曰曩子行今子止曩子坐今子起何其無持操卓然獨立之操守也與音余景音影曰吾有待而然者邪不能自主吾所待又有待而然者耶吾待蛇蚹音附蜩翼邪蚹蛇腹下齟齬所以主行者蓋蛇以附行蜩以翼飛而蚹翼不能自行自飛必有主張之者惡識所以然惡識所以不然景待形形待造化亦猶之蛇蚹蜩翼也而其所以然不然吾惡乎知之昔者莊周夢為蝴蝶栩栩音許喜貌然蝴蝶也自喻快也適志得意也與音余不知周也俄然覺則蘧蘧音渠有形貌然周也不知周之夢為蝴蝶與音余在莊周以夜來之夢為蝴蝶也蝴蝶之夢為周與音余恐蝴蝶又以今者之覺為夢莊周也周與蝴蝶則必有分矣曩為夢裏之蝴蝶今為覺後之莊周故曰則必有分此之謂物化天地不物故能物物天地不化故能化化物尚有化人為物中之最靈胡為而不化哉莊老分明以物醒人欲其打破夢覺關頭人夢中能變化者魂與魄交也第主其變化者魄也魂不能主之耳若有道之士則必先滅魄而後魂昌千變萬化惟我主張人奈何不知滅魄而晝覺夜夢以終身况併其所謂覺者而卒成一大夢也哀哉復圭子曰俯仰天地孰為大哉惟空大也空能載天地藏萬有空中有物物中之至大者心也此心超乎天地之上故可以藐萬物包乎天地之外故可以陶萬物南郭子綦似喪其耦無人相也已而吾喪我無我相也不言齊物而先言天籟地籟人籟者物情之不齊也夫大塊噫氣明是天籟也而入大木百圍之竅穴形象不同而竅聲亦異故因地名籟人籟不離比竹天籟屬之吹萬吹者風也萬物非風不生人為物中之最靈種種變態之不齊者真君不存也人苟得乎真君之情則不師心而自是道惡乎往而不存仰觀天道當察哉生明生魄之理所謂莫若以明也初三月出庚為方生十八月退辛為方死此之謂道樞得其樞者居環中以應無窮蓋天地之化育具人指掌萬物之曲成在我手猶我之羈靮以御馬也任天下之可不可然不然而莫不復通為一任人之各自為喜怒各自為是非而莫不聽休乎天均考之未始有物與未始有封之初且無是非安有成虧即工於琴工於樂工於辨者同歸於堅石白馬強辨以終身也猶然無成與虧也故滑疑之耀為聖人之所圖謀此疑耀在人道為象罔在天道為生明乃火候也女與男為類無以異於月與日為類從有始與未始有夫未始有始以來而已然矣得其説者一粒粟中藏世界則秋毫非小而泰山非大無生則無滅故殤子非夭而彭祖非夀其原起於一生二二生三三生萬物則有之極矣有處不能著力必因無適焉探討其先天之母氣可與六合以外聖人道難與六合以內聖人言也故止其所不知即前之疑耀與道樞是也張祖云任君聰慧過顏閔不遇真師莫強猜天府者玄牝之别名也天地人物從此而生亦生仙生佛之竅也虛而不屈動而愈出固無滿竭之時亦無去來之朕可由而不可知當晦而不當露此之謂葆光庸詎知所謂知之非不知即言者不知也不知之非知即知者不言也人人自以為得天下之正處正味正色自道眼視之有無處之處無味之味不色之色方可與乘雲氣騎日月超出乎死生利害而遊塵垢之外也此非孟浪之言乃太上無欲以觀其妙之道是黃帝之所狎聞而狎見者也彼巳旁日月挾宇宙而與造化為徒矣彼已脫卑暗而登高必自卑矣人知萬歲成其一純陽也亦知參贊之者誰耶莊老方且視生死為一途怪悅惡之喪歸可生可死而必不忍令人生處於夢中而不覺故以大覺而覺大夢也寧蒙吊詭之號而猶期萬世後之聖人知其解而旦暮遇之也時人不信而與我辨甚至於爭勝負爭是非爭邪正而猶不以我夢覺之説為是為然也吾將惡乎待哉吾且和之以天倪則仁義禮知之端始乎微芒常卒乎曼衍窮年由之而不盡矣久之而忘寒盡不知年忘年也精義入神忘義也振於無竟菩提本無樹也寓諸無竟白雲深處是吾家也罔者無也兩者二也罔兩即不二矣影無特操待乎形也形端則影端形枉則影枉此其所以然不然也道人去影其莫若去形乎前言舉世若大夢胡為勞其生恐人不覺又設為真夢以覺之蓋蝴蝶之飛無遠志也一入莊周之夢惟知夢中之樂局於夢也俄然覺在莊周以夜來之夢為蝴蝶恐蝴蝶又以今者之覺為夢莊周未有知其分也故能分辨莊周與蝴蝶者必知夢覺之解者也此之謂物化胡人不化須魄滅則魂昌而遊無夢之境不將為西極之化人乎內篇養生主第三夫人一身心為王四肢百骸皆是臣妾所以供王之役而神又是王之主宰世人凡為聲色臭味之好皆云所以養生而不知琢喪其主宰實多主既不存臣將安附可見養生非養生也養其養生之主乃為善養生者也吾生也有涯盡也而知也無涯人生不滿百常懷千歲憂以有涯隨無涯殆已以有盡之生逐無盡之算危也已而為知者殆而已矣已困於知而又為知以救之真大殆也為善無近名為惡無近刑上不為仁義之操以近名下不為淫僻之行以近刑緣督以為經督督脈也人身有飪督二脈督脈從尾閭後上過三關至泥丸前下與飪脈會至黃庭是緣督以為經可以保身可以全生可以養親可以盡年不虧體以辱親養親也全而生全而歸盡年也庖丁庖人名丁為文惠君解牛屠牛也手之所觸肩之所倚以手用力以身就牛形狀如此足之所履膝之所踦音紀跪壓也主石音翕然嚮然奏刀馬主石音畫主石然嚮然馬主石然皆用刀之聲然莫不中音合於桑林之舞宋舞樂名乃中經首之會咸池樂章文惠君曰嘻音熙善哉技蓋至此乎庖丁釋刀對曰臣之所好者道也長生不死之道即朝聞道之道進乎技矣技自學道中得來以後皆寓言借牛暗合大道始臣之解牛之時所見無非牛者見牛之難解三年之後未嘗見全牛也一見而得其可解之處方今之時臣以神遇而不以目視到此時不用目而以神解也官知止而神欲行耳目手足為官止不動也神行默運也依乎天理牛身自然之脈理批大郤音隙批開也大郤骨節之際導大窽音欵導引刀而入大窽骨節之空因其固然刀不妄加技經肯綮之未嘗而况大軱音孤乎肯綮骨肉聯之處筋節所在大軱大骨也言我技精好遊刃於空也良庖歲更刀割也族衆也庖月更刀折也今臣之刀十九年矣所解數千牛矣而刀刃若新發於硎音刑砥石也彼節者有間而刀刃者無厚以無厚鋒鋭也入有間筋骨之交恢恢乎其有遊刃必有餘地矣是以十九年而刀刃若新發於硎喻世事有自然之理我但順而行之無所攖拂此心泰然也雖然每至於族筋骨結聚處吾見其難為怵音出然為戒著心加意視為止行為遲停視而遲行刀動刀甚微謋音獲然已解如土委地如土崩之易提刀而立為之四顧為之躊音疇躇音除躊躇熟思審處也滿志快意也善刀而藏之滿意暗應神遇善刀暗應割折此段喻人處逆境能順以應之不動其心事過而化一似全無事時也文惠君曰善哉吾聞庖丁之言得養生焉吕吉甫曰物以有而礙道以虛而通人未聞道則所見無非物既聞道則所見無非道神遇不目視喻聞道者以心契而不以知知識識也李士表曰物本無物其體自離道無不通安所用解莊子所謂解牛者離物冥心而未嘗見牛乘虛順理而未嘗經刃是亦解於無解耳又曰以道觀之在解無解非礙則解亦不知在礙無礙非解則礙亦不立以庖丁視族庖解者解其礙也以族庖視庖丁礙者礙其解也解礙俱遣虛而已矣以是道而遊乎萬物之表彼且惡乎礙哉公文軒見右師而驚曰已刖足之人為右師之官是何人也惡乎介也獨足也天與音余其人與音余天生其介抑人刖其足而使之介也曰天也非人也天之生是使獨也刖足明是人而曰天者天生時要他獨存一足人之貌有與也天與之形道與之貌必有兩足也以是知其天也非人也人人皆兩足而彼獨足知非人則不當尤人知其天則當安命安命之人不著外物以驚其神澤雉十步一啄音卓百步一飲無拘無束何等甚適不蘄不蘄猶不意也畜乎樊中為人所拘束即無飲啄之慮何如澤中十步百步之樂神雖王不善也神雖居中而王以令衆體然心勞日拙而神瘁不如衆體之逸老聃死寓言人之喪其祖氣秦失弔之弔其失喪祖氣三號而出弟子曰非夫子之友邪吕吉甫曰弔之為禮哭死而弔生三號則哭死為不哀無言而出則弔生為不情此弟子所以疑其為非友也曰然是吾友然則弔焉若此可乎何弔之不用情如此曰然始也吾以為其人也而今非也向吾入而弔焉有老者哭之如哭其子子子氣也少者哭之如哭其母母母氣也彼其所以會之所以會合人心者必有不蘄言而言不求譽而譽者自至不蘄哭而哭者不求哭而哭者自至是遁天倍情遁天理倍人情忘其所受古者謂之遁天之刑忘其未始有物之先所受之正而隨俗化情非至人也非至人則違天矣適來夫子時也適去夫子順也視生死如來去安時而處順哀樂不能入也常情以生為樂而死為哀是哀樂非內出外入也至人視生死外也哀樂內也外境有變幻而內情無變幻內外之不相及久矣故曰哀樂不能入古者謂是帝之縣解縣音玄帝天帝也以生為懸以死為解又云以有係者為懸則無係者懸解也懸解而性命之情得矣此養生之要也指窮於為薪火傳也不知其盡也窮盡也以薪熾火指薪觀之薪有窮盡而世間之火傳不絶未嘗見其盡窮內典曰火之傳於薪猶神之傳於形火之傳異薪猶神之傳異形前薪非後薪則知指窮之術妙前形非後形則悟情數之感深惑者見形朽於一生便謂神情共喪猶睹火窮於一木便謂終期都盡可乎此語甚精前言生之當養此言死生如一豈故相反哉知死生之如一者乃為善養生者耳復圭子曰篇以養生為名首尾皆寓言養生之事築基以清心為本故先戒人不可以有涯之偽生而逐無涯之妄念以自取其危殆被褐懷玉而人不知無近名也斬滅三尸而無罪無近刑也督脈乃坐功之起手處自尾閭後上三關至泥丸前與壬脈會而降黃庭緣督以為經也人能識此內工終身用之而不盡庖厨也丁火也不言解龍解馬為二物屬陽也而解牛者坤為牛也凡言牛指一身之陰也以吾身之陽神而與羣陰神戰用吾之慧劍莫不一一中節始而所見一身莫非陰也三年之後羣陰已剝盡矣不以目視而以神行一身之大關大竅皆迎刃而解無有巨魔與我角者彼旁門小智之士鑄劍不靈即月更歲更一鋒刃何益哉十地數也九天數也今臣之劍乃得天地之精陰陽之髓煆鍊而成已解數千陰魔矣此劍益磨益鋭萬里誅妖一電光也寧有厚而不入間而阻礙者乎族衆也每至於族乃衆人之不知養生主者吾見其難為不可以道論也吾以有涯逐無涯之説戒之一行一止欲以吾之慧劍而解族人奈族人不受解吾劍徒委之於地猶然四顧躊躇而有望於人不得已乃善刀而藏之不復言養生也文惠君因言技而悟道易悟也哉人有四端猶有四體介一足耳喻言人之琢喪其四端者是無足之人不能行也澤雉飲啄自如一入樊中喻人在名利樊籠神思甚苦不如散人之逍遙神雖居中而王亦多勞瘁不如百體之逸也天地篇云可為衆父而不可為衆父父老聃乃衆父父也老聃死喻言人自喪其先天之祖氣也子是子氣在我母是母氣在彼哭衆人不知以彼先天之母氣而伏吾身之子氣也似亦言乎不得不言哭乎不得不哭蓋人生受於天陰陽之患為天刑忘其所受性命之本來雖欲遁天刑惡可得哉何也天下惟忘死生者乃可以出死生亦惟出死生者乃能無哀樂人生於世不知跳出陰陽之樊籠者皆木強人也其線索皆懸於天帝之手提之則生不提則死哀樂不能入之人造化不能拘天帝亦為解其懸而夀與天齊矣火氣也火附於薪而無盡期不可謂此火非彼火人一氣也氣必寄於形凡人也人之傳子孫者特傳氣耳形以傳形不可謂祖父之神為子孫之神形如薪而有盡神如火而可傳故仙人傳神不傳形蓋悟薪者形也火者神也養形者養生也是留薪也養神者養其養生之主也是留火也仙佛之長存特得天地之真火如日月之常懸耳弄丸子曰莊子所謂丁者日之光也刀者月初得日之光以象偃月刀也牛者亥位上十月坤卦為牛也十一月變一陽解成復卦而牛受一刃十二月變二陽解成臨卦而牛受二刃正月變三陽解成泰卦而牛受三刃二月變四陽解成大壯卦而牛受四刃三月變五陽解成夬卦而牛受五刃四月變六陽解成乾卦而牛受六刃皆上弦之刃也五月變一陰是牛受七刃解成姤卦六月變二陰是牛受八刃解成遁卦七月變三陰是牛受九刃解成否卦八月變四陰是牛受十刃解成觀卦九月變五陰是牛受十一刃解成剝卦十月變六陰是牛受十二刃解完復成坤卦此屠牛垣一朝而解十二牛之説也解盡其道圓成無復解矣又何以謂之十九年十者地之數九者天之數故復卦在子以至於乾已皆謂九也姤卦在午以至於坤亥皆謂十也是以十合其九循環一年故曰十九也海陽有弄丸子諱程易明先生甚精於易象豫問易焉先生曰學易必要觀象得象斯得意得意斯忘言也豫唯唯而退內篇人間世第四世間人皆以世間為樂而不知其遊於苦海之中不知回頭永無到岸之期南華本出世之書也而此篇曰人間世者欲人透人世間事乃能出人間世爾仙詩云一局著殘人事省七弦彈破世間空即此意顏回見仲尼請行曰奚之曰將之衛曰奚為焉曰回聞衛君輒也其年壯其行獨自用輕用其國而不見其過輕用民死死者以國量乎澤若蕉言野無青草民其無如矣無所之也回嘗聞之夫子曰治國去之不必治也亂國就之治其亂也醫門多疾就而求治也願以所聞思其則則法則也思其處之之法庶幾其國有瘳音抽愈也乎仲尼曰嘻音熙若殆往而刑耳殆幾也幾於往而就戮耳夫道不欲雜雜則多多則擾擾則憂憂則不救顏回欲屈巳伸道夫子不許惡雜多之為擾而不救也古之至人先存諸已而後存諸人有其具然後以應物所存於己者未定何暇至於暴人之所行暴白人之行以救人且若汝也亦知夫德之所蕩滌除而知之所為出乎哉德蕩乎名才求名則喪德知出乎爭才用知則起爭名也者相軋音乙傾奪也也知也者爭之器也二者凶器非所以盡行也非所以盡保身處世之行且德厚信矼音江慤實貌未達人氣不識人之性氣名聞不爭雖名望高人不與我爭未達人心不識人之心事而強以仁義繩墨之言術暴暴白人之前者是以人惡有其美也命之曰災人必謂暴人之惡而貽害於彼災人者人必反災之人謂我與彼爭名而反害我若殆為人災夫汝殆往而為人所害且苟為悅賢而惡不肖惡用而求有以異夫彼衛君者苟知悅賢而惡不肖則彼國自有賢者可用惡用汝而求其有以異而自售乎若惟無詔王公必將乘人而鬬其捷今汝不待詔而自往彼必將乘汝之輕身而以智巧鬬汝求勝於汝而目將熒之汝為其所困則目眩而色將平之色靡求平口將營之口營營自解釋容將形之足恭也心且成之順成也是以火救火以水救水彼將鬬捷而汝順從之不暇則捷者愈捷是以水救水火救火也名之曰益多順始無窮益多長其惡也始順成之而終不知所止極若殆以不信厚言必死於暴人之前矣若交淺而言深不信厚言必死於暴人之前所謂殆往而刑者以此且昔者桀殺關龍逢音龎紂殺王子比干是皆修其身以下傴音羽拊人人指人君之民以下拂其上者也傴拊憐愛之也上不愛民而我愛之是逆君暴虐之性也故其君因其修以擠音濟陷也之是好名者也不欲令臣有勝君之名昔者堯攻叢枝胥敖二國禹攻有扈音戶國名國為虛厲國為邱墟死為厲鬼身為刑戮其用兵不止其求實無已求其拂上之情實是皆求名實者也好善之名拂上之實而獨不聞之乎名實者聖人之所不能勝也而况若乎好名貪欲之君雖堯禹不能勝他故與衆攻之而汝乃空手而往化哉雖然若必有以也汝欲往必有所恃嘗以語我來試言之於我顏回曰端而虛外端肅內謙虛勉而一矜持其志純一其德則可乎曰惡惡可甚不可夫以陽為充孔揚衛君得志滿盈為充盛甚揚強禦之色采色不定忽敬忽怠忽喜忽怒常人之所不違畏順之也因案人之所惑以求容與其心容與快暢也觀人之所感於我者而不違我因求以快暢其心欲人逢其惡也名之曰日漸之德不成而况大德乎將執而不化外合而內不訾音紫子欲以大德感之彼將執而不化訾即端虛而勉一外合於內而不可訾議其庸詎可乎言不可用此以化人曰然則我內直而外曲成而上比內直者與天為徒與天合德與天為徒者知天子之與已我也皆天之所子皆天之所生而無分别而獨以已言蘄音祈求也乎而人善之蘄乎而人不善之邪若然者人謂之童子純一不喪天之本然是之謂與天為徒外曲者與人之為徒也與人為伍擎音檠執苟也跽音計長跪也曲拳鞠躬人臣之禮也人皆為之吾敢不為邪為人之所為者人亦無疵焉不反災之是之謂與人為徒成而上比者與古為徒聖人之徒其言雖教謫之實也古之有也非吾有也若然者雖直不為病是之謂與古為徒若是則可乎仲尼曰惡惡可太多政法而不諜音疊謂汝事目方法太多終是不安雖固亦無罪雖然止是耳矣夫胡可以及化猶師心者也罪則無矣化則未也挾三術以適彼非無心而付之天下也顏回曰吾無以進矣敢問其方仲尼曰齋吾將語若有而為之其易邪易之者皥音蒿天不宜汝道有此三術而為之甚易耶第未免於師心與自然之皡天不相似顏回曰回之家貧唯不飲酒不茹暈者數月矣若此則可以為齋乎曰是祭祀之齋非心齋也回曰敢問心齋仲尼曰若一志純一不雜無聽之以耳而聽之以心無聽之以心而聽之以氣聽止於耳心止於符氣也者虛而待物者也唯道集虛虛者心齋也陳詳道曰有思為者古人嘗難之有思必齋有為必戒故欲神明其德者必齋心焉此仲尼所以告顏子也文子曰上學以神聽中學以心聽下學以耳聽聽止於耳則極於耳之所聞心止於符符天符也亦道家火符之符順其自然暗與之合也聽之以氣則廣大流通用形而非用於形待物而非待於物虛而無礙應而不藏故一志所以合氣合氣所以致虛致虛所以集道此心齋之義也顏回曰回之未始得使聆教實自回也得使聆教也之也未始有回也忘我可謂虛乎既得心齋之使則無其身夫子曰盡矣吾語若若能入遊其樊謂樊籠世網也而無感其名不為虛名所動入則鳴可與言而言譬之宫商應而無心故日鳴也不入則止不可與言而不言無門無毒不開一門不發一藥一宅而寓於不得已則幾矣一宅不二法門也寓於不得已則幾矣洪鐘無聲叩之乃有聲也即以無事為真宅有為為應迹也絶迹易無行地難不觀不聽官知止而絶迹猶為易也內視之謂明返聽之謂聰神欲行而無行地豈不難哉為人使易以偽為天使難以偽為人使者大姦似忠大詐似信非偽乎為天使者海底金烏天上日眼中童子面前人非難以偽乎聞以有翼飛者矣未聞以無翼飛者也世儒止知名無翼而長飛不知刀圭入口羽翰自生聞以有知知者矣未聞以無知知者也止知自明誠謂之教不知大道不可以知知不可以識識也瞻彼闋音缺者虛室生白吉祥止止人之有知者以知填實其心則無缺無缺則不虛矣惟無知之知如明鏡止水中無一物任外物之來而無不畢照亦猶室之闋而虛虛則生明而容光必照虛室生白即丹經之虛無生白雪寂靜發黃芽也吉祥止止即丹經之五氣朝元三花聚頂也夫且不止是之謂坐馳夫徇耳目內通而外於心知鬼神將來舍而况人乎此止與儒知止之止不同乃元精元氣元神打成一片即丹家之神室也而不能止其處者即終日打坐而元神不在腔子裏謂之坐馳耳惟至人有耳目之形而無耳目之情不通於外而通於內化耳目為精神化心知為虛明方且幽可以役鬼神胡明而不能攝羣情哉是萬物之化也禹舜之所紐也伏羲几蘧之所行終而况散衆人也焉者乎此道不惟可以感召神人且可以範圍萬物樞紐帝王而况其下者乎葉音攝公子高沈諸梁字子高葉邑宰將使於齊問於仲尼曰王使諸梁也甚重齊之待使者蓋將甚敬而不急禮貌雖隆情意疏慢匹夫猶未可動也而况諸侯乎吾甚栗之栗即戰栗也子嘗語諸梁也曰凡事若小若大寡不道以歡成鮮不言以歡洽方得成事若不成敗事則必有人道之患刑罰也事若成勞心成事則必有陰陽之患疾病也若成若不成而後無患者惟有德者能之以上述孔子之言吾食也執粗音粗而不臧美也爨音竄無欲清之人府下事簡無欲清涼之人今吾朝受命而夕飲冰我其內熱與音余受出使之命喜懼交戰於胸中五臟結成冰炭矣吾未至乎事之情未親見其行事之實而既有陰陽之患矣事若不成必有人道之患是兩兩患也為人臣者不足以任之不能勝任子其有以語我來仲尼曰天下有大戒二大經大法其一命也受之於天其一義也人所當為子之愛親命也不可解於心臣之事君義也無適往也而非君也無所逃於天地之間是之謂大戒是以夫事其親者不擇地有順逆而安之孝之至也夫事其君者不擇事有險夷而安之忠之盛也自事其心者事心如事君父哀樂不易施乎前施移也時有哀樂而此心不移於前知其不可奈何而安之若命德之至也為人臣子者固有所不得已義命所在行事之情而忘其身何暇至於悅生而惡死夫子其行可矣孝至忠盛行入世之事也不知悅生惡死則行出世之道矣邱請復以所聞凡交近本國則必相靡順也以信遠鄰國則必忠之以言言必或傳之假使以傳夫傳兩喜兩怒之言兩國之君喜怒之言天下之難者也夫兩喜必多溢過也美之言兩怒必多溢過也惡之言凡溢之類也妄妄則其信之也莫不信也莫則傳言者殃兩邊皆歸咎於傳言故法言曰傳其常情庸言也無傳其溢言則幾乎全上止言臣子義命以解其兩病之憂此則教以為使之道曲盡人間情狀全自全也以兩國喜怒不生而安於無事也且以巧鬬力者戲相搏者始乎陽任其自然常卒乎陰便用機械此下教以事當愼始蓋以善始者未必能善終况始不善乎泰至則多奇巧戲太甚則有過當處以禮飲酒者始乎治初筵秩秩常卒乎亂載號載呶泰至則多奇樂太甚則生情以為樂凡事亦然始乎諒信也常卒乎鄙鄙詐生焉其作始也簡其將畢也必巨始以苟簡從事其終必決裂潰敗而不可收拾言者風波也夫水有風則波生人有言議論風生故曰言者風波也行者實喪也人無行無得亦無喪而有行則得名者少而喪名者多故曰行者實喪也夫風波易以動大凡禍福皆言語以為階故曰風波易以動實喪易以危名者實之賓也實者名之主與名異名雖喪也而實猶存實一喪也不惟賓不至而主亦剝牀以膚矣故忿設無由忿設之言多無根由巧言偏辭花巧之言止見一偏獸死不擇音氣息茀音拂然於是並音並生心厲夫無情之言譬之野獸蹴之窮地則和音轉而為暴音氣息拂然且生疵厲之心以應之尅核太至則必有不肖之心應之夫寬則得衆信則人任焉尅者尅剝也核者綜核也至極也尅核太極是以不肖之心待人而人亦以不肖之心應之人情也亦物理也涉世者熟思之而不知其然也苟為不知其然也孰知其所終於此猶不加省攺而尚莫知其然也則禍患之來莫知其所終故法言曰引書就奉使事上説無遷令不改遷君命無勸成不勸人成事不擔利害也過度益也遷令勸成殆事才有過度念頭求益其事而遷令勸成則其事必危美成在久兩君相好非一日可成惡成不及改夫言者風波也風波易以作惡行者實喪也實喪易以成惡可不愼與音余愼言愼行也且夫乘物以遊心託不得已以養中至矣何作為報也莫若為致命此其難者陸西星曰吾子若能乘有物之感而遊心於無物之天託於不得已之義命以養吾心之中正順應無情斯其至矣何必過度加益以報命於君耶蓋事求其可功求其成以聽莫之為而為之天莫之致而致之命此豈人臣之所易能者哉顏闔將傅衛靈公太子蒯瞶而問於蘧伯玉名瑗曰有人於此其德天殺天奪其監與之為無方縱其敗度則危吾國與之為有方以矩矱繩之則危吾身其知適足以知人之過而不知其所以過言足以飾非智足以詎諫若然者如此之人吾奈之何蘧伯玉曰善哉問乎戒之愼之正汝身哉君子求諸已形莫若就心莫若和平易近人使人皆可親形就也涯岸不立渾然一團元氣心和也雖然之二者有患猶覺有患害就不欲入溫而理也和不欲出內文明而外柔順也形就而入且為顚為滅為崩為蹶音厥自古諧臣媚子往往形就而入四者只是顚危而不扶持將與彼俱亡之意心和而出且為聲為名為妖為孽和而至於出則有含垢之聲濟彼之名彼將惡其勝已妄生妖孽彼且為嬰兒亦與之為嬰兒與之為嬰兒至入於無疵則雖與之無方不至於危國與之有方不至於危身嬰兒無知識也亦與姑順之詞彼且為無町音挺畦音擕亦與之為無町畦無町畦以園無町畦喻人之無準繩也彼且為無崖亦與之為無崖無崖流蕩忘返之意達之入於無疵言彼放蕩不撿我且陽為承順陰乘其覺悟處一加點化便躍然無疵矣汝不知夫螳螂乎連發三喻欲使量敵而進無犯怒心無伐美才然後無道之儲可傅怒其臂以當車轍不知其不勝任也是其才之美者也戒之愼之積伐而美者以犯之幾矣幾於危身昔楚莊王見車前有一蟲怒臂以當其車問曰此何蟲也左右曰此螳螂也其為蟲也知進而不知退莊王日吾當避之以為勇敢者勸後天下之壯士聞風因聚於其庭汝不知夫養虎者乎不敢以生物與之為其殺之之怒也不敢以全物與之為其決之之怒也時其飢飽達其怒心虎之與人異類而媚養已者順也順其情也故其殺者逆也乃至於為虎所殺者逆其情也夫愛馬者以筐盛音成矢屎也以蜄音臏灰泥器盛音成溺適有蚊虻愛馬之至適見蚊虻嘬之僕御者緣而拊之卒然摶之出馬不意不時則決銜毀首碎胸致馬驚怒決去銜勒毀碎其身首之飾虎至暴而順之則馴馬易馴而驚之則暴意有所至而愛有所亡可不愼邪當世接物逆順之際不可不愼也匠石之齊至乎曲轅山名見櫟音厯社樹其大蔽牛潔之百圍潔量度也徑尺為圍蓋十丈也其高臨山十仞四尺日仞而後有枝其可以為舟者旁十數觀者如市匠伯不顧遂行不輟弟子厭足也觀之走及匠石曰自吾執斧斤以隨夫子未嘗見材如此其美也先生不肯視行不輟何邪曰已矣勿言之矣散木也無用棄材以為舟則沈以為棺槨則速腐以為器則速毀以為門戶則液樠音瞞津液暗出樠樠然以為柱則蠧是不材之木也無所可用故能若是之夀匠石歸櫟社見夢曰汝將惡乎比豫哉若將比豫於文木邪天下之木多以文見伐夫柤音查梨橘柚果木實蓏音裸草實之屬實熟則剝則辱大枝折小枝泄此以其能材能也苦其生者也故不終其天年而中道夭自掊音剖擊於世俗者也物莫不若是且豫求無所可用久矣幾死弟子厭觀幾乎不免於死乃今得之為豫大用使豫也而有用且得有此大也邪不剝則辱且也若與子也若指匠石子櫟木自指皆物也奈何哉其相物也汝奈何以物相識而幾死之散人又惡知散木匠石覺而診言軫占也其夢弟子曰趣取無用此木志趣既取無用則為社何邪曰密若無言閉口勿言彼亦直寄直寄寓於社耳焉以為不知已者詬音后厲也罵而辱之不為社者且幾有剪乎縱不為社亦豈有人剪伐之且也彼其所保與衆異而以義義理也譽之不亦遠乎南伯子綦遊乎商之邱見大木焉有異結駟千乘隱將芘音庇其所藾音賴子綦曰此何木也哉此必有異材夫仰而視其細枝則拳曲而不可以為棟梁俯而視其大根則軸解如輪軸之解散而不可以為棺槨咶音舐其葉則口爛而為傷嗅之則使人狂酲言狂如病酒也三日而不已子綦曰此果不材之木也以至於此其大也嗟乎神人以此不材因是以知神人亦以是不材故精神凝因人不壞而天獨存也宋有荆氏地名者宜楸音秋柏桑其拱兩手所圍把一手所據而上者求狙猴之杙音弋所以棲戲猴猿者者斬之三圍四圍求高名大家之麗棟也者斬之七圍八圍貴人富商之家求樿音善棺之全邊者傍者斬之故未終其天年而中道夭於斧斤此材之患也故解古巫祝書名之以牛之白顙者與豚之亢鼻者與人有痔病者不可以適河以人祭河如西門豹之事又一説謂以人為巫祝此皆巫祝以知之矣所以為不祥也以此三者為不祥此乃神人之所以為大祥也不知神人乃以此無用為大祥也支離支體不全貌疏者頤音移隱於齊脊曲之狀齊臍也肩高於頂頸縮之狀會音噲撮指天會撮髻也古者髻在項中脊曲頭低故髻指天也五管在上五臟屬於背背曲則管向上兩髀音陸為脅髀人大腿也脅人兩臂也言支離身曲而背聳之狀也挫針音針縫衣治繲音解浣衣足以糊口鼓策音策以箕播米也播精足以食音食十人上徵求也武士則支離攘臂於其間徵不及之上有大役則支離以有常疾不受功役不及之上與病者粟則受三鍾與十束薪夫支離其形者猶足以養其身終其天年又况支離其德者乎支離其德者不自見不自伐藏其用於無用泯其能於無能故得免於世而自全也上以木喻此以人喻孔子適楚楚狂接輿遊其門曰鳳兮鳳兮何如德之衰也來世不可待往世不可追也天下有道聖人成成成功也焉天下無道聖人生焉生全生也方今之時僅免刑焉不能有為也福輕乎羽全生福也莫之知載禍重乎地傷生禍也莫之知避福輕於羽殆易於載禍重於地胡不知避巳乎已乎臨人以德何暇臨人以德也殆乎殆乎畫地而趨何必畫地而趨也迷陽迷陽無傷吾行胡自昧其明以傷吾行乎吾行卻曲無傷吾足胡自枉其直以傷吾足乎山木自冦也膏火自煎也二句忘己徇物之喻桂可食故伐之漆可用故割之二句衒美求用之喻人皆知有用之用而莫知無用之用也有用之用世間事也胡世間人知之無用之用出世事也非出世之人不能知亦不能言篇內言虛結尾言無虛無二字丹經萬卷不能外焉此莊老學問之大頭腦處世儒惡知南華為丹經之主乎復圭子曰一部南華全以出世為主自古出世之人必先看得人間世之事透然後能斬釘截鐵以為出世之舉故此篇復以入世之事而寓出世之旨凡所云顏回仲尼顏闔伯玉楚狂皆莊老以已意而託為其人之言令人之信從也顏回不往治國而往衛國行獨之君以救衛民此亦人間情也而未得人聞道也故夫子教之以道不欲雜先自治而後治人也治人不外以已之德與知而治之設有相爭與相軋之事則人不治而祗以召災矣當知行獨自用之君飾非拒諫其天性也仁義繩墨之言適拂其恣睢暴戾之情非以火救火而水救水乎故桀紂假好名之説以殺其臣堯禹假用兵之威以求名實而猶不勝回將何所恃乎所恃者端而虛耳終不能化衛君甚揚之色所恃者勉而一耳終不能格衛君容與之心即能與天為徒與人為徒與古為徒僅免刑焉而欲以化人不能也其惟心齋乎若而人也耳目化而心思亦化所謂煉精還氣也故以氣聽至心止於符則煉氣還神煉神還虛矣虛則六通四闢任物之來而待之無所隔礙天下惟虛能載物而道又集虛故舍虛別無心齋矣絶迹猶為人使以有翼飛有知知也無行地則純為天使以無翼飛無知知也人身有神室即瞻彼闋者之虛室也實則不祥而暗凡夫也虛則吉祥而明仙佛也吉祥止止止於虛也所謂白雲朝頂上甘露灑須彌也鬼神且不能出其範圍又何衛君之不可化哉顏子上根利器故教之以出世之道葉公則下根鈍器日以涉世為事者也其使於齊供職可免人道之患欲跳出陰陽之外以免其患則難與言矣謂子之事親不可解臣之事君無所逃自事其心者齊死生忘好惡視奉使第供職之一事非揣情不可也人情不外於喜怒傳其常情無傅其溢言則兩主喜怒無由生而使者不難成命而返何今之使者非以巧鬬即以力鬬亦猶飲酒者始治而卒亂也人能察始簡畢巨之理無為風波之言無為實喪之行無致人之危如追窮獸無竭人之情以激不肖况為使亦有成法奉君命如奉尺璧無遷令也任詞命不任利害無勸成也寧將兩君相好之命不將兩君啓釁之詞非止愼於為使之道亦以養吾心中正之理欲免人道之患寧出此乎至於莫之致而致則有大司命在此其難者人不能為也顏闔之傳衛太子止慮保身之無策不知無方有方之未盡道故夫子示之以正身而其運用之妙曰形莫若就可方可圓也曰心莫若和無彼無我也曰就不欲入磨不磷而涅不淄也曰和不欲出神潛移而迹渾朴也此豈矯世以鎮俗哉不過欲與天下相安於無知識無封畛無涯岸則善矣又何瑕疵之可議哉言螳螂所以喻美才之當惜言養虎所以喻民情之當順言愛馬所以喻小不忍以失大謀曰意有所至而愛有所忘雖是頂愛馬説言外便含人止知世內之樂而不知世外無名實無生死虛以待物其樂無極虛以生白其神莫測此陰陽外之人非陰陽所能害也然欲全神必自全形始彼櫟社商邱之木俱以不材而保其生支離疏以不全而養其身又况支離其德者埋名韜光不表見於世而精神完固又何如也未又託為楚狂闢禍福之門指載避之路傷世人顚倒其行以取種種罪愆祇自冦自煎耳自伐自割耳彼山木膏火桂漆猶其小也胡世人知有用之用為天下利不知無用之用不為身害也人盡世間人也人盡埋沒於名利而不思為出世之計也哀哉內篇德充符第五道家以修德為根本養氣鍊形為築基王駘申屠嘉叔山無趾三人雖有修德之根本矣天刑之安可解是德尚未充即為才不全而不能德不形也其惟哀駘它乎丈夫與之處以下是寓言得藥得丹之術即為才全而德不形者也此人乃為知為孽四句下德有為之聖人不能為不謀惡用知四句上德無為之聖人也及其成功下德亦與上德同歸德充於內而道氣符於外也至未曰天選子之形子徒以堅白鳴是惠子有愧德充於內安望其道氣符於外哉魯有兀當作介獨足人也者王駘音臺從之遊者與仲尼相若常季問於仲尼曰王駘兀者也從之遊者與夫子中分魯受魯國之弟子半於夫子也立不教坐不議即夫子豫欲無言無行不與之教虛而往虛心往求教實而歸實有所得而歸固有不言之教無形而心成者邪支體不完為無形元神完固為心成是何人也仲尼曰夫子聖人也指王駘邱也直後而未往耳邱將以為師而况不若邱者乎奚假何但也魯國邱將引天下而與從之常季曰彼兀者也而王宇法勝也先生其與庸常人也亦遠矣若然者其用心也獨若之何仲尼曰死生亦大矣而不得與之變常人以死生為大變至人視死生如晝夜而心不與之變雖天地覆墜亦將不與之遺人失物謂之遺天地覆墜言天之覆墜遺於地也天地自覆墜我心自不覆墜何會與之俱遺哉審乎無假而不與物遷人之生也謂之假爾面目借爾形骸夫人至無假之時形喪而神亦遷至人視無假如解脫而神長存不與之俱遷命物之化而守其宗也造者造無為有化者化有為無命物各有命也至人視命物雖化而我自有不化者以有主在也守其宗者守吾之元神真君是也常季曰何謂也仲尼曰自其異者視之肝膽楚越也自其同者視之萬物皆一也人以異心起見即肝膽可以為楚越况其遠者乎亦猶父子如路人同舟如胡越之謂也人以同心起見雖萬物與我為一體况其近者乎亦猶民吾同胞物吾與也之謂夫若然者且不知耳目之所宜而遊心乎德之和夫若然者既視萬物為一則吾身亦一矣耳目可互為視聽是不知其所宜也遊心乎德之和則不以耳聽而以心聽不以目視而以心視所謂聽其所聽不聽其所不聽視其所視不視其所不視也物視其所一而不見其所喪視喪其足猶遺土也有一有不一則有得亦有喪物視其所一即萬物各具一太極之一我非獨得而人非獨喪指守其宗而言也真君既存則百體為微土無往而不在視喪足如遺土猶勿遺也常季曰彼為已以其知得其心以其心得其常心物何為最勝也之哉彼指王駘知守宗而得心亦不過得人之常心耳人何為而稱彼為最哉仲尼曰人莫鑑於流水而鑑於止水惟止能止衆止守宗之心定心也夫人之心動心也水定則能鑑衆形心定則能止衆止受命於地惟松柏獨也在冬夏青青受命於天惟舜獨也正幸能正生以正衆生松柏得地正氣舜得天之正命夫保始之徵不懼之實勇士一人雄入於九軍正性即守宗也守宗即保始也非有天德之剛者必不能長守不失正如不懼之實一人雄入於九軍有進而無退將求名而能自要者而猶若是一將求功名而自要於君者猶若是而不憚生死而况官天地以無形君有形故天地可作我之官府萬物以無物藏萬物故萬物為我之府庫直寓六骸象耳目首身雙手雙足為六骸寓寄寓也直寄寓於六骸之中而以耳目為象取象於聰明也一知之所知而心未嘗死者乎郭象日知與變化俱則無往而不宜此知之一者也心與死生順則無時而非生此心之未嘗死也彼且擇日而登假音格人則從是也彼且何肯以物為事乎釋氏以地水火風為四大假合彼王駘也乃得道之人彼且擇日而升於假合之上人則從是而學其道彼何嘗肯以教人為事乎申屠嘉兀者也而與鄭子産同師於伯昏無人子産謂申屠嘉曰我先出則子止子先出則我止以同坐出入為嫌其明日又與合堂同席而坐子産謂申屠嘉曰我先出則子止子先出則我止今我將出子可以止乎其未邪子見執政子産自稱而不違不避也子齊字法並也執政乎申屠嘉曰先生指伯昏無人之門乃論德之地固有執政焉如此哉則論勢位矣子而悅子之執政而後人者也笑其矜説在位欲處物先聞之曰鑑明則塵垢不止止則不明也久與賢人處則無過今子之所取大者求廣其見先生也而猶出言若是齊執政之言不亦過乎子産曰子既若是兀也矣猶與堯爭善計子之德不足以自反邪言其不自量申屠嘉曰自狀其過以不當亡者衆自陳其過以足為不當亡者衆人也不狀其過以不當存者寡默然不狀其過以足為不當存者鮮矣知不可奈何而安之若命惟有德者能之遊於羿之彀音構中喻天下之徼幸行險者中央者中地也中央的之中也羿所必中之地然而不中者命也然而有不中者幸免耳人以其全足笑吾不全足者衆矣我拂然而怒而適先生之所則廢然而反見至人之知命遺形故廢向者之怒而復常不知先生之洗我以善邪不知先生洗我以善道邪抑我能自反邪吾與夫子遊十九年矣而未嘗知吾兀者也不見形骸今子與我遊於形骸之內而子索我於形骸之外不亦過乎郭象曰形骸外矣其德內也今子與我德遊耳非與我形交而索我外好不亦失其所以取大於先生者乎子産蹴然不安貌攺容更貌曰子無乃稱稱謂善於稱述蓋服善而譽之之詞魯有兀者叔山字也無趾無足趾遂以為稱踵無趾故踵行見仲尼仲尼曰子不謹前既犯患兀也若是矣雖今來何及矣不能復全其足無趾曰吾惟不知務而輕用吾身吾是以亡足今吾來也猶有尊足者存尊於足者真君是也吾是以務全之也夫天無不覆不擇人而覆之也地無不載不擇人而載之也吾以夫子為天地安知夫子之猶若是也責其不謹不及天地孔子曰邱則陋矣夫子胡不入乎請講以所聞無趾出孔子曰弟子勉之夫無趾兀者也猶務學以復補前行之惡而况全德之人乎無趾語老聃曰孔邱之於至人其未邪彼何賓賓以學子為彼且蘄音祈以諔音叔詭幻怪之名聞以為善救惡為求非常之名不知至人之以是為已桎梏木在足曰桎在手曰梏皆刑具邪聖人無名故以名聞為桎梏老聃曰胡不直使彼指孔子以死生為一條未始有生孰名為死以可不可為一貫者本來無可安得有不可解其桎梏其可乎無趾曰天刑之安可解陸西星曰善法惡法皆是幻法善名惡名皆是詭名此不二法門只是解粘去縛本來無物何處生塵但天刑之人帝縣不解謂一定而不可易也魯哀公問於仲尼曰衛有惡人醜貌人也焉曰哀駘音臺它音陀名也丈夫與之處者思而不能去也以下皆寓言採藥採丹婦人見之請於父母曰與為人妻寧為夫子妾者十數而未止也未嘗有聞其唱先也者也常和應也而已矣無君人之位以濟乎人之死無聚祿以望字法月圓滿之意人之腹又以惡醜𩳏駭天下和而不唱不能首事知不出乎四域不見其有遠略且而雌雄合乎前人事勝負皆來質成是必有異乎人者也寡人召而觀之果以惡駭天下與寡人處不至以月數而寡人有意乎其為人也不至于期年而寡人信之國無宰主也而寡人傳國焉委之國政悶音門然而後應無意而答泛音泛而若辭寡人醜乎自愧卒授之國無幾何也去寡人而行寡人恤字法憂也焉若有亡如有失也若無與樂音洛是國也是何人者也是何等人而使人愛戀若此仲尼曰邱也嘗使於楚矣適見豚音豚子食音嗣於其死母者少焉㫬音瞬若皆棄之而走不見已焉爾以為目之瞬不見已也不得類焉爾形之僵不類已也所愛其母者非愛其形也愛使其形者也有形者不足愛而使其形者真可愛則哀駘它之可愛者必有在矣戰而死者其人之葬也不以翣音殺形似方扇以木為之若戰而死且不得全歸何望儀物之備翣乃喪禮通用非專飾武資刖者之屨無為愛之所愛屨者為足故耳刖者之屨則無可愛皆無其本矣戰以武為本行以足為本無本者無所用而有本者斯可用則它之可用者必有在矣為天子之諸御不爪剪不穿耳又設喻採擇嬪御不剪不穿其全形也于以垂至尊之取音娶妻者止於外不得復使新娶妻之人不服役以胼胝其手足恐無以結新昏之歡形全猶足以為爾而况全德之人乎今哀駘它未言而信無功而親使人授已國惟恐其不受也是必才全而德不形者也天之降才渾全已之成德不炫也哀公曰何謂才全仲尼曰死生存亡窮達貧富賢與不肖毁譽飢渴寒暑是事之變命之行也事情之變態天命之流行日夜相代乎前如環無端而知不能規乎其始者也規有一定之則然但不能規乎其始而已不可謂之未始有始也故不足以滑音骨和不可入於靈府滑汨沒也和即發而皆中節之和靈府即靈臺精神之宅也誠知其未始有始而先天之本體又何至滑沒吾之太和於靈府也耶使之和豫通而不失於兌今使吾德之和豫通於死生窮達而不失於物議兌即道德經塞兌之兌兌為口使日夜無卻音隙與日俱新而與物為春是接而生時於心者也常人不畏物議一隙之中皆秋冬肅殺氣象與接為搆日以心鬬者也彼則心中日夜無一隙而非春生即接搆亦四時皆生意在吾心乃為太和不滑沒於靈府者也是之謂才全此箇和德不變於物交之感便是才全才全者不以外物動其心德不形者德盛而人自化耳何謂德不形曰平者水停之盛也天下之平莫盛於停水其可以為法也萬物取準則焉內保之平則內能自保而外不蕩也停則外不搖蕩德者成和之修也水之平猶德之和全此性中和德之修也德不形者物不能離也德隨物見哀公異日以告閔子曰始也吾以南面而君天下執民之紀法也而憂其死吾自以為至通矣今吾聞至人之言恐吾無其實輕用吾身而亡吾國吾與孔邱非君臣也德友而已矣聞德充之風者雖復哀公猶欲遺形骸忘貴賤也闉音因曲跛也跂音企支離形不全貌無脤音辰無脣也説音稅衛靈公靈公説音悅之而視全人視全人反不如之其脰音豆頸也肩肩細小貌甕盎音盎大癭之狀大癭音影説音稅齊桓公桓公説音悅之而視全人其脰肩肩故德有所長愛其德長而形有所忘而忘其形短人不忘其所忘形也而忘其所不忘德也此謂誠忘所當忘者形也所不當忘者德也故夫忘形者非忘也不忘形而忘德者乃誠忘也故聖人心有所遊而知為孽以用智為災約為膠以拘禮為固德為接以德慧為應接工為商以技能為行貨聖人不謀無思無慮惡用知不斫質任自然惡用膠無喪渾然全具惡用德不貨深藏若虛惡用商碧虛云蜣蜋轉丸蜘蛛結網不謀之知也雲龍風虎松柏女蘿不斫之膠也禽獸林藪魚鱉江湖無喪之德也物物自利各各營生不貨之商也四者天煮也天煮也者天食也既受食於天又惡用人四者有所用則人也而非天也無所用則遊以天矣遊以天者天煮之天煮也者天食也煮養也聖人既食於天矣而惡用乎人為也有人之形無人之情四者不用有人之形故羣類聚於人無人之情故是非不得於身是非付之於物眇乎小哉所以屬於人也謷乎大哉獨成其天陸西星曰然謂之無人之情則聖人似乎離世絶俗而不與物同春者不知聖人之身常自謙抑眇乎小哉所以聯天下以成其身也其心則謷乎大哉浩然天遊所以成其天也老子所謂不自大故能成其大意蓋如此成其天則不惟忘其所不忘抑且忘無可忘而人不得以其所不忘者係之矣惠子謂莊子曰人故無情乎莊子曰然惠子曰人而無情何以謂之人莊子曰道與之貌天與之形惡得不謂之人惠子直謂無情若木石不可以為人莊子以人之形色相貌皆自未始有始中來皆道與之道與之即天與之也有自天中道中來者尚不得謂之人乎惠子曰既謂之人惡得無情莊子曰是非吾所謂情也吾所謂無情者言人之不以好惡內傷其身常因自然而不益生也不以人為增益於所生之外惠子曰不益生何以有其身惠子謂人有情欲之感因託以有身今不益生何以有此身莊子曰道與之貌天與之形無以好惡內傷其身好惡者人神主之也身者藏精之府也無以好惡內傷其身所謂滅動心不滅照心也今子外乎子之神勞乎子之精倚樹而吟據稿梧而瞑天選子之形子以堅白鳴今子外乎子之神則不能抱神以靜矣勞乎子之精則不能無搖女精矣稿梧琴瑟也瞑睡也以外神勞精之人倚樹而吟據稿梧而瞑雖曰有人之情猶然人也內傷其身實多矣天選子之形聰明智慧獨加厚於子子不能以德充符而欲以堅白鳴豈能磨不磷而涅不緇也哉此篇以德為內而形為外形可忘也德不可忘也德以守宗保始為本靈府乃藏神會精之所即人之神室而為守宗保始之處也凡養德者必自此始德既充盛於內自然效驗符合於外而天地為吾之官萬物為吾府庫矣首言魯有兀者王駘以為人當忘形之喻彼之所不全者形也而其所全者神也故從之遊者得其不言之教心成之道凡人視死生為大變神人則視死生為旦暮彼自變遷也我自有不變不遷者在任命物之化而吾守其宗耳即丹經養其無象象故常存守其無體體故全真也膽附於肝肝司謀慮膽司決斷內無宗主者肝膽且不供職何啻如楚越乎能守其宗者視萬物與我為一若而人也耳目互宜遊心和德得失渾然又安知有足之喪水惟止故可以為物之鑑人亦惟宗厥止者可以止衆止松柏以得所止而冬夏青青舜以止於正而窮通一轍非保其未始有始之故我者不能守其宗矣勇士之所保者氣也而猶以一氣冠三軍况至人之所全者神也先有吾身後有天故天地可官無物之中而萬物森然故萬物可府足雖喪而心不死前曰審乎無假假者形也此曰擇日登假則直超乎地水火風之上矣次引申屠嘉之兀與執政並行並坐論德不論形也子産責其不各行各止見勢不見德也鑑以止能鑑人之形不能鑑人之德則申屠嘉為可鄙賢人取人以德不以貌則申屠嘉又當物色之矣况足之存亡不知者以為吾過乎知之者以為命實司之豈惟一足凡名實之途得者以為巧手達者以為羿彀遊其彀者必為羿所中然而有中有不中者非其智得也命通也吾聞德內也形骸外也外內之不相及久矣遺內而索外賢者固如此乎又引兀者叔山無趾以為全形不如全德之喻今人之尊生尊其形骸也孰知無趾之來猶有尊於足者存尊德性也非尊形骸也其求全者大矣天地猶不擇人而覆載夫子可擇人而教誨乎嗟夫疾沒世而名不稱者夫子也故欲以諔詭幻怪之名聞為名之所桎梏也凡在桎梏之中者悅生一心惡死又一心不知生從何方來死向何方去能悟來時蹤始識去時路死生原一條也以可為是必以不可為非不知此亦一是非彼亦一是非可中有不可不可中有可可不可原一貫也釋氏云舍惡送何去取善令誰守本此庶不為名聞所縛乎哀駘它至末乃玄門入室採藥之喻丈夫思而不能去願與彼為侶伴也婦人甘為妾金愛木慈仁木愛金順義也不為唱而為和惟主持丹道者之言是聽也無君人之位以濟乎人之死同為入室之侶伴者皆得藥而長生也無聚祿以望人之腹未學道時腹內空虛既入室後虛其心實其腹也且而雌雄合乎前者孤陰不生孤陽不成二人同心其利斷金也豚子不食死母愛其神而不愛其形也喻人止知食後天之母血而不知食先天之母氣也戰而死者喻旁門採戰者之喪生也刖足之履無為愛之喻無德者即知採取之法必不能得藥猶無足之人不能行也為天子喻主持丹道者不剪不穿喻入室之御女未雕未琢渾然一先天也取妻者取鼎也止於外者不得與之見也不得復使者不得别役以勞其神也採藥尚為全形而全德則全神事也又有進於此者矣築基鍊已結胎脫胎咸宜謂之才全被褐懷玉謂之德不形若而人也任世態之變遷歲序之更代而吾靈府之太和不變不代豫通於彼而不失其西方之兌氣兌為少女為毀折有黃婆以監守之使兌女不走失日夜而無郤也不與之接是冬藏也接則與物為春以彼先天之母氣伏吾後天之子氣採藥得丹莫不有時所謂生時於心者也是之謂才全何謂德不形水峻則流平則停人所取準焉平則內能自保停則外不搖蕩水之平猶之德之和也彼以成和為修物以不能離為德不形即一而不分死生無變之意哀駘它足以當之衛靈齊桓悅支離大癭而不足全人者以全人特全其形而神不全也以為人當忘不當忘之喻遊心遊也聖人有所遊五句取坎填離後天之聖人也以築基之知為孽同伴之約為膠真色不色之德為接法財兩備之工為商聖人不謀四句乃童真修鍊先天之聖人也不必穿鑿惡用知未嘗斫削惡用膠原無喪失惡用德不必法財惡用商四者先天之母氣原存謂之天食又惡用借後天以還先天哉若後天之聖人則不然有人之形形若稿木也無人之情心若死灰也故有類聚而無是非所以用後天而還先天今惠子徒知益生為有身不能愼汝外閉汝內反以好惡傷其生精神營營終日不寧德不充於內而欲以堅白鳴於外可乎哉內篇大宗師第六為學日益師知也人各一宗師也為道日損師不知也天下之大宗師也故能一水火一生死一其不一而與天為徒其學問從已生而殺生未死而學死得來其工夫從忘仁義忘禮樂墮肢體黜聰明養定乃人而歸於天知而還於不知天地不能貧我司命不能限我豈非大宗師而為天下萬世之取宗哉知天之所為自然也知人之所為者至矣以人合天然後天人兩盡知天之所為者天而生也元精元氣元神是也知人之所為者以其知之所知以養其知之所不知鍊精鍊氣鍊神知之所知者神也至於不知之所以神而不神者性也鍊神須鍊不神神養而俟之不知之處難於著力矣終其天年而不中道夭者是知之盛也終天年而不天特順之耳止可謂知之盛而不可謂真知雖然有患猶有病患未知有所待而後當其所待者特未定也夫説知天知人者未必其果知也直待終其天年之後而後定其知不知也庸詎知吾所謂天之非人乎天非人不因所謂人之非天乎人非天不成且有真人而後有真知真人全生之人也真知識全生之道也何謂真人古之真人不逆寡幽僻靜室一二侶伴可以全真不以其寡而逆之不雄成豪門貴人以勢力求道吾亦不畏其雄而成就之不謨士謨音模惟真人與真儒而後學通天地人士則尋常之士也與之言全真之道必不信故不謨士若然者過而弗悔當而不自得也道若不成聽其在天而弗悔道若當而成與人共得其得而不獨自得也若然者登高不栗入水不濡入火不熱是知之能登假音格於道也若此登升也維摩經以地水火風為假合若而人也出聖入神而升於地水火風上之大道也古之真人其寢不夢其覺無憂其食不甘其息深深真人之息以踵衆人之息以喉一呼一吸為一息踵腳底心湧泉穴是也凡人以口鼻呼吸為一息故曰其息以喉真人之呼吸則自湧泉穴起蘆芽穿膝後過尾閭通三關至泥丸下重機至黃庭為一息故曰真人之息以踵與口鼻之呼吸較覺其息深深吾自方上得於至人不敢祕焉屈服者其嗌音益言若哇音蛙以踵息之理而與衆人言之欲屈服其心彼必不服常多嗌言口舌以支吾人若蛙鳴也其耆音嗜欲深者其天機淺天人理欲遞為消長蛙鳴之人純是一團嗜欲埋沒了這天機與之語踵息之道彼必不信此機字即萬物皆出於機皆入於機之機古之真人不知悅生不知惡死其出不欣音欣喜也其入不距音巨逆也翛音肅然而往翛然而來而已矣不忘其所始必窮性命之始不求其所終不敢與造物爭衡受而喜之愛性命如金璧忘而復之以後天而還先天是之謂不以心捐音沿道不以人助天物之感人無窮人之逐欲無節則天理滅矣真人知用心則背道助天則傷性故不為也是之謂真人若然者其心志志於道也其容寂神凝不動其顙頯音瑰廣大貌凄然似秋暖然似春初學用殺機以滅魄似秋道成滿腔生意似春喜怒通四時與物有宜而莫知其極此即其神凝使物不疵厲之意極至也莫知其至此者何人也故聖人之用兵也亡國而不失人心殺之不怨利澤施乎萬世不為愛人利之不庸故樂通物非聖人也與過化存神之聖人異有親非仁也至仁無恩天時非賢也聽時之自然而不能易否為泰利害不通非君子也不通利害倚伏之機何以為君子行名失已非士也善為士者遺名而自得若求名則失實矣非士也亡身不真非役人也常人喪真而亡身為造化所役也若亡身而真不亡豈為造化所役乎若狐不偕下聖人一等務光讓國自沈伯夷叔齊扣馬餓死箕子被髮請囚胥餘紀他申徒狄三人無可考是役人之役適人之適而不自適其適者也斯皆舍已徇人徇彼傷我也古之真人其狀義而不朋義則大公而又不朋黨若不足而不承不足則若虛而又不奉承與乎其觚而不堅也寧為圓通毋為堅滯張乎其虛而不華也文雖弗實而非滅質邴邴乎其似喜乎心曠神怡也崔乎其不得已乎迫而後應也滀乎進我色也粹然見於面也與乎止我德也虛實生白吉祥止止也厲乎其似世乎謷乎其未可制也連乎其似好閉也悗音瞞乎忘其言也真人韜光養晦不令人識故佯為顚狂之狀有時乎大呌大罵似世間一厲人也有時乎縱恣自如不受凡人之制約也有時乎不視不聽似與世人絶也有時乎自塞其兌養氣忘言守也以刑為體先鑄劍也以禮為翼養其刀圭也以知為識鍊己得藥得丹各有其時以德為循三千功八百行皆是德也以刑為體者綽乎其殺也劍成先斬三尸後斬天魔以禮為翼者所以行於世也欲刀圭入口而羽翰自生者必先盡人道之所以行於世也以知為時者不得己於事也學道工夫既己知之不得先時亦不得後時也以德為循者言其與有足者至於邱也而人真以為勤行者也吕祖云知學道之人而無德如無足之人不能行也有德而循之以入道者如與有足之人行至於邱坦然平易自有不疾不徐者在不知之人以為勤行也故其好之也一一者道也即金丹也真人惟好此而已其弗好之也一凡人之所不好者亦此一也其一也一其不一也得此大道之一則凡萬有不齊皆不能越此一之範圍真人登天下地貫金石入水火俱無所礙豈非一其所不一乎一其一與天為徒純陽也其不一與人為徒半陰半陽也天與人不相勝也是之謂真人真人純陽與天為徒戰退羣陰豈有陰陽相半與人為徒者與之角乎故日天與人不相勝也死生命也氣數之命其有夜旦之常天也如旦之必夜人之有所不得與皆物之情也死生著一毫人力不得物之常情耳若真人則造化在我豈有不得與乎彼特以天為父而身猶愛之而况其卓乎父生其身無不愛之天大父也凡人皆知以天為父而愛其身而不知身卑也尤有卓於身者神也非身也可不思所以愛之乎愛神須滅魄人特以有君為愈乎已而身猶死之而况其真乎君安其身無不賴之事君當忠也夫人猶知以死報之而不知君外也尤有切於我者非君也乃真君也可不思所以死之乎心死則神活矣泉涸魚相與處於陸相詬音吁以濕相濡音儒以沫音末不如相忘於江湖先以魚之不足於水者而相愛孰若有餘於水而相忘下文有是非毀譽不如忘是非毀譽皆所以起下善吾生二句之意與其譽堯而非桀也不如兩忘而化其道釋氏大道無難惟嫌揀擇本此意非譽皆生於不足故至足者忘善惡遺死生與變化為一又安知堯桀之分哉夫大塊載我以形勞我以生佚我以老息我以死故善吾生者乃所以善吾死也夫形生老死皆我也載勞佚息非我也造化主之也凡人惟聽造化不能善吾生所以不能善吾死若真人則生不徒生有養生之術為善吾生死不徒死有死心之道為善吾死心死則神活矣夫藏舟於壑藏山於澤謂之固矣然而夜半有力者負之而走昧者不知也物之大者莫過於舟形之大者莫過於山壑澤能藏之而不能守之夜半有力者負之而走昧者不知也即沖虛經云造化密移疇覺之哉之謂也夫天地間有有力之力人也所負能幾何有無力之力虛空是也力能負山川亦能移山川非心通造化者孰敢言之哉藏小大有宜藏者出機猶有所遁遁者入機若夫藏天下於天下而不得所遁是恆物之大情也大以藏小小以藏大物各有宜有所藏必有所遁者理也夫藏天下於天下孰藏之哉虛空藏之也今之天下猶昔之天下今之人物非昔之人物豈非遁其所藏哉而人不得其所以然物之恆情大抵然矣特犯人之形而猶喜之若人之形者萬化而未始有極也其為樂可勝計邪一犯人之形喜其得以為人便思所以順適其形者千變萬化無所不至止知為樂之計而不思為脫形骸之計何耶故聖人將遊於物之所不得遁而皆存藏神於形無負可施無往可適曰遊曰不得遁形神相守故曰皆存善夭善老善始善終人猶效之又况萬物之所係而一化之所待乎聖人始以形藏神繼以神化形故自夭至老自始至終無不善也人猶效之以為師而况大宗師為萬物之樞紐而一化之所待命者不思是則是效耶夫道有情有信無為無形可傳而不可受可得而不可見自本自根未有天地自古以固存從前未説道字到此方提起説大宗師也動為情符為信無為自然也無形無迹也可傳口得而言之不可受手不可得而探之可得心可得而有之不可見目不可得而視之自本自根萬物各具一太極也未有天地自古以固存有無極而後有太極也神鬼神帝生天生地鬼陰之精也得此道而後顯帝陽之宰也得此道而後靈非神鬼神帝乎混沌未鑿陰含陽也天得此道以生於子地得此道以生於丑開闢以後陽分陰也非生天生地乎在太極之先而不為高在太極之下而不為深先天地生而不為久長於上古而不為老凡物言高言深必有高深之盡處此道獨高無其高而深無其深凡物言久言老必有久老之數存焉而道獨久無其久而老無其老狶音喜韋氏得之以挈天地伏戲音羲得之以襲氣母狶韋氏古之帝挈天地言整齊世界也太易者未見氣太初者氣之始未見氣為父則氣者母也襲繼也世爵子繼父職謂之襲職伏羲得之以襲氣母得此道之母氣而長存矣維四維斗星斗得之終古不忒不易其度日月得之終古不息不晦其明堪壞音胚崑崙山神人面獸形得之以襲崑崙馮夷得之以遊大川清泠傳云馮夷華陰人服八石得水仙是為河伯肩吾泰山神得之以處泰山黃帝得之以登雲天軒轅氏也鑄九鼎鼎成之日上升顓頊音旭得之以處玄宫帝高陽氏也玄宫北方宫也月令日其帝顓頊其神玄冥禺音愚強得之立乎北極北海之神名手足乘雨龍靈龜為之使西王母得之坐乎少廣西方仙貌美山海經云人面獸身未必然莫知其始莫知其終彭祖姓錢名鏗得之上及有虞下及五霸傅説得之以相武丁奄有天下乘車維騎箕尾而比於列星傅説高宗賢相東維在箕斗間傅説死其精神乘東維騎箕尾為列宿今尾上有傅説星狶韋氏以下十三句得之得此道即大宗師也見帝不得不可以為帝日月星斗山川不得不可以為日月星斗山川仙真聖賢不得不可以為仙真聖賢南伯子葵問乎女偊音禹曰子之年長矣而色若孺子何也曰吾聞道矣南伯子葵曰道可得學邪曰惡惡音烏可猶言不可子非其人也非學道之人也夫卜梁倚音錡有聖人之才而無聖人之道聖人即神仙才即財也道即神仙之道富人有志於長生是有聖人之財而不知長生之法是無聖人之道也我有聖人之道而無聖人之才吾欲以教之庶幾其果為聖人乎得藥得丹非財不可女偊知有其道而無其財是貧而聞道尚未得外護故欲得卜梁倚而教之則彼我皆可以入聖矣不然以聖人之道告聖人之才亦易矣卜梁倚有學道之根器故有其資斧輒為有聖人之才設彼無其財我即有其道彼亦難與入聖矣已得為道未得尚為法也惟我抱聖人之道教彼有聖人之財者是為法財兩用同與入聖甚易易矣吾猶守而告之卜梁倚有其財而無其道故守而待以告之傳其聖人之道也三日而後能外天下忘富貴已外天下矣吾又守之七日而後能外物忘交接已外物矣吾又守之九日而後能外生三七九皆天之數也天為太虛一物不著故云守之三日七日九日而後能外天下外物外生也天下疏也物則漸近矣生則又切近之至者也故外天下易而外物難外物易而外生又難之難非得大道之宗師者不能也已外生矣而後能朝徹頓悟也朝徹而後能見獨外生之理止可自見而不可與人共見故曰見獨見獨而後能無古今視之猶旦暮也無古今而後能入於不死不生丹經云欲求長生不死客鍊性當如活死人石杏林云萬物生皆死元神死復生以神居氣內丹道自然成釋氏云非常亦非斷非生亦非滅生亦未曾生滅亦未曾滅即此旨殺生者不死生生者不生其為物無不將也無不迎也無不毁也無不成也其名為攖音嬰寧攖寧也者攖而後成者也丹經云心死神活魄滅魂昌役生者養神而不養形故不死生生者養形不養神故不生憧憧然以將迎成毀亂其心不寧亦甚矣惟殺生者無將迎無不將迎無毀成無不毀成已入於大定之境非大定不能定不定故其名為攖寧攖寧也者攖而後成也猶金不鍊不純玉不磨不光也莊老一生受用全在攖寧二字人生學問得力處亦當於攖寧二字磨鍊得透自然成其為真人釋氏居塵出塵之旨蓋本於此南伯子葵曰子獨惡乎聞之曰聞諸副墨之子翰墨也副墨之子聞諸洛誦誦讀也之孫洛誦之孫聞之瞻明目瞻心明瞻明聞之聶許目聶心許聶許聞之需役需役聞之於謳吟咏也於謳聞之玄冥有氣之始玄冥聞之參寥無名之始參寥聞之疑始無始之始前段自外天下至見獨愈入愈精以入世而出世此則自副墨語言而直窮到參寥疑始蓋以文字上尋性天因尋性天之所自始以至於無始愈求愈玄真所謂玄之又玄者也可謂得老氏道德之神矣子祀子輿子犁子來四人相與語曰孰能以無為首以生為脊以死為尻音翹尾也孰知死生存亡之一體者吾與之友矣此下寓言皆以發明死生無變之意首脊尻只是首中卒也凡物始於無終於無其生其死一念之起滅一氣之往來耳苟入於不死不生其所存豈在七尺之軀哉四人相視而笑莫逆不違也於心遂相與為友俄而子輿有病子祀往問之曰偉大也哉夫造物者將以豫為此拘拘病狀也曲僂音縷曲身也發背瘡也上有五管瘡發處有五管頤隱於齊肩高於頂句音勾髻也贅指天露頂陰陽之氣有沴音戾其心間音間而無事跰音駢躚病不能行貌而鑑於井曰嗟乎夫造物者又將以豫為此拘拘指病體而言也子祀曰女惡之乎曰亡音無豫何惡浸假假使也而化豫之左臂以為雞豫因以求時夜浸假而化豫之右臂以為彈豫因以求梟音梟炙浸假而化豫之尻音翹以為輪以神為馬豫因而乘之豈更駕哉不以外物談造化而實以吾身委之於造化順其自然而無好惡之意凡三變幻摹寫出機入機之光景有如畫圖不覺令人貪生之念化為烏有矣且夫得生也者時也失死也者順也安時而處順哀樂不能入也不知惡死不知悅生此古之所謂縣解不為死生所係也而不能自解者物有結之郭象日一不能自解則衆物共結之矣故無解則無所不解無解之解是謂真解且夫物不勝天久矣吾又何惡焉吾又何惡死求生哉俄而子來有病喘喘然將死其妻子環而泣之此段又發明所以當安當順的道理子犁往問之曰叱避無怛音答化叱其妻子避去謂無哭泣以驚將化之人倚其戶與之語曰偉哉造化又將奚以汝為將化汝為何物將奚以汝適將使汝何往以汝為鼠肝乎以汝為蟲臂乎鼠肝蟲臂只是言其化為微蔑至賤之喻子來曰父母於子東西南北唯命之從陰陽於人不翅於父母彼近速也吾死而我不聽我則悍逆也矣彼何罪焉彼謂死也其死之速由於我之悍非死之罪也夫大塊載我以形勞我以生佚我以老息我以死故善吾生者乃所以善吾死也解在本章之前今大冶鑄金金踴躍曰我且必為鏌鎁音耶大冶必以為不祥之金今一犯人之形而曰人耳人耳夫造物者必以為不祥之人今一以天地為大爐以造化為大冶惡乎往而不可哉成然寐以死為寐蘧然覺以生為覺今夫大冶鑄金惟冶所造今日之金安知非前日之所已鑄更幾百千爐錘過來將金喻人將大冶喻造化甚為親切未有金而不聽之於冶者亦未有人而不聽之於司命者蓋天地問原有限之金故鑄而復鑄者大冶也造化亦有限精神故以人已死之精神復還而為人更不知前身為何等人也亦猶大冶將舊金入新爐今日之形不知前鑄為何形也故釋氏輪回之説實本爐冶生來有道者不可不知子桑戶孟子反子琴張三人相與友曰孰能相與於無相與無心也相為於無相為無為也孰能登天遊霧遊於物外撓音裊挑音兆戲弄也無極相忘以生不悅生無所終窮不惡死三人相視而笑莫逆於心遂相與友莫然有間少頃而子桑戶死未葬孔子聞之使子貢往待事焉助喪事或編曲或鼓琴相和而歌曰嗟來桑戶乎嗟來桑戶乎而已反其真還歸造化而我猶為人猗嘆詞子貢趨而進曰敢問臨尸而歌禮乎二人相視而笑曰是惡知禮意禮之意重在反始故曰禮不忘其始率真而已矣即至親無文之謂也若後世虛文盛則禮意亡矣子貢反以告孔子曰彼何人者邪修行無有而外其形骸臨尸而歌顏刀巴不變無以命之名也彼何人者邪孔子曰彼遊方之外者也出世法而邱遊方之內者也在世法中外內不相及各自行其志而邱使汝往弔之邱則陋矣彼方且與造物者為人而遊乎天地之一氣物初彼以生為附贅縣疣音尤以有生為纍以死為決肒音換潰癰死則大患乃解夫若然者又惡知死生先後之所在假以異物即圓覺地水火風託於同體四大合而成體之説忘其肝膽遺其耳目外其身也反復終始不知端倪音詣芒然倣徨乎塵垢之外逍遙乎無為之業彼又惡能憒憒然為世俗之禮以觀衆人之耳目哉陸西星曰假於異物託於同體即圓覺經所謂地火水風四大假合而成幻身及其死也骨髮齒爪歸之於地精津血液歸之於水暖氣歸火動轉歸風今者幻身復在何處故忘其肝膽遺其耳目反復終始不知端倪芒然倣徨乎塵垢之外而不知身世之何有逍遙乎無為之業而一任來去之自然又惡能憒憒然以強世之禮而觀示衆人之耳目乎哉子貢曰然則夫子何方之依曰邱天之戮民也即帝縣不解之意雖然吾與汝共之共遊其方子貢曰敢問其方孔子曰魚相造乎水造生也人相造乎道相造乎水者穿池而養給得水不拘多少相造乎道者無事而生定隨其分量為事而自定故曰魚相忘乎江湖人相忘乎道術至人常足故常忘子貢曰敢問畸人音奇異也子貢言此則為獨行人矣故問畸人曰畸人者畸於人而侔於天合乎自然故曰天之小人人之君子人之君子天之小人也琢喪其精神者多是富貴之儔為天之小人而人反呼之為君子養其形骸而不知性命者此人中之君子也而天必賤之為小人顏回問仲尼曰孟孫才其母死哭泣無涕中心不戚居喪不哀無是三者以善喪蓋魯國固有無其實而得其名者乎回一怪之仲尼曰夫孟孫氏盡之矣進於知矣惟簡之而不得夫已有所簡矣彼於哭泣之事於不得不簡之中夫已有所簡矣孟孫氏不知所以生不知所以死不知就先不知生故不就先不知就後不知死故不就後若化為物以待其所不知之化已乎郭象日死生宛轉與化為一猶乃忘其所知於當今豈待所未知而豫憂者哉且方將化惡知不化哉方將不化惡知己化哉己化而生焉知未生之時哉未化而死焉知己死之後哉故無避就而與化俱生也吾特與汝其夢未始覺者邪化不化等夢覺故夢中有覺而覺中未必無夢且彼有骸形而無損心有旦宅而無情死有人之形故有骸形而心不動故無損心死生猶夜旦故有旦宅無人之情故無情死孟孫氏特覺人哭亦哭是自其所以乃人哭亦哭是哭不由裏即所謂無損心無情死也所以乃三字奇甚猶言乃所以如此也且也相與吾之耳矣庸詎知吾所謂吾之乎且死生變化彼與吾之所同也彼之所謂既如彼庸詎知吾之所謂又如此乎且汝夢為鳥而厲乎天夢為魚而沒於淵不識今之言者其覺者乎其夢者乎造適不及笑適意而樂不暇及笑獻笑不及排適然而笑不暇安排安排而去化乃入於寥天一安排既去純任自然則雖人也而亦天也寥天一即不二也太極也大宗師也金丹也意而子見許由許由曰堯何以資教也汝意而子曰堯謂我汝必躬服仁義而明言是非許由曰而奚來為軹音只語助詞夫堯既黥汝以仁義而劓汝以是非矣毀道德以為仁義似黥之破玄同以為是非似劓之汝將何以遊夫遙蕩恣睢轉徙之塗乎仁義是非乃世法也出世之人聞此言謂汝先入之言牢不可破猶受黥劓之傷也被他教壞了何以遊於逍遙自在之境乎意而子曰雖然吾願遊其藩籬也許由曰不然夫盲者無以與乎眉目顏色之好瞽者無以與乎青黃黼黻之觀無瞳子曰盲有瞳子曰瞽言汝無美資不足以聞道也意而子曰夫無莊美人之失其美據梁勇士之失其力黃帝之亡其知皆在爐錘之間耳夫未入爐錘三者猶有美名有力名有知名一入爐錘則美者失其美力者失其力知者亡其知爐錘之功大矣哉言汝能有道而化人使人人去其舊習而自悟在夫子陶鑄之間耳庸詎知夫造物者之不息我黥而補我劓使我乘成以隨先生邪昔受黥劓而傷性非自然也今於爐錘而悟本來之面目安知夫造物者之不去雕琢而還我以本來乎許由曰噫未可知也我為汝言其大略吾師乎吾師乎許由自述其師之德虀音齎虀粉也萬物而不為義澤及萬世而不為仁長於上古而不為老覆載天地刻雕衆形而不為巧此所遊已遊於不為而師於無師也顏回曰回益矣仲尼曰何謂也曰回亡仁義矣曰可矣猶未也他日復見曰回益矣曰何謂也曰回忘禮樂矣曰可矣猶未也他日復見曰回益矣曰何謂也曰回坐忘矣仲尼蹴然曰何謂坐忘顏回曰墮枝體黜聰明離形去知同於大通此謂坐忘仲尼曰同則無好也化則無常也而果其賢乎邱也請從而後也陳詳道曰道海也仁義禮樂百川也回得道而忘仁義禮樂是覩海而忘百川然猶未忘道也至於離形而忘物去知而忘心宴然無所係纍則道果何在哉與我兼忘而已蓋回之忘有所不忘而其益有所謂損不忘其所忘以歸於誠忘損之又損以至於無損非造坐忘之妙何足以與此子輿與子桑友而淋雨十日子輿曰子桑殆病矣裏飯而往食音嗣之至子桑之門則若歌若哭鼓琴曰父邪母邪天乎人乎有不任其聲而趨音促舉其詩焉言歌不成聲而其詞促也子輿入曰子之歌詩何故若是曰吾思夫使我至此極者而弗得也父母豈欲吾貧哉天無私覆地無私載天地豈私貧我哉求其為之者而不得也然而至此極者命也夫子桑為淋雨所病而糊口無資安於貧而制於命亦士之常耳何足挂仙翁之齒頰哉不知句句皆寓言也即孟子之所謂言近而指遠也玄門顚倒坎離水自下而上為水火既濟天地不能貧我故無病今淋雨十日水自上而下為水火未濟况十乃地數見其一身皆純陰也安得不病天地為人之大父母天乎人乎二語見天定勝人此凡夫也人定亦能勝天則仙佛也天地無私覆載豈私貧我隱隱見人之自取其貧要人尋出吾身自有不貧者在人身首為乾而腹為坤凡人不知發殺機不能天地反覆為天地否精神耗盡至於貧極而聽之司命求其為之者而不得要人做下德有為之工夫不可不為王子去求仙也然而至此極者要人知物極必反之理觀天之道執天之行命始由我不由天矣蓋玄門顚倒乾坤為地天泰天不能使之災地不能使之貧則司命不能制此之謂大宗師而人胡不宗師之也復圭子曰凡學道者非有知不能入道非無知不能得道道之大原出於天天者天性也著一毫人力不得有知可以人力為而全性不知不可以人力與而養性勿忘勿助是也故必有真人而後有真知古之真人不侮寡不畏強禦不傳非人不得其人雖過去而不悔苟得其人未嘗自私其所得人知其登高不栗入水火不熱不寒而不知其知全者真也已超於地水火風四大假合之上矣謂之寢不夢覺無憂食不甘猶其小也真人之工夫全在踵息二字其息深深直自湧泉穴起與凡人之息以喉嗜欲深而天機淺者異矣生乃造化之出者機始也固不知悅死乃造化之入者機終也亦不知惡非吾心之寒暑與四時流通萬物合宜者不能也若而人也殺之而人不任怨生之而人不任德所由殆與狐不偕諸賢適人之適而不自適其適者又異矣吾見其不比不屈不堅不華似喜似躍似彰似晦佯為無制之厲人深為有捫之朕舌提無刃之鋒振無翮之翼乘天之時循人之德惟守此一而已亦可以一不一惜神甚於惜身死心急於死君堯桀不分非譽兩忘以善生之術為善死之道藏舟藏山藏天下猶有所遁藏神於形無負可施無往可適欲形神相守而長存者其誰耶惟恃有自本自根之道在鬼神不得不靈天地不得不生高深莫與並久老莫與京帝不得不可以為帝日月星斗山川不得不可以為日月星斗山川仙真聖賢不得不可以為仙真聖賢卜梁倚有聖人之才才與財通有財無法安能得道女偊有聖人之道告乎有聖人之財者其於得道亦易矣三七九皆陽數也三日而外天下以出世為心也七日而外物無人相也九日而外生無我相也漸外漸近一朝豁然頓悟惟我獨見而人不見也視古今猶旦暮死生猶瞬息故能入於不死不生此禪學之所宗也吕祖云人能已生而殺生未死而學死則長生矣其殺生者不死生生者不生之謂乎有將迎成毀輒有寧不寧無將迎成毀則無寧不寧故其名為攖寧靜處鍊氣間處鍊神何嘗不寧攖寧也者攖而後成其為不死不生之人聞諸副墨丹經也洛誦之而後見得徹聶許之而後為需役歌之咏之皆文章也而實性天也玄冥為有氣之始受形之初也參寥為無名之始受性之初也猶涉於有也至聞之疑始為無始之始併有亦忘矣牧正禪師云迷時須假三乘教悟後方知一字無即此旨子祀四人以無為首初也以生為脊中也以死為尻卒也化左臂以求時夜化右臂以求梟炙化尻為輪化神為馬安時處順其懸自解敢與造物爭衡哉俄而有哭其子來之將死者不知陰陽陶鑄鼠肝蟲臂惟其所化東西南北任其所命人不敢違父母豈敢悍陰陽乎若金之在冶而躍冶人之在型而期人皆不詳也有能識天地造化為大爐冶者必能悟生死之大夢覺也子桑戶三人以無心無為而友視死為反真歌尸為禮意遊方之外與遊方之內者不相及謂生為附贅懸疣則生亦纍人矣死為決肒潰癰則死亦非苦矣若而人者視身為假合肝膽耳目非吾有又惡肯有世俗之有哉子貢問夫子何方之依不知魚在水而忘水人在道而忘道天下有畸人之人而後有侔天之人有天之小人而後有人之君子顏回怪孟孫才居喪不戚不知其猶以哭泣為繁而思以簡之視生死為先後之序化不化為一定之理身可損而心不可損形未死而情不可不死則夢魚夢鳥厲天沒淵莫知其情之變也適也亦猶造適不及笑而人不知其適獻笑不及排而人不知其所以笑凡屬於人者為安排安排一去天然乃見而神遊於寥天一即疑始也大宗師也失道德而後仁失仁而後義則仁義非天然也故曰既黥汝以仁義有仁義斯有是非則是非亦強名也故曰劓汝以是非惟有爐錘者然後形骸意氣知識皆化而為烏有上義不義至仁不仁大老不老極巧不巧吾與若神遊而已因有仁義之黥所以回曰忘仁義而黥息矣因有是非之劓所以回曰忘禮樂而劓補矣已而曰坐忘墮枝體黜聰明即易之艮其背不獲其身也離形去知同於大通即易之行其庭不見其人也舉子桑為淋雨所病子輿褁飯而往見與氣滿不思食而食丹者異舉天無私覆地無私載見與聖人外其身而身存無私故能成其私者異舉其至此極者命也見與手握乾坤口吞日月者異大宗師即人之元神也人人有之而人人不知宗師之故仙翁多方為人指點之耳內篇應帝王第七帝王治人者也亦得人矣而必出於非人如壺子之無夀者相然後可保其混沌而為帝王合應之道也齧音梟缺問於王倪四問而四不知此知字乃人之知識分别鑿混沌散太朴是也故王倪四以不知答之齧缺因躍而大喜此知乃大道之所忌因其不知有悟而喜行以告蒲衣子即被衣王倪之師也蒲衣子曰而乃今知之乎有虞氏不及泰氏古之帝人有虞氏其猶藏仁以要人懷仁以結人之心亦得人矣而未始出於非人非人天也不出於天則非自然無為可知泰氏其臥徐徐行徐貌其覺于于自得貌一以已為馬一以已為牛不辨是非即老氏呼馬亦馬呼牛亦牛之意斯可謂出於非人之域其知情信其德甚真而未始入於非人有人有非人樊然殽亂泰氏之知情信而不疑德真而不偽惡知不仁之為否而入於非人乎唐荆川曰言舜猶有意尚出於人道而非天道未始入於非人泰氏之於天道不期而合也褚伯秀曰真知無知是以能無不知帝王之道尤宜忘知以任物使聰者代聽明者代視知者代謀勇者代捍吾則端拱無為道合乎天而人自歸之此應帝王之第一義也肩吾見狂接輿狂接輿曰日中始人名何以語汝肩吾曰告我君人者以已出經經綸天下之大經也式義度人以義為程式以法為尺度孰敢不聽而化諸狂接輿曰是欺德也離性已遠以已制物則物失其真也其於治天下也猶涉海鑿河而使蚊負山也夫聖人之治也治外乎正而後行確乎能其事者而已矣聖人治外乎治內乎治內者治之以不治正謂正性求諸已也而後行則加諸人矣為治不過確乎盡性命之能事不強人以所不能也且鳥高飛以避矰音奚弋之害鼷音奚鼠深穴乎神邱之下以避熏鑿之患而曾二蟲之無知夫鳥鼠二蟲尚知高飛深穴以全性命曾謂斯民之不若而必作為經式義度以拂亂其常性使百姓有避患之心天下安得而治乎天根人名遊於殷陽殷山之陽至蓼音了水之上適遭無名人而問焉曰請問為天下無名人曰去汝鄙人也何問之不豫也使我不樂豫方將與造物者為人造物生人我因人以治人厭則又乘夫莽眇之鳥以出六極之外而遊無何有之鄉以處壙埌音浪之野汝又何帠音詣以治天下感豫之心為厭不屑也不屑遊人世思以出世乘莽眇出六極淩虛履空超陰陽也遊何有處壙埌造道域也欣厭在已出入無迹豈肯以天下為事汝又何帠以治天下感其心為又復問無名人曰汝遊心於淡合氣於漠順物自然而無容私焉而天下治矣遊心於淡常清靜也合氣於漠無聲臭也不見作為而無容私此上古之治也陽子居人名見老聃曰有人於此嚮疾敏於句道強梁勇於力行物徹知周物情疏明疏通明達學道不倦音倦如是者可比明王乎比猶及也老聃曰是於聖人也胥易胥徒之更番直事者技係工技之居肆係業者勞形怵心者也若人適人之適而不能自適其適勤於學道而不自適亦此類耳且也虎豹之文來田以皮之文致人之田獵猿音袁狙之便執斄音狸之狗來藉猿狙斄狗皆以有用而致藉係如是者可比明王乎則夫勞形怵心而為天下用者亦強梁疏明之所自取也陽子居蹴然攺容之貌曰敢問明王之治老聃曰明王之治功蓋天下而似不自已化貸施也萬物而民弗恃有莫舉名有高今古之名而莫可舉使物自喜化國之民日以舒立乎不測所存者神而遊於無有者也不測無有只是箇無為自然意鄭有神巫曰季咸善相者知人之死生存亡禍福夀夭期以歲月旬曰若神鄭人見之皆棄而走畏其言驗列子見之而心醉心服其能歸以告壺子曰始吾以夫子之道為至矣則又有至焉者矣壺子曰吾與汝既其文既盡也盡其外也未既其實未盡其內而固得道與與音余莊子論應帝王而言此者夫帝王之應世惟寂然不動故感而遂通若弊弊焉以天下為事則人得而相之矣衆雌而無雄而又奚卵焉卵胎于雌而朕于雄無雄之卵不可抱又奚以卵為兆呈于色而生于心無心則無兆而汝也以道與世亢必信夫故使人得而相汝汝未懷道則有心有心而亢張于外以取信于世故人可得而相之嘗試與來以豫示之明日列子與之見壺子出而謂列子曰嘻子之先生死矣弗活矣不以旬數矣吾見怪焉見濕灰焉如灰已濕而火已滅列子入泣涕沾襟以告壺子壺子曰鄉吾示之以地文將生機萌于九地之下萌乎不震不正是殆見吾杜德機也萌芽也震動也正定也日萌則似生不動又似死故曰不正杜者閉也德機即生意也嘗又與來明日又與之見壺子出而謂列子曰幸矣子之先生遇我也有瘳矣瘳愈也全然有生矣吾見其杜權矣權動也即權衡之權杜閉中動機已露列子入以告壺子壺子曰鄉吾示之以天壤先不曰地壤而曰地文此不曰天文而曰天壤用字之奇處遊心于虛空也名實不入而機發於踵是殆見吾善者機也諸無所有故名實不入只有一段生機自踵而發踵即真人之息以踵之踵人之湧泉穴也善機即生機猶言好機括也嘗又與來明日又與之見壺子出而謂列子曰子之先生不齊動靜不定吾無得而相焉試齊且復相之列子入以告壺子壺子曰吾鄉示之以太沖莫勝是殆見吾衡氣機也呂吉甫曰地文則陰勝陽天壤則陽勝陰太沖之氣莫之勝而不一是以疑其不齊莫勝則平猶平衡故謂衡氣機也太沖莫勝與天壤地文皆是觀名鯢言倪桓之審為淵鯢魚也桓盤桓也審處也淵靜深不測也鯢魚盤桓之處乃靜中微動喻天壤善者機止水之審為淵止水全然不動喻地文杜德機流水之審為淵水且流且止正得其平有衡之意喻太沖莫勝衡氣機淵有九名此處三焉機發于踵是鯢桓也不震不正是止水也不齊是流水也故日此處三焉言方示其三猶未盡其妙也嘗又與來明日又與之見壺子立未定自失而走壺子曰追之列子追之不及反以報壺子曰已滅矣已失矣吾弗及矣壺子曰鄉吾示之以未始出吾宗宗即禪家之本性道家之元神未始出者凝聚那點陽神下藏于氣穴之內即深根寧極是也季咸以其心而相人之心我無心則彼所心相者亦不能獨立故自失而走吾與之虛而委音威陀音陀不知其誰何不惟杜機不動併機亦無順化自然委委移移不可名狀因以為弚音頽靡因以為波流故逃也其止也因以為弚靡則莫知其為靡也其動也因以為波流則莫知其為流也求我于動止之間皆不可得此其所以逃也季咸見其尸居而坐忘即謂之將死見其神動而天隨即謂之有生誠能應不以心而理自玄符與化升降而以世為量然後足為物主而順時無極故非相者所可測耳此應帝王之大意也然後列子自以為未始學而歸三年不出以下直指學問真訣為其妻爨音竄食音嗣豕如食音嗣人於事無與親雕琢復朴塊然獨以其形立紛而封哉一以是終為其妻爨不知有妻食豕如食人不知有物于事無與親不知有人事也雕琢復朴即已雕已琢復歸于朴也塊然獨以其形立無情無為之貌紛而封哉不至紛而有封畛也一以是終終身以此為常也無為名尸無為謀府無為事任無為知主實者名之主吾韜其光無為名尸集思廣益所以聚謀吾黜其聰無為謀府激濁揚淸所以任事吾同其塵無為事任也為學日益所以求知吾示以地文無為知主也學道人必先有此四無而後可以入道最為喫緊體盡無窮而遊無朕盡其所受乎天而無見得亦虛而已凡人以形骸為體故體有窮而遊有朕至人以精神為體故體無窮而遊無朕盡其所受于天而無一虧損所見所得不為不多矣而彼不自以為見得也亦虛而已即顏子之實若虛也至人之用心若鏡不將不迎應而不藏故能勝物而不傷郭象曰若鏡者鑒物而無情也不將不迎不藏來即應去即止也物來即鑒鑒不以心故雖天下之廣而無神之慮即定觀經以有為為應迹以無為為真宅之意南海之帝為倏音叔北海之帝為忽中央之帝為渾沌倏與忽時相與遇於渾沌之地渾沌待之甚善倏與忽謀報渾沌之德曰人皆有七竅以視聽食息此獨無有嘗試鑿之日鑿一竅七日而渾沌死陸西星曰南海之帝火德也北海之帝水德也中央之帝土德也水能流火能焰故名之曰倏日忽士沖氣故名之曰渾沌此箇寓言卻是人身中法象五行四象全入中宮故中央之帝待之甚善為二帝者曰宜收聽返觀和合混融方為報德奈何以聲色香味報之日鑿一竅使人視聽食息七竅開而渾沌死乎此箇渾沌人人有之自形生神發之後知誘物化因六根而染六塵因六塵而起六識于是逐妄迷真去道日遠矣復圭子曰此章大旨木老氏王法天天法道道法自然來欲今之帝王合應亦如此也蓋齧缺問於王倪治天下之道四問而四不知含有不識不知順帝之則意烏知不知之非知耶謂有虞氏為藏仁以要人而未始出於非人其泰氏之卧徐徐而覺于于乎想此有道氣象舉止自如夢覺皆真渾然一天也而猶未始入於非人者何哉至道忘道故君人者經可已出義可已式度可已裁欲任此以化人而未必能化化也狂接輿之所謂欺德是已何異於涉海鑿河而使蚉負山乎聞聖王之治形端影端令人各正其性命未聞其知出於鳥鼠二蟲避害之下也猶未也不觀無名人身在造物之內神遊六極之外謂之出有入無也亦可謂之處壙埌之野也亦可不以天下為事者而強問以治天下之道彼未調天下之人而先調一已遊心於淡合氣於漠而已治矣順物自然而無容私焉而天下治矣猶未也陽子居以嚮疾疆梁物徹疏明者為學道不倦而比明王不知自聖人視之不啻如胥易技係之勞苦也亦猶虎豹之文而來田執𣀗之狗而來藉均之不能自適其適者也有道於此功高天下而已不居化貸萬物而民不恃不惟難名亦難測不惟無譽亦無迹老氏之所謂明王何容易哉鄭有神巫能知人之死生禍福者知無雄之卵雖衆雌不能抱也知鋒頴在外雖立覩易窺測也特皮相耳不知壺子能自為死生不聽造物為死生故季咸一見壺子而以為死矣豈知壺子將生意藏之於地文不震不定自杜其德機耳再見壺子而以為有瘳矣豈知壺子將生意升之於天壤機發於踵悉現其善機乎三見壺子而以為顏色不齊無可相焉豈知壺子示之以太沖莫勝不動不靜為衡氣機也壺子之道其有淵源乎機發於踵為鯢桓之淵不震不正為止水之淵氣色不齊為流水之淵壺子之九淵即淵泉而時出之淵僅露其三未罄其中藏也四見壺子望之而反走豈知壺子示之以未始出吾宗宗也者在道為太虛在天為斗杓在儒為一貫在玄為真主人翁在釋為本來面目未始出則深根寧極變化莫測相者將何處著眼乎故不得不逃列子於是見所見而來學其學而歸杜門不出者已三年矣為其妻爨食豕如食人忘物我也於事無親太朴已復志玄同也無為名尸名自去無為謀府謀不集無為事任事漸解無為知主知渾忘體無窮而遊無朕渾然一實若虛之至人也至虛莫如鏡物來而不著物去而不留任其自來自去而我不傷至人其庶幾乎南帝識主火德也火能明亦能燥故名倏北帝情君水德也水能澤亦能流故名忽中央黃帝正位居體土德也旺於四季火得之則熄水得之則止故其名為渾沌人身之水火會合於中宮之土故曰甚善報德之法無過於虛靜恬淡寂漠無為而已奈何投之以聲色臭味日鑿一竅未免魂漏于眼魄漏于鼻神漏于口精漏于耳意漏于四肢孔竅鑿至七日元神喪而識神用事一身皆純陰也故渾沌死矣不知復卦之陽以七日而來復大修行人乘此七日之後眼不視而魂在肝耳不聞而精在腎舌不聲而神在心鼻不香而魄在肺四肢不動而意在脾則五氣朝元矣此之謂報渾沌之德
