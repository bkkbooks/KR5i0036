body:
  text: 南華真經周漆園吏莊周著海陽復圭子程以寧注疏外篇駢拇第八道有內則有外內篇有題目外篇各以首句摘二字為題先言外而後及內故曰外篇所以發泄內篇未盡之旨也駢拇一篇謂凡有增滅造作無論善惡皆失本然之正也通篇一意駢連合也拇音某足大指連二指枝指手左右多生一指名曰枝指出乎性哉生而有之而侈多也於德非人所同得者故曰侈附贅餘肉縣音懸疣音尤癭瘤也出乎形哉生于有形之後而侈於性比于初生則為剩矣故亦曰侈多方多端也乎仁義而用之者列於五藏哉五性感動列于五藏以配五行而非道德之正也即駢枝附縣者皆為無用之物喻仁義多用者皆非道德之正設仁義之教以治五藏之情猶削駢枝贅疣也既傷自然之理更益其疾矣是故駢於足者連無用之肉也枝於手者樹無用之指也多方駢枝於五藏之情者淫過也僻偏也於仁義之行而多方於聰明之用也以大道觀仁義等于駢枝均一無用是故駢於明者亂五色淫文章靑黃黼白與黑黻黑與靑之煌煌非乎以駢明為非而離朱是巳黃帝時人百步見秋毫用明之人則以為是多於聰者亂五聲淫六律金石竹黃鍾大吕之聲非乎以多聰為非而師曠是巳晉樂師用聰之人則以為是離朱師曠自以為審音辨色為聰明之盡而不知大道之極𥥆𥥆冥冥昏昏默默何有聲音何有色象是以善體道者返視收聽喪耳忘目斂其聰明于不用而復歸于朴枝於仁者擢音濯拔也德塞性以收名聲謂拔擢德行茅塞性真以收取美譽使天下簧鼓以奉不及之法不及者難及也法禮法也言使天下同聲附和如笙鼓簧以奉此難及之法非乎以枝仁為非而曾史是已曾參史魚二子忠孝之盛亦以枝仁為是駢於辨者纍瓦滑稽如纍瓦結繩佶屈如結繩竄句點竄古人章句以自證遊心於堅白同異之間強辨之名求以自異而敝跬敝疲也跬音窺半步言解者之勞如疲敝者半步而行譽無用之言非乎言終其身勞于辨博以此無用之言互相推譽為非而楊朱墨翟是已以駢辨為是故此皆多駢旁枝猶言餘剩也之道非天下之至正也呂吉甫曰道在不言則辨非道也瓦貴鱗比而纍之繩貴條直而結之句所以通其讀而竄藏之心貴乎虛而遊于堅白同異之間敝行跬立以喻無用之言如纍瓦結繩然者此楊墨所以駢于辨也凡此皆非天下之至正也彼正正者不失其性命之情正正即易經各正性命之正自然而然之意今之駢枝于仁義者自謂正道而不知既曰駢矣枝矣非正正也彼正正者獨全其所受于天之實理故曰不失其性命之情情之言實也故合者不為駢不以枝為正則不以合為駢而枝者不為跂音岐不以合為正則不以枝為岐長者不為有餘不以短為正則不以長為有餘短者不為不足不以長為正則不以短為不足陸西星曰性命之情渾然天成隨賦各足無所謂合也故合之而不為駢無所謂枝也故枝之而不為岐無所謂長與短也故長者不見其有餘短者不見其不足是故鳬脛雖短續之則憂鶴脛雖長斷之則悲故性長非所斷性短非所續無所去憂也順性命之情者各適其適無所去憂也意音噫仁義其非人情乎彼仁義何其多憂也多憂謂畏天命悲人窮之類行仁義而多憂則與斷鶴續鳬者無以異矣且夫駢於拇者決斷也之則泣枝於手者齕音核齒斷也之則啼二者或有餘枝者於數或不足駢者於數其於憂一也有餘不足便有增減吾心無增減則無餘不足矣今世之仁人嵩目心有憂勞不欲瞪視故半閉其目其睫蒙茸如蒿故曰蒿目而憂世之患不仁之人決性命之情而叨音叨貪財曰叨貴富言善惡雖殊其憂一也故意音噫仁義其非人情乎自三代以下者天下何其囂囂也音譊喧雜之意言三代而後憂仁義者之多也且夫待鉤繩規矩而正者是削其性也待繩約膠漆而固者是侵其德也屈折禮樂屈折肢體以為禮樂之文詬音吁俞仁義詬俞顏色以為仁義之貌以慰天下之心者此失其常然也猶固然即自然之理正正者也詬俞者嫗撫之義天下有常然常然者常然者常常如此即道德也此道能曲能直能圓能方能固能束竟古竟今日囿于其中而不知也曲者不以鉤直者不以繩圓者不以規方者不以矩附離音麗不以膠漆約束不以纆音墨索之兩股者為纆索故天下誘然皆生而不知其所以生同焉皆得而不知其所以得誘然皆生生其形也而不知其所以生者常然生之也同焉皆得得其性也而不知其所以得者常然得之也故古今不二不可虧也虧則削性侵德矣則仁義又奚連連如膠漆纆索而遊乎道德之間為哉使天下惑也不二是一也不可虧則不可減矣不可減則不可增矣焉有不減不增不虧而可連續仁義以遊之哉祇足以惑人矣夫小惑易方不知東西南北大惑易性矜尚仁義變其常性此大惑也何以知其然邪自虞氏招仁義以撓亂也天下也天下莫不奔命於仁義是非以仁義易其性與音余易方不過以東為西易性則以無為有人生而靜招仁義以撓之是以仁義易其性也故嘗試論之自三代以下者天下莫不以物易其性也天下為仁義而易其性聖人為易天下而自易其性故三代以下未有不為外道易性者小人則以身殉利是以利易性士則以身殉名是以名易性大夫則以身殉家是以家易性聖人則以身殉天下是以天下易性故此數子者事業不同名聲異號其於傷性以身為殉一也起一殉心便是傷性的根蒂臧與穀二人相與牧羊而俱亡其羊問臧奚事則挾策音策執卷也讀書問穀奚事則博塞以遊投瓊曰博不投曰塞瓊猶今投子二人者事業不同其於亡羊均也制字者以羊從言為譱羊從大為美誠有取爾也故莊子以亡羊為大道之喻伯夷死名於首陽之下盜跖死利於東陵之上二人者所死不同其於殘生傷性均也奚必伯夷之是而盜跖之非乎人性上不可𣷹一物伯夷只為于性分上𣷹了箇為善念頭不能強其志也盜跖死利蓋不能強其骨也天下盡殉殺身以從曰殉也彼其所殉仁義也則俗謂之君子其所殉貨財也則俗謂之小人其殉一也則有君子焉有小人焉若其殘生損性則盜跖亦伯夷已又惡取君子小人於其間哉齊伯夷于盜跖非夷可貶也所以哀夷之生殘而性傷也進盜跖于伯夷非跖可褒也所以返已殘之生已損之性而聖狂同盡也然則讀南華者可不訪仙師道友而求所以全生保性乎哉且夫屬音燭附著也其性乎仁義者雖通如曾史非吾所謂臧善也也屬其性於五味雖通如俞兒黃帝時人即易牙能辨淄澠之水非吾所謂臧也屬其性乎五聲雖通如師曠非吾所謂聰也屬其性乎五色雖通如離朱非吾所謂明也吾所謂臧非仁義修行之謂也臧於其德渾然天成一而不分而已矣吾所謂稱也臧者非所謂稱述仁義之謂也任其性命之情而已矣不殉外物以喪真吾所謂聰者非謂其聞彼也聞彼為聞聲自聞而已矣自聞為聞性吾所謂明者非謂其見彼也自見而已矣夫不自見而見彼不自得而得彼者是得人之得而不自得其得者也得彼得外物自得為得性命之情適人之適而不自適其適者也適人為巧干涉世以悅人自適謂心曠神怡何所往而不自得也夫適人之適而不自適其適雖盜跖與伯夷是同為淫僻也禪家狂犬逐塊幻花又生幻果即是這箇彼字儒家默識默成不言而喻即是這箇自得自適淫者浸淫太過之義僻者頗僻一偏之義余愧乎道德莊老深得太上之道德而曰愧乎道德者大道不道大德不德也是以上不敢為仁義之操仁義即為道德之駢枝附懸故曰上不敢為仁義之操而下不敢為淫僻之行也此淫僻只是太過一偏之謂凡見彼得彼適彼皆淫僻也皆莊老之所不敢為也其所為者何在乎返聽之謂聰內視之謂明惟知保全吾性命而已矣安往而不自適也復圭子曰此章以道德為主宰性命為本體不增不減為面目仁義為駢拇枝指附贅縣疣何也大道廢而後有仁義仁義之盛乃道德之漓也吾欲屏仁義以還道德故必閉離朱之目而後人不傷于明矣塞師曠之耳而後人不傷于聰矣杜曾史之行而後人完其道德在我皆古之制矣蔽楊墨之口而後人遊于玄同太白若辱盛德若不足矣彼正正者不失其性命之情談何容易哉正正即的端也悟真篇云學仙須要學天仙惟有金丹最的端乃全性保命之術舍金丹而求長生皆旁門也非正正也安能不失其性命之情哉惟此正正之道可合而不可為駢可枝而不可為歧可長可短無不足惡用續無有餘惡用斷行仁義而多憂似與斷鶴脛續鳬脛者類矣三代以下為削其性而欲去鉤繩規矩為侵其德而欲去繩約膠漆勢既有所不能為失其常然而欲黜禮樂棄仁義夫人未必信丹經云人至死日為無常故常然者長生也即金丹也此物可曲可直可圓可方可固可束此物可以生人而人不知其生從何來此物人皆可得而人不知其得于何地故古今不二者一也一即金丹也純陽也不可虧也稍有虧損則非不二矣小惑者人猶可易一方術以指其迷而復其性若大惑者終身不解與之語金丹之大道必不見信併其常然之性而易之矣安能不失哉真人尊生保性忘利忘名忘家忘天下故不失其常然若夫人存一殉之之心雖殉利殉名殉家殉天下所殉不同而傷性則同猶之讀書與博塞不同而亡羊一也死名死利不同而夷與跖殘生傷性一也夫曾史與俞兒以仁義五味為嘉臧師曠與離朱以聲色為聰明豈知真人自有真臧不在仁義五味而在德與性命真聰真明不在聞彼見彼而在自聞自見何也自聞自見者返聽內視金丹雖自外來乃離宫真陽走入坎宫故真人借彼先天之母氣以伏吾身之子氣是得我之得而非得人之得金丹一得羽翰自生可以朝遊北海暮蒼梧是自適其適也視見彼得彼適彼者總之得人之得適人之適而不能自得其得自適其適也故上不敢為仁義之操懼為駢枝附縣也下不敢為淫僻之行懼與死名死利者同歸于盡也君子曰失道德而後有仁義無仁義則必有淫僻莊老雖不以道德自居不知仁義與淫僻對既不敢為仁義則必淫僻矣又不敢為淫僻必為仁義矣未有不仁義不淫僻而中立者莊老顯然居道德之中而不失其性命之正俯視世有拘拘以為仁義者陋亦甚矣外篇馬蹄第九此以用智治馬而馬失其常性以起用仁義以治民而開民爭利之端反失其常性馬蹄可以踐霜雪毛可以禦風寒齕音核草飲水翹足而陸馬立時每有一蹄跂立者此馬之真性也雖有義臺路寢即王者之宫室無所用之此喻人適真性不慕顯榮及至伯樂曰我善治馬伯樂天星名主天馬孫陽善馭馬故以名之燒之剔之刻之雒音絡之燒以鐵剔刻以刀雒以火印治蹄及馬腿者連之以羈音機馽音縶絡首曰羈絡足曰馽編之以皂音皂棧槽櫪也衆馬列于其間馬之死者十二三矣飢之渴之馳之驟之整之齊之排布其列前有橛馬銜飾馬纓之患而後有鞭策音策之威而馬之死者巳過半矣此喻人慕顯榮便失真性夫天下之物性有常然自適其適者可以養生可以盡年有意治之則不治矣治之為善斯不善也陶者燒窑者曰我善治埴磚瓦之坯圓者中規方者中矩匠人木匠曰我善治木曲者中鉤直者應繩夫埴木之性豈欲中規矩鉤繩哉然且世世稱之曰伯樂善治馬而陶匠善治埴木此亦治天下者之過也夫埴之就規矩與木之就鉤繩皆非本性是惟土木無知使其有知必以柔埏刻削為戕賊矣度之馬性亦猶是也而世有稱之曰伯樂善治馬陶匠善治埴木亦猶治天下者以傷民性而反謂之善治也吾意善治天下者不然彼民有常性織而衣耕而食是謂同德同得于天一而不黨均齊專一無所偏倚命曰天放曠蕩自適于天然之中即天行天鈞天遊之類故至德之世其行填填音田質而重也其視顚顚莊而寧也當是時也山無蹊隧澤無舟梁言水陸之路不通喻無他歧也萬物羣生連屬其鄉禽獸成羣草木遂長羣生咸若是故禽獸可係羈而遊鳥鵲之巢可攀援而窺人物兩忘夫至德之世國與禽獸居族與萬物並惡乎知君子小人哉同乎無知其德不離知識開則道德離同乎無欲是謂素朴情欲生則文飾繁素朴而民性得矣無知素朴便是常性故曰得及至聖人蹩音撇躠音泄為仁踶跂音提岐蹩躠踶跂皆勉強不安之意為義而天下始疑矣澶音但漫猶汗漫也流蕩之意為樂摘僻屈折奉持為禮而天下始分矣疑且分則黨而不一不一則太朴散故曰純朴云云故純朴不殘孰為犧樽白玉不毁孰為圭璋道德不廢安取仁義性情不離安用禮樂五色不亂孰為文采五聲不亂孰應六律夫殘朴以為器工匠之罪也毁道德以為仁義聖人之過也此一段説得天花亂墜令未聞道者應接不暇自道眼視之乃莊老追思上古之世神遊沕穆之風太朴未雕桴簣而土鼓污樽而杯飲禮樂未興文采未著犧樽圭璋何從來五色五聲何自至其三皇之臨蒞乎止有道德而無仁義降及五帝則不能不文明矣文明之開則聖人毁道德以為仁義之過斯有為犧樽以下六者之事而技巧不可勝窮矣以上皆是用人力非自然之喻工罪聖過總結上文下復即馬以喻而申言之夫馬陸居則食草飲水喜則交頸相靡相摩擦也怒則分背相踶馬之相踶必以足向後故分背馬知已此矣夫加之以衡扼衡轅前橫木縛軛者也扼加馬頸者也齊之以月題頭上額鏡如月者而馬知介倪介音戛倪音詣介倪猶睥闉扼闉音因曲也曲頸扼拒不受銜絡鷙猛也曼突也不受羈勒而相抵突也詭銜詐受其銜竊轡偷齧其轡故馬之知而能至盜者伯樂之罪也夫赫胥氏之時民居不知所為行不知所之含哺而熙鼓腹而遊民能已此矣及至聖人屈折禮樂以匡天下之形縣跂高揭張揚之貌若馬之翹足也仁義以慰天下之心而民乃始踶跂各聘趨向之若馬之詭竊者好知爭歸於利不可止也好知爭利便是死名死利之階此亦聖人之過也一句收煞全文三箇過字緊相呌應復圭子曰民與馬雖殊性也牧民與牧馬不殊道也故世有伯樂止可言知馬而不可言善治馬吾觀其燒剔刻絡羈馽皂棧之智多而馬有二三之死飢渴馳驟整齊鞭策之威備而馬有過半之死何以異于陶者誇其善治埴而圓中規方中矩乎何以異于匠人誇其善治木而曲中鉤直應繩乎不知加之以規矩鉤繩而埴木之性亦已離矣今之治民者法網密而趨避巧反自謂善治不知其琢民性也實多故善治者知織衣耕食民之常性也一而不黨天之所放也遐思至德之世民有填填之行顚顚之視而山無蹊隧之迹澤無舟梁之通故禽獸得以成羣草木得以遂長禽獸可係羈而遊物不為人害也鳥鵲可攀援而窺人不為物害也人可與禽獸雜居族可與萬物並處天下盡君子也惡知有君子天下無小人也惡知有小人惟其無知所以有德同乎無欲所以素朴素朴而民性得矣治天下者至今法之可也奈何聖人以仁義強天下而天下之心始疑以禮樂強天下而天下之心始分疑與分而太朴散矣朴散則為器夫人盡知犧樽圭璋之為宗廟光也孰知殘純朴毁白玉之為識者悼乎人盡知仁義禮樂之為全民用也孰知廢道德離性情之為至人憂乎人盡知文采六律之悅耳目也孰知亂五色淆五聲之為大雅傷乎總之無工匠則太朴不殘無聖人則道德不毁兩者皆譏吾尤不能不為聖人過也欲知聖人治人之過與伯樂治馬之過將無同乎伯樂非不知食草飲水馬之性也非不知喜則交頸相靡怒則分眥相踶馬之知也然而猶必以衡扼銜轡相加者恃其治之之巧故不必服而求良伯樂之罪也此不可使聞于赫胥氏之時其民何民也居則忘知行則忘行含哺而熙鼓腹而遊此何等氣象也禮樂未攖其心仁義不感于懷道德存而民性全也及至後世聖人有禮樂以正其身而祇以啓民之好智有仁義以安其心而祇以啓民之爭利智識多則瓦解之象著利風競斯土崩之禍成回視至德之世聖人固功之首而實罪之魁也外篇胠篋第十通篇主意以聖智治天下便有盜聖智者以仁義治天下便有盜仁義者不如兩亡而盜自不生乃可還世道於醇龎將為胠音袪開也又云脅也從篋之脅旁開而取物也篋探以手取物囊發亦開也匱之盜而為守備則必攝緘縢纒之類固扄音穹管鑰也鐍音決鎖也此世俗之所謂知也本為鼠竊之備然而巨盜至則負匱揭舉也篋擔囊而趨唯恐緘縢扄鐍之不固也併挈而去亦欲其固然則鄉之所謂知者今乃為大盜積者也從旁説來故嘗試論之世俗所謂知者有不為大盜積者乎所謂聖者有不為大盜守者乎言世俗所謂聖知者有如此真聖知者固不然也何以知其然邪昔者齊國鄰邑相望雞犬之音相聞罔乂之所布耒耨之所刺方二千餘里闔四境之內所以立宗廟社稷治邑屋州閭鄉曲者曷嘗不法聖人哉然而田成子齊大夫陳恆也一旦殺齊君簡公而盜其國割安邑以東至琅琊自為封邑所盜者豈獨其國邪并與其聖知之法而盜之齊國私量大而公量小田成以私量貸于民而以公量入于已是借聖智之法以濟其竊國之私即借聖知之心以為盜也故田成子有乎盜賊之名而身處堯舜之安借聖人之法以濟其盜賊之謀小國不敢非大國不敢誅十二世有齊國自田敬仲至齊威王凡十二世則是不乃竊齊國并與其聖知之法以守其盜賊之身乎觀齊田之竊國盜跖之用智皆聖人立法以招之嘗試論之世俗之所謂至知者有不為大盜積者乎所謂至聖者有不為大盜守者乎加二至字至知至聖又深一步説何以知其然邪昔者龍逢斬桀殺比干剖紂剖萇洪肔音耻裂也又云刳腸曰肔周靈王賢臣子胥靡音迷吳王夫差賜劒以死爛之江中故四子之賢而身不免乎戮賢者不足以自恃而竊聖道者或以自利故跖之徒問於跖曰盜亦有道乎跖曰何適而無有道邪夫妄意室中之藏聖也入先勇也出後義也知可否知也分均仁也五者不備而能成大盜者未之有也為盜者必有五德而後能服羣盜由是觀之善人不得聖人之道不立跖不得聖人之道不行天下之善人少而不善人多則聖人之利天下也少而害天下也多聖道不為害盜賊用之則為害故曰唇竭則齒寒魯酒薄而邯鄲圍楚伐魯以其酒薄也梁伐趙以魯不得援也聖人生而大盜起掊擊聖人縱舍盜賊而天下始治矣泛言天下無聖人則盜跖不識道而竊五德以為盜矣非真謂屏聖而容盜也夫川竭而谷虛邱夷而淵實竭涸也夷平也郭象曰竭川非以虛谷而谷虛夷邱非以實淵而淵實喻聖人之法不為盜設而反為盜賊之資聖人已死則大盜不起天下平而無故矣止盜在去欲不在彰聖智聖生盜起聖死盜止只是説大盜能假法以濟其私凡喻利小人皆是也聖人不死大盜不止雖重復出也聖人而治天下則是重利復有所資益盜跖也向秀云聖人不死言守故而不日新牽名而不造實也大盜不止不亦宜乎為之斗斛以量之則并與斗斛而竊之一法立便一姦生以下皆所以明苟非其人雖法無益為之權衡以稱之則并與權衡而竊之權稱錘衡稱衡也為之符璽符音浮符節也又軍符古以竹為之後人用銅各留其半璽音徙天子印章以信之則并與符璽而竊之為之仁義以矯之則并與仁義而竊之何以知其然邪彼竊鉤者誅鉤腰帶之鉤金也竊之小者有司猶得以按法而加誅竊國者為諸侯竊之大者人不得而誅反得國而為諸侯諸侯之門而仁義存焉則是非竊仁義聖知邪既為諸侯亦以仁義守之故逐於大盜大盜既竊法而得國故人人逐此而為之揭昭揭也明假此以圖諸侯之國諸侯竊仁義並斗斛權衡符璽之利者深遂其貪得之願雖有軒冕之賞弗能勸斧鉞之威弗能禁盜以得失為利病不以勸懲為榮辱故難改其盜竊之心此重利盜跖而使不可禁者是乃聖人之過也立法之過故曰魚不可脫於淵國之利器不可以示人魚失淵則為人獲利器明則為盜資故不可示人彼聖人者天下之利器也非所以明天下也諸氏云聖人當作聖知蓋聖人立法而使人竊法者總是不該以利器示人也但天下既知利器又從而愚之亦不能故絶聖棄知大盜乃止擲音擲投棄之也玉毁珠小盜不起焚符破璽而民朴鄙掊斗折衡而民不爭殫音丹盡也殘天下之聖法而民始可與論議陸西星曰此為天下遏絶亂源絶聖棄知絶仁棄義本老子又云不貴難得之貨使民不為盜殫殘謂盡去也盡去聖法則民返于素朴故始可與論道大抵此等説話皆不可與局士道之擢取也亂六律鑠音灼絶竽瑟塞瞽曠之耳而天下始人含其聰矣滅文章散五采膠離朱之目而天下始人含其明矣毁絶鉤繩而棄規矩攦工倕之指而天下始人有其巧矣故曰大巧若拙大巧若拙雖是承巧一邊説來其實有許多含蓄削曾史之行鉗楊墨之口攘棄仁義而天下之德始玄同矣同歸于玄妙彼人含其明則天下不鑠矣鑠消散也不見可欲而心不亂人含其聰則天下不纍矣不聽是非而心不動人含其知則天下不惑矣人含其德則天下不僻矣彼曾史楊墨師曠工倕離朱者皆外立其德皆役心于外以立其德而以爚亂天下者也爚音約火光也謂薰灼而撓亂之此數人者自逞其巧使天下躍而效之未免失其故我則彼為亂主矣法之所無用也若夫法之所用者不過視止于見耳止于聞事止于能智止于知德止于得安用立所不逮于性分之外使天下奔馳而不能自反哉子獨不知至德之世乎厯引崇古帝王皆無為而為者言古者以見今之不然昔者容成氏大庭氏伯皇氏中央氏栗陸氏驪音犁畜氏軒轅氏赫胥氏尊盧氏祝融氏伏羲氏神農氏當是時也民結繩而用之甘其食美其服樂其俗安其居鄰國相望雞狗之音相聞民至老死而不相往來自民結繩至此皆老子之言若此之時則至治已今遂至使民延頸舉踵曰某所有賢者贏音盈裏也負也糧而趨音趨之暗指孔孟下及蘇張則內棄其親而外去其主之事足迹接乎諸侯之境車軌結乎千里之外則是上好知之過也好知者以智謀相尚也上誠好知而無道好知則非自然之道故云無道則天下大亂矣高下相傾長短相形而天下日益多事矣何以知其然邪夫弓弩畢弋機變之知多則鳥亂於上矣鉤釣鉤餌魚餌網魚網笱音苟以竹取魚之知多則魚亂於水矣削格所以施網羅也羅落兔罘音浮翻車網之知多則獸亂於澤矣知詐漸毒以知相詐積漸成毒也頡即詩云飛而上曰頡滑滑即滑稽也堅白堅執以為白而辨之者解垢解散其紛如垢之脫也同異合異為同皆公孫龍之書之變多則俗惑於辨矣故天下每每大亂罪在於好知故天下皆知求其所不知務外以求異而莫知求其所已知者不知求其自然易曉者皆知非其所不善非指人也而莫知非其所巳善者不知巳之所是者亦非也是以大亂此正頡滑堅白解垢同異之生亂故上悖薄蝕日月之明下爍崩竭山川之精中墮毁隳四時之施喘耎音軟微息而動之物蝸牛之屬之蟲肖翹飛揚之物蝶蛾之屬之物莫不失其性甚矣夫好知之亂天下也自三代以下者是巳試觀三代而下至于春秋戰國何等氣象安得不傷今而思古也舍夫種種不識不知皆種種生來合下之氣象之民而悅夫役役人趨而趨人諾而諾也之佞佞則純用口舌以悅人矣釋夫恬淡無為而悅夫啍啍之意傳曰多事生之讐多言德之賊役役多事者也啍啍多言者也啍啍已亂天下矣舍夫種種以下六句括盡一篇辭意復圭子曰莊老慨道德漓而世教衰思已凋已琢復歸于朴所以發揮老氏絶聖棄智民利百倍絶仁棄義民復孝慈絶巧棄利盜賊無有之意傷為治者不能弘道德以公天下之情使天下紛紛皆為利往天下逐逐皆為利來小則有胠篋探囊發匱之盜大則有負匱揭篋擔囊之盜何也世俗之聖智祗以為大盜資耳而真人之聖智則不然夫盜貨之大盜猶其小也又有盜國之田成子不惟盜其土田以享其利且盜其聖智之法以守其國昔者龍逢比干萇洪子胥四子實有聖智之名反以殺其身盜跖無其名盜仁義聖智勇之五德反以成大盜則聖人也者善人竊之以成其善惡人竊之亦以濟其惡天下之善人少而不善人多則聖人之利天下也少而害天下也多故曰唇竭則齒寒魯酒薄而邯鄲圍由唇齒魯趙之事而觀之則人知聖人原以化盜不知聖人所立之法反以生大盜末世法網太密吾而剖擊聖人之法欲其效天網之恢恢也末世盜賊成市吾而縱舍盜賊之𡨚欲其效解網之遺風也真川竭而谷自虛邱夷而淵自實矣聖人之法已死而不用則大盜必無有竊其法者聖人之法猶存而不死則大盜必侵侵起矣故聖人之法愈多則盜跖愈得之以為口實也一法立斯一姦生斗斛權衡符璽仁義聖人所以防天下之偽而大盜并飾偽以掩真矯非以為是竊鉤者可誅而竊國者無誅况諸侯之門而竊仁義聖智者不獨一齊國為然厯觀四海九州不一姓也分茅錫壤不一君也豈非逐于大盜以竊國者比肩雖有軒冕弗能勸斧弗能禁也故曰魚不可脫于淵國之利器不可以示人欲復開闢之初其國無帥長故絶聖棄智大盜乃止其民無嗜欲故摘玉毁珠小盜不起其俗無疑信故焚符破璽而民朴鄙其時朴未殘為器故掊斗折衡而民不爭其風不知畏忌故殫殘天下之聖法而民始可與論議不如塞師曠之耳欲反聽也我返聽則天下含其聰而不纍矣膠離朱之目欲內視也我內視則天下含其明而不鑠矣攦工倕之指不作無益以害有益也而天下始人有其巧而不惑矣削曾史之行鉗楊墨之口攘棄仁義而天下之德始玄同矣吾猶及記至德之世自容成氏而下神農氏而上凡十二帝也結繩之風不改甘食美服樂食安居國有雞狗之音而民無往來之勞何今世之人日以奔競為事疏其所親而親其所疏諸侯掃榻以迎辨士方軌而至豈非上人好智之過乎好智而無道天下于是浸浸大亂矣但以機心生而機事起機事起而機禍深于是有弓弩笱且不之事遂使鳥亂于上魚亂于水獸亂于澤蠕動之物咸失其性而又遊説之士簧鼓人心方之弓弩弋其禍尤慘胡為天下皆知求其所不知索之于玄遠也而不知求其所巳知失吾心之真聰明也皆知非其所不善為狂為愚也而不知非其所巳善聖智仁義也是以不祥上應造化下及昆蟲矣卒舍種種無知之民而悅奔競諛佞之風釋夫恬淡淸虛之理而悅啍啍多言之意不知啍啍之亂天下也何時已哉使司世道者人人而如漆園之用心也何患世界之不太古乎外篇在宥第十一此篇以至道全身以無為治天下復自無為中翻出有為又自不可不為者而為之以不為方為在宥聞在宥天下不聞治天下也在者優遊自在之義宥者生養自得之義言民有常性為人上者只宜在之宥之使之自得不可以法制整齊之在之也者恐天下之淫凡所為過甚皆謂之淫其性也宥之也者恐天下之遷移于外物其德也性德兩字皆自然之理三教同歸天下不淫其性不遷其德有治天下者哉言不必用治也昔堯之治天下也使天下欣欣焉人樂其性是不恬也人性上不可添一樂字樂則不恬靜桀之治天下也使天下瘁瘁焉人苦其性是不愈也人性上不可添一苦字苦則不愈樂夫不恬不愈非德也而可長久長治久安者天下無之欣欣焉不恬靜者不在之之故瘁瘁焉不愈樂者不宥之之故人大喜邪毗益也助也有餘之病於陽大怒邪毗於陰陰陽井毗四時不至順也寒暑之和不成調也其反傷人之形乎氣序乖則生病使人堯桀使人如此喜怒失位居處無常思慮不自得方寸長戚戚中道不成章作事半途而廢不成條理氣候失宜則傷形性德淫遷則傷自然之理蓋至是而民之失其常性者多矣於是乎天下始喬音矯好高過當詰責人過密而窮辨也卓特立過亢鷙鉏擊過猛而後有盜跖曾史之行雖善惡不同總是失真亂性之民君人者分善惡以定賞罰也盜跖曾史只是替換賢不肖字面故舉天下以賞其善者不足舉天下以罰其惡者不給故天下之大不足以賞罰自三代以下者胸胸猶洶洶奔兢如波濤相逐焉終以賞罰為事彼方趨賞避罰之不暇彼何暇安其性命之情哉欲安其性命之情者置其賞罰在之宥之而後天下之性可得也而且説音悅明邪是淫於色也有心而好之之調悅説聰邪是淫於聲也性命之情不特為賞罰之所亂何也淸靜之中不著一物達天德者以為應迹過而不留不知者從而悅之即此愛悅之心反生理障故悅明悅聰是淫于色聲也説仁邪是亂於德也説義邪是悖於理也德者天德理者天理皆出自然有心以為仁義則為悖為亂如金屑眼中砂景星慶雲皆非太虛中所宜有者亦是此意説禮邪是相於技也説樂邪是相於淫也相助也技謂伎倆淫謂滋荒是荒于樂也説聖邪是相於藝也説知邪是相於疵也藝謂才能蓋世有以多能為聖者疵謂疚病知詐漸毒則疵癘漸多天下將安其性命之情之八者明聰仁義禮樂聖智存可也亡可也安于自然雖有不為纍天下將不安其性命之情之八者乃始臠音欒卷曲束之貌傖音倉囊多事之貌而亂天下也而天下乃始尊之惜之不以為亂反尊崇之愛惜之甚矣天下之惑也豈直過也而去之邪乃齊戒以言之重談其事跪坐以進之敬望其傳鼓歌以儛之歆慕愛樂手舞足蹈吾若是何哉夫若是矣吾其如之何也以上反説以下正説在宥天下只是養身故君子不得已而臨蒞天下莫若無為無為二字乃一篇之宗旨無為也而後安其性命之情故貴重也以身為天下貴已之身為天下之身則可以託天下而後天下可以託之愛以身為天下愛我之身為天下之身則可以寄天下而後天下可以寄之故君子苟能無解其五藏解分解也五藏五性也無擢其聰明擢抽拔也無拔出聰明以先天下尸居而龍見尸居獨處未變化也而天下之變化存焉故龍見不在田而在尸居淵默而雷聲淵默靜存無震驚也而天下之震驚出焉故雷聲不在天下在淵默神動而天隨我之神甫動于此而彼之天輒契乎我如谷之傳聲影之隨形也從容無為而萬物炊纍焉吾又何暇治天下哉炊如以息相炊之炊纍微塵纍聚也炊纍若遊塵之自動言萬物同此天機自作自息吾任之而巳何暇治哉崔瞿問於老聃曰不治天下安臧善也人心老聃曰汝愼無攖拂亂也人心人心排下而進上排抑之則墜下引進則向上上下囚殺上下無常煩惱妄想其係如囚恐怖如殺淖音綽約柔乎剛強淖約柔也所謂至柔能制至剛廉嵗刊干音貴雕琢廉嵗刊干是廉隅圭角也雕琢是磨礱也少年圭角以涉世磨礱殆盡其熱焦火起燥急心其寒凝冰起戰兢心其疾俯仰之間而再撫四海之外語其奔兢之疾則一俯仰之間而再臨乎四海之外其居也淵而靜其動也縣而天僨驕而不可係拘制也者其唯人心乎居而未動也其靜如淵其既動也則懸隔如天如淵天淵懸絶也此人心忿戾驕亢不可制伏之狀故曰無攖也昔者黃帝始以仁義攖人之心堯舜法之於是乎股無胈音跋作紱蔽膝也薄于自奉脛無毛勞于跋涉以養天下之形愁其五藏苦其心也以為仁義矜其血氣束其筋骸以規法度然猶有不勝也不勝便是人各有心人人鬬智矣堯於是放歡兜於崇山南裔之山投三苗即叨餮也於三峗西裔之山流共工官名即窮奇也於幽都北裔此不勝天下也又無奈天下何堯舜且然夫施及三王而天下大駭矣駭其放伐下有桀跖不仁不義上有曾史行仁行義而儒墨畢起於是乎喜怒相疑同已則喜異已則怒愚知相欺懷知而不以相教善否相非自是而不肯相下誕信相譏誠偽互有其黨而天下衰矣玄同之德衰大德不同而性命爛漫矣爛者糜爛也猶腐壞也漫者澶漫也猶泛濫也德本大同人人共一性命皆可以長存自大德不同旁門誤人種種而性命之真喪矣天下好知而百姓求竭矣殫盡思慮應接不暇於是乎嚴刑重罰皆以有心防有心者釿音斤鋸音句制焉繩墨殺彈正而後琢削之是殺也焉椎音槌鑿決潰也焉肉刑故用椎鑿皆是重其刑罰天下脊脊音籍猶相踐籍也大亂罪在攖人心聖人既以重刑威天下而亂之所由生也罪在于以仁義攖人心故仁義窮而刑罰用亦熱之所必至者故賢者伏處大山嵁嵓之下而萬乘之君憂栗乎廟堂之上孤立無輔今世殊死非罪者相枕也事不同而同以死斷者桁楊長械也所以錮人之頸及脛者者相推也刑戮者相望也而儒墨乃始離跂足半離地攘臂露臂肆口而談乎桎梏之間意音噫歎詞甚矣哉其無愧而不知耻也甚矣吾未知聖知之不為桁楊接摺械中橫木用桁楊必用接摺也仁義之不為桎梏鑿枘也音鋭枘員而鑿方所以制桎梏者其事相須有仁義聖知必招罪戾儒墨恐難僥幸苟免也焉知曾史之不為桀跖嚆音蒿矢也今之響箭猶言先聲故曰絶聖棄知而天下大治黃帝立為天子十九年十地數陰也九天數陽也前庖丁十九年此又曰十九年皆寓陰陽二意以為下文欲官陰陽取天地之精張本令行天下聞廣成子在於空同山名之上故往見之曰我聞吾子達於至道敢問至道之精此精即無極也即元始之祖氣也為造化之根抵其精以治身而緒餘可以治天下國家人能得之則宇宙在手吾欲取天地之精精者先天一氣也取精之法安在吕祖曰掘地尋天見天光種得金花果是強而玄門又有採日精月華之法以佐五穀以養民人吾又欲官陰陽以遂羣生官謂陰陽為我之官無不效職而順令也陰陽既調則羣生自然各遂其性矣為之奈何廣成子曰而汝也所欲問者物之質也質者未散之朴也而汝也所欲官者物之殘也殘者朴散之器也自而汝也治天下雲氣不待族而雨草木不待黃而落族聚也雲行則雨施者常也草木必黃而後落者理也今皆不待先時而至乃陰陽不調之故日月之光益以荒矣荒廢也日月薄蝕以身占之則耳目先病矣而佞人之心翦翦者又奚足以語至道翦翦二字説盡殘物心事便捷貌急遽求成之謂黃帝退捐天下築特室席白茅間音間居三月復往邀之廣成子南首而卧黃帝順下風膝行而進再拜稽首而問曰聞吾子達於至道敢問治身奈何而可以長久廣成子蹶驚而起然而起曰善哉問乎不問治天下而問治身故善之來吾語汝至道至道之精精神也𥥆𥥆冥冥不落形象至道之極精神之極處昏昏默默不著聲臭無視無聽此道視之而不見故無視聽之而不聞故無聽抱神以靜形將自正天君泰然則百體從令也必靜必淸無勞女形無搖女精乃可以長生靜為坐功之本故必靜也然心源不淸恐有坐馳之病故必淸也勞汝形則不能靜矣搖汝精則不能淸矣故曰無勞云云長生久視道在此矣目無所見耳無所聞心無所知女神將守形形乃長生要之多視則精搖於目亂聽則精搖于耳多知則精搖于心故無視無聽無知則精不搖而神自寧神形之主也常守其形則形不壞而長生愼女內閉女外多知為敗愼汝內握固其神也閉女外關鍵其耳目也多知為敗泯絶其思慮也然而道有陰陽不可不知也我為女遂於大明至陽也之上矣至彼至陽之原也為女入於𥥆冥至陰也之門矣至彼至陰之原也為汝遂于大明之上矣則見至陽其赫赫乎而至彼至陽之原則赫赫者發乎地為汝入于𥥆冥之門矣則見至陰其肅肅乎而至彼至陰之原則肅肅者發乎天天地有官陰主靜而陽主動天地有官陰陽有藏陰含陽而陽含陰陰陽有藏愼守女身物將自壯我守其一一即先天真一之氣金丹也以處其和得天地沖和之氣故我修身千二百歲矣吾形未嘗衰黃帝再拜稽首曰廣成子之謂天矣廣成子曰來余語汝彼其物道也無窮不變也而人皆以為終不識陰陽則此生有涯彼其物無測不滯也而人皆以為極不知養生遂以為有盡得吾道者上為皇而下為王上德行無為之道而為皇下德行有為之道而為王失吾道者上見光而下為土見日月之光而生入土壤之間而腐今夫百昌昌盛也猶言百物皆生於土而反於土不止于人百物皆然臭腐化而為神奇神奇化而為臭腐故余將去汝離塵俗之意入無窮之門以遊無極之野猶言天地之外吾與日月參光與日月合其明吾與天地為常與天地合其德當我緡乎當迎也緡絲之合而為緡也人有當而迎我者知愼汝內閉汝外之道其形猶緡愈引愈長遠我昏乎遠我而去者便不知陰陽而昏暗矣與之言長生之道必不信也人其盡死而我獨存乎人盡死遠我之人也我獨存存于守一以處和也雲將雲也東遊過扶搖之枝風也一云東海神木而適遭鴻蒙元氣也鴻蒙方將拊音甫脾音陛跳躍自得爵躍而遊雲將見之儻然止自失貌贄然立拱立貌曰叟何人邪叟何為此鴻蒙拊脾爵躍不輟對雲將曰遊雲將曰朕願有聞也鴻蒙仰而視雲將曰吁雲將曰天氣不和地氣鬱結六氣不調四時不節今我願合六氣之精以育羣生為之奈何鴻蒙拊脾爵躍掉音吊頭曰吾弗知吾弗知雲將不得問又三年東遊過有宋之野而適遭鴻蒙雲將大喜行趨而進曰天指鴻蒙忘朕邪天忘朕邪再拜稽首願聞於鴻蒙鴻蒙曰浮遊不知所求猖狂放佚之狀不知所往遊者鞅掌詩云鞅掌失容也言事煩勞不暇為容儀也以觀無妄朕又何知以猖狂之偽世而欲觀無妄之真機甚不相入故終以為不知也雲將曰朕也自以為猖狂而民隨豫所往朕也不得已於民不能却其從今則民之放效法也也願聞一言鴻蒙曰亂天之經經常逆物之情常情玄天弗成不成就也解獸之羣而鳥皆夜鳴解散也機心一動致烏皆夜驚而鳴災及草木禍及昆蟲有為之治足以治人噫治人之過也有心治人之過雲將曰然則吾奈何鴻蒙曰噫毒哉仙仙乎言三代以下流毒長久歸矣猶言子姑去也雲將曰吾遇天難願聞一言鴻蒙曰噫心養言汝此心自養便是汝徒處無為而物自化見不必亂天之經逆物之情自有無為而可以化物墮爾形體吐爾聰明倫與物忘言不分倫類與物相忘大同乎涬音幸溟無氣之始解心釋神解去有心釋去識神莫然無魂此魂乃識神遊魂也識神既解釋則遊魂自無萬物云云各復其根各復其根而不知萬物云云猶言種種也比道德經多一萬字則不止草木併人在內矣常人以丹田為根特一呼一吸後天之根也而先天之根則五行不到處父母未生前所謂先天之祖氣是也須復其根如嬰兒之不識不知渾渾沌沌終身不離若彼知之乃是離之若鑿竅而有知則渾沌死而大道離無問其名無窺其情物固自生物本無名我不生分別而問其名物本無情我順其常然而不窺其情則物固復根而自生矣物即道也雲曰天降朕以德示朕以默躬身求之乃今也得再拜稽首起辭而行前面皆矯世俗絶之談人多以為異已故下文便説世情世俗之人皆喜人之同乎已而惡人之異於已也同於已而欲之異於已而不欲者以出乎衆為心也其心以為巳之聞見同出于衆人人不得議我夫以出乎衆為心者以同出乎衆為心曷常出乎衆哉何常超出于衆哉因衆以寧所聞因衆人之聞見以穩妥自已之聞見不如衆技衆多也矣而欲為人之國者此攬音覽乎三王之利仁義聖智之利而不見其患者也仁義聖知之害此以人之國僥幸也幾何僥幸而不喪人之國乎其存人之國也無萬分之一而喪人之國也一不成而萬有餘喪矣決辭悲夫有土者之不知也夫有土者有天下有大物也崇高莫大乎富貴有大物者不可以物物不可以主宰綱維乎是物而不物而不物于物者故能物物故能主宰綱維乎是物也明夫物物者之非物也苟明夫主宰綱維乎是物者之非物也豈獨治天下百姓而已哉出入六合遊乎九州獨往獨來元神默運是謂獨有與天為一獨有之人是之謂至貴視大物之貴不可同日而語大人之教下三句狀其無情之感若形之於影聲之於響有問而應之盡其所懷扣兩端而竭焉之意為天下配與人相合而各得其宜也處乎無響寂以符感也行乎無方因人變化也挈汝適擕天下而適道也復來也之往也撓撓擾以遊無端往來自如撓撓以遊無極也出入無旁獨往獨來無所旁依與日無始凡物有始則有終無始則無終頌論形軀合乎大同與大道吻合大同而無已無我也無已惡乎得有有以有為有覩有者以有為有者昔之君子指三代以下聖賢覩無者以無為宗天地之友仙佛是也非獨有之人孰能與于此哉因上覩有覩無之説又恐人截然分有無為兩端故下文語上而不遺下語理而不遺物觀在宥結尾篇議論何常與吾儒異乎賤而不可不任用也者物也卑而不可不因者民也承上貴字説來道為貴則物為賤然物終不可遺也故不可不任道為尊則人為卑然終不能離人也故不可不因因相依也匿隱昧也而不可不為者事也粗而不可不陳者法也道明而事昧終不可以其昧而謝絶之故曰不可不為道精而法粗終不可以其粗而廢弛之故曰不可以不陳者遠而不可不居者義也親而不可不廣者仁也義主分別似與渾然之道相遠然却不可不居道本無親疏仁雖主于親愛然亦不可不廣節而不可不積三千三百非一時一人之力可為故曰積者禮也中大中也而不可不高者德也禮主節文似乎強世然却不可不積德雖人所同得然亦有卓然自立處故曰不可不高一而不可不易者道也神而不可不為者天也道本至一然却與時變通故曰不可不易天雖至神然天道遠人道邇人事却當自盡故曰不可不為故聖人觀於天而不助不助長則為而不為成於德而不纍無心積纍德不期崇而自崇出於道而不謀有心圖度則失道之自然不謀是率性之謂道矣會於仁而不恃有所恃則有邀結于民非仁也不恃是利之而弗庸矣薄於義而不積可義可不必義薄于義也變而通之不積則不蹈襲取之弊應於禮而不諱自然應禮非由忌諱也接於事而不讓當行則行無所退縮也齊於法而不亂與民畫一無心更張也恃於民而不輕民雖可特不輕身以徇民因於物而不去物雖可因不徇物以喪真物者莫足為也而不可不為不為之為為而不為便是無為不明於天者不純於德不通於道者無自而可天乃德之原故學不知天即抱一察以自好干德必不純道乃事之宗識不通道即見聞極博知風不知自安所往而可不明於道者悲夫何謂道有天道有人道無為而尊者天道道心也有為而纍危也者人道人心也主者即是道心為主天道也臣者即是人心聽命人道也天道之與人道也相去遠矣不可不察也甚言人當無為不當有為復圭子曰莊子學本老子自太上而下道德無有出其右者也後世玄宗禪伯咸取則焉聞天下止可在之宥之而不可以法治之夫人人而自在毋以多事搖之則性全何恬淡也人人而安宥毋以作為害之則德存何愈快也人知樂性是不恬而寧知苦性為不愈堯桀之所同病也夫有恬愈則有喜怒矣喜怒過甚者必毗于陰陽而召寒暑之不和顚倒人之思慮于是天下始有悍佞狂聖之不同因有賞善罰惡之殊術此以法治天下而不能在宥天下者也安能保其性命之不傷哉將欲治之以聰明仁義而適以溺于聲色叛于德理將欲治之以禮樂聖知而適以近于技淫蹈于藝疵使八者而有益于性命猶不關係乎存亡况八者而無益于性命而天下尊之信之誦之讀之鼓之舞之歌之咏之何為者哉八者皆有為也而愈不治則莫若無為無為而性命之情得矣必先知貴愛吾身之性命而後可以託寄天下之性命內葆其五性外塞其聰明不動不言而龍見寓于尸居雷聲藏于淵默吾之神動于此而人之天隨於後從容無為而萬物咸得其所如吹纍焉在之宥之也非暇治之也崔瞿以治天下而後能臧人心老子何為曰汝愼毋攖人心夫人心方寸耳可排之而下亦可進之而上可繫之如囚亦可制之使殺可以淖約而柔剛強亦可以廉嵗刊干而施雕琢可以不火而熱亦可以不寒而氷近可使之遠遠可使之近靜可使之動動可使之靜可內可外可淵可天人心之僨驕而不可制有如此昔黃帝之與唐堯俱以仁義攖人心規法度而不勝施及三王放伐逆施而天下大駭自桀跖曾史出而儒墨紛紛起矣於是有喜怒愚知相疑相欺也者有善否誕信相非相譏也者盛世寧復有此乎吾見人各德其德而性命之真喪矣人各懷一知而百姓之求竭矣復有釿鋸繩墨椎鑿之加而天下愈不可支矣夫聖知仁義曾史所以制法而安天下性命之情然而法有所不及施則謂聖知之為桁楊接摺也可謂仁義之為桎梏鑿枘也亦可謂曾史之為桀跖嚆矢也亦可總之治天下不如先治吾身故黃帝謁廣成子於空同之上欲取精於天地而養民人官陰陽以遂羣生廣成子不輕以至道告之者何也為黃帝之治陰陽未調以致雲氣不族而雨草木不黃而落日月有薄蝕之患而安足以語至道黃帝於是退而齋戒復稽首於廣成子而問治身長久之道廣成子曰至道之精𥥆𥥆冥冥無象也至道之極昏昏默默無聲也無視無聽者內視而返聽也抱神以靜心若稿木也形將自正形若死灰也人心好靜必靜而後不牽於欲人神好淸必淸而後不擾於心無勞汝形養外以保內也無搖汝精固內以壯外也乃可以長生神長生也目無所見耳無所聞則精不搖于耳目猶有限也心無所知斯精不搖于心而神自寧神守其形形乃長生愼汝內則內不出閉汝外則外不入凡人學道不終皆是多知為敗故以一語喚醒之欲識人身之陰陽當先明天地之陰陽而後人身之陰陽可按也我為汝遂於大明之上而至陽之原則在地我為汝入於𥥆冥之門而至陰之原則在天丹經云凡人欲作大羅仙須知陰陽顚倒顚此之謂也分陰分陽則天地有官矣陰含陽而陽含陰則陰陽有藏矣內不出而外不入是愼守汝身也吾身為純陽是物將自壯也物即丹家之藥物我惟守此先天真一之氣以處於太和之中故千二百歲而形不衰此道無窮無極上德行吾無為之道而為皇下德行吾有為之道而為王失吾道者神奇化而為臭腐亦猶百昌生于土而歸于土已耳吾將舍子而去入無窮而遊無極與日月參光與天地為常人之近而當我者猶緡之愈引愈長也人之遠而背我者猶夜之愈昏愈暗也人其盡死若何而死也而我獨存何為而存也亦可以深長思矣雲將浮雲也以喻人生之血氣或聚或散也鴻蒙元氣也以喻人生之真氣當長存也雲將願合六氣之精以育羣生鴻蒙始而辭之以弗知恐知識之開大道之漓也再遇再問猶以不知答之其曰浮遊不知所求無定求也猖狂不知所往無定往也以無定求無定往之見而欲合宇宙之六氣以觀真實無妄之理朕又何知焉雲將三問而鴻蒙乃曰亂天經而逆物情玄天弗佑驚乎鳥獸災及草木禍及昆蟲豈非治人之過乎雲將固問而鴻蒙乃曰心者性命之所統會也已與百姓之所同得也汝能心養而自在自宥即所以在宥天下是徒處無為而物自化也墮爾形體者養心不養形也吐爾聰明者黜其聰明於不用也倫與物忘視一切人皆作平等觀也所以然者何也其道直追乎涬溟無氣之始解心釋神莫然無魂即內觀其心而心無其心也萬物藝藝各復其根草木之復根易知也龜能伏氣鹿運督脈二蟲尚知復根以引年人本先天之祖氣所以生而為根非重性命而輕財帛之奇男子安得聞仙師復根之祕訣呂祖云欲求天上寶須用世間財非有知不能入道又云各復其根而不知非無知不能得道也渾渾沌沌終身不離復根也若彼知之乃是離之恐得道之後加一知識則渾沌鑿而道不為我有矣凡丹經所云鉛汞龍虎等號皆強名也吾惟復其根而不必問其名之有無學道者萬千而聞道者百不得一吾惟養吾心以復吾根而已奚必問人情之真偽則故物自生而還吾先天之精氣神也問在宥羣生而答以復根者先自治而後治人也若不知世俗之人喜同而惡異安知其同衆方能免物議哉夫夫也止知效三王仁義聖知之利而不知有仁義聖知之害為其存人之國者少而喪人之國者多有土者不可不知也有土者有大物而不能物物明此道者其緒餘以治百姓而其精以治身獨往獨來元神默運是謂獨有而能自復其根者也不更貴於有大物者哉故大人有形影聲響問答之教無心之感為天下配而咸宜者也處乎無響示不言之教也行乎無方顯不滯之途也挈汝適欲天下亦如吾之無響無方耳若而人也往來出入莫知其終烏覩其始形神俱妙與大道合安見有巳無已則一切俱無惡得有有故覩有者昔之君子聖賢也覩無者天地之友仙佛也故任物因民為事陳法皆覩有也居義廣仁積禮高德亦覩有也道本與時為變易吾亦與之為變易天本神而寄於人吾亦盡天道於人事故聖人以下雖亦是覩有總是有為中之無為性命本之於天聖人觀其所自來不受天損亦不藉人益不助也繼之者善為德聖人成德不見其增有時而崇不纍也出於道而不參之以人謀會於仁而不恃之以為恩薄於義而不積之以傷性動即是禮非以避諱而為禮當行即行接於事而不讓畫一者法也不亂而更張者亦法也可恃者民也不輕身以徇者亦民也當因者物也不去物而喪真者亦物也天者德之元道者事之宗故不明於天者不純於德不通於道者無自而可道有天人無為而尊者天道也亦主道也自然而然也有為而纍者人道也亦臣道也非自然也人君欲體天行道而不以無為為尊可得謂之知道者乎此之謂在宥天下而非治天下也外篇天地第十二道本自然因人而治是謂至治順性而修是謂至德在去智與纍而已天地雖大其化均也禮統云天地者元氣之所生萬物之祖也萬物雖多其治一也吕吉甫曰道生一而至萬何從而治哉一則各復其根而不知乃其所以治也謂主張綱維乎是者人卒雖衆其主君也天地主萬物人君主萬民君原於德而成於天故曰玄非德無以出治非天無以成德天為玄天君為玄德天子稱朕朕即玄也古之君天下無為也天德而已矣惟無為也而後謂之天德一有作為則為人道而非天德矣以道觀言而天下之君正以道觀分而君臣之義明以道觀能而天下之官治以道泛觀而萬物之應備陸西星曰夫天德即天道也道不能不散而為器故凡天下之有名相者莫非道朴之所散故以道觀言則稱謂定而人君之名正矣以道觀分則上下位而事使之義明矣以道觀能則大小異職而天下之官治矣以道泛觀則無獨有對而天下之應備矣故通於天地者德也行於萬物者道也上治人者事也能有所藝者技也陸西星曰德謂性命之正道謂當然之理形而上焉者也上之所以治人者事也人之所以成能者技也形而下焉者也技兼於事事兼於義義兼於德德兼於道道兼於天道德是精者事與技是粗者無精無粗皆出於自然則技即事事即藝藝即德德即道道即天無上下也無精粗也故曰技兼云云兼者合而一之之義分而兩則道器離矣此假所論極為精當故曰古之畜天下者無欲而天下足無為而萬物化淵靜而百姓定記曰老子所作通於一而萬事畢無心得而鬼神服通一而萬畢即一粒粟中藏世界之謂也凡人必心有所失然後有心得皆後天也我心原無失渾然一先天安有所得自然與鬼神合其吉凶故鬼神服夫子曰夫道覆載萬物者也洋洋乎大哉君子不可以不刳音枯心焉去其知覺而後可以入自然之道也無為為之之謂天為之以自然而後合天然之道無為言之之謂德有心得者必不泄露於言矣愛人利物之謂仁不同同之之謂大聯異以為同也行不崖異之謂寬有彼此分途則窄無彼此則寬有萬不同之謂富官天地而府萬物故謂之富故執德之謂紀德有大小大德者綱也小德者紀也大德不勉而中若細行必檢執之僅謂之紀而已德成之謂立卓然自立不為外物所搖循於道之謂備道原衆善悉有故循道則備道全美不以物挫志之謂完不以外物纍其心則體受而歸全君子明於此十者備此十者之德則內重外輕而齊萬物一生死矣則韜乎其事心之大也韜載也包容之義心大故事無不容沛乎其為萬物逝也逝往也萬物往來不窮而吾與之俱無窮也若然者下四句言不以身捐道藏金於山藏珠於淵不利貨財不近富貴下四句言不以物捐道不樂夀不哀夭不榮通不醜窮不拘一世之利以為已私分不以王天下為已處顯一世之利厚矣而不以為已私天下之權重矣而不以為已顯顯則明萬物一府死生同狀顯則明明以德而非以位處上則帝王天子之德處下則玄聖素王之道也管見云王天下不以為已顯也乃若所顯則有之在明乎萬物一府死生同狀耳萬物一府則無彼我之分死生同狀則無去來之纍此為刳心之極致與夫子曰又述師言夫道淵乎其居也寂然不動漻乎其淸也澄然不淆金石不得無以鳴以為無耶金石不得無以鳴故金石有聲不考不鳴以為有耶金石不考則不鳴金石本有能聲之理而非聲聲者以感之則亦無以自鳴萬物孰能定之即是而觀道俱兩在鳴者是道乎考者是道乎以為定在金石不考何以不鳴定在考者他聲何以不同金石定在虛空考之何以無聲疇能定之畢竟天非人不因人非天不成考者非道而所以考者則道也夫王德之人素逝而耻通於事逝先往也言率其素履以往常自淸淨未嘗著於事為色相中故曰耻通於事立之本原而知通於神本原初也如水之源然雖耻通於事而事至能揆物來能應所謂淸明在躬志氣如神故其德廣其心之出有物採之通於神則淸通無礙故日其德廣其心之出而有物物為何物乃先天真一之氣採之者採取其藥物也故形非道不生生非德不明昭昭生于冥冥故形非道不生即立之本源也道得于心之謂德明者明其有物必有則也故生非德不明即知通于神也存形窮生立德明道存形而窮生窮其一物各具一太極也立德而明道明其萬物統體一太極也非王德者邪蕩蕩乎忽然出勃然動而萬物從之乎此謂王德之人出者首出庶物之義動動而應也從之者其聖人作而萬物覩乎視乎冥冥聽乎無聲冥冥之中獨見曉焉無聲之中獨聞和焉故深之又深而能物焉獨見獨聞者不因有聞見而後有不以泯聞見而遂無深之又深莫可測矣而物物皆能順應神之又神而能精焉神之又神至無方而處處發見精光故其與萬物接也至無而供其求時聘而要其宿至無而供其求即虛而不屈動而愈出無為而無不為也時聘而要其宿即逝曰遠遠曰反動極而歸乎靜也供供給也聘馳聘也要統會也宿歸宿也大小長短修遠可大可小可長可短而又可修遠道之體如此即中庸費而隱之義黃帝遊乎赤水之北生我之門死我戶幾個惺惺幾個悟登乎崑崙之邱而南望還音旋歸南望進陽火也旋歸則退陰符終矣遺其玄珠遺走失也玄珠真陽也乃乾體破而為離使知索之而不得使離朱索之而不得知明皆不可求使喫音隙詬音厚索之而不得也喫詬言辨也不可以議論強探乃使象罔象罔得之象罔火候也其來也有象其隱也罔形仙家所謂不老不嫩故一索而即得之黃帝曰異哉象罔乃可以得之乎在乾體為玄珠在坎體為象罔昔也失之于赤水今也得之于赤水取坎填離也莊老以數語而發泄殆盡今之學道者萬千而知道者寥寥豫曾得仙師口訣故不敢自祕為世人指迷知我罪我曷計焉堯之師曰許由許由之師曰齧缺齧缺之師曰王倪王倪之師曰被衣堯問於許由曰齧缺可以配天乎王天下也猶言配帝吾籍王倪以要邀致也之許由曰殆哉圾殆圾皆危也乎天下齧缺之為人也聰明睿知給數音朔以敏其性過人而又乃以人受天天賦而天全之謂之天受恃其聰明睿知而穿鑿以應事故謂之以人受天彼審乎禁過而不知過之所由生與之配天乎彼且乘人而無天乘行也行其在人之事而欲以人勝天方且本身而異形身我也以我身與物對先已而後人也方且尊知而火馳自尚其知而露其精光如火之遠馳也方且為緒使自此天下日多事不免為細事所役使方且為物絯音核方為事物所束縛也方且四顧而物應道貴乎靜而能應四顧而物應則非靜矣方且應衆宜道貴乎無心而應物應衆宜則有心矣方且與物化而未始有恆如是則與物俱化而失其真常之性矣非定而應者也夫何足以配天乎此皆有知有為之道未足以配天也雖然又下一轉先抑而後揚揚之而復抑文字變化之妙有族有祖言族聚者必尊其祖也可以為衆父而不可以為衆父父衆父者出於衆人而可以為其父也衆父之父則又高出之矣缺之才可以首出而去道之遠故不可以為衆父父治亂之率音帥也北面之禍也南面之賊也言此人之用於世可以致治亦可以治亂者北面臣也南面君也蓋君道無為臣行君之令而致之民果於自用所以不免有禍害堯觀乎華山名華封人守封強者曰嘻聖人請祝聖人使聖人壽堯曰辭使聖人富堯曰辭使聖人多男子堯曰辭封人曰壽富多男子人之所欲也汝獨不欲何耶堯曰多男子則多懼懼其生亂也富則多事勝心不已壽則多辱嫌其易侮也是三者非所以養德也故辭堯有不欲之心便有意非自然也封人曰始也我以女為聖人邪今然君子也天生萬民必授之職多男女而授之職則何懼之有富而使人分之則何事之有夫聖人鶉音淳居無常所居而鷇食鳥初生者為鷇毋自哺之無心于食鳥行而無彰鳥行虛空過而無迹無心自然之意天下有道則與物皆昌天下無道則修德就間千歲厭世去而上仙乘彼白雲至於帝鄉三患少壯老也如楞嚴恆河沙之喻莫至身常無殃則何辱之有封人去之堯隨之曰請問封人曰退已世變愈趨愈下借堯舜禹言之堯治天下伯成子高立為諸侯堯授舜舜授禹伯成子高辭為諸侯而耕禹往見之則耕在野禹趨就下風立而問焉曰昔堯治天下吾子立為諸侯堯授舜舜授豫而吾子辭為諸侯而耕敢問其故何也子高曰昔堯治天下不賞而民勸不罰而民畏今子賞罰而民且不仁德自此衰刑自此立後世之亂自此始矣夫子闔音盍行邪無落吾事落荒廢意言無廢吾耕事也俋俋音邑俯首耕之狀乎耕而不顧泰初有無無無無乃主張此無者有無名天地之始即無也所謂無名天地之始也一之所起有一而未形物得以生謂之德無極與太極對是一有一無而無有之上有箇主張之者為一一之所起不惟無有而亦無無何有形此箇無無物不得不可以為物德之為言得也天地之大德曰生未形者有分且然無間謂之命物生未形若有分矣然陰陽闔闢往來不窮却又分他不得是則天之所以為命也留動而生物物成生理謂之形命本靜而渾然亦無形象可見也至元氣留聚于此則鼓動萬物之出機而物生矣有物必有則而理斯附焉謂之形則器不離理也形體保神各有儀則謂之性神以君形然非形不棲則形體也者所以保護其神第四肢百骸與元神並運莫不有當然一定之儀則即神中之性也而理亦何常離器乎性修反德德至同於初同乃虛虛乃大性即是德何必反德失性而後修修即湯武反之也故曰反德後天之學到亦同于先天之初而本體無一毫之渣滓故曰同乃虛虛則何所不容故曰虛乃大合喙音晝鳴喙鳴合與天地為合喙鳥喙也合喙鳴者猶言衆口一詞也民心雖愚合之則聖豈不與天地合德乎其合緡緡音泯與吻同若愚若昏是謂玄德同乎大順其合也緡緡然吻合無際若愚若昏老子所謂衆人昭昭我獨若昏衆人察察我獨若悶如是則謂之玄德而同於大順矣大順者順其自然而不以已私與之也修性返德其道如此夫子問於老聃曰有人治道若相放相似也可不可然不然以我之可明彼之不可以我之然明彼之不然言不苟同於衆辨者有言曰離堅白若縣音玄寓若是則可謂聖人乎離分析也辨者之言堅白異同紛紛我能離析若揭日月懸之天宇非有過人之才智者不能老聃曰是胥易技係勞形怵心者也胥易謂庶人在官更番直事技係謂居肆計功皆勞形怵心以才藝自纍者也執狸之狗成思猿狙之便自山林來執狸之犬人思係之便捷之猿人思捕之見聖人不以才智自見終亦不以才智自纍也邱豫告若而所不能聞與而所不能言不能聞與不能言者何物即無極也前所云秦初有無無是也凡有首有趾無心無耳者衆有首有趾即自頂至踵之謂也無心無耳者衆是無知無聞也無心是無學道之根器無耳是未遇仙師若何而與天地合德天地同久之道未聞也有形者與無形無狀而皆存者盡無有形者何物四體百骸也精也無形無狀者何物氣也神也凡人勞其形而搖其精不知煉精化氣煉氣化神故精竭而形盡矣形盡而形形者亦與之俱盡其動止也其死生也其廢起也其動止死生廢起未嘗異於人此又非其所以也所以者則與人異所以即無形無狀者有治在人忘乎物忘乎天其名為忘已忘已之人是之謂入於天已為人物之統會天又為已與人物之源頭未世為治者多以已治人以其知有物也上古以人治人胸中且不知有物又安知有物之從出而為天乎豈惟形骸不隔物我無間方且墮肢體黜聰明併已亦忘之矣名雖為人而實遊于九天之上人物不能出其範圍中也既曰忘天而又曰入天者譬善汨者忘于淵而後能入于淵也蔣閭葂見季徹曰魯君謂葂也曰請受教辭不獲命既已告矣未知中否請嘗薦之陳也請以所言陳之吾謂魯君曰必服恭儉拔出公忠之屬舉賢也而無阿私心無偏黨也民孰敢不輯音集安也季徹局局然大笑貌笑曰以下言有心之害道若夫子之言於帝王之德猶螳蜋之怒臂以當車轍言力小不足以任大事也則必不勝任矣且若是則其自為處言其自為所處之地如此危其觀臺多物將往投迹者衆自持恭儉用人公忠心無偏黨民各安堵不可謂非善治也然而帝王之道貴無為而賤有為故季徹笑閭葂恐其所行未必能如其所言有似螳蜋怒臂以當車轍識者知其必不勝任矣又似高其觀臺能聳動人物投迹于一時者雖衆却不能瞻仰于久遠也蔣閭葂虎頁虎頁音虩驚貌然驚曰易曰震來虩虩注謂蠅虎進退多驚葂也汒茫同若於夫子之所言矣聞此言而不知也雖然願先生之言其風也猶言遺風願言其略之意季徹曰大聖之治天下也搖蕩化導之意如草木搖蕩于春一般全無作為處民心使之成教易俗舉滅其賊心有為之志而皆進其獨志若性之自為而民不知其所由然聖人順民心之自然使之自得其性成教易俗所謂鼓之舞之以盡神也民滅其相戕相賊之心而進其昭徹獨見之志大順大化若性之固有而忘帝力於何有矣若然者豈兄堯舜之教民溟滓音幸俯首甘心之意然弟之哉欲同乎德而心居矣大聖之治若是則豈兄堯舜之道而弟溟涬之德哉蓋堯舜有心而出治溟涬之民無心而自然者欲者聖人欲民之同歸于德而各得其所安矣子貢南遊於楚反於晉過漢陰見一丈人方將為圃畦種菜蔬曰圃畦圃之界限也鑿隧而入井抱甕而出灌搰搰音窟勞貌然用力甚多而見功寡子貢曰有械於此一日浸百畦用力甚寡而見功多夫子不欲乎為圃者仰而視之曰奈何曰鑿木為機後重前輕挈水若抽數音朔如泆音逸湯言取水之逸也其名為槔音羔桔槔也為圃者忿然作色而笑曰吾聞之吾師有機械者必有機事有機事者必有機心機心存於胸中則純白不備機械器也用之則為機事所以用之者心也機心存則方寸擾擾而不純不純故不白也白如虛白之白純白不備則神生不定神生不定者道之所不載也神生猶言神發也蓋本體純粹自然光明透徹而可以載道純白不備則日見其紛紜而搖搖靡定矣道奚由以載哉吾非不知羞而不為也子貢瞞然慙俯而不對有間為圃者曰子奚為即奚有之意者邪曰孔邶之徒也借聖人以自重為圃者曰子非夫博學以擬聖賢希聖也於于夸毗之貌以蓋衆猶云蓋世獨弦哀歌自誦自歌以振響于天下也以賣名聲於天下者乎汝方將忘汝神氣墮汝形骸即泯其機心于不用而庶幾乎而身之不能治而何暇治天下乎子往矣無乏荒廢也吾事子貢卑陬音鄒愧恧之貌失色頊頊音旭自失之貌然不自得行三十里而後愈其弟子曰向之人何為者邪夫子何故見之變容失色終日不自反言不復其常也邪曰始吾以為天下一人指夫子言耳不知復有夫人也吾聞之夫子事求可功求成用力少見功多者如桔槔之類聖人之道今徒不然漢陰丈人獨不然執道者德全在天為道在人得之則為德故執道則德全德全者形全德內也形外也故內全外自全形全者神全形神之舍也神形之主也舍不壞則主有所依神全者聖人之道也託生與民並行而不知其所之汒乎淳備哉功利機巧必忘夫人之心若夫人者指漢陰丈人言非其志不之非其心不為雖以天下譽之得其所所言行於世曰得其所謂謷然不顧以天下非之失其所謂所言不行曰失儻然不受天下之非譽無損益焉是謂全德之人哉我之謂風波之民易動也反於魯以告孔子孔子曰彼假託也即事即道之謂修渾沌氏之術者也上古無為之世識其一不知其二心不分也治其內而不治其外夫明白入素無為復朴體性抱神以遊世俗之間者汝將固驚邪言汝未知此道宜乎驚異也且渾沌氏之術豫與汝何足以識之哉諄芒未雕未琢之人也將東之大壑海也觀海亦浮海之意適遇苑風囿內之風於東海之濱苑風曰子將奚之曰將之大壑曰奚為焉曰夫大壑之為物也注焉而不滿酌焉而不竭吾將遊焉苑風曰夫子無意於橫目之民乎橫目為人禽獸則直目矣願聞聖治諄芒曰聖治乎官施而不失其宜無曠職也拔舉而不失其能無遺賢也畢見其情事而行其所為人各紓其情實而無浮行也行言自為而天下化所行所言自為而巳非為人也無心為人而天下自化手撓顧指手一動隨所顧而指之四方之民莫不俱至丕應徯志也此之謂聖治願聞德人全德之人視聖治又高曰德人者居無思行無慮動靜無所容心也不藏是非美惡所謂不思善不思惡也四海之內共利之之為悅共給之之為安寄蜉蝣於天地而不知有其身怊音超乎若嬰兒之失其母也泛泛乎不知其所依儻乎若行而失其道也儻乎沉吟貌行不知其所歸無心於世也財用有餘而不知其所自來飲食取足而不知其所從無心於求故人不見其乏而常至足也此謂德人之容德人忘功願聞神人曰上神乘光上神者神上升而日月之光反乘於下也與形滅亡雖有形而若亡所謂入金石無礙者此謂照曠泰宇發光昭徹空曠無復形拘致命盡情致命致其天命之謂性之命也盡情盡其發而皆中節之情也天地樂音洛而萬事銷亡致虛之極萬物復情藝藝歸根此之謂混冥混則合而為一冥則照亦俱忘忘即所謂溟涬混沌是也門無鬼與赤張滿稽觀於武王之師赤張滿稽曰不及有虞氏乎故離此患也不及有虞之揖遜故使天下罹此征伐之患門無鬼曰天下均治而有虞氏治之邪其亂而後治之與音余赤張滿稽曰天下均治之為願而何計以有虞氏為天下均治則人人各足其願何為計有虞氏之德而以元后尊之也分明是亂而求治於虞也有虞氏之藥瘍音羊也禿而施髢音替病而求醫無瘍何以藥為不禿何用髢為不病何用醫為喻亂而求治者孰若無庸於治與天下相安於無事之為愈哉孝子操藥以修慈父其色燋然聖人羞之操藥以療父心非不善終不如無病不藥可無憂色矣羞者羞其心之日煩不如渾沌氏無心於治之為愈也至德之世不尚賢不使能未有賢能之名故曰不尚不使上如標枝高處而無臨下之心民如野鹿放曠而無相忌之嫌端正而不知以為義忘義也相愛而不知以為仁忘仁也實相與以誠而不知以為忠忘忠也當事得其當而不知以為信忘信也蠢動而相使互役不以為賜忘恩也是故行而無迹事而無傳行無畔岸故無迹也事無歆羡故無傳也斯世也斯民也何有於亂而抑何求於治乎哉總形容上古風氣見武不及虞虞不及上古司世道者使人人有莊氏之用心則上古可坐致矣孝子不諛其親忠臣不諂其君臣子之盛也親之所言而然所行而善則世俗謂之不肖子君之所言而然所行而善則世俗謂之不肖臣而未知此其必然邪詰問之詞正言其必然也自我言之人固不可苟同於君親尤不可苟同於世俗世俗之所謂然而然之所謂善而善之則不謂之道音導諛之人也乃不以導諛之人目之然則俗固嚴於親而尊於君邪不忠不孝之律甚大故不肯受謂巳道人則勃然作色不肯受諂諛之名謂已諛人則怫然作色而終身道人也終身諛人也世俗之人惡人之導諛乎君親而悅人之導諛巳已惡導諛之名終身為導諛之實何為君親謀則是而自為謀則非耶合譬飾辭聚衆也廣為譬喻令人易曉巧為潤色令人易聽聚天下之學者而歸乙已是終始本末不相坐猶言別有一般道理各自不相掩也垂衣裳設采色動容貌以媚一世而不自謂導諛襲儒者之衣冠文物以媚世而不自謂導諛也與夫人之為徒通是非而不自謂衆人愚之至也衆是亦是衆非亦非與庸衆為徒而又不以庸衆自居非愚之至乎知其愚者非大愚也愚於理而不愚於自知知其惑者非大惑也惑於事而不惑於自見大惑者終身不解大愚者終身不靈猶曉也三人行而一人惑所適者猶可致也惑者少也二人惑則勞而不至惑者勝也而今也以天下惑豫雖有祈嚮音向不可得也不亦悲乎天下惑吾不知其惑於道術乎惑於治術乎儒惑乎釋惑乎道惑乎儒者止知述唐虞三代之德尚有為也而不知太古之世猶有無為之教則儒惑也禪家止知明心見性不知性命雙修然後為真釋則釋惑也旁門止知枯坐導引以求長生不知大道不離陰陽然後為玄之又玄則道惑也莊老之作南華經諄諄然以祈嚮與人言而誰從之不亦悲乎大聲不入於里耳大雅之音非里巷之耳所樂聞折楊皇荂里巷之曲名也俗言勝則至言隱矣則嗑然而笑是故高言不止於衆人之心止入也住也至言不出俗言勝也至言之晦俗言之勝招之也以二缶鍾惑而所適不得矣缶秦樂瓦器也設有二人擊缶鍾以為音人必喜其新聲而為其所惑古樂不行矣此以樂喻而今也以天下惑無人不惑也余雖有祈嚮其庸可得邪知其不可得也而強之又一惑也天下惑是惑於治術與道術也余欲以子之祈嚮無為與金丹大道而強之奈天下盡大惑終身不解不可得而強之何故莫若釋之而不推求也不推誰其比同也憂比者和同之意蓋不推巳知天下無人矣而又望其誰與我同憂哉莊老憂世之心有如此語意含蓄似結非結正文章家三昧法也厲之人醜惡人也中添一之字文法便古雋夜半生其子遽取火而視之汲汲然惟恐其似已也惡人尚自知其惡乃大愚大惑之人至終身不解不靈曽厲人之不若矣百年之木在山林於性無傷也破為犧樽靑黃而文之其斷在溝中比犧樽於溝中之斷則美惡有間矣其於失性一也木之所遭雖有貴賤之異而均為賊其生生之性則不異跖與曾史行義有間矣然其失性均也犧樽靑黃以况曾史之修溝中之斷以况盜跖之污二者雖所殉有利義之殊而失真則一且夫失性有五一曰五色亂目使目不明二曰五聲亂耳使耳不聰三曰五臭熏鼻困惾音悛中顙氣味上達顙額四曰五味濁口使口厲爽五曰趣舍滑音骨泊亂也心使性飛揚此五者皆生之害也而楊墨乃始離跂即踶跂自以為得非吾所謂得也彼楊墨者曾不講於復性之學而離跂於仁義之間趣舍滑心不以為失而反以為得自我言之直因而已矣可為得乎夫得者困可以為得乎則鳩梟之在於籠也亦可以為得矣夫楊墨以一偏之説自困者也而乃日自得以此為自得則鳩梟在籠亦可以為得矣且夫趣舍聲色以柴音恣積也其內有欲以障其內皮辨鷸音聿冠搢執也笏紳大帶垂者修長也以約其外有飾以束其外內支盈於柴恣柵塞外重纆墨繳灼睆睆然在纆繳之中支枝拄也盈充塞也內支盈於聲色之柴柵外束縛於衣冠之纆繳睆音版睆睆然明也而自以為得則是罪人交臂束其手也厯指困其指也而虎豹在於囊檻亦可以為得矣且夫趣舍聲色以下所以嘲萬世而下無道德而富貴者內多欲以自欺外巍冠以欺人上得罪於君不知無為而治也下得罪於民併有為之治亦不克稱也前得罪於聖賢內多欲必不能外施仁義也後得罪於名教服之不衷身之災也莊老指之為桎梏之罪人擬之為監檻之虎豹所以輕賤而痛惡之者極矣然往往有善終者何也不知此輩能逃法譴而必不能逃理譴法譴人王司之可以幸而免理譴天王司之所謂免人道之患者必不能免陰陽之患即天網恢恢疏而不漏是也復圭子曰大莫大於天地尊莫尊於道德聖人道兼覆載故得而並稱焉蓋天地雖大無私覆載其化均也萬物雖多天生天殺其治一也人卒雖衆各君其君而民其民其主君也君有侯王之分原於其德之大小為之者人而成之者天天為玄天而君有玄德故曰玄古之君天下乃三皇之世無為也其德則天德也其道則天道也持此道以觀言與分則君明於上臣良於下持此道以觀能與泛應則百官稱職而萬物不害天地人合而為一者德也推之萬物而無不準者道也以居上治人之事宜簡安能與全民用之藝技同繁乎莫若技兼於事聽其事之自然也事兼於義因其義之當然也義兼於德本之於繼善成性也德兼於道出之無極而太極也道兼於天自然而然天者天理也故無欲而天下足天者天然也故無為而萬物化無欲無為何淵淨也天下足萬物化而百性乃大定矣記曰通於一而萬事畢即識得一萬事畢之謂也無心得而鬼神服即造化能役有識不能役無識之謂也一即道也道雖覆載萬物惟君子為能去其知覺刳心而載道焉故君子有無為之為無言之言愛人之仁不同之同不異之寬無不有之富無不執之紀卓然自樹之立衆美咸具之備不以物挫志之完若而人也明此十者金自在山珠自在淵外富貴齊夭壽一窮通平隱顯視萬有第臟腑之故物而何有參差視死生第晝夜之夢覺而安見殊途此道寂然無聲也而實能聲天下之聲以道為定在金石不考何以不鳴以道為定在考者倘考虛空何以無聲是萬物皆不能定道之處所也惟王德之人知之學有本原故其知如神其德普博故其應物亦圓人知有形生於無形而不知德立則道自明視乎冥冥有獨見內視之謂明也聽乎無聲有獨聞返聽之謂聰也無物之中而能物物神之又神而能神神此何以故將以為無乎無能生有蓋有供有則有限無供有斯無窮將以為有乎有終歸無馳騁而無所歸必易竭時騁而要其宿斯事有宗能大能小能長能短能修能遠此道保之而不失上德無為純乾之體也失之而思還其故物下德有為取坎填離之人也黃帝遊乎赤水之北丹經名為産藥之川源登乎崑崙之𨚑而南望旋歸宜得大道而反反曰遺其玄珠者何也仙師云玄珠飛到崑崙上子若得之求罔象又名太陰玄珠又名朱衣仙子絳氣丹霞又曰南天赤鳳髓紫府火龍脂曲江春雪海屋蟠桃瑤池天酒賜美金花總不外此妙相身中包含混沌先天之靈返還命寶之丹此珠不可以知識求不可以明察見不可以議論探帝使象罔乃能得之象則非無罔則非有非有非無仙家之真火候也此珠自外而來從虛而生在坤兌而不在乾巽乃先天之氣名曰玄酒醉到元翁靠道友扶持德行陰隲乃能得也堯問於許由問其治天下之道也而許由危之謂道不可以有心求不可以聰明得也天無為也人有為也以有為而擬無為必不得之數也故曰乘人而無天本身而異形則不能無我尊知而火馳則不能去知與故是以為天下所役物有結之而不能自解也四顧而物應物未能忘我也方且應衆宜我未能忘物也與物化則逐物而遷未始有常則失其常然之我夫何足以配天乎雖然有族有祖謂齧缺亦嘗聞道者可為衆父衆人之首也而不可為衆父父衆首之首也君道貴無為而齧缺不能所以為治之魁亂之率也不能以無為致其君所以為北面之禍人君欲以有為而行臣之道所以為南面之賊堯觀乎華乃莊子涉世之經濟也封人教之以授職於多男則分各有定而人不亂富而分之於衆則知足常足而心無事鶉不擇居鷇不擇食鳥行虛空皆無心自然之意聖人處世亦復如是天下有道與物皆昌即吾儒有道則見天下無道修德就間即吾儒無道則隱至于厭世教堯乘雲而入帝鄉可見華封人亦非凡人也奈世變愈趨愈下故又借堯舜禹以明之堯猶不用賞罰而民勸畏禹用之而尚不勝自此以後天下未免多事伯成子高之辭為諸侯而耕也殆超然免於評論哉太易者未見氣也太初者氣之始也然則太初之無即太易也有無無又所以主張此太易者太始者形之始也有無名即無名天地之始是也才言無便與有對讒言有便一之名起矣尚為太初氣之始有一而未形至一即太初也物不得不可以為物及其物得以生謂之德德之為言得也天地之大德曰生也未形之時萬理皆具分陰分陽各有修理可以分別然根陰根陽却又無間分他不得則是天之所以為命也留凝也留動而生物鼓萬物之出機也物既生矣則生生之理隨物各正一成而不可易者即太始形之始也既有形矣必有形形者形形者神也形以神為君神以形為宅故曰形體保神神即道家之元神佛氏之元性也各有儀則謂之性如有物必有則也修性者貴反乎德德至則同於太初之無無同乃虛者神返於虛也虛則何所不容何所不納故乃大有心於同終涉於有如何可同其要則無心自然盡之矣故合喙而鳴合喙不言也鳴言也既以不言而言則言猶不言矣即與天地合德可也宜其緡緡然若愚若昏如是則謂之玄德行且入於無礙之境而同於大順矣即老氏乃至大順之謂也夫子問於老聃問治人之道也可不可然不然飾智以求異也離折堅白若懸宇使心事昭然也何異以形相易以技相係疲爾形骸驚怵心神猶獵犬被繫猿狙入檻皆因技能而致患耳見聖人不以才智自見終不肯以才智自纍也豫告若以所不能聞與所不能言者何物則性與天道也凡有首有趾自頂至踵也可謂有人之形矣無心無耳者衆是無知無聞也可謂無人之情矣有形者與無形無狀而皆存者踐形盡性之聖人也盡喪其無形無狀者則凡民也然吾所謂盡無者動止死生廢起人之物於物也而其所以然則天也夫惟忘物者為能忘天亦惟忘天者為能不有乎已而天人合一矣視天梯若掌中矣是之謂入於天蔣閭葂之告魯君恭儉用賢心無偏黨自以為安民之道至此止矣而季徹笑之者猶螳蜋之怒臂以當車轍而不知其不勝任也猶危其觀臺以招衆往而不知其不可久也夫帝王之德貴無為而賤有為其治天下也移風易俗而民不知若然者豈兄堯舜之道而弟溟涬之德哉不過欲民之同歸于德耳溟涬乃鴻蒙之世無為之治即雲將篇大同乎溟涬也至堯舜則有為也子貢遊楚反晉見漢陰丈人抱甕灌畦可謂勞矣而羞為子貢之機械夫機械猶小也因而有機事所遺纍不亦多乎機事猶外也因知其有機心所點染不亦甚乎太上云靈臺無物謂之淸一念不起謂之靜淸靜則無機心虛室生白放無極神光照徹十方矣若有一毫機心內存則純白不備而神生不定猶言神不守舍也大道之所不載漢陰丈人豈屑為此機械之事乎猶教子貢以忘神氣無心也墮形骸無我也必先治身而後能治天下子貢始悟事求可功求成用力少而見功多者非聖人之道也執道者德全德全者形全形全者神全丈人之道蓋全神之道也而豈識有機械若而人也惟行吾心志之所為而不知有非譽其德全也凡聞其機心機事等語未有不為丈人所搖動者故我謂之風波之民夫子一聞其言謂丈人為假人事以修渾沌氏之術渾沌乃上古之君純乎道德者也守其一而心不二治其內而所全者德也不治其外而所忘者物也丈人惟純白備而入於太素無為而還之朴體性抱神以遊世俗之間也今非渾沌之世豫與汝何足以識渾沌之術哉諄芒者諄諄芒芒有意於治世之人也將之大壑大壑即海若也適遇苑風者風化之寓言也大壑之為物注焉而不滿狀其無涯之量也酌焉而不竭形其淵泉之深也吾將遊焉然則至治將何如官無曠職舉無遺賢人各抒其情實而無浮行無心為人而天下自化一顧一指而四方之民莫不丕應徯志若德人則不然居無思行無慮不藏是安有非不藏美安有惡四海之內共利其利而悅共給其給而安失之如嬰兒之失慈母如行人之失道財用飲食餘足而不知其所從來德人忘功也若神人則更有進焉上神乘光所謂遂於大明之上是已與形滅亡所謂入於𥥆冥之門是已此謂照曠光明所燭山河大地無所不照而神人不自以為照也惟有心曠神怡而已致命使山河大地無人不各正其命也盡情使山河大地無人不各得其情也天地樂上下與天地同流也萬事銷亡靜而與陰同德焉萬物復情動而與陽同波焉消者不知復者不知消之復之者亦不知此之謂混冥其神人之忘已乎武王革命之師不及有虞之揖遜何待赤張滿稽而後知之亂而後求治是有虞氏之藥瘍也禿而施髢也病而求醫孝子操藥以修慈父總不如無病而不必藥無亂而不必治之為愈也故聖人羞之至德之世不尚賢不使能無揀擇也上如標枝無臨下之心民如野鹿亦無仰上之念有端愛實當之事而無仁義忠信之名蠢動互相役使使者不知為所使者亦不知是故太古之世行而無迹非無實迹也不著迹耳事而無傳非無可傳也不留傳耳季世之人亦知不諛不諂為孝忠之盛面從君父之言行為孝忠之衰何獨人諾而諾人趨而趨而不謂之導諛也世俗之人惡人之導諛乎君親而悅人之導諛乎已已惡導諛之名終身為導諛之實世俗固無定見庸人不足道也又有一等好異之士合譬飾詞聚衆講學其説自相矛盾標榜以取媚而不謂導諛學其學者亦是其是而非其非墮其愚而不覺知其愚者不為彼所愚也知其所惑者不為彼所惑也惑者少猶可以不惑而易惑惑者多恐併不惑而亦惑矣大惑者終身不解則無解之日矣大愚者終身不靈則無靈之時矣而今也以天下惑儒無真儒性命通三教天人達一途者誰乎道無真道自古神仙栽接法能知人老有醫藥者誰乎釋無真釋人知觀音坐蓮上能知蓮裏産觀音者誰乎雖有真人以大道解其惑必不信也何也大聲不入於里耳高言不止於衆人之心至言不出俗言勝也假二人一擊缶而一擊鍾人必惑於新聲而不適雅樂矣厲之人猶自知其厲何大惑者不自知其惑也犧樽靑黃以譬曾史之修溝中之斷以譬盜跖之污性修反德而德同於初乃所以為得今亦惡分別曾史盜跖於其間哉夫真色不色五色亂之真聲不聲五聲亂之然則五臭熏鼻五味濁口趣舍滑心亦若是而巳心無趣舍以趣舍滑亂其心則自然之性失矣彼楊墨者不聞道趣舍滑心者也以其説自困而乃曰自得則鳩梟之在籠亦可以為得矣夫無道德而富貴者以趣舍聲色填塞其胸次冠辨搢紳以拘束其四體內充盈於柴柵外重之以纆繳人見其自苦如此而彼自以為得則罪人交臂厯指與虎豹在囊檻亦可以為得矣夫夫也讀南華至此當解其外約脫其內柴倣一識象罔之道友與之共索玄珠同登崑崙也又何難之有哉外篇天道第十三此篇以天地為宗以道德為主以自然為用本在於上末在於下要在於君詳在於臣天道運而無所積故萬物成天以一氣周流而成就萬物帝道運而無所積故天下歸帝以一德洋溢而聯聚萬民聖道運而無所積故海內服聖王以一誠推心置腹血脈與一世相貫徹而攝服四海明於天通於聖六通四辟辟與闢同謂六合四方洞達無礙也於帝王之德者其自為也昧然無不靜者矣六通四辟則明也明以暗為基所謂明道若昧也昧則歸於靜矣聖人之靜也非曰靜也善故靜也萬物無足以鐃音撓心者故靜也其本自靜非靜之而後靜也蓋萬物得我以生我則不生萬物孰能撓之不撓則靜矣靜則定而慧生焉水靜則明燭鬚眉平中準大匠取法焉水靜猶明而况精神聖人之心靜乎天地之鑒也萬物之鏡也靜字乃一篇主張而以精神二字貫之則非枯寂之靜矣鑒鏡均明也水靜生明所照有限心靜生明其照無窮也夫虛靜恬淡寂寞無為者天地之平而道德之至故帝王聖人休焉止也休則虛虛則實實者倫矣止則心中無物故虛虛則真空之中妙有生焉故實實則一實萬分敦化川流脈絡分明自有條理所謂倫也虛則靜靜則動動則得矣虛者靜之體動者靜之生所謂一動一靜互為其根也靜則無為無為也則任事者責矣謂責成於已蓋羣材萬品各任其事而自當其責無為而無不為也無為則俞俞俞俞者憂患不能處年夀長矣俞俞愈愈也悅樂之意無為則能靜能應常靜而常愈憂患不能入而精神完年夀長矣夫虛靜恬淡寂寞無為者萬物之本也明此以南鄉堯之為君也明此以北面舜之為臣也以此處上帝王天子之德也以此處下玄聖素王有德無位之名之道也以此退居而間音間遊江海山林之士服以北進為而撫世則功大名顯而天下一也所謂動則得而任事者責蓋如此靜而聖動而王即內聖外王也無為也而尊尊貴也言天下之道莫貴於無為也朴素而天下莫能與之爭美靜則不動矣而能使羣動故無為而尊朴素則無文矣而至文者出故莫與爭美夫明白於天地之德者此之謂大本大宗與天和者也所以均調天下與人和者也天和與天為徒者也人和與人為徒者也與人和者謂之人樂音洛與天和者謂之天樂和則樂從生焉故曰天樂人樂莊子曰吾師乎指虛靜吾師乎音齎萬物而不為戾萬物變化生死日物自耳非吾師之暴戾也澤及萬世而不為仁仁者無不愛至人無恩故人不知其仁長於上古而不為夀覆載天地雕刻衆形而不為巧巧者為之妙耳無為故無所稱巧乃莊子所師此種學識劈破千聖傳心之祕此之謂天樂樂非外至故曰天故曰知天樂者知者與天為徒默與之契非但聞見之知而已其生也天行行乎天理之自然而我未嘗生其死也物化若萬物之變化而我未嘗死靜而與陰同德陰不能死我動而與陽同波陽不能生我所謂陰陽在我手也故知天樂者無天怨無人非以其禾嘗在彼也無物纍無鬼責以其未嘗在我也故曰其動也天其靜也地所謂宇宙在我手也一心定而王天下其鬼不祟鬼出見人曰祟不祟言藏而不露也其魂不疲精神不倦曰不疲一心定而萬物服言以虛靜推於天地通於萬物此之謂天樂天樂者聖人之心以畜天下也我心常靜則萬物之心通矣通則服不通則叛聖人之心所以畜天下者奚為哉天樂而已夫帝王之德以天地為宗以道德為主以無為為常天地道德不過無為之理而已無為也則用天下而有餘有為也則為天下用而不足無為則以一人用天下而天下為之用故有餘有為則以天下用一人而一人為之用故不足俱指帝王言故古之人貴乎無為也上無為也下亦無為也是下與上同德下與上同德則不臣下有為也上亦有為也是上與下同道上與下同道則不主上必無為而用天下下必有為為天下用此不易之道也斧能刻木而運斧者工也臣能任事而用臣者君也蓋君道無為臣道有為君逸臣勞之義也若主代臣事則非主矣臣秉主道則非臣矣故各司其任則上下咸得其宜而無為之理可坐致矣故古之王天下者知雖落與絡同包絡也天地不自慮天下為之慮也也辨雖雕萬物不自説也天下為之説也能雖窮海內不自為也天下為之為也天不産而萬物化地不長而萬物育帝王無為而天下功天地不産不長而萬物自化自育帝王無為而天下自樂自利孰居無事而主張是孰居有事而運用是則道以提挈之也故曰莫神於天莫富於地莫大於帝王故曰帝王之德配天地此乘天地馳萬物而用人羣之道也本在於上末在於下要在於主詳在於臣又自無為有為翻出本末示人説有為為末當知無為為本前言明此以北面舜之為臣則臣當無為矣又言末在于下詳在于臣前言其心此言其分也三軍五兵之運德之末也賞罰利害五刑之辟教之末也禮法度數等差刑名名物也比類例也詳纎悉也治之末也鐘鼓之音羽毛之容樂之末也哭泣衰音催絰音牒隆殺之服哀之末也此五末者須精神之運心術之動然後從之者也精神心術五末之本而靜虛無為又保精神明心術之本也養其本則末從之矣末學者古人有之而非所以先也所先者在虛靜無為而已君先而臣從父先而子從兄先而弟從長先而少從男先而女從夫先而婦從夫尊卑先後天地之行也故聖人取象焉荀子譏莊子蔽于天而不知人觀此則莊子豈不知於人與因上一先字一從字説出許多名分見得道有自然之序當先者先當後者後故曰行也何曾與儒異天尊地卑神明之位也春夏先秋冬後四時之序也萬物化作萌芽也區別也有狀盛衰之殺非一時而盛一時而衰言其有漸次第差等也變化之流也夫天地至神而有尊卑先後之序而况人道乎宗廟尚親昭穆有序朝廷尚尊官職有序鄉黨尚齒長幼有序行事尚賢承乘有序大道之序也語道而非其序者非其道也語道而非其道者安取道語道尚其序道而非序安取於道哉此發明本末要詳之旨是故古之明大道者先明天而道德次之天者性命之極先明於天則本立於上而末學自可次第而舉而道德次之者以道之大原出於天德則行道而有得焉者也道德已明而仁義次之祖老子失道德而後仁義來仁義已明而分守次之職守也蓋朴散為器聖人用之則為官長故次之分守已明而形名次之形以彰之名以命之形名已明而因任次之因其才職而任使之因任已明而原省次之原宥也省試也所以別人官之能否原省已明而是非次之省察明則是非定是非已明而賞罰次之是非明則賞罰加賞罰已明而愚知處宜處之得宜貴賤履位官之各當其才仁賢不肖襲情襲如禮記襲裘之襲又如襲職之襲露也君子小人各露其情實也必分其能必由其名名當其實以此事上以此畜下以此治物以此修身知謀不用必歸其天事事協於理而無容心皆歸於自然而已此之謂太平治之至也故書曰有形有名形名者古人有之而非所以先也先者其本始也非所先者其末學也古之語大道者五變而形名可舉五行變化而後萬物生故知五行之變者則制禮作樂文物以紀之聲名以發之而形名可舉九變而賞罰可言也九為老陽必變少陰賞屬陽罰屬陰五行原從陰陽中生故知陰陽之變態者然後能行彰疸之權以賞善罰惡而示人驟而語形名不知其本大道也驟而語賞罰不知其始大道也倒道而言不言大道而言形名忤音悟道而説不説大道而説賞罰者人之所治安能治人驟而語形名賞罰此有知治之具非知治之道可用於天下不足以用天下此之謂辨士一曲之人也禮法數度形名比詳古人有之此下之所以事上非上之所以畜下也昔者舜問於堯曰天王之用心何如堯曰吾不敖無告不廢窮民苦死者嘉孺子而哀婦人此吾所以用心已舜曰美則美矣而未大也堯曰然則何如舜曰天德而出寧日月照而四時行若晝夜之有經雲行而雨施矣本天德以出治而萬物咸寧日月自照四時自行晝夜有常雲行雨施天何心於物哉而萬物自成所謂天道運而無所積也堯曰然則膠膠擾擾乎子天之合也我人之合也夫天地者古之所大也而黃帝堯舜之所共美也故古之王天下者奚為哉天地而已矣孔子西藏書于周室欲藏其所著之書以為一代之信史子路謀曰由聞周之徵藏藏名史有老聃者史官免而歸居夫子欲藏書則試往因焉孔子曰善往見老聃而老聃不許於是翻十二經翻者反覆經旨以説老聃中其説言方及半而老子以為太煩也曰太謾願聞其要孔子曰要在仁義老聃曰請問仁義人之性邪性本靜虛之中寂然湛然一物不著者孔子曰然君子不仁則不成不義則不生仁義真人之性也又將奚為矣老聃曰請問何謂仁義孔子曰中心物愷與物同春兼愛無私此仁義之情也兼愛屬仁無私屬義老聃曰意幾乎後言猶失言也夫兼愛不亦迂乎無私焉乃私也夫子若欲使天下無失其牧乎則天地固有常矣日月固有明矣星辰固有列矣禽獸固有羣矣樹木固有立矣夫子亦放德而行循道而趨已至矣必欲使天下無失其養則萬物各足其性吾惟循放自然之道德而行亦已極也又何偈偈音傑勞力也乎揭仁義若擊鼓而求亡子焉逃亡之人擊鼓而求之是速其亡也猶之揭仁義而治天下是速其亂也意夫子亂人之性也士成綺見老子而問曰吾聞夫子聖人也吾固不辭遠道而來願見百舍重趼音繭足跟厚皮也而不敢息今吾觀子非聖人也鼠壤有餘蔬而棄妹不仁也生熟不盡於前而積斂無崖妹作味老氏主儉嗇以鼠壤有餘蔬而棄於暗昧不明之地可謂仁乎生熟物用之不盡而又積斂其末來可謂儉乎老子漠然不應是以不答答之也士成綺明日復見曰昔者吾有剌譏剌也於子今吾心正郤矣何故也退也言向有所訊今其心退然安意受教也老子曰夫巧知神聖之人吾自以為脫焉巧知神聖之人應答如流吾自以為弗及脫失也不及意昔者子呼我牛也而謂之牛呼我馬也而謂之馬不知者謂太白若辱雖人呼我為牛馬犯而不與之較也知之者謂德合天地名為呼牛呼馬實為亦坤亦乾易云乾為馬坤為牛也苟有其實人與之名而弗受再受其殃名者實之賔苟有其實斯人應以此名加故不受名者再受其殃吾服也恆服吾非以服有服名以加人人蒙之如衣服也令名猶衣錦也不美之名猶被褐也老子自言褐吾服也吾恆服褐非別有不衷之服故暫以此服而愚人也被褐懷玉自是老氏本色士成綺鴈行避影側身而行也履行遂進踵步而前也而問修身若何老子曰而汝也容崖然崖崖異也而目衝然突目而視視之高也而顙頯然頯音仇顙中央高而兩頭鋭言高露也而口闞然口呿之貌言張口也而狀義然踶跂自持之貌言自矜也似繫馬而止也身定而神馳也動而持發也一舉動之間便持發若機括渾是機事所露機察而審熟察而詳審渾然一團機心也知巧而覩於泰恃巧而驕泰見於外巧於見泰則拙於抱朴矣凡以為不信凡此十者皆不實之徵邊竟音境有人焉其名為竊邊陲人不聞修身大道縱有言語偶會墳典皆竊盜所得何足道哉老子曰夫道於大不終於小不遺大包無外細入無倫故萬物備廣廣乎其無不容也淵乎其不可測也無不容不可測即中庸費而隱之義形德仁義大道無形及其形而為德為仁為義皆非形而上者也神之末也末對本而言道之主宰為神道無本以虛靜恬淡為本道無末以形德仁義為末非至人孰能定之定其本末也夫至人有世不亦大乎而不足以為之纍天下奮抦音柄而不與之偕神之定者外物不足以尚之故不以攖世纍彼自操柄我自行志不與偕也審乎無假而不與利遷極物之真能守其本所以者何審乎無假而不以利遷耳究極物之真實而能守其本耳無假即真也本也神也故外天地遺萬物而神未嘗有所困也外天地出乎天地之外遺萬物不與萬物為伍也此乃出世之事不溺不焚而神何困之有通乎道合乎德退仁義賔禮樂至人之心有所定矣以仁義為後而非所先故曰退其所先者道德也以禮樂為賓其所主者性情也此乃至人之根本真實凝神處而心大定矣世之所貴道者書也書不貴語語有貴也世得古人一書襲而藏之以道載在此書吾貴道因貴書也不知書僅言語而已當更尋語之所貴也語之所貴者意也意有所隨意之所隨者不可以言傳也而世因貴言傳書世雖貴之哉猶不足貴也為其貴非其貴也意之所向言不得而傳則言之與書皆不足貴矣以此為貴皆不足貴故曰非其貴也故視而可見者形與色也聽而可聞者名與聲也悲夫世人以形色名聲為足以得彼之情夫形色名聲果不足以得彼之情書言之於意猶形色名聲之於情情不可以形色名聲得意其可以書言得乎則知者不言言者不知而世豈識之哉知道者不求之言與書求之言與書不知道也老子此段欲人忘象忘言不惟結上亦以起下桓公讀書於堂上輪扁斫輪人名扁斫輪於堂下釋椎音槌鑿而上問桓公曰敢問公之所讀者何言邪公曰聖人之言也曰聖人在乎公曰已死矣曰然則君之所讀者古人之糟魄糟爛為魄已夫桓公曰寡人讀書輪人安得議乎有説則可無説則死輪扁曰設此輪扁一喻正見意非言所能傳臣也以臣之事觀之斫輪徐則甘而不固疾則苦而不入不徐不疾得之於手而應於心口不能言有數存焉於其間徐寬也疾緊也寬則甘滑易入而不堅緊則苦澀堅持而難入要在不疾不徐自有分數存乎其間數猶分寸也臣不能以喻臣之子臣之子亦不能受之於臣是以行年七十而老斫輪古之人與其不可傳也死矣然則君之所讀者古人之糟魄巳夫陸西星曰莊子之意欲人離口耳黜聞見心領神會而得之意言象數之外則有書無書同歸影響有言無言俱屬筌蹄若徒誦其言而忘其味是得其糟魄而失其神髓不免為輪人之所竊笑矣復圭子曰道何物也動靜互為其根者也善言道者靜處不可見而先言其動天得其常運者而成萬物帝與聖人得其常運者而天下歸服此皆道之運用也有動者以為道之流行必有不動者以為道之主宰則聖人之心靜也水靜猶可以明燭鬚眉平中準而况精神聖人之心靜乎靜字乃一篇之主而以精神二字貫之則裏面有運用工夫而不徒為頑靜矣若而人也天地不出其範圍萬物無逃其洞察謂為天地之鑑也可謂為萬物之鏡也亦可則我命由我法自我出而道由我行矣夫靜生於虛一靜則無所不靜故虛靜恬淡寂寞無為者天地之所取平道德之所究竟帝王聖人之所歸休休則虛實相生虛則動靜各得靜則以無為而無所不為無為則心常愈而外患不能入長生久視道在此矣此虛靜恬淡寂寞無為者乃萬物之本不惟堯得之而為君舜亦得之而為臣帝王天子有此德不虛王於上玄聖素王有此道不虛處於下可退而表儀乎山林亦可進而顯功名於天下可以靜而聖德隱亦可以動而王業著無為而羣德不能與較尊朴素而百家莫能與爭美此之謂大本大宗天地人不能外也則天和人和天樂人樂亦從此生也莊子之師是何人者耶分明指太上言藏生於殺故萬物而不為戾施澤於不知故及萬世而不為仁履厯不能考故長於上古而不為夀乾坤萬有性其所陶鑄故覆載天地雕刻衆形而不為巧皆無為自然而然此之謂天樂若知天樂者虛靜恬淡寂寞無為與天為徒默與之契是故其生死動靜與造化為卷舒又此和樂之中無怨無非無纍無責不祟不疲一靜定而王天下服萬物聖人之心可以畜天下矣寧知帝王之德即天地之德也道德其主宰也無為其作用也有才而不露其才無為也而天下之才咸願為我使故用天下而有餘有才而自彰其才有為也而一人之才不能以周遍故為天下用而不足第無為誠足貴也在上秉之為恭已在下秉之為曠官有為亦可善也臣下行之為敬事主上行之為代庖上必無為而用天下下必有為為天下用此古今不易之道也可見莊子之學亦與吾儒同而非偏枯於無為者矣故古之明王有落天地之知而無自慮之心有雕萬物之辨而無自説之詞有窮海內之能而無自為之事則天地之化育一帝王之化育也帝王之無為一天地之無為也故天之神地之富盡歸於帝王之大而帝王之德配天地者無為配之也馳萬物而用人羣者無為用之也識者以無為為本有為為末而上下分無為為要有為為詳而主臣又分故不知五兵五刑為德教之末何以索德教之本不知禮法鍾鼓為治樂之末何以考治樂之本不辨哭泣衰絰為哀之末何以究哀之本此五者皆精神心術之所流露古人有之而非所先也可見有為為後而無為為先吾觀之五倫咸先後之不紊者何也聖人取象於天尊地卑之位取法於春夏秋冬先後之序也夫萬物化生尚有隆殺盛者不頓盛衰者不頓衰而變化有漸豈聖人尚親尚尊尚齒尚賢而無次序乎道之大原出於天故必先明天道而後知道之原行道而有得者謂之德必明乎道德者而天道始為我有矣由是而仁義而分守而形名而因任而原省而是非而賞罰各以次第而明者其相因之序也由是而愚知而貴賤而仁賢而不肖處宜履位各露其情而不惜力必循名者何也咸由明道德之人事上畜下治物修身不用有為之人謀而歸無為之天道也故書曰有形有名即文物以紀之聲名以發之之謂也治天下者所不能無而第不先之耳古之語大道者必須知五行生尅變化之理而後形名可議不然本之不知末於何有須知九為老陽陰陽生尅變化之機而後賞罰可談不然始之不明終於何有即有強而語形名賞罰者特知致治之具而不知致治之道也下之所以事上非上之所以畜下也聞堯之用心憫顚恤窮哀寡慈幼而舜猶以堯為未大也本天德以寧民同日月之無私照與四時為順度若晝夜之有經民無不知也雲行而雨施澤無不被也舜信合乎天而堯猶合於人也自古之治天下者未有不取法於天地者也孔子西藏書於周室翻十二經以説老聃而後聃厭其太謾願聞其要孔子曰要在仁義仁義真人之性也中心物愷兼愛無私此仁義之情也老聃曰夫兼愛不亦迂乎無私焉乃私也若欲使天下無失其牧未有拂天地之常悖日月之明乖星辰之列亂禽獸之羣搖樹木之立而能放德而行循道而趨者揭仁義以示人何異擊鼓而求亡子鼓愈疾而亡愈遠噫仁義亂人之性也士成綺見老子而問曰吾聞夫子聖人也今觀子非聖人也蔬有餘而斂無崖老子漠然不應士成綺明日復見老子曰夫巧知神聖之人吾自以為可脫焉昔子呼我牛也而亦牛呼我馬也而亦馬有其實者斯有其名而弗受其名者殃必及之吾素被褐也恆服此服吾非別有不衷之服故以被褐之服而愚人也士成綺鴈行避影遂進而問修身若何老子曰而容崖然而目衝然與沖虛內視者異矣而顙頯然而口闞然而狀義然與大辨若訥抑抑威儀者又異矣身似繫馬而意馬未羈其發若機括未發而機心衝知巧露而泰容覩凡此皆不實之徵也若而人也其邊幅易盡也底裏易窺也即有所聞所見亦竊取之學問耳惡足以言修身夫子曰凡物能大者必不能小惟道大無終而小不遺廣乎其無不容也淵乎其不可測也神矣哉道之難名也即形德仁義特其末耳惟至人者能藐世界薄銓衡屏寵利任真而黜假守本而亡末神遊乎天地之外超乎萬物之上無往而非道德耳視仁義猶後也禮樂吾賔也其心惟定於道德而已至人往矣而神亦往僅有書以遺於後世人貴道因貴書不知書惟有言語之存語以達意意之所向仍有書不盡言言不盡意者無乃貴非其貴乎書之不能盡道亦猶形色名聲不足以得人之情也信哉知道者不求之言與書也求之言與書者不必知道也而世豈識書之不足貴哉後引輪扁之對以為書不足貴之證桓公讀書於堂上彼其所貴者書也而輪扁問之曰何言耶公曰聖人之言也輪扁曰聖人在乎公曰巳死矣曰然則君之所讀者古人之糟魄已矣糟魄二字此莊老為千古後學傳神處學人當尋糟魄之真味何在真味即人之真性也真神也酒以滓而成糟魄人以雕琢而失真性哀哉輪扁申其説曰斫輪雖小有道於此運斤徐則甘而物不堅固運斤疾則苦而不入木不徐不疾得之於手與手習也而應於心與心合也口不能言者不徐不疾之數存乎其間俱是心領神會臣不能以喻其子則他人不喻可知臣之子亦不能受之於臣則他人不受可知是以行年七十而老斫輪古之人與其不可傳也死矣此語凜凜有喚起後人須於不可傳中尋出可傳之物來須於已死尋出不死之物來方為會讀書人然則君之所讀者古人之糟魄已夫有糟魄必有精神二句冷語非嘲桓公也嘲萬世之後讀南華者止思竊其詞華而不知大道有長生不死之術則雖讀南華猶未讀也夫外篇天運第十四重重徵問造化要人求得一箇運化主宰以立君道之凖貴無為賤有為重道德輕仁義乃其大旨天其運乎地其處乎日月其爭於所乎天以氣運而不息地以形處而不動日月之行皆有定所第往來代謝方會則月光都盡而為晦巳會則月光復蘇而為朔似有爭所之象孰主張是孰維綱是孰居無事而推行是意者其有機緘而不得已邪意者其運轉而不能自止邪主張綱維猶涉有為居無事則全漠然無所為矣機緘如有所係屬也即太極也得此默運則居無事而化育自成雲者為雨乎雨者為雲乎孰隆施是孰居無事淫樂而勸是天氣下降地氣上騰蒸而為雲釀而為雨隆如藴隆之隆盛也施雨滂沛也雲雨陰陽和氣所成故謂之淫樂風起北方一西一東有上倣徨孰噓吸是孰居無事而披拂是上言雲雨有雨必有風以繼之東北陽方西南陰方必東北方陽氣先起自下而上後西南以陰氣迎之所謂陽從陰則雨至矣故風起北方而後或西或東有風自上而倣徨四周噓吸風之呼吸也披拂風鼓動之貌此風雨所以交作造化必有主之者易曰密雲不雨自我西郊西方陰氣陰促陽必不雨也非知道者孰敢言之敢問何故巫咸祒音超曰來吾語女天有六極五常天有六氣五行以佐元宰而成歲功則天地日月雲雨風露主張綱維等皆是物也帝王順之則治逆之則凶順之順造化之無為也九洛之事九是九疇洛乃洛書也事即五行五事八政五紀之類治成德備治功成而聖德備監照下土天下戴之此謂上皇上皇即挈天地馳日月隆施雲雨噓吸風氣而常居無事之地者不必拘拘鴻荒之世也商大音泰宰蕩問仁於莊子莊子曰虎狼仁也曰何謂也莊子曰父子相親何為不仁曰請問至仁莊子曰至仁無親太宰兩間而莊子兩答一座皆驚而不可以驚獨坐言虎狼父子相親則世有父不慈而子不孝者愧矣言至仁無親則如周公之誅管蔡石碏之誅石厚是也後人之處兄弟父子有周公石公之不幸而不能行管蔡石厚之誅者亦愧矣一説至仁視萬物猶一體合親疏而皆愛之故曰無親太宰曰蕩聞之無親則不愛不愛則不孝謂至仁不孝可乎莊子曰不然夫至仁尚矣孝固不足以言之此非過孝之言也不及孝之言也仁統萬善者一箇孝字固不足以盡至仁無親之言蓋至仁不過於孝矣故子之所言非過於孝者之言也乃不及乎孝自常人之言耳大抵莊子問答正言若反類如此夫南行者至於郢北面而不見冥山是何也則去之遠也冥山在北海而南行以回望之則去山愈遠至仁在乎無親而仁愛以言之則愈非至理矣故曰以敬孝易恭敬在外其孝可以勉而能以愛孝難愛則本於出衷自然而然以愛孝易而忘親難愛親而忘其愛忘之在已者也忘親易使親忘我難我無心不自知其孝親亦無心不知我之孝忘之在人者也故尤難使親忘我易兼忘天下難如舜之棄天下如棄敝蓰是也兼忘天下易使天下兼忘我難天下忘我即忘帝力於何有也夫德遺堯舜而不為也遺棄也薄之也德薄堯舜而不自以為德利澤施於萬世天下莫知也豈直太息而言仁孝乎哉夫孝悌仁義忠信貞廉此皆自勉以役其德者也不足多也此八者皆一節一行之士勉為修飭以役於德者也故曰至貴國爵并焉至富國財并焉至願名譽并焉是以道不渝并即屏棄也至貴在我何有於國爵至富在我何有於國財至願在我則道德備於身而何有於名譽凡我屏去者皆有變滅惟道真常不變不可得而渝北門成問於黃帝曰帝張咸池之樂於洞庭之野吾始聞之懼駭聽復聞之怠細聽卒聞之而惑莫知所以蕩蕩神不能定也默默口不能言也乃不自得心不自安帝曰女殆其然哉此假備論古樂之妙吾奏之以人徵之以天人人事也天天理也言樂非人不備而六律五音與天地之氣侯相表裏也行之以禮義禮以節之則有序義以正之則不亂建之以太淸太淸者聲氣之元建之為主而淸濁高下常取節焉所謂大樂與天地同和也夫至樂者先應之以人事順之以天理行之以五德貌言視聽思也應之以自然此四句作樂之本也董子所謂心和則氣和氣和則形和形和則天地之和應之矣然後調理四時太和萬物非得無聲之樂何能發揚雅奏四時迭起萬物循生一盛一衰文武倫經一淸一濁陰陽調和四時萬物合乎造化之自然盛衰文武淸濁陰陽言其節奏之妙自四時迭起至不可待又言作用之妙循環無端變化不窮且作且止而莫知歸宿之地也流光其聲言其聲流動而光瑩所謂美哉洋洋乎者蟄蟲始作吾驚之以雷霆蟄蟲聞吾樂之奏便驚若雷霆而始作所謂發舒鼓舞不能自已也其卒無尾樂雖終而餘音似嫋嫋不絶故無尾其始無首始非突然而始自有輕揚圓轉之妙故無首一死一生無死無生一僨音奔一起無僨無起所常無窮以變化為常則所常無窮而一不可待始終相生統同無間死生僨起變動而不可窮故不可執也待者求其歸一而未得之謂女故懼也初聞無窮之變不能待之以一故懼然竦聽吾又奏之以陰陽之和燭之以日月之明見動靜之相生往來之相禪與造化無不吻合其聲能短能長類晷影之前却能柔能剛象氣序之溫烈變化齊一同為變化不主故常愈出愈新在谷滿谷在坑音坑滿坑聲氣之洋洋流動充滿無所不屆其盛如此塗郤音隙守神言黜其聰明而寧一其心志以審音律之節奏也以物為量量之以管以定鍾律之短長其聲揮綽悠揚寬綽其名高明名曰高明之樂是故鬼神守其幽能使鬼神安位日月星辰行其紀二辰順軌作樂之極功有如此吾止之於有窮吾之樂止乎其不得不止流之於無止而又行乎其所當行子欲慮之而不能知也無所致吾思望之而不能見也無所容吾見逐之而不能及也無所容吾足儻然自失也立於四虛之道倚於稿梧琴也而吟目知窮乎所欲見力屈乎所欲逐人之知力各有所限也吾既不及已夫形充空虛乃至委音威蛇音移女音汝委蛇故怠喪其耳忘其目廢其形骸身如虛空弛放而不收故曰乃至委蛇惟委蛇故怠也大凡見人作為自覺非思慮所及者則辰然憮然其狀類如此也吾又奏之無怠之聲振刷其精神調之以自然之命調之使出於自然樂之節如天命之流衍也故若混逐叢生言樂之無相奪倫如禽獸之混逐草木之並生並育而不相害也林樂音洛而無形布揮而不曳幽昏而無聲林林同樂而形迹之相忘布散揮動而牽曳之自泯幽深昏默又若無聲而天籟之自鳴者動於無方居於𥥆冥動則無方所居則𥥆兮冥兮而不可測或謂之死或謂之生或謂之實或謂之榮行流散徙不主常聲非生非死非華非實但見流行散徒之不定不主故常也世疑之稽於聖人聖也者達於情而遂於命也節奏之妙匪夷所思人皆稽之於聖以為聖人者達樂之情而順天之命也天機不張而五官皆備元神不動而五官互效其職此之謂天樂無言而心説音悅其悅樂有不容言者故有焱為之頌曰聽之不聞其聲視之不見其形充滿天地苞褁六極女音汝欲聽之而無接焉言彌漫宇宙天地為昭雖欲聽之耳目無從接也而故惑也求其然而不得其所以然也樂也者始於懼懼故祟懼則精神鼓愓疑其樂之為鬼為神故祟吾又次之以怠怠故遁怠則因探索而心力疲竭不得不棄去卒之於惑惑故愚愚故道道可載而與之俱也卒聽其樂之節奏疑非人間之應有故惑惑則著一毫知識不得故愚愚則雖落後天而猶不失先天之本體故道道可載而與之俱也是愚為載道之器而非道以載愚也可見愚之一字乃莊老得道以後之妙悟揭出以示人孔子西遊於衛顏淵問師金魯太師名曰以夫子之行為奚如師金曰惜乎而夫子其窮哉顏淵曰何也師金曰夫芻狗之禾陳也結草為狗祭天解厭之物喻儒者所學古昔陳言不能用於今世盛以篋衍巾以文繡尸祝齋戒以將之及其已陳也行者踐其首脊蘇者取而爨之而已將復取而盛以篋衍巾以文繡遊居寢卧其下彼不得夢音蒙魂識顚倒必且數音朔眯音米目晴虧避焉今而夫子亦取先王已陳芻狗取弟子遊居寢卧其下故伐樹於宋削迹於衛窮於商周是非其夢邪音耶圍於陳蔡之間七日不火食死生相與鄰是非其眯邪芻狗祭則奉之已則棄之若復取而尊之則惑矣惑則生夢生眯今而夫子取先王巳陳之名物羣弟子而習之卒以取困是非夢眯之明徵耶夫水行莫如用舟而陸行莫如用車以舟之可行於水也而求推之於陸則沒世不行尋常古今非水陸與音余周魯非舟車與音余今蘄音祈行周於魯是猶推舟於陸也以古之周道而行於今之魯國是推舟於陸其不利於行也必矣勞而無功身必有殃彼未知夫無方之傳應物而不窮者也自古所傳自有隨時順應之道以應世而不窮而可以執一乎且子獨不見夫桔音結槔音羔者乎引之則俯舍之則仰彼人之所引非引人也故俯仰而不得罪於人俯仰隨人而無所容心即無方應物不窮者也故夫三皇五帝之禮義法度不矜於同而矜於治故譬三皇五帝之禮義法度其猶柤梨橘柚邪音耶其味相反而皆可於口故禮義法度者應時而變者也今吾試按齊楚吳燕之歌異轉而皆樂九夷哭殊其聲而皆悲是以聖人因時致宜為民立法故伏羲神農教而不誅黃帝堯舜誅而不怒夏質而不文周文而不質古之法其可行於今今之法其可膠於古乎今取猿狙而衣以周公之服彼必齕音紇齧挽裂盡去而後慊快也觀古今之異猶猿狙之異乎周公也故西施病心而矉顰同其里其里之醜人見而美之歸亦捧音奉心而矉其里其里之富人見之堅閉門而不出貧人見之挈妻子而去之走彼知美矉而不知矉之所以美惜乎而夫子其窮哉古今異宜而治不相襲必以古之道變今之俗以求其同是猶猿狙而衣周公之服里女而效西施之矉其勢必至相詆也夫子之窮也固宜重重譬喻皆極言世道不可挽回之意蓋以慨古道之難復而哀夫子之終窮耳孔子行年五十有一而不聞道乃南之沛見老聃老聃曰子來乎吾聞子北方之賢者也子亦得道乎孔子曰未得也老子曰子惡乎求之哉曰吾求之於度數禮樂制度道之形而下者五年而未得老子曰子又惡乎求之哉曰吾求之於陰陽天地造化道之形而上者十有二年而未得老子曰然使道而可獻則人莫不獻之於其君使道而可進則人莫不進之於其親使道而可以告人則人莫不告其兄弟使道而可以與人則人莫不與其子孫明道不可以言傳在人自悟之耳然而不可者無他也無他故中無主而不止道雖有所聞於外而中無定主終非真得不能止而不遷外無正而不行學貴能虛在我縱有所得而外無就正則無以印證而不行由中出者不受於外自悟入者聖人不出聖人不多出言以強聒之由外入者無主於中自口耳入者聖人不隱作止語默無非教也名公器也不可多取夷齊餓死比干剖心皆取名多之纍也故大聖大賢隱身非難而隱名為難仁義先王之蘧音渠廬也草舍也止可以一宿而不可以久處覯而多責仁義譬之草舍止可暫而不可久必以仁義自見於天下則求全責備者至矣古之至人假道於仁託宿於義假託皆不久處之意以遊逍遙之墟不染纎塵之處方可逍遙食於苟簡之田此苟簡之田乃坎兌之方家家有之不必耕種而自收惟仙家能食之立於不貸之圃此不貸之圃乃乾離之體止可自給而不可以假人惟仙家能立之逍遙無為也乃得道以後事所謂及其無為衆始知也苟簡易養也坎中之陽原為離宮之物能知取坎而填離易養也不貸無出也無出二字有深意吕祖云正心收住黃龍髓即不出之義古者謂是採真之遊旁門採戰御女僅知採其後天不能延年者何也為其所採者假耳真人則採彼先天真一之母氣所謂借假修真而換骨為純陽矣以富為是者不能讓祿以顯為是者不能讓名親權者不能與人柄操之則栗舍之則悲而一無所鑒以窺其所不休者是天之戮民也貪夫徇利烈士徇名夸者死權往迹之當鑒者何可勝數此而不鑒非善保全之人故為天之戮民怨恩取與諫教生殺八者正之器也唯循大變而無所湮音因者為能用之故曰正者正也其心以為不然者天門不開矣怨恩取與諫教生殺為政之具所用以正人之器惟利害不關於心生死無變於已者故能當機而斷更無湮滯也正者正也所謂以已之正而正人之不正也人有不信其然者季世之執政也若而人也人欲填滿其縱意橫心所念無非人門鬼路上走而天理不存生機閉塞故曰天門不開也孔子見老聃而語仁義老聃曰夫播粳眯目則天地四方易位矣蚊虻音文盲𠾱音匝訥也膚則通昔夕同不寐矣夫仁義憯然乃憤吾心亂莫大焉夫淸虛之體不容一物目與膚尚不容眯且𠾱而况吾心乎故降道德而言仁義未始不為心亂也吾子使天下無失其朴吾子亦放風而動總德而立矣又奚傑然若負建鼓而求亡子者邪天下有無名之朴無失之者還其混沌之天而不以竅鑿之也放風總德皆無為之教也天下已失其朴而救以仁義何異建鼓而求亡子耶夫鵠不日浴而白鳥不日黔而黑黑白之朴不足以為辨名譽之觀不足以為廣泉涸魚相與處於陸相詬音吁以濕相濡音儒以沫音未不若相忘於江湖且人之稟賦皆出自然如鵠白烏黑其朴何所加飾名譽之觀無所加廣魚處陰兩相詬相濡則病矣不若處之江湖魚相忘於水也使天下失其朴而相詬以仁義之濕沫不若相忘於道術之江湖也孔子見老聃歸三日不談弟子問曰夫子見老聃亦將何規哉規而正之也孔子曰吾乃今於是乎見龍龍之為物可見而不可見者龍合而成體散而成章謂神氣卷舒乘乎雲氣而養乎陰陽謂以陰陽二氣自相吐納豫口張而不能嗋與協同合也張而不合無所容言也豫又何規老聃哉子貢曰然則人固有尸居而龍見音現不見而自章也雷聲而淵默常應而常靜也發動如天地者乎過化存神上下與天地同流賜亦可得而觀乎遂以孔子聲見老聃老聃方將倨堂而應微居于堂上而應答之聲微曰豫年運往矣年馳而事去謙言老也子將何以戒我乎子貢曰夫三皇五帝之治天下不同其係聲名一也而先生獨以為非聖人如何哉子貢祖三皇而宗五帝聞老氏卑淺帝王故首舉為問老聃曰小子少進子何以謂不同對曰堯授舜舜授禹禹用力而湯用兵文王順紂而不敢逆武王逆紂而不肯順故曰不同老聃曰小子少進余語女三皇五帝之治天下黃帝之治天下使民心一民心純一太朴未散民有其親死不哭而民不非也差等帝王而論以見世道愈降愈遠非之則強哭不非則無喜也無怒也堯之治天下使民心親親陸九族平章百姓是也民有為其親殺其殺而民不非也情禮獨隆於其親其餘皆降殺而民不以為薄舜之治天下使民心競有虞氏尚賢故民心爭競民孕婦十月生子子生五月而能言不至乎孩而始誰則人始有夭矣十月而生五月能言未孩而早知其誰何則競教之速成也開竅太早民始有夭閼而不長者禹之治天下使民心變變其大道為公之心人有心而兵有順人有機變之心兵有順者誅其不順以歸於順也殺盜非殺人殺人者死而殺盜者無罪人自為種而天下耳人人各有警備舉天下皆然是以天下太駭各親其親各子其子故大駭異之儒墨皆起橫議交作其作始有倫夫婦人之大始古人作始自有倫序如三十而娶二十而嫁是也而今乎婦女何言哉今以幼稚之女為婦偷薄之俗又何言哉與禮記大道為公一段意相似余語女三皇五帝之治天下名曰治之而亂莫甚焉三皇之知大道無為之世其政悶悶其民醇醇自三皇五帝以智治國則有為矣上悖日月之明日月雖明而不能照覆盆今用智察察以為明是上悖之也下暌山川之精山峙而川流自有定位今用智無故鑿山而濬川是下暌其精也中墮音隳四時之施西時之序猶以漸而進退今用智以治厯明時而先為之防是隳四時之施也其知憯音慘於蠆音厲蠆音豸之尾鮮規之獸蠆規小蟲小獸多智而害物者以此而喻所謂以智治國國之賊也莫得安其性命之情者而猶自以為聖人不可耻乎其無耻也子貢蹴蹴然立不安有為之治喪其真性所謂性命之情無為而巳矣自然而巳矣絶聖棄知之意孔子謂老聃曰邱治詩書禮樂易春秋六經自以為久矣孰知其故矣以姦音干者七十二君論先王之道而明周召音節之迹一君無所鉤用鉤取也猶言取用之意甚矣夫人之難説音稅也道之難明邪音耶老子曰幸矣子之不遇治世之君也言遇則必為彼笑夫六經先王之陳迹也豈其所以迹哉今子之所言猶迹也夫迹履之所出而迹豈履哉以陳迹干人宜乎不遇毋乃感之以無迹乎夫白鶂音鷁之相視以目相交眸子不運不動也而風化此以神相感而生子蟲雄鳴於上風陽唱也雌應於下風陰和也以唱和相交而風化此以氣相感而生子類自為雌雄類物類也此一類或有雌無雄能雌者亦能雄彼一類或有雄無雌能雄者亦能雌是也故風化凡物皆風氣所生風化者言生子也物生無一定之迹不可拘泥如此性不可易命不可變性命皆一定時不可止流動也道不可壅活潑也苟得於道無自而不可得其陰陽與根陰根陽之理無自而不可無不可悟其生生之道失焉者無自而可失焉者失其消息而不得陰陽互為消息之妙無往而可悟道物之生機也孔子不出三月復見曰𨚑得之矣烏鵲孺魚傳沫細要者化有弟而兄啼久矣夫𨚑不與化為人不與化為人安能化人老子曰可𨚑得之矣復圭子曰俯仰宇宙天運於上易知也地處於下易知也日月一往一來似有爭所之象亦易知也冥冥之中主張是而綱維是者誰乎居無事而能靜以制動者誰乎意者其有機緘莫知為而為耶意者其有運轉欲止而不能止耶雲可為雨而雨亦可為雲隆施而淫樂是者非雲非雨也必有居無事而朝為行雲暮為行雨者陽從陰則雨北方陽方也故風起北方自下而上一西一東自上而下噓吸是者風也而所以噓吸者非風也必有居無事而披拂以佐雲雨者巫咸祒所謂天有五運六氣以綱維此造化是也帝王法之九疇洛書宗之治功成而聖德備天有常鑒而人有常戴非上皇極治之世無以加此皇降而為仁故太宰蕩問仁於莊子莊子以虎狼為仁則人駭以虎狼父子相親為仁而人亦駭乎謂至仁無親則人疑謂孝為至仁之緒餘而人亦疑乎故曰以敬孝而知有親不如以愛孝而忘親我孝而相忘於孝不如使親而相忘乎我我孝而能忘天下不如使天下而兼忘乎我則世有大德堯道舜行不為奇利澤濟世不為恩而區區以孝悌仁義忠信貞廉自見者亦微矣故至貴至富而在我則何有乎國爵國財道德有於身而至願在我又何有虛名虛譽何也爵財名譽易渝而至貴至富至願不渝也北門成觀黃帝咸池之樂於洞庭之野聞一也始而懼既而怠卒而惑使人神不定口難言而心不安者何也黃帝曰吾樂之奏非僅聲容而巳也天人相參禮義節制而聲氣之元一本乎太淸非遠求也蓋至樂雖先應之以人事不可不順之以天理雖行之以五德不可不因之以自然故善作樂者未調樂而調四時未和樂而和萬物則盛衰文武之有倫者象四時之遞起也淸濁陰陽之相和者象萬物之循生也其流聲可以驚蟄蟲其始卒難尋其首尾始終相生死生僨起循環無端欲求其歸一而不可待女安得而不懼吾又奏之以和合陰陽明並日月其聲之短長類晷影柔剛似氣序無變化也無不變化也有故常也而不主故常也聲滿坑谷神守其量謂之為揮綽之音可也謂之為高明之樂亦可也故聞吾奏者鬼神安於幽日星順乎軌所以然者皆由吾之樂止乎其所當止而行乎其所當行子欲著一意見而不能逐之以步武而不及非立四虛之道倚稿梧而吟不能知其妙也以知窮力屈之後形若太空身弛而不張女安得而不怠吾又奏之以無怠之聲其樂之元韻與天命同流行其中之條理與動植而並生雖金石交作竹遞奏若無分又若有分如天籟之自鳴以方所拘之而不得以𥥆冥測之而不得以死生華實擬之而亦不得但見其流動變化非尋常之聲也意者其聖人乎惟聖人達樂之情而知天之命天機不必運而五官互效其職此樂非人間有也可謂妙不容言矣聽之難聞視之難見其聲之充滿無所不包其音之精微耳無從接而安得而不惑夫樂也者始聞之而懼驚惶震恐疑其為鬼為神懼故祟既聞之而怠心神並竭無可著力怠故遁卒聞之而惑以為盡善盡美而不知美善之所自來惑故愚巧者人用事人則去道遠愚者天用事天則與道近故云大智若愚愚可載道而非道以載愚也孔子西遊於衛師金與顏回曰夫芻狗之未陳也重神明不得不重芻狗及其已陳也若與未陳之芻狗而同珍彼非以覺為夢必目昏於明也今夫子取先王之陳言而誦習何異取巳陳之芻狗而與弟子遊居寢卧其下耶其不得志於宋衛商周猶曰是夢也而困於陳蔡與死為鄰是非其眯耶夫水陸異路舟車異行夫人知之也古之周道不可行於今之魯宜亦夫人知之也今欲以周道而行於魯是猶推舟於陸可行乎不可行乎強以古道而行今者徒勞無功未知時無方吾亦與之為無方可以應物而不窮也知桔槔之俯仰而人不罪則可以悟治世之道矣故夫三皇五帝之不同道而同治猶相梨橘柚之不同味而同適口知禮義法度之必應時而變通則知古道之不宜於今猶猿狙之不得服周公之服也里婦之不得效西施之顰也惜乎而夫子其窮哉孔子南之沛見老聃老聃曰子亦得道乎孔子曰吾求之度數道之形而下者五年而未得吾求之陰陽道之形而上者十有二年而未得老子曰夫道貴心悟不可以言傳至尊莫如君親道尚不可以獻而進之至親莫如兄弟與子孫道亦不可以告而與之者何也中有主則見定以無主之心安能守不變之道外有正則行確以一偏之見安能獨斷而獨行故由中出而悟入者聖人亦與相安於無言由口耳而外入者聖人不惜言詮以指其歸名公器也且不可以多取况仁義先王之蘧廬也豈可以久處哉故古之至人即真人也假道於仁所謂金愛木慈仁也託宿於義所謂木愛金順義也以遊逍遙之墟則一塵不染矣呂祖云掘地尋天見天光即苟簡之田也此田在坎兌而不在乾巽朝種而暮收者也故曰食於苟簡之田呂祖云種得金花果是強即不貸之圃也此圃在乾離而不在坤兌貸人而不貸於人者也故曰立於不貸之圃何所往而不逍遙矣呂祖云嬰兒日食黃婆髓姹女時飱白玉杯所以苟簡易養也吕祖云正心收住黃龍髓張口擒吞白虎漿所以不貸無出也旁門採戰僅知採其後天採假而不採真也至人則採其先天真一之母氣以伏吾身之子氣張三丰祖師云一點靈光出渾身粉汗香霎時乾我汞換骨作純陽即採真之遊也何世有貪夫殉利烈士徇名夸者死權不知鑒古以取天之戮辱與至人相去遠矣怨恩取與諫教主殺八者皆正人之器非利害生死無變於巳者不能以已之正而正人之不正也人門用事而天門何由開哉失道德而後仁義故老聃欲孔子舍仁義而進道德日播粳眯目則不知有四方矣蚊虻𠾱膚則不知有夢寐矣今吾子語我以仁義則不知有大道矣亂莫大焉是故不如巳雕巳琢使天下相安於無為之風也奚必以仁義教人若建鼓而求亡子耶夫鵠之白鳥之黑乃自然而然不足辨也名譽之觀無所增益於人之性不足廣也處陸之魚而得濡沫何如相忘於江湖失朴之民而沾仁義何如相忘於道術孔子歸而語弟子曰吾見老子其猶龍乎夫龍也者變化莫測龍無體以合而成體潛龍也龍無章以散而成章見龍也龍無潛見乘雲氣而吐納乎陰陽飛龍也老子其庶幾乎又何所容吾言而規之哉子貢曰然則人固有尸居而龍見即龍之散而成章也雷聲而淵默即龍之合而成體也發動如天地即龍之乘雲氣而養乎陰陽也苐夫子借龍言而子貢便就老子言耳遂以夫子之聲先容而見老聃曰三皇五帝之治天下不同而為聖人一也先生獨以為非聖人何哉昔堯舜禹之相授受禹用力而湯用兵文王順紂而武王逆故曰不同老聃曰黃帝之治天下使民心一民反有其親死不哭而民不非也則不一矣各親其親之端開矣堯之治天下使民心親民反有為其親殺其殺而民不非也則不親矣所厚者薄之漸起矣舜之治天下使民心競欲力追上古也誰知混沌大鑿孕婦不踰十月而生子子不踰五月而能言未至乎孩而問誰而民始夭則不競矣懷知而不以相教之風萌矣禹之治天下使民心變以復醇厚也人有心而兵不順殺盜者無罪類聚者為常人心駭而儒墨起夫婦不遵始作之倫幼女可使之為婦則不變矣數代揖讓之傅又已不終局矣名曰治之實以亂之吾見上不得與日月並明下不得與山川耀精中不得與四時同施使萬物莫安其性命之情而猶然稱聖其有耻乎子貢立且不安而敢復言哉孔子謂老聃曰𨚑治六經有年矣于七十二君而不一遇何人之難説而道之難明耶老子曰夫今俗之不合乎古亦猶古道之不宜於今也今子所執六經乃先王治古天下之陳迹而欲治今之天下不亦迂哉不知有為之制作皆粗迹也而所以迹則先王無為之精神也得其粗迹而遺其精神是見迹為履之所自出而認迹為履也可乎哉豈惟古今之治迹不同而萬物相生之迹亦異白鶂以目相視而風化神相感也蟲之雌雄以上下唱和而風化氣相感也又有物類龜鱉無雄蜂蠆無雌互自為雌雄而亦風化也乘時者有定生而無定迹無不易也無不變也而不易不變者惟性命而已何也時不可止治古之天下者不可治今之天下也道不可壅生人者可測而生物者不可測也苟得乎性命不變易之道以之治天下可也以之自治而長生亦可也苟失乎性命不變易之道與之治人則昧乎古今與之自治昧乎性命之所自來又安知性命之所自往孔子退三月不出乃復見曰𨚑今得之矣得乎性命不易不變之理時道不止不壅之情也天下有卵生濕生者一本乎天親上一本乎地親下也天下有化生胎生者一至蠢而能化一至靈而不能化也𨚑今得聞夫子性命時道之教不易不變者雖可操其權於繼善之後而不止不壅者尚未能脫凡近以遊高明不諳化為人之道安能化人老子曰可𨚑得之矣知乎性命者然後可與言時道得乎不易不變者然後可與言不止不壅𨚑也解物化必知人化既知人之所以不化必亦悟其所以化𨚑從今而後可與言道矣外篇刻意第十五通篇以養神守神作主以靜虛無為為宗此莊文中之最近時好者刻意尚行刻苦用意以行為尚也離世異俗避世不以俗為伍高論怨誹自立高論不免怨天尤人為亢音抗而已矣此山谷之士非世之人枯稿赴淵者之所好也自甘寂寞而投於深山淵谷之中為遁世之士語仁義忠信恭儉推讓為修而已矣此平世之士教誨之人遊居學者之所好也隱居求志之士語大功立大名禮君臣正上下為治而巳矣此朝廷之士尊主強國之人致功并兼者之所好也行義達道之士就藪澤處間音間曠釣魚間音間處無為而巳矣此江海之士避世之人間音間暇者之所好也忘世之士如漢陰丈人抱甕灌園之類吹詬音吁呼吸吐故納新吐故氣納新氣熊經鳥申若熊之攀樹而引氣如鳥之伸吟也為夀而已矣此道音導引之士養形之人彭祖壽考者之所好也靜坐養氣之士若夫不刻意而高從容中道無仁義而修純是道德不知仁義無功名而治天爵在我何所往而不可無江海而間音間居塵出塵不道音導引而夀元神既全何必打坐無不忘也無不有也即無為而無不為之意淡然無極而衆美從之此天地之道聖人之德也五等之士總屬有我未免蔽於一曲聖人則無我故忘形而備衆善故曰夫恬淡寂寞虛無無為此天地之平而道德之質也故曰聖人休休止也焉則平易矣平易則恬淡矣平易恬淡則憂患不能入邪氣不能襲故其德全而神不虧故曰聖人之生也天行順天理而行無容心也其死也物化脫然不為物纍也靜而與陰同德動而與陽同波同波同流也動靜相生波平則水靜不為福先不為禍始感而後應迫而後動不得已而後起感而後應三句正見不為福先不為禍始無心應物之意也去知音智先事之謀去則無意必也與故故者已然之迹去故無固我也循天之理故無天災無物纍不逆物故無纍無人非與人同故人不非無鬼責與鬼合故鬼不責其生若浮其死若休不思慮不豫謀光矣而不耀耀光之露也不耀則韜光矣信矣而不期期信之必也其寢不夢其覺無憂其神純粹其魂不罷音皮虛無恬淡乃合天德故曰悲樂音洛者德之邪喜怒者道之過好惡者德之失故心不憂樂德之至也憂樂盡忘所謂不思善不思惡直透本來面目者一而不變靜之至也無所於忤虛之至也順事應物無所乖戾也不與物交淡之至也無所於逆粹之至也太虛之體一物不著故一有憂樂則德分一有變動則心擾一有忤觸則胸中有物而不虛一與物交則征逐世情而不淡一有拂逆則胸中有疵而不粹忤與逆相似但逆細而忤粗無忤易而無逆難耳故曰形勞而不休則弊精用而不已則勞勞則竭水之性不雜則淸莫動則平鬱閉而不流亦不能淸天德之象也故曰純粹而不雜靜一而不變淡而無為動而以天行此養神之道也衆人失之於動聖人養之以靜然聖人能靜能應常應常靜故以水喻夫有干越之劒者干溪吳地吳越出善劒柙而藏之不敢用也寶之至也以劒喻精神不可輕用神為主宰精為作用神存則精自固矣精神四達並流無所不極上際於天下蟠於地化育萬物不可為象如天地萬物皆精神之旁達處其名為同帝功用與天同也純素之道惟神是守守而勿失與神為一一之精通合於天倫純素之道莫要於守神守而勿失則我即一一即我一之精上通於天則與天載吻合而無間矣周子曰一故神是神之與精相為依附野語有之曰衆人重利廉士重名賢士尚志聖人貴精衆人三句所以起聖人貴精一句無勞爾形無搖爾精是也貴精二字乃玄門第一著切要之工夫故素也者謂其無所與雜也純也者謂其不虧其神也能體純素謂之真人無雜謂不雜於物也不虧謂不虧其神也能體純素則神存而精自固而真常不壞之體全矣謂之真人不亦宜乎復圭子曰此篇以精神二字為主保精守神為工夫精完神王面目不虧自然而然乃聖人也若夫刻意離世以為卓高談腹誹以自異不與世為伍樂山藪者往而不能返耳有仁義忠信以相宣恭儉推讓以自律與世為浮沈恬於教誨者屈而不能伸耳功垂旗常名勒鼎君逸臣勞之禮明上略下詳之義正於主為甚尊於國為富強特固圉肆封者之所好已耳邃壑大澤可以藏吾身執竿垂釣可以適吾適理亂不入耳是非不關心特避世逃名者之所好已耳一呼一吸所吐者心中之濁氣所納者天地之正氣河車運轉周流而不息特導引養形者之所好已耳若夫不刻意而高者從容中道也無仁義而修者道德渾全也無功名而治者自性自度也無江海而間者心曠則神怡也不導引而壽者及至無為衆始知也何者著吾心何者能踰吾心渣滓氷釋也衆美畢集也非有聖人忘我之德者安能具此天地之道乎故曰恬淡寂寞虛無無為者聖人之所休休也休休則平易矣憂患不能入平易則恬淡矣邪氣不能侵故聖人以天行物化為生死而不為陰陽之所生死以我之動靜為陰陽而不為福先禍始之陰陽何以能感而後應迫而後動不得已而後起哉則以其無意必無固我去知與故耳此所以天不能災物不能纍人不能非鬼不能責視生死若浮休謀慮若兩忘韜光融信寢覺一致神粹魂王非虛無恬淡者不能有此天德也故悲樂喜怒好惡皆有道德者之所禁也而無憂樂變遷無忤逆物交可以想見其盛德靜虛淡粹之至矣焉肯勞其形而耗其精乎觀於水之性以不雜而淸莫動而平則知所以養神矣我無駁雜以擾其神則神常靜我無二三以亂其神則神常寧以淡而無為者為神之體動而天行者為神之用養神之道曷以加焉知寶劒者猶藏而不敢輕試懼其鋒之易折也况吾之精神放之則彌六合與天帝同功用卷之則退藏於密吾神惟守此純素之道而已守之既久則不知神之為我我之為神惟有此一耳天得此一於穆不已聖人得此一其精與天通故聖人貴精良有以也然則素而無所雜者謂不雜一之精也純而無所虧者謂不虧一之神也能體純素精神完固謂之真人外篇繕性第十六此篇為性命而發俗學俗思性命交喪惟深根寧極者性反而神完樂全而志得與倒置之民異矣繕音善修治也性於俗學以求復其初滑音骨汨亂也欲於俗思以求致其明謂之蔽蒙之民性非學不復而俗學不可以復性復非明不得而俗思不可以求明俗學俗思四字極中季世腐儒之病俗者對真而言言俗學障性俗思亂明凡為此者謂之蔽蒙之民古之治道者以恬養知若要發蒙必離俗去欲以恬養知乃繕性求明之要訣也知者人之覺性也恬者無為自然之義人能以恬養知則定能生慧即吾儒之不逆不億自然之先覺也生而無以知為也謂之以知養恬知我有生之初本來無知無以知為則恬者常自恬矣始猶以恬養知養之之久則知即恬恬即知故曰以知養恬知與恬交相養而和理出其性交養則得其和順自然之性出者見非外至也夫德和也和合衆善而成也道理也衆善無不有條理也德無不容仁也道無不理義也義明而物親忠也中純實而反乎情樂音洛也信行容體而順乎文禮也禮樂偏行則天下亂矣性者仁義禮樂之所自出也若不出於性而第求之仁義禮樂則逐末忘本支離於俗學而天下亂矣偏行是偏得外而遺內非遺仁義而偏於禮樂也彼正而蒙已德蒙晦其明也言德積於已不自炫露而彼物自正德則不冒德者人所同德冒如覆蓋之義不可以己之德而蓋人之德也冒則物必失其性也為所冒者見人之德未免自失性中固有之德也古之人在混芒之中與一世而得淡漠焉古之人上古之人也混芒乃混沌初闢之光景指治世者而言淡漠則指古人所治之民而言當是時也陰陽和靜鬼神不擾四時得節萬物不傷羣生不夭人雖有知無所用之此之謂至一舉世皆純全而於道無欠缺故曰至一當是時也莫之為而常自然此何時也意者其天皇地皇人皇之時乎逮德下衰及燧人伏戲音羲始為天下是故順而不一知有理之可順則純一者漓矣德又下衰及神農黃帝始為天下是故安而不順各以理為安則知有已知有已則離於道矣德又下衰及唐虞始為天下興治化之流濠與澆同醇散朴離道以善險德以行作意為天下而興其教化非無為自然矣然後去性而從於心去其自然之性而從其有為之心心與心識我以有心為彼以有心應日以心相覺察也陸西星曰燧人以下皆不以恬養知而有以知為者以故品為德衰順而不一不一已失其性矣猶順也再衰則安而不順不順是以有坂泉涿鹿之師險德如孔子所謂危行去性從心道心微而人心危也心與心識者從心起識日以心鬬也知而不足以定天下然後附之以文益之以博文滅質博溺心然後民始惑亂無以反其性情而復其初用其知不足又附益之以禮樂以文滅質以博溺心爭逐於末而忘其本是以無以反性而復其初由是觀之世喪道矣道喪世矣世與道交相喪也道之人何由興乎世世亦何由興乎道哉道無以興乎世世無以興乎道雖聖人不在山林之中其德隱矣隱故不自隱世與道交相興則聖人作而萬物覩世愈降道愈漓非交喪乎道無由興矣其隱也非自隱也人不知之不求隱而自隱矣所謂天地閉賢人隱也古之所謂隱士者非伏其身而弗見音現也非閉其言而不出也非藏其知而不發也時命大謬也伏身閉言藏知邦無道則愚也當時命而大行乎天下則反一無迹道雖可行而付物於無心所謂恬淡自然不見有為之迹也不當時命而大窮乎天下則深根寧極而待根極性命安厥止以待時此存身之道也修身俟時之義古之存身者此身大行於天下又當反一而無迹不以辨飾知不強不知以為知不以知窮天下不以知窮人不以知窮德不以知窮已危然處其所而反其性已危然處其所言無為也反性即反一也所謂反一無迹也又何為哉道固不小行德固不小識小識傷德小行傷道大道自有正途遠識小行小識旁門也旁門御女之術於已為損德於金丹為損道故曰正己而已矣平時了性臨時了命已外無求樂全之謂得志有傷則不得謂之全所樂者全則快意矣古之所謂得志者非軒冕之謂也謂其無以益其樂而已矣君子樂之所性不存焉今之所謂得志者軒冕之謂也軒冕在身非性命也物之儻來寄也去留在彼而不在我者日寄寄之其來不可圉其去不可止故不為軒冕肆志不為窮約趨俗其樂彼與此同窮達一致故無憂而已矣今寄去則不樂由是觀之雖樂未嘗不荒也故曰喪已於物失性於俗者謂之倒置之民營外虧內甚置倒也向秀云以外易內謂之倒置復圭子曰此篇為原性而發性無知也而無不知也若繕性之俗學未免失之有為其去初愈遠滑欲之俗思未免失之障隔其背明愈甚名曰開之實以蔽之迹似牖之祇以蒙之故古之治道者欲發蒙而啓蔽惟有以恬養知而巳何也恬者不受天損性常定也定則生慧恬者不藉人益性常靜也靜則能覺此知悉從恬養中來回視有生之初其有知乎無知乎養之之久則知即是恬恬即是知知與恬交相養而和也非俗學之所能繕也交相和而理出乎性也非俗思求明而取蔽也此性一全則無不全其和合衆善則為德條理咸備則為道能容為仁能理為義能明親為忠能真純為樂能信順為禮皆性中之所有行則並行而不可偏行者也有正人之德而已不露人亦陰被其正而物各得如以一人之德而蓋人之德人能不失其性乎故上古之人居混芒之中與一世之民相安於淡漠遐想其時陰陽調鬼神安四時順萬物育羣生夀不識不知人盡然也雖一二有知以知遇不知亦無可用其知也至一之世何嘗有作為乎即有所為猶莫之為也自然而已自德一衰於燧人伏羲其治天下順則順矣而不能一也德再衰於神農黃帝其治天下安則安矣而不能順也德復衰於唐虞其治天下治化雖流醇愈澆朴愈散失道而德失德而險使民去性而從於心天下從此擾擾萬緒起矣我一心彼一心心識心全是識神用事而人心不一之極矣先王知智不足以定天下然後有文物以紀之博議以辨之文滅質博溺心而民始惑亂皆俗學俗思安能反性情而復其初哉由是觀之世非道不治喪道則無世矣道非世不興喪世則無道矣奈何交相喪而不互為興也故有聖人之道者德既隱矣故其身亦隱何必自隱哉然則古之隱者非故伏閉藏也當時命大謬藏乎其所不得不藏也古之見者非故行所無事也當時命大行無乎其所不得不無也深根即道德經之深根為得藥事寧極即道德經之固蒂為得丹事而待者待天詔之宣召也此窮而存身之道乃玄門之要旨不知性命乃存身之本也虛心又所以求反其性命也故古之存身者不知曰不知不以辨飾已之所不知也知之曰知之不以已之知而窮天下之不知也不以知窮德既而得道有知終歸於無知也但見身存而性反性反則神全矣又何所作為哉旁門三千六百乃小行小識小識傷德有損人益已之愆德固不可以小識也小行傷道亦有淫邪亂正之嫌道固不可以小行也惟有正己而巳矣正已者何所謂煉藥但尋金裏水大小無傷兩固全是也其神全則可樂初念遂則志得故曰樂全之謂得志以軒冕對窮約則軒冕為可樂以性命對軒冕則性命尤可樂故古人不以軒冕為得志謂無以益吾之真樂也今人以軒冕為得志知有軒冕而不知有性命也古人知軒冕為儻來寄也寄則聽其忽然而來亦聽其忽然而去何古人無不得志之日而今人有得志不得志也何古人有樂無憂而今人樂之日短不樂之日長也則以喪已於物亡形也失性於俗亡神也性命可存且不能長存又安能保軒冕之長存乎徇外忘內謂之曰倒置之民固宜外篇秋水第十七此篇以形有大小喻道無大小以物有精粗貴賤喻道無精粗貴賤以物有短長終始喻道無短長終始必達理明權者方為知道之人又曰無以人滅天以小不勝為大勝化窮通一四方出死生齊物我不惟識見大而學問亦精微可謂玄之又玄而大道為我有矣秋水時至百川灌河喻學自外至而未達乎本源也涇音經水名流之大兩涘音俟水涯也渚水中可居曰渚涯之間喻道不出於兩旁中央而學未至無所不見也不辨牛馬於是焉河伯欣然自喜以天下之美為盡在已自負其為天下之大觀順流而東行至於北海東面而視不見水端不知水之所自來也於是焉河伯始旋其面目望洋海中為洋向若海神名若而歎曰野語有之曰聞道百喻世之以少自多者萬分之中僅得其百耳以為莫已若者我之謂也且夫我嘗聞少仲尼之聞而輕伯夷之義者始吾弗信今我睹子之難窮也吾非至於子之門則殆局於已見也矣吾長見笑於大方之家大方猶言大道百尺竿頭進一步更有一步也北海若曰井蛙音蛙不可以語於海者拘於虛也井中之空處夏蟲不可以語於氷者篤於時也久近之所定也曲士不可以語於道者朿於教也方術之所制也今爾出於涯涘觀於大海乃知爾醜狹小也爾將可與語大理矣天下之水莫大於海萬川歸之不知何時止而不盈尾閭即列子所云渤海無底之谷名曰歸墟是也泄之不知何時已而不虛春秋不變水旱不知此其過江河之流不可為量數而吾未嘗以此自多者自以比形於天地而受氣於陰陽吾在天地之間猶小石小木之在大山也方存乎見少又奚以自多百川總歸于海天地納海則各有量也大者至足故秋毫無以纍乎天地小者無餘故天地無以過乎秋毫各知其極物安其分若覩大不安其小視小自以為多將奔馳於勝負之場矣豈莊生之旨哉陸西星曰夫學道者見欲大而心欲小見大則不以小自安心小則不以大自負海如此之大而海若未嘗以此自多方且存乎見少此望道未見之心聖不自聖之意也知見少則可進於大觀矣以下解自少計四海之在天地之間也不似壘空音壘孔之在大澤乎計中國之在海內不似稊米之在大倉乎壘空稊米微之甚者號物之數謂之萬人處一焉人卒盡也九州穀食之所生舟車之所通人處一焉此其比萬物也不似毫末之在於馬體乎天地無窮而四海有窮以四海比壘孔渺四海也天地間惟有一海周流四方中國特海南一撮土之上浮耳比之如稊米渺中國也物有萬而人為萬物中之一物渺人羣也言九州則中國所生之食用為有限言舟車之所通凡為海上之國人力之所能到者能有幾而其不通舟車之處尚多也以人力所通之處而比於馬體之毫未渺世界也五帝之所連以揖讓相連續三王之所爭仁人之所憂任士任事之人治世之事也之所勞盡此矣伯夷辭之以為名應前輕伯夷之義仲尼語之以為博應前小仲尼之聞此其自多也不似爾向之自多於水乎世界之小如此而五帝三王千聖萬賢所知所能不出其內揚復所曰乾坤雖大人身小拳石空中作勝遊與此相類河伯曰然則吾大天地而小毫末可乎北海若曰否夫物量無窮謂局量之大小時無止所值之先後分無常此生之得失終始無故死生存亡之變故前言其大此又言無小無大即前篇大秋毫而小泰山意是故大知觀於遠近故小而不寡大而不多知量無窮身在此則此近而彼遠在彼則彼又近而此遠觀遠近有變更則大小多寡亦有變更矣故無窮證嚮音向明也今故音古故遙而不悶掇音奪而不跂音企伸足也知時無正明證古今則未來者雖遙後之視今猶今之視昔何悶之有既往者雖難綴昔之視今亦猶今之視後今無常今有時而為古是以勿跂蓋人之常情從前觀之待而不得則悶追而勿及則跂故知其無止其妄自息察乎盈虛故得而不喜失而不憂知分之無常也盈虛者造化之消息盈不常盈虛不常虛故得失不足為喜憂知分之無常也明乎坦途故生而不悅死而不禍知終始之不可故也坦途者無平不陂無往不復生者物之出而往往者必反則生何足悅也死者物之來而屈屈者必伸何禍之有故者一定之陳迹以今視始則始為終為故以後視今則今又為始為終為故矣知終始之無定斯知故之不可定也計人之所知不若其所不知不若無知王倪對齧缺之問是也其生之時不若未生之時不若未生髑髏不願人間之勞是也以其至小求窮其至大之域以渺然之身究竟未生之前是故迷亂而不能自得也由此觀之吾身不足小天地不足大又何以知毫末足以定至細之倪又何以知天地之足以窮至大之域大毫末小矣其倪之細小若可定矣然有小者尤有小小者故毫末不足以定至細之倪與吾儒之語小天下莫能破同天下大矣其域之至大若可定矣然有大者尤有大大者故天地不足以窮至大之域與吾儒之語大天下莫能載同人能知小小者大大者則可以窮無窮而極無極又何至小至大之不能定其倪而窮其域哉河伯曰世之議者皆曰至精無形至大不可圍是信情乎又將大小字面換作精粗重重入細信情乎言有是實理乎否也北海若曰夫自細視大者不盡不盡耳非不可圍也自大視細者不明見不真耳非無形也夫精小之微也垺音孚謂盛也大之殷也殷衆也故異便此勢之有也有無形有不可圍此異便之勢所必有也夫精粗者期於有形者也一涉精粗便有形迹無形者數之所不能分也不可圍者數之所不能窮也一入無形便不可圍矣豈惟數所不能分别亦不能窮其邊涯矣可以言論者物之粗也即易曰書不盡言也可以意致者物之精也即易曰言不盡意也言之所不能論意之所不能察致者不期精粗焉夫子曰豫欲無言太上日大道無名維摩詰與諸菩薩論不二法門而卒示之以默即不言不察之旨何也道無精粗論精粗雖精亦相矣故不如屏精粗於不言之為妙也是故大人之行不出乎害人不多仁恩雖不害物而亦不以仁恩自多動不為利不賤門隸我雖不為利而亦不賤門隸求利之人貨財弗爭不多辭讓我雖不黷貨而亦不多辭讓之名事焉不借人不多食乎力不賤貪汙行殊乎俗不多辟異為在從衆不賤佞諂雖由由焉與衆人同處而亦不遠佞諂之人世之爵祿不足以為榮戮耻不足以為辱知是非之不可為分細大之不可為倪言大人體道之事無歆羡無取舍舉利害爵祿是非不足以入之也聞曰道人不聞有聲聞非道人也至德不得有所得非上德也大人無巳有我相非大人也約分之至也約謂收斂本分不自大也不自大故能成其大河伯曰若物之外若物之內惡至而倪貴賤惡至而倪小大合內外論之分明有箇貴賤大小倪者緒之兩頭蓋取以為分别之義河伯欲於無分別之中認箇分别下之海若言貴賤大小有無是非未有所定終無分别北海若曰以道觀之物無貴賤以物觀之自貴而相賤以俗觀之貴賤不在巳言貴賤之未有定以差觀之以大小之等而觀之因其所大而大之則萬物莫不大因其所小而小之則萬物莫不小知天地之為稊米也大亦可以為小知毫末之為𨚑山也小亦可以為大則差數覩矣言大小之未有定以功觀之因其所有而有之則萬物莫不有因其所無而無之則萬物莫不無知東西之相反東家之西可為西家之東相反也而不可以相無則功分定矣有無之未有定以趣觀之又以人之趣而觀之因其所然而然之則萬物莫不然因其所非而非之則萬物莫不非知堯桀之自然而相非則趣操覩矣正人指邪人為邪邪人亦指正人為邪但以趣操不同而分是非功分不同而辨有無差數不同而名大小此皆於不分之中妄有分別彼勝此負卒無窮已孰知是非之不可為分而細大之不可為倪乎昔者堯舜讓而帝之噲讓而絶湯武爭而王白公爭而滅由此觀之爭讓之禮堯桀之行貴賤有時未可以為常也堯噲之讓武白之爭篡義之分為貴賤亦因其時不可定以為常也梁麗屋棟也可以衝城而不可以室穴言殊器也大小各有所用也騏驥驊騮一日而馳千里捕鼠不如狸狌言殊技也物各有所能也鴟鵂音笞梟夜撮蚤蚤蝨不失察豪末晝出瞋音甸目而不見𨚑山言殊性也是非治亂不能相無故以殊器殊技殊性喻之故曰蓋師是而無非師治而無亂乎是未明天地之理萬物之情者也是猶師天而無地師陰而無陽其不可行明矣天地陰陽相為對待是非治亂相為循環此天地萬物自然之情理也然且語而不舍非愚則誣也帝王殊禪三代殊繼差其時逆其俗者謂之篡夫當其時順其俗者謂之義之徒默默乎河伯汝惡知貴賤之門小大之家惡知貴賤之為一門大小之為一家乎信乎其不分矣欲知貴賤小大之所從出當於未始有物求之日門日家言貴賤小大之所從出也河伯曰然則我何為乎何不為乎吾辭受趣舍吾終奈何既無是非貴賤則我何所適從而辭受趣舍亦無歸著矣北海若曰以道觀之何貴何賤是謂反衍有貴有賤皆世諦也因有貴以臨賤賤以承貴相傾相役如何得寬反之於道無貴無賤則自寬矣故曰是謂反衍衍者寬義無拘而志與道大蹇愼母以世情拘而志與道為梗也何少何多是謂謝施施則有多有少謝而不施則何多少之足云反衍則忘貴賤而不纍於名謝施則忘多少而不纍於利無一而行與道參差一則齊參差則不齊愼毋執一而與道相背馳也嚴乎若國之有君其無私德繇繇乎若祭之有社其無私福泛泛乎其若四方之無窮其無所畛音疹域既無分別以道心為王則無私德私福此心廣大則無私畦町矣兼懷萬物毋私愛也其孰承翼是謂無方有承接羽翼則有方所孰為承翼則無方矣萬物一齊孰短孰長物有短長自齊物之見而論則無短長道無終始物有死生不恃其成死生者物之終始而道無終始也故不居其成功一虛一滿不位乎其形數有虛有滿不敢守其定位也年不可舉時不可止消息盈虛終則有始是所以語大義之方論萬物之理也四時之序成功者退去而不可追者年流而不可止者時消息盈虛如循環終則始以是而論則大義之方萬物之理盡在是矣物之生也若驟若馳無動而不變無時而不移何為乎何不為乎夫固將自化若有為不為於其間則聽其自化矣河伯曰然則何貴於道邪音耶既聽其所為又何貴於學道北海若曰知道者必達於理達於理者必明於權明於權者不以物害已理謂盈虛消息之理權則所以善其用於不窮者也惟知道者能達而明之明夫進退存亡之道物外誘也已性命也豈徇外而忘內至德者火弗能熱水弗能溺寒暑弗能害禽獸弗能賊非謂其薄之也言察乎安危寧於禍福謹於去就莫之能害也故曰天在內人在外德在乎天有道德者不為福先不為禍始而察之寧之謹之之功多也知天人之行知天內人外則達理明權本乎天位乎得位得猶言立德也蹢音適躅音躅而屈伸反要而語極德立則蹢躅屈伸皆自得如此道之要也理之極也説到此處則知莊老知天知人知經知權孰副其荒唐而無當哉曰何謂天何謂人北海若曰牛馬四足是謂天落音絡馬首穿牛鼻是謂人故曰無以人滅天無以故滅命無以得殉名謹守而勿失是謂反其真四足乃天所生者穿絡則人為形容天人最妙又恐鑿竅者以人勝天急轉三無以字以禁止之故者有心而為之一著有心便非自然自然之謂命命即天也得即巳德喪於為名者多矣知天知人於此謹守勿失明乎內外之分則性分之真反為歸之我矣夔憐蚿音賢百足蟲也蚿憐蛇蛇憐風風憐目目憐心夔一足蚿百足蛇無足皆能自行猶有形者風則無形而自行目則不行而自至猶以形用者心則以神用而古今宇宙無不周遍矣夔謂蚿曰吾以一足趻音締踔音卓而行豫無如矣今子之使萬足獨奈何蚿曰不然子不見夫陲音吐者乎噴則大者如珠小者如霧雜而下者不可勝數也今豫動吾天機而不知其所以然任其自動莫知所由遲速難易豈在多寡有無間哉蚿謂蛇曰吾以衆足行而不及子之無足何也蛇曰夫天機之所動何可易邪音耶疾徐之節進退之妙乃天機也何可易耶言非人力所得與也吾安用足哉蛇謂風曰豫動吾脊脅而行則有似也今子蓬蓬然起於北海蓬蓬然入於南海而似無有何也風曰然豫蓬蓬然起於北海而入於南海也然而指我則勝我趥音秋趥足踐也我亦勝我雖然夫折大木蜚音飛大屋者唯我能也故以衆小不勝為大勝也為大勝者唯聖人能之自古至人多甘受挫折含羞忍而志不衰其後道成而臻大順之境無礙之宇非小不勝為大勝之驗乎若目一開便見不似風來有漸若心則無思而無不通又非目所及矣然而皆天也不説心目正所謂言有盡而意無窮也令人自得言外之意乃古人作文之妙處孔子遊於匡宋人圍之數匝而弦歌不輟子路入見曰何夫子之娛也孔子曰來吾語女我諱窮久矣而不免命也求通久矣而不得時也當堯舜而天下無窮人非知得也當桀紂而天下無通人非知失也得失二字皆指君子言時勢適然夫水行不避蛟龍者漁父音甫之勇也陸行不避兕虎者獵夫之勇也白刃交於前視死若生者烈士之勇也知窮之有命知通之有時臨大難而不懼者聖人之勇也漁父獵夫烈士之勇情各有所安聖人則無所不安矣由處矣吾命有所制矣無幾何將甲者進辭曰以為陽虎也故圍之今非也請辭而退郭象曰命非巳制故無所用其心也夫安於命者無往而非逍遙矣公孫龍辨士問於魏牢魏公子曰龍少學先王之道長而明仁義之行合同異離堅白然不然可不可困百家之知窮衆口之辨吾自以為至達已今吾聞莊子之言汒音茫焉異之不知論之不及與音余知之弗若與音余今吾無所開吾喙音諱敢問其方公子牟隱几太息仰天而笑曰子獨不聞夫坎音坎壞井也井之蛙音蛙乎謂東海之鱉曰吾樂音洛與音余吾跳梁乎井幹之上幹井欄也入休乎缺甃音秋井甃缺而成崖之崖赴水則接腋音亦兩腋拍水持頥閉其口也蹶泥則沒足滅沒也跗小足也此句言踊躍於塗中還音旋回視也虷音寒水中赤蟲也蟹與科斗蝦蟇子莫吾能若也且夫擅音禪專也一壑之水而跨跱音峙行止也塪井之樂此亦至矣夫子奚不時來入觀乎東海之鱉左足未入而右膝巳縶音至絆也矣於是逡音皺巡而却告之海曰夫千里之遠不足以舉其大千仞之高不足以極其深禹之時十年九潦音老而水弗為加益湯之時八年七旱而崖不為加損夫不為頃久猶云頃刻長久也推移不以多少進退者此亦東海之大樂也於是塪井之蛙音蛙聞之適適然驚規規然自失也且夫知不知是非之竟音境而猶欲觀於莊子之言是猶使蚉音文負山商蚷音渠馳河也必不勝音升任矣且夫知不知論極妙之言而自適一時之利還其利口者是非塪井之蛙音蛙與音余且彼方跐音此蹈也黃泉而登太皇天也謂極深窮高也無南無北火南水北是有南有北也今顚倒坎離而水火同宫則無南無北矣奭音釋然四解解悟歸土淪於不測所入者深無東無西木東金西是有東有西也今金木交併而東西合一則無東無西矣始於玄冥水也反於大通大道也子乃規規然而求之以察索之以辨是直用管窺天用錐指地也不亦小乎以察察之小明而欲窮索之以言辨不亦小乎子往矣且子獨不聞夫壽陵餘子未成丁之夫曰餘子之學行於邯鄲音寒丹與音余未得國能又失其故行矣直匍匐而歸耳邯鄲國中所能之步學未成而故步又失所以匍匐而歸也今子不去將忘子之故失子之業公孫龍口呿開口而不合舌舉而不下乃逸而走逸逃遁也莊子釣於濮水陳地楚王使大夫二人往先焉達意先容曰願以境內纍矣猶言請以國從纍先生之身也莊子持竿不顧曰吾聞楚有神龜死已三千歲矣王巾笥而藏之廟堂之上此龜者寧其死為留骨而貴乎寧其生而曳尾於塗中乎二大夫曰寧生而曳尾於塗中莊子曰往矣吾將曳尾於塗中養生全神以自適朝露之榮華又何足羡昔陶隱居畫二犍牛以答詔一拘窘於鞭繩一優遊於水草亦此意惠子相梁莊子往見之或謂惠子曰莊子來欲代子相於是惠子恐搜於國中三日三夜莊子往見之曰南方有鳥其名鵷雛鳳雛也子知之乎夫鵷雛發於南海而飛於北海非梧桐不止非練實竹實也不食非醴泉不飲於是鴟得腐鼠鵷雛過之仰而視之曰嚇音黑鴟恐奪已食而驚鳴也今子欲以子之梁國而嚇我邪莊子喻自已為鳳雛惠子為鴟梁相為腐鼠焉肯代之相耶其鄙薄功名之士可謂極矣莊子與惠子遊於濠梁石絶水曰梁之上莊子曰鯈音條魚白鯈魚也出遊從容是魚樂也惠子曰子非魚安知魚之樂莊子曰子非我安知我不知魚之樂魚之所樂忘水而因忘道南華之所樂知道而因以知魚其曰子非魚云云者不知能盡其性者必能盡人物之性也其曰子非我云云者借其不通物性者以詰其必不通人性也惠子曰我非子固不知子矣子固非魚也子之不知魚之樂全矣我與子猶人類也尚以形骸之隔而不相知何况魚為非類乎則子之與魚全無相知之理矣莊子曰請循其本反復辨論皆枝葉也若循其本則於性體上探索矣子曰女安知魚樂云者既巳知吾知之而問我我知之濠上也子既已知吾之知魚樂而問我正欲得所以知魚之故不知物理人情自是可推我居濠之上而逍遙則濠之下其樂不言可知也復圭子曰通篇以道字為主能聞道者可以窮極大而定至細包精粗忘貴賤化有無達理明權知天洞人全真照物一以貫之矣不觀秋水之時至乎百川灌河充滿渚崖河伯自以為天下之大觀無過此矣及至北海望洋向若而嘆曰我其聞道百而以為莫已若乎若非至子之門亦不信少仲尼之聞而輕伯夷之義矣北海若曰井蛙夏蟲各有所局者限於虛與時也而曲士難語大道者束於時師之教也今爾始可與言大理矣夫水莫大於海萬川歸之而不盈尾閭泄之而不虛春秋自若水旱一致吾方存乎見小又奚以此自多計四海之在天地猶小石小木之在大山壘孔之在大澤已爾計中國之在海內猶稊米之在太倉已爾計人處萬物中之一物猶毫末之在馬體已爾世界之小如此而五帝三王千聖萬賢所知所能不出其內海若不以水自多名高學博者亦安可以此自多也然則將大天地而小毫末可乎北海若曰否夫物量無窮遠近大小不可定也知時無止古往今來遞為更也分無常盈虛得失原迅速也終始無故生寄死歸若旦暮也計人之所知者人也其知有限不若其所不知者天也無知而無不知其生之時形也形則有所必敝不若其未生之時神也神則有死而不亡者由此觀之毫末非小而天地非大吾身不為不足而天地不為有餘信然則小無形而大無邊乎不知細能精乎大而視不能盡乎大大能包乎細而視不能徹乎細有大小則有精粗矣有精粗則有形矣有有形則有無形矣可以言論意致者物之精粗也不可以言論意致者物之超出乎粗精也故大人之行無歆羡無取舍齊利害泯廉貪忘貴賤屏是非融細大方成一道人也果且有聞乎有得乎有已乎果且無聞乎無得乎無已乎惟不自大故能成其大胡河伯猶然未忘貴賤大小之倪也北海若曰天地之間惟道為獨尊以道眼視之物無貴無賤也皆作平等觀以物眼視之貴賤咸其所自取也皆作奔兢觀以俗眼視之貴賤不在巳也皆作炎涼觀以差等之眼視之大小有因天地毫末互藏也皆作推移觀以功分之眼視之有無有自東西各見也皆作一定觀以趣向之眼視之是非不昧堯桀異向也皆作善惡觀故自昔以聖人而行讓爭之事雖凶化為吉以庸人而行讓爭之事雖吉化為凶猶梁麗可以衝城而不可以窒穴騏驥可以千里而不可以捕鼠鴟臬可以夜撮蚤而晝不見𨚑山獨不聞有是必有非有治必有亂此天地之理萬物之情也智者知之故師天必師地師陰必師陽也河伯欲分貴賤大小惡知貴賤之為一門大小之為一家乎奈何河伯不悟而莫知所適從也北海若曰反衍則忘貴賤而不纍於名謝施則忘多少而不纍於利以道心為主則無私德福此心廣大則無私畦町矣萬物同冶短長共軌執此道之無終始者以御無窮視物之死生也數之虛滿也年之往而不返也時之流而不止也不出消息盈虛之循環終始之範圍耳萬物皆出於機皆入於機與時變遷無為也而無不為也順其自化而已河伯曰然則何貴於學道耶北海若曰道有盈虛消息之理進退存亡之權迷者徇外忘內恆以物而喪身明者全內存外不以物而害已豈水火之所能熱溺寒暑禽獸之所能賊害非待相薄而後勝之也則知道者遊於先天而後天自不相及矣故曰天在內我可得而主之人在外我不可得而必之有德者知天知人本乎天學有宗也立乎德行有根也欲屈伸之自如者惟有明理達權而已河伯欲究天人之所謂不知牛馬之四足為天毫無與乎人也絡馬首穿牛鼻為人毫無與乎天也寧天勝人毋以人滅天寧命造故毋以故滅命寧名負得毋以得徇名謹守勿失謂之真人夔憐蚿憐其足之多也蚿憐蛇憐其無足也蛇憐風憐其無形而疾也風憐目憐其不行而至也目憐心憐其神無所不到也夔以一足不及蚿之使萬足者亦猶噴者大如珠小如霧雜下而不可勝數也豫動吾天機不知其然耳蚿以衆足而不及蛇之無足者亦以倚脊脅而行者純用天機又安所用足哉蛇雖無足猶有形也風則無形而終歸無何有人可以指而勝之亦可以踐而勝之然天下之折大木飛大屋者非風不能也豈非積衆小不勝而為一大勝乎自古得道之聖人亦往往似之孔子困於匡謂子路曰命不為我之諱窮而免時不為我之求通而得當堯舜而天下無窮人非知得也時命大順也當桀紂而天下無通人非知失也時命大謬也人知漁父獵夫烈士之勇情各有所安不知聖人之勇則無所不安矣公孫龍自多其所學矜其所行知可困百家辨可窮衆口今屈於莊子因問其方於公子牟公子牟曰子不聞坎井之蛙誇其樂於東海之鱉乎自以為赴水蹶泥於井幹之上虷蟹與科斗莫吾若也吾擅一壑之樂可謂至矣引東海之鱉入觀不知其曾一足不能容也乃告之海曰若亦知海之遠且大乎高且深乎禹之時十年九潦而海不加益湯之時八年七旱而海不加損頃久不推移多少不進退者非東海之大樂乎人無超世之見而欲聞達者之言何異使蚉負山商蚷馳河也必不勝矣不解極妙之言而欲鬬一時之利口何異坎井之蛙自多其樂於東海之鱉也必見笑矣且彼是何人者耶才踏地便登天無南無北水火濟矣水火金木四者解悟而會歸於土難測其涯涘矣無東無西木金交併矣始於玄冥坎水上升而其究五氣朝元反於大通矣子乃欲以小知小辨究之何異用管窺天用錐指地乎何異學步邯鄲者未得國能失其故步匍匐而歸乎公孫龍如不去恐失其業矣莊子釣於濮水非臧丈人之釣而其釣莫釣也楚王使二大夫曰願以境內纍先生莊子持竿不顧曰吾聞楚有巳死之神龜王藉之以笥覆之以巾而藏於廟堂之上不知此龜願死為留骨而貴乎願生而曳尾於塗中乎二大夫亦知其願生而曳尾也莊子曰子往矣吾將曳尾於塗中則立功之小不如全神之大之一徵也惠子相梁恐莊子之來代巳相也莊子往見之曰南方有鳥其名曰鵷雛仙禽也棲迹於海島而止足於梧桐非竹實不食非醴泉不飲鴟得腐鼠自以為天下之美無過此矣仰而見鵷雛之過曰嚇恐鵷雛之奮其食也今子謂我為代子相毋乃以梁國而嚇我耶則立名之賤不如保真之貴之一徵也莊子與惠子遊於濠梁之上莊子嘆鯈魚出遊之樂而惠子曰子非魚安知魚之樂是人性物性兩者皆昧也莊子曰子非我安知我不知魚之樂是咎其不通人性者所以不通物性也惠子未聞道者也其曰我非子不知子者有人相也又曰子非魚不知魚之樂全者有物相也欲無人無我請循其本本者本性也吾性一盡萬物皆吾性中物也則鯈魚之得所亦吾性中之一物樂也故我不以魚知魚我於濠上知之也則貴賤之為一門小大之為一家之又一徵也外篇至樂第十八此言至樂非世人之樂也惟有活身之物及其無為衆始知也而後能跳乎出機入機之外天下有至樂音洛指逍遙遊也無有哉反詰之詞言決有也有可以活身者指先天母氣也無有哉以下正詰之詞今奚為奚據奚避奚處奚就奚去奚樂奚惡夫天下之所尊者富貴壽善也總提此四字作案後分解之所樂者身安厚味美服好色音聲也所下者貧賤夭惡也所苦者身不得安逸口不得厚味形不得美服目不得好色耳不得音聲若不得者則大憂以懼其為形也亦愚哉服味聲色失之無傷於已得之有損於性而反以不得為憂非愚而何夫富者苦身疾作多積財而不得盡用其為形也亦外矣備舉富貴者夀者善之不長存者以為世俗警吾性本自至足內其形者知足而已厚積身死而財無用非外其形而何夫貴者夜以繼日思慮善否其為形也亦疏矣吾身中自有真貴親其形者不失本來面目而已貴者終日營為思慮以固祿位而天下有可以活身之物竟不之思非疏身而何人之生也與憂俱生夀者惛惛音昏久憂不死何之苦也憂無不死之術其為形也亦遠矣遺生而後忘憂憂忘而後生可樂而後形為我有夀者以憂患之身慮無不死之術求為引年非遠其形而何烈士為天下見善矣未足以活身吾未知善之誠善邪音耶誠不善邪音耶若以為善矣不足活身以為不善矣足以活人故曰忠諫不聽蹲音存循勿爭當逡巡却去而勿與之爭故夫子胥爭之以殘其形不爭名亦不成誠有善無有哉烈士好名止知活人而不知活身諫爭適以殘形不成矣無有哉言名善之必亡也有言外意引人當更思尋活身之物與其為烈士毋寧為真人孰樂孰不樂也有志者思之今俗之所為與其所樂吾又未知樂之果樂邪果不樂邪吾觀夫俗之所樂舉羣趣者誙誙音鑑然如將不得已而皆曰樂者吾未之樂也亦未之不樂也果有樂無有哉吾以無為誠樂矣又俗之所大苦也故曰至樂無樂至譽無譽四者世俗之所樂世俗所羣而趣者果樂耶不樂耶吾之所樂者無為之樂忘憂而已觀至樂無樂則世俗之所樂非真樂也至譽無譽則烈士之所爭非真名也天下是非果未可定也以世俗之樂為是則不見其是以為非彼不自以為非是非果不可定雖然無為可以定是非至樂活身唯無為幾存丹經云始於有作人難見及至無為衆始知何等快樂活而不死矣惟至無為庶幾可以長存請嘗試言之天無為以之淸地無為以之寧故兩無為相合萬物皆化天地酉因醖萬物化醇人能從有為以至無為則凡胎亦化矣芒乎芴乎而無從出乎芴乎芒乎而無有象乎萬物職職皆從無為殖故曰天地無為也而無不為也人也孰能得無為哉芒即混芒之義芴即沕穆之義無從出者不見所由始也職職盡職也殖生也萬物皆從無為生也人也天地之心也焉能得無為哉知無為則虛靜恬淡而不以苦為樂矣莊子妻死惠子吊之莊子則方箕踞音據鼓盆而歌盆瓦缶也鼓之所以節音惠子曰與人居長子老身死不哭亦足矣又鼓盆而歌不亦甚乎莊子曰不然是其始死也我獨何能無概然言焉能不概然與世人同情也察其始而本無生釋氏無生之説本此非徒無生也而本無形非徒無形也而本無氣生死一氣也氣至而聚則生氣反而散則死雜乎芒芴之間變而有氣氣變而有形形變而有生生指知覺運動言先有形而後有此知覺今又變而之死是相與為春夏秋冬四時行也人且偃然寢於巨室以天地為巨室猶言地為大塊而我噭噭音呌然隨而哭之自以為不通乎命故止也以上論死不足哀此種無情學問究竟性命者得力且在此處生死關頭説一箇無生法教人認取本自無來今亦無去生死第與寒暑晦明代謝相同何足關情支離叔與滑音骨介叔觀於冥伯之𨚑支離忘形滑介忘心言二子乃識化也冥伯死者之稱觀之者即下觀其化也崑崙之虛音墟黃帝之所休俄而柳瘍也柳多擁腫故為瘍癤之喻生其左肘其意蹶蹶然惡之支離叔曰子惡之乎滑介叔曰亡豫何惡生者假借也四大假合假之而生生者塵垢也人居塵中猶魚居水死生為晝夜人生之有死生猶晝夜之循環必不能免且吾與子觀化而化及我我又何惡焉郭象曰先示有情然後尋至理以遣之我本無情故能無憂則夫有情者遂自絶於遠曠之域而迷困於憂樂之境矣莊子之楚見空髑音獨髏音樓髐音磽然有形檄音竅旁擊也以馬捶音箠因而問之曰夫子貪生失理而為此乎南華致髑髏五問可謂灼見世情憂患之端髑髏所答則雖有世患何由及哉將子有亡國之事斧之誅而為此乎將子有不善之行愧遺父母妻子之醜而為此乎將子有凍餒之患而為此乎將子之春秋故及此乎郭象曰莊子非樂死惡生若然何謂齊也所謂齊者生時安生死時安死生死之情齊則無為當生而憂死耳此莊子之旨也於是語卒援髑髏枕而卧夜半髑髏見夢曰子之談者似辨士諸子所言皆生人之纍也死則無此矣子欲聞死之説乎莊子曰然髑髏曰死無君於上無臣於下亦無四時之事從然以天地為春秋雖南面王樂不能過也好生者以世事為樂趣死者以人間為勞惟超死生者可以論其大概矣莊子不信曰吾使司命復生子形為子骨肉肌膚反子父母妻子閭里知識子欲之乎髑髏深矉音顰蹙額曰吾安能棄南面王樂而復為人間之勞乎顏淵東之齊孔子有憂色子貢下席而問曰小子敢問回東之齊夫子有憂色何邪孔子曰善哉女問昔者管子有言𨚑甚善之曰褚音煮布袋也小者不可以懷大綆音梗井繩也短者不可以汲深喻齊侯短小之見不可以大道往説之也夫若是者以為命有所成而形有所適也夫不可損益受命自然不可勸成賦形定分不可遷適其可得而損益之乎吾恐回與齊侯言堯舜黃帝之道而重以燧人神農之言彼將內求於已而不得不得則惑人惑則死內求不得是不得性命之大道也已惑不過不聞道人惑則未有不喪生且女獨不聞邪昔者海鳥止於魯郊魯侯御而觴之於廟奏九韶以為樂具太牢以為膳鳥乃眩視憂悲不敢食一臠不敢飲一杯三日而死此以已養養鳥也非以鳥養養鳥也夫以鳥養養鳥者宜棲之深林遊之壇陸浮之江湖食之鰌音秋䱔音由隨行音杭列而止委音威蛇音移而處彼惟人言之惡聞奚以夫譊譊音繞為乎御音迓譊譊多言以鳥設喻謂齊侯不可以堯舜黃帝之道説之若戰爭攻守之事富強之術則彼將樂聞矣鳥之非所養而養則驚以比人之非所言而言則惑也咸池九韶之樂張之洞庭之野鳥聞之而飛獸聞之而走魚聞之而下入人卒音猝聞之相與還而觀之魚處水而生人處水而死彼必相與異其好惡故異也故先聖不一其能不同其事人有賢愚事有古今故不一不同名止於實義設於適因名以求實因適以陳義是之謂條達而福持名實不越則有條而不塞義理適用則禍去而不危矣列子行食於道從見百歲髑髏攓音蹇蓬而指之曰此段言天地間生物種各不同不是以小喻大正謂雖大無異於小也只是無小大無貴賤意而行文整齊中有不整齊不整齊中有整齊極妙惟豫與女音汝知而未嘗死未嘗生也言而用未嘗死也察其本始亦未嘗生也若果養乎豫果歡乎若果以豫為得生而養乎豫果以汝為寂滅而歡乎種有幾舉其化生凡有幾種得水則為繼音繼塵埃為息所吹浮遊水上如如縷其名為繼蓋水苔欲生之先河中多有此物先以澤物言者蓋水乃太一之氣此氣一動變而有形未免假生也得水土之際則為蛙音蛙蠙音賓之衣兩岸之旁水得土氣漸凝漸厚遂有體質其色沈緑名為蛙蠙衣衣即靑苔也自此以下言一氣而萬形有變化而無死生生於陵屯則為陵舄田野中高處曰陵屯靑苔漸漸近土生於高處為陵舄即車前草也又名澤舄其性利水陵舄音昔得鬱棲則為烏足鬱棲者穢土久積而為糞壤也車前草生於糞壤中則變而為烏足草烏足之根為蠐螬蝎子其葉為胡蝶草化為蟲一為根所化人不能見一為葉所化人往往見之胡蝶胥也化而為蟲生於竈下其狀若脫其名為鴝掇一云胥也乃胡蝶之别名甚無考據還是物有相胥生者不可概論胡蝶草化之蟲質多蠕弱生野竈之下得火氣以生化而為蟲無皮無殼其狀若脫其名為鴝掇鴝音渠掇音奪鴝掇千日為鳥其名為乾餘骨此一化自鳥足來者最為強健乃鴝掇伏土千日所化者乾餘骨之沫為斯彌蟲名乾餘骨之流沫所化者斯彌為食醯音希蠓也喜酸而聚醯故其名曰食醯頥輅生乎食醯食醯生頥輅也黃軦音况生乎九猷瞀音茂芮音汭生乎腐蠸音權又音歡羊奚即羊蹄根也根比于久不生笋之竹則生靑寧比乎不箰音笋久竹生靑寧蟲名靑寧生程有謂延州人至今呼虎豹為程程生馬馬生人馬生人直以人馬為是或謂繁氣而生人類可乎搜神記秦孝公時有馬生人史言長沙武陵蠻生於畜狗元始祖胎於狼鹿舊作馬齒菜人參者非也以上論氣變化非死非生一人又反入於機萬物皆出於機皆入於機造化到生人住了不消假借而生人反入於機者入於大造爐冶中而不能出其範圍也先自萬物説到人末二句又自人説到萬物上去機所謂機緘也始而生者為出機終而死者為入機復圭子曰夫人之樂皆以外而樂內惟至樂則以內而樂外也天下有至樂無有哉夫人止知求活於一時非真活也不知有不死者而後為可以活天下有可以活身者無有哉今觀其所為所據所避所處所就所去所樂所惡而天下之人情得矣以富貴壽善為尊者未有不以身安聲色衣食之美為快樂也以貧賤夭惡為下者未有不以形勞聲色衣食之艱為憂懼也自知有可以活身而觀之其為形也亦愚矣使富而可以不死則苦身疾作而多積財者胡為財有餘而身不得盡用也非以財貨為內而形體為外乎使貴而可以不死則貴人晝夜思索多方以為固位計胡為位雖固而身不固也非以爵祿為親而形骸為疏乎使夀而可以不死則人生不滿百常懷千歲憂者自少至老惛惛憂無不死之術而不知求活身之道非以蓬島閬苑為遙而袖懷摩尼為遠乎使名而可以不死則烈士忠諫當能保其形胡為善與不善不並立活身與活人不兩利而子胥竟以殘形而成名也善果存乎不存乎富貴壽善世俗之所樂也樂者未必樂無為之樂世俗之所苦也苦者未必苦故曰至樂無樂非無樂也其樂不在外而在內也至譽無譽非無譽也其譽不貴名而貴實也而是非乃大定矣天下之至樂孰有過於活身哉活身至無為而有不長存哉何也天淸地寧不過以無為而萬物化吾且不知無為之從出又安知無為之形象萬物有也無為無也無能生有天地得其無為故能無不為天地也人也分而為三苟合而為一人孰能從有為以至於無為則至樂活身雖與天地並存可也莊子妻死箕踞鼓盆而歌惠子譏之以為太甚莊子曰不然夫死者人之終也吾因其終以追其始混沌初剖朕兆未萌有天地而無萬物無生也而安得有形無形也而安得有氣自太易變而為太初為氣之始太初變而為太始為形之始太始變而為太素為生之始今又變而之死猶春夏秋冬之遞為循環也生為晝覺死為夜寢於巨室而噭噭然哭之者可謂通於命乎安知今日之死不為他日之生故止而不哭也支離叔與滑介叔觀於冥伯之𨚑滑介叔俄而柳生其左肘始而惡之者人情也既而曰豫何惡以理遣情也識人為假借地水火風四大而生總不離塵垢之中方死方生方生方死遞相為晝夜化也我與子觀於冥伯之𨚑觀化也而柳生其肘我亦化中人也未能超乎造化又何惡乎化之及我哉莊子之楚見空髑髏之形因而問之曰夫子不貪生失理未必罹此患也不有亡國之事斧鉞之誅未必罹此患也不有不善之行以遺父母妻子之醜未必罹此患也不有凍餒之危或春秋故及此未必罹此患也髑髏見夢曰子談似辨士人生之纍也死則無此矣子亦知死之樂乎死無君臣上下則無職要職詳之勞無春夏秋冬則無寒暑侵人之患人生小年也死則以天地為大年元會運世為春秋至逸之極雖南面王樂不能過矣莊子不信曰吾使司命復若形骸反若父母妻子閭里知識子欲之乎髑髏深矉蹙額曰吾安能棄南面王樂而復為人間之勞乎顏淵東之齊孔子有憂色曰褚小者不可以懷大綆短者不可以汲深夫若是者以為命成於一定而形適得之本來命長者不可損之使短短者不可益之使長吾恐回與齊侯言黃帝堯舜之道而不得更益以燧人神農之言止知事求可功求成內求於性命而不得巳惑不過不聞道人惑則貪功名而喪本來未有不死者也安能活身而獲至樂哉昔者海鳥至於魯郊魯侯迓而觴之於廟奏九韶具太牢鳥乃三日不食而死此以巳養養鳥非以鳥養養鳥也不知養鳥者自有深林壇陸江湖鰌䱔羽翼其行列也委蛇而安處也若人亦與九韶之樂鳥聞之而飛者獸必聞之而走魚必聞之而下人獨相與還而觀之豈惟鳥性與人殊魚非水不生人處水則死者其好惡異也故能有聖凡之不一事有正旁之不同名不虛揚也必止於實義不虛附也必設於適內求於巳無所往而不可是之謂條達則不惑而福持則可以活身亦可以活人矣此猶出死而入生也更進一步則有不死不生之道不觀列子之指髑髏乎曰惟豫與汝同居大造之中汝未嘗死也豫未嘗生也若果虧養而死乎豫果歡樂而生乎不知死生一條也萬物一轍也究造化初生之種天一生水水上有浮遊之氣如如縷其名為繼繼近土則為蛙蠙之衣為陵舄為烏足三者皆濕生之草漸變則漸異其名為鳥足之根化為蠐螬親下其葉化為胡蝶親上此一蝴蝶也化而為蟲生於竈下其名為鴝掇鴝掇千日化而為乾餘骨之烏漸化漸大卵生也乾餘骨之流沫又化為斯彌之蟲由是而為食醯為頥輅為九猷為黃軦為腐蠸為瞀芮皆化生之蟲漸化又漸小矣羊奚之根比乎不箰之竹而生靑寧之蟲靑寧生虎豹之程小生大也程生馬猶為類之近似也馬生人者何也乾為馬則馬得乾之氣為多造化之始人類少則馬生人者乾生之也史言長沙武陵蠻生于畜狗元始祖胎于狼鹿必有本矣至於人一入於胎生之機則不變不化而不能出於機也惟跳出陰陽之外者斯能出於機若萬物中有變化者似皆出於機然亦惟陰陽所陶鑄而不能違則又皆入機矣可見宇宙間惟一氣機播弄人物或出或入或入或出無須臾之停有志長生者胡不訪真人打破陰陽之機緘陶鑄乎陰陽而不為陰陽所陶鑄哉
