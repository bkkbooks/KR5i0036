body:
  text: 南華真經周漆園吏莊周著海陽復圭子程以寧注疏雜篇外物第二十六徇外則伐生損道有釣利者有盜儒者均之不知神聖自全之道惟得意忘言之人而始可與言內而忘外外物不可必凡不言性命而言形色人與物皆外物也外物有成必有虧無論善者惡者忠者孝者不孝者均之不免而不可必也故龍逢誅比干戮箕子狂惡來紂佞臣死桀紂亡人主莫不欲其臣之忠而忠未必信故伍員流於江吳王戮之褁鴟夷而浮之江萇弘死於蜀藏其血三年而化為碧周靈王臣被放歸蜀刳腸而死藏其血於地三年化為碧玉人親莫不欲其子之孝而孝未必愛故孝已憂股高宗子逐於後母而曾參悲誤斫瓜根大杖幾死以上俱外物之不可必者木與木相摩則然木火同侶火陰根陽寄位於木因動而發反傷其母金與火相守則流金本至堅見火則流陰陽錯行則天地大絯音駭於是乎有雷有霆水中有火乃焚大槐陰陽雜其氣鬱而不伸則雷雨交作或焚樹木所謂水中有火也乃五行之不可必者有甚憂兩陷而無所逃至人修真五志之火一時俱伏不知道者甚憂兩陷於利害之中無所逃遁人事陰陽之患兩者交相陷也螴蜳音陳淳不得成怵惕不自安也心若縣音懸於天地之間慰睯音昏沈屯抑鬱陷溺也利害相摩生火甚多衆人焚和利害交戰燥急心熱甚於焦火故焚傷其至和之氣月固不勝火於是乎有僓音頽然而道盡月水母也尚在天涯喻遠水不能救近火於是惟有頽然衰斃而生道盡矣莊周家貧故往貸粟於監河侯監河侯曰諾我將得邑金將貸子三百金可乎莊周忿然作色曰周昨來有中道而呼者周顧視車轍中有鮒魚焉周問之曰鮒魚來子何為者邪對曰我東海之波臣猶云水官也君豈有斗升之水而活我哉周曰諾我且南遊吳越之王激西江之水而迎子可乎鮒魚忿然作色曰吾失我常與我無所處吾得斗升之水然活耳若然可活君乃言此曾不如早索我於枯魚之肆莊子貸粟明養生者止於活身而不必務有餘意魚以水為天所與者惟水而已一失水則失其所與而無處所矣枯魚乾魚也肆處所也任公子為大鈎巨緇五十犗音界犍牛也以為餌喻經世者期於大成蹲乎會稽投竿東海旦旦而約期年不魚已而大魚食之牽巨鈎錎音陷沒而下驚揚而奮䰇音須白波若山海水震蕩聲侔鬼神憚赫千里任公子得若魚離而臘音昔之乾肉也自浙音浙河以東蒼梧以北莫不厭若魚者已而後世輇音權才諷説之徒皆驚而相告也夫揭竿纍趨灌瀆守鯢鮒其於得大魚難矣飾小説以干縣令其於大達亦遠矣是以未嘗聞任氏之風俗其不可與經於世亦遠矣喻言有大抱負者必有大設施有大設施者必有大成就厭飽飫也輇才小才也纍小繩也瀧瀆田中灌水之瀆鯢鮒小魚也文氣跌宕與巨魚爭雄摘文之士允宜熟讀儒以詩禮發冡詩禮古人之陳迹也猶冡為古人之臭腐也取陳迹而稱迷之何異於發冡而竊古人之臭腐哉大儒臚傳自上語下曰臚自下語上曰傳故殿試唱名曰臚傳大儒呼小儒亦曰臚傳此為遊談竊先生之緒餘者發曰東方作矣事之何若小儒曰未解裙襦口中有珠不須解其裙襦口中有珠在焉詩固有之曰引詩以證口中有珠青青之麥生於陵陂音披生不布施死何含珠為譏富者生而鄙吝死後含珠以下大儒語小儒之言計取珠之法接其鬚擪音壓以手按之其音歲頤下儒以金椎控開也其頤徐别其頰無傷口中珠詩禮乃古人口中之珠世儒教子弟竊而取之又欲其不失古而無損惑哉老萊子之弟子出薪遇仲尼反以告曰有人於彼修長也上而趨促也下末僂背微僂而後耳耳帖腦後視若營四海蒿目而憂當世不知其誰氏之子老萊子曰是𨚑也召而來仲尼至曰𨚑去汝躬矜身矜持也與汝容知動容知慮斯為君子矣仲尼揖而退蹙然改容而問曰業可得進乎老萊子曰夫不忍一世之傷而驁音傲萬世之患抑固窶邪亡其略弗及邪驁放也不忍一世放心憂萬世豈其命當窶耶抑其知慮不及此耶惠以歡為驁終身之醜中民之行進焉耳相引以名相結以隱以恩惠買人之歡為自得甚可醜也常人之行進於此以耳語耳相引以名也或推心置人腹中或施恩於人所不知相結以隱也與其譽堯而非桀不如兩忘而閉其所譽不忍一世之傷者莫若堯坐至一世之傷者莫若桀是堯而非桀斯毁譽生吾堯桀兩忘則無毁無譽矣反無非傷也動無非邪也教化必以其漸民亦歸正而不覺如頓欲反斯世於唐虞民必以為駭而傷其天頓欲鼓動其民舍舊而從新民必放逸而趨邪然則聖人將奈之何哉聖人躊躇以興事以每成功奈何哉其載焉終矜爾聖人豫若冬涉川猶若畏四鄰躊躇而不輕為所以往往有成功今汝奈何哉不忍一世之傷而以萬世事自任哉終見其矜持而徒勞爾宋元君夜半而夢人披髮窺阿門曰豫自宰路淵名之淵豫為清江使河伯之所漁者余音豫且音趨得豫元君覺使人占之曰此神龜也君曰漁者有余且乎左右曰有君曰令余且會朝明日余且朝君曰漁何得對曰且之網得白龜焉其圓音員五尺君曰獻若之龜龜至君再欲殺之再欲活之心疑卜之曰殺龜以卜吉乃刳音枯龜七十二鑽而無遺策仲尼曰神龜能見夢於元君而不能避余且之網知能七十二鑽而無遺策音策不能避刳腸之患如是則知有所困神有所不及也神知根於有生之前數定於有生之後老子曰自吾無身復有何患外其身則不囿於數矣雖有至知萬人謀之雖有至知不如與萬人謀之合衆知以為知也魚不畏綱而畏鵜鶘音提胡去小知而大知明去善而自善矣網大而無情猶之萬人謀也鵜鶘小而有情猶之一人智也魚之畏鵜鶘者畏有情耳小知任已大知任物人能去其任已之知則大知自現善者自善吾不知其善也人能不有其善而去之則衆善畢集而自善矣嬰兒生無石師而能言與能言者處也此習俗之移人見人雖有知亦當與衆謀之惠子謂莊子曰子言無用莊子曰知無用而始可與言用矣吕吉甫曰世情以有知有能者為有用無知無能者為無用而不知無用者乃有用之所自出也夫地非不廣且大也人之所用容足耳然則厠音側足而墊音店掘也之致黃泉人尚有用乎惠子曰無用莊子曰然則無用之為用也亦明矣足之所步踐地幾何必有餘地而後始敢於徐行濶步若掘餘地至黃泉則人不敢行無用之用此為最著莊子曰人有能遊且得不遊乎人而不能遊且得遊乎遊即雲遊也出家之意人生根器有利鈍故遊有能有不能胸次飄灑者自然是出世之人塵根太重者自然是入世之人夫流遁之志決絶之行其非至知厚德之任與音餘覆墜而不反火馳而不顧大抵世緣難斷私欲易牽流遁之志決絶之行乃至知厚德之所任常人不能也夫墮物者誰不反顧火逸者希不顧家今獨不然而後可以與遊雖相與為君臣時也易世而無以相賤故曰至人不留行焉吾觀塵世雖一時之間有貴有賤名為君臣易世之後何貴何賤故至人等為浮雲而廟堂之間無轍迹也所謂人有能遊者且得不遊乎夫尊古而卑今學者之流也且以狶音喜韋氏之流觀今之世夫孰能不波唯至人乃能遊於世而不僻順人而不失己彼教不學承意不彼夫人有古今學無古今尊古而卑今者俗學也上遡狶韋下及今世前浪後浪也後之視今亦猶今之視昔夫孰能禁其不波波相逐乎惟至人知之遊於世而無所偏倚順於人而不失已居塵出塵也彼教不能遊也至人豈惟不學之即時或承不能遊之意而我自我也彼自彼也豈為彼教所移哉目徹為明耳徹為聰鼻徹為顫音鸇口徹為甘心徹為知知徹為德凡道不欲壅壅則哽哽而不止則跈跈則衆害生人耳目口鼻心知不為聲色臭味所壅則為聰明為顫甘為知德壅則哽而不通不通則相蹍踐得失交戰衆害因之以生也物之有知者恃息其不殷非天之罪天之穿之日夜無降人則顧塞其竇人息存則生息去則死息之出入隨子午以消長循陰陽而左右不殷氣不盛也天為人穿其孔竅有升有降人顧自塞其竇俾真元之氣不能與天同周流也哀哉胞有重閬音浪心有天遊室無空虛則婦姑勃豀音奚心無天遊則六鑿相攘大林𨚑山之善於人也亦神者不勝陸西星曰此言虛之為用胞人身脬膜也重閬空曠之地所以行氣者人心亦然中常清淨便為太虛故曰心有天遊於室亦然故室有虛空然後長幼各適不然則婦姑勃豀而怒爭矣以况人心而無天遊則六鑿攘奪終無寧已六鑿即六賊也元神被擾欲求幽靜之地以自安故見大林𨚑山即以為善也精神不能勝之故也若吾之精神足以勝之何為善之哉德溢乎名名溢乎暴謀稽乎誸音弦知出乎爭柴生乎守官事果乎衆宜上德不德故無名有名則德之溢而如水之滿也表暴不藏則名之溢也誸急也御下急則人思以智巧當之故用稽彼此交爭則智慮所由出也執滯於物故柴塞於胸中而與物為梗官者司也謂司事者或宜於一人而不宜於衆人則不可果決惟衆宜而後可果斷行也春雨日時草木怒生銚耨於是乎始修草木之到植者過半而不知其然春雨時若草木沛然而怒生生之速也農人當此時尚知修田器以治田大修行人不知倣仙師設丹房器皿以採藥而接命也獨不聞草木之子入土曰種根入土曰栽折彼枝而插此枝上曰到植草木無知尚可以老而接嫩况人為萬物之靈而命不可接乎故祖師之插梅寄柳亦本乎易之枯楊生稊耳子得仙師之傳而知其然惜人未有信其然者而不思接命何也靜然可以補病眥𡟬音恣滅可以休老寧可以止遽雖然若是勞者之務也非佚佚作逸者之所未嘗過而問焉人知靜功而行之則火降水升其病自己眥𡟬滅其嗜欲則老境自安靜能鎮動故一止可止衆止遽急遽也皆有病而求藥也若佚人則不待遽而先安於止故勞者之務佚者未嘗過而問焉聖人之所以駴音戒天下神人未嘗過而問焉賢人所以駴世聖人未嘗過而問焉君子所以駴國賢人未嘗過而問焉小人所以合時君子未嘗過而問焉佚者兼神聖而言神聖不同迹賢人君子不同者才君子小人則有義利之分矣駴與駭同聳人之視聽也問講求也承上而言勞者之務佚者不問則聖人之事神人不問可知君子賢人小人愈失愈下故其所不問者不過禮樂文物之具小人則惟術數而已道不同不相為謀是故有過而不問者演門有親死者以善毁爵為官師其黨人毁而死者半堯與許由天下許由逃之湯與務光務光怒之紀他音陀聞之帥弟子而踆音存鄙薄之義於窽音欵水諸侯弔之三年申徒狄因以踣百仆二音河演門地名善毁是親死而哭之哀者上之人以為善毁爵之而為官師其黨慕之毁而死者過半不得爵而反以喪其生則好名之過也若乃許由避堯紀他聞之而踆窽務光赴淵申徒狄因之而自沈何為哉則二子始作俑也名也者非聖人之所貴也故至人無名人不得而慕之焉筌者所以在魚得魚而忘筌蹄者所以在兔得兔而忘蹄言者所以在意得意而忘言吾安得夫忘言之人而與之言哉筌魚笱也蹄兔可以取兔者既得則無用矣以言寓意得意則可忘言矣惟忘言之人可與言而行不言之教矣釋氏云渡河須用筏到岸不必船倣此復圭子曰天下物有內外內者可必而外者不可必也若禍自外來忠佞同盡如以忠者為必報與則伍員不沈於江萇弘不化為碧如以孝者為必達與則孝已不憂其逐而曾參不悲其傷豈惟人事不可必木非火也木與木摩則火生而然金非水也以火而守金則金鎔而流猶為順也如陰陽錯行則天地大駭雷雨交作水中有火大槐可焚此天地之水火也而人心憂甚則水生焉溺於淵猶可遊也兩陷於方寸之水無所逃也棟宇焚於祝融猶可救也利害相摩心火生焉焚和甚多月中之水不能解人心之火聽其無可救藥而生理絶矣莊周家貧往貸粟於監河侯監河侯欲候邑金以三百貸之莊周作色曰周昨來視車轍中有鮒魚曰我東海之波臣也君安得升斗之水而活我哉莊周曰我將遊吳越之王激西江之水而活子可乎鮒魚作色曰我失其常處得升斗之水則活耳與其遠而待西江之水來不如早索我於枯魚之肆近而得生之為愈也然則養生家身中有真水不能醍醐灌頂而五氣朝元也惜哉任公子為大鈎巨緇五十犗以為餌投竿東海大魚食之海水震蕩任公子得若魚而臘之以為後世諷説者之驚告况矜小説以干縣令者不如大道以經世也又明矣詩禮古人之陳迹也而所以迹非詩禮也精神也今人誦讀古人之詩禮者何異於發古人之冡得其臭腐而不能得其精神也小儒曰未解裙襦是未見其典藉也口中有珠即詩禮也小儒有詩譏大儒曰青青之麥生於陵陂生不布施死何含珠為是嘲其生不能救世而僅以詩禮傳後也千古而下有讀其書者曰無傷口中珠是摹其陳迹而遺其神理也可乎哉老萊子之弟子出薪遇仲尼於途反以告曰有人於彼修上而趨下未僂而後耳視若營四海不知其誰氏之子老萊子曰召而來仲尼至老萊子曰𨚑也去而矜躬與容知斯為君子矣仲尼曰夫子之業可得進乎老萊子曰夫不忍於一世因而憂萬世者非其命之窮也乃其知之不及此也不知以利買人之歡者中民以為德之進也以名引人以隱結人者是譽堯而非桀也吾以為不如兩忘而無毀無譽故急欲反斯世為唐虞者適以鑿人之真性急欲以仁義而動人者適以啓仁義之邪徑惟聖人能無為而後能無不為彼澤不及一世而欲齊萬世徒勞而無功也宋元君夜半夢人訴之曰豫為清江使者至河伯之所適有余且獲豫覺而使人占之曰此神龜也因訪漁者余且召之至曰漁何得且對曰得白龜焉命獻之殺之以卜七十二鑽而無遺策仲尼曰神龜能見夢於元君而不能避余且之網數也知能七十二鑽而無遺策而不能避刳腸之患亦數之無所逃也如是則知有所通必有所困神有所及必有所不及也故一人之知不如萬人之謀亦猶魚之知畏鵜鶘而不知畏網耳何也小知者大知之害故去小知則明有善者反為善之纍故去善則愈善嬰兒不必學言而自能言與能言者處也何也不能言者大言之根也無用者大有用之基也足之所踐其地幾何其不及踐者乃踐者之大用以為壯行之本也無用顧不重與莊子曰人之根器有利鈍出世之士遊于方之外且得拘于方之內乎入世之人志在方之內且得遊于方之外乎夫雲遊即流遁之志決絶之行非至知而有覺厚德而有道氣者不能非覆墜而不反火逸而不顧者不能吾觀塵世一時之君臣有貴賤而易世何貴何賤故廟堂之上無至人之轍迹夫古之不能不今亦猶水之無平不波也惟至人可方可員正行而不倚旁行而不流非一徹盡徹者安能目明耳聰鼻顫口甘心智知德乎徹則不壅故道不欲壅壅則猶噎者之哽而不通其食必為人所跈而百病集也一呼一吸人之一息也一升一降氣之上下也天固與之人固塞之何哉胞無重閬此一氣不能周流心無天遊則六鑿相攘而不安不然神擾者何喜得𨚑山之善地若吾神果靜世途自鬧吾心自寂何善之有哉德不欲溢名之溢者必自纍也謀貴容與稽乎誸者必其御下急也知識出於爭競執滯生於拘守司事者宜於一人不如宜於衆人之果決也春雨日時陰陽和也草木之興沛然何異於怒而生乎種植者固多而倒植者過半草木無知尚可移接莫知其然而然人知接木之理當知接命之道我命由我不由天矣靜功可以却病滅恣可以休老大定可以止遽勞人之所務也逸者未嘗過而問焉神聖不同者迹賢人君子不同者才其未嘗過而問者均以德言也君子小人則以義利分矣其未嘗過而問者道不同也宋人居喪有善毀而得爵者黨人因毀而死者半許由務光均聞讓天下之語一洗耳一投淵紀他與申徒狄聞之因而踆水沈河皆名為之崇也孰知至人無名乎筌蹄所以取魚兔既得魚兔則筌蹄可忘立言所以達意大意已得則言語亦可相忘安得忘言之人而與之崇無言之教哉雜篇寓言第二十七此莊子自敘其作經之旨人當以聞道而先人如顏成子遊學道九年而臻大妙之境不可如影之待形甲蛻之離而不復合則影滅然待之中又有待焉不可如影之必待火日須臾而陰夜代之則影又滅矣人之形體猶影也生猶火日也死猶夜陰也元神去而軀殼存何異蜩甲與蛇蛻乎而強陽安在哉莊老此喻提醒人當急急覓侶伴訪仙師而求長生寓言十九重言十七巵音支言日出和以天倪此篇先生自敘立言之意寓言猶詩之比體所言在人事而所指多在大道即孟子言近而旨遠之意郭象謂託之他人寓言非也所言者淺故十言而九見信重言謂借重上古帝王大聖大賢之言以取信者十居其七也巵言猶巵酒易於入人之口以况巵言易於入人之耳也和者和合也天倪者人天性之端倪也以巵言和合天倪而出令人鼓動其性天耳寓言十九藉外論之親父不為其子媒親父譽之不若非其父者也非吾罪也人之罪也談性談玄人多不悟故不得不為寓言藉外物論之即下根鈍器聞之必悟矣故談道不可以直言猶親父之不可譽其子也非吾之好為寓言之咎乃下根鈍器者之自取其咎耳與已同則應不與已同則反同於已為是之異於己為非之重言十七所以已止也言也喜同而惡異人之常性是同而非異亦人之常情故借重古人之言以止之是為耆艾年先矣而無經緯本末以期年耆者是非先也人而無以先人無人道也人而無人道是之謂陳人我以耆年為重者以所聞先於我非以年也經緯天經地緯也本末大道之本末也此而先人則人信之人而不聞道則是無以先人也太上云識得人跳出塵無人道也之道乃天何以生人人何以完其精氣神而為真人也不然則亦一陳人而已猶古詩所謂陳死人何重之有巵言日出和以天倪因以曼衍所以窮年巵巵酒也以美言入人之耳曰巵言日出日新而不重復之謂和如和羹之和曼衍如草曼水衍生息不竭以此言而消歲月也不言則齊是非同異惟此言則歸於一理齊與言不齊齊者一也一則忘言矣若一而有言則不一矣言與齊不齊也不言則一設涉於言則一而不一矣故曰無言彼我之見原自不齊故不若不言以待其自齊言無言終身言未嘗言聖人有有言之言有無言之言此則言其無言故如未嘗言終身不言未嘗不言終身不言非緘默也聖人有無言之教即無言若有言也有自也而可有自也而不可有自也而然有自也而不然天下之可不可然不然皆有自惡乎然然於然我無然然於物之所然惡乎不然不然於不然我無不然因物不然惡乎可可於可惡乎不可不可於不可物固有所然物固有所可無物不然無物不可非巵言日出和以天倪孰得其久凡人所謂可不可然不然皆有自來因其所然所可則物之無不然無不可者可得而齊所以能久也若非我以自然之言調和衆口而與之同為是非寧能要諸久遠哉萬物皆種也以不同形相禪始卒若環莫得其倫是謂天均天均者天倪也又自物理而論胎卵濕化物種有萬形雖不同然皆自無始以來形形相禪始終循環莫可得而比擬者要皆以氣聚而生氣散而死於不齊之中有至齊在焉是之謂天均莊子謂惠子曰孔子行年六十而六十化始時所是卒而非之未知今之所謂是之非五十九非也惠子曰孔子勤志服知也勤志即敏求之意服知謂行其所知莊子曰孔子謝之矣已謝去此事而其未之嘗言此不足以言之孔子云夫受才乎大本復靈以生鳴而當律言而當法利義陳乎前而好惡是非直服人之口而已矣夫才受於大本是天降之大才非小有才之才也且其才皆由性靈以生德以濟乎才也時而有鳴以彰志皆合於音律時而有言以範世皆中乎法則利義陳前不能淆好惡是非不能混皆是以言教也止能服人之口不能服人之心使人乃以心服而不敢蘁音悟忤也立定天下之定已乎已乎吾且不得及彼乎不以口服人能使人心服而不敢違逆者是必無言之教也而人心乃定矣吾立定以心服而定天下之定道其止於此乎止於此乎吾且不得而及彼至人心服之教乎已上皆孔子言曾子再仕而心再化謂心化於祿也曰吾及親仕三釜而心樂三釜之粟祿之薄也親及而亦樂後仕三千鍾不洎音計及也謂以厚祿不及其親也吾心悲親不及祿雖厚而亦悲弟子問於仲尼曰若參者可謂無所縣其罪乎縣音玄曰既已縣矣夫無所縣者可以有哀乎彼視三釜三千鍾如鸛雀蚊虻相過乎前也林希逸曰弟子問曾子此言有係纍之罪否疑其前後兩變有悲喜也既已縣矣言只此悲喜便是有係若無係則外物過前猶蚊虻而已豈足悲喜乎必進此一步然後爵祿不入於其心而一塵不挂矣顏成子遊謂東郭子綦音其曰自吾聞子之言一年而野二年而從三年而通四年而物五年而來六年而鬼入七年而天成八年而不知死不知生九年而大妙野返其朴也從順也是非好惡無所逆也通者無我無人無障礙也物如稿木無情識也來謂非幻非滅如往之有來也釋氏之如來本此鬼入與鬼同其屈伸天成與天同其造化然又有箇未始有天未始有人未始有物未始有始也者故八年九年工夫愈細不知有死不知有生乃入於妙入於大妙則與道合真矣不知死是不死也不知生是不生也釋氏不生不滅本此生有為死也勸公以其死也有自也而生陽也無自也而果然乎惡乎其所適惡乎其所不適生則有為死則無為有死生之見自私者也若勸之以公而無私則不知有死矣生而為死之所自故聖人外其身而身存以其無私能成其私所以勸公也夫人皆以其死也有自也謂有大司命以宰之也而生陽也俄而自無而有疑其為無自也而果然無自乎不知方生方死方死方生必然之理夫人惟聽造化為陶冶耳適者往也惡乎以生為得所當往而適其生乎惡乎以死為不得所不當往而不適其死乎不敢與造化爭衡也天有厯數地有人據吾惡乎求之此以造化之不可知者反復徵問厯數謂日月星辰之數人據謂圖書禹貢地理之可據者二者猶不足以盡天地之理莫知其所終若之何其無命也莫知其所始若之何其有命也有以相應也若之何其無鬼邪無以相應也若之何其有鬼邪以為無命耶窮之不知其所終以為有命耶遡之不見其所始以為無鬼耶屈伸往來氣機不爽以為有鬼耶善未必福仁未必夀造化之妙不可知者如此衆罔兩影邊淡薄者問於景音影曰若向也俯而今也仰向也括括髮而今也被髮向也坐而今也起向也行而今也止何也景曰叟叟也影稱罔兩之詞奚稍問也汝何必稍稍而問豫有而不知其所以我之俯仰行止皆有所待汝獨不知其所以然耳豫蜩音條甲也蛇蛻音脫也似之而非也甲蛻一離不復聯屬形影則離合有時火與日吾屯屯聚有影也陰無日與夜無火吾代代之而去也衆罔兩故稱曰叟叟若隱若顯之謂罔生於影影生於形俯仰行止隨人而已寧知所以哉譬之蜩已化而甲在蛇已化而蛻在以此為比亦近似之而非也影得日與火則屯聚而顯遇陰與夜則代去而隱彼形也吾影也所以有待耶無形則無影故影必待形而况乎以有待者乎影待形也而形則何所待乎有待者必有待待者待者形操其權而况待待者又有所以主張乎形者非彼之所待乎彼來則我與之來彼往則我與之往彼強陽猶言強健則我與之強陽強陽者又何以有問乎彼形也我影也影不能自來往必待形以為來往影不能自強健必待形以為強健及問強健者誰為之強健乎又問強健者果能長強健否乎知此則知形亦影也影亦罔兩也皆為幻相而非真實也有志之士何不訪真人跳出有待之外自為解脫而步日月無影乎陽子居姓陽名戎字子居列子作楊朱南之沛老聃西遊於秦邀於郊至於梁而遇老子老子中道仰天而歎曰始以汝為可教今不可也陽子居不答至舍進盥音管潄音嗽巾櫛脫屨戶外膝行而前曰向者弟子欲請夫子夫子行不間音間是以不敢今間矣請問其故不可教之故老子曰而睢睢音疽仰目盱盱音虛張目皆傲狀而誰與居人將畏難而疏遠也大白若辱道高之人心中無一毫點染內懷玉也而外被褐和光同塵使人不識若辱也盛德若不足道愈高而心愈下德盛而志愈謙不自滿足也陽子居蹴然變容曰敬聞命矣其往也舍者迎將其家公主人公執席妻執巾櫛舍者避席煬音陽炊也者避竈其反也舍者與之爭席矣同一楊朱也一舍者也始而避不止於不爭既而爭不止於不避曷以故始而露其丰頴故人見而敬之既而深自韜晦故人視之以為尋常矣復圭子曰南華老仙自揆立言既多恐人殉迹而失真宗乃自説破其立言之法有三寓言重言巵言也使人知尋其正脈耳凡言人事寓言大道十中有九欲人保全性天也凡言帝王聖賢有徵而可信十中有七欲人之不疑也巵言如巵酒在手和天倪而出令人爽口因以爽心不覺鼓舞而興起也此何以故以人之根有上下器有利鈍也故就性天而言性天不若藉外物而論性天之易明也即親父不譽其子之説也寓言也就庸言而醒庸人不若借聖諦而聳庸人之悅從也即是同而非異之説也重言也人之以年先人而聞道不先吾終謂之陳人而不謂之先人不如以美言曼衍使人知窮其根源也巵言也道有言乎無言乎言者齊乎不言者齊乎吾以不言為齊則言而愈不齊矣吾以言與不言俱不齊也毋寧不言乎毋寧言而同不言乎終身言未嘗言言齊不言也終身不言未嘗不言不言齊言也可不可然不然均之有所自吾無然不然因其物之然不然也吾無可不可因其物之可不可也物物有天物物有倪吾以巵言和而出之則天下之言齊而久遠之情得矣號物之數謂之萬形不一也而相禪同造化之所循環形不倫也而天均同天均者即天倪也人之所以成性物之所以成物不外乎此耳莊子與惠子曰孔子行年六十不惟渣滓化而是非亦化聲為律言為法利義不淆好惡是非合宜服人之口非難而服人之心為難也曾子再仕而心再化其先仕而心樂樂親之與養也非樂三釜之粟也其既仕而心悲悲親之不與養也非悲千鍾之粟也即此猶係心於悲喜也其去哀樂不能入而爵祿不介懷者尚隔一膜矣顏成子遊進乎東郭子綦之道一年而復還乎太朴二年而與道不違三年而撤人我之障四年而情識不著五年而獨往獨來釋氏之如來本此也六年而役使鬼神與鬼神合其吉凶也七年而天即我我即天與天地合其德也八年而忘死生心經之不生不滅本此也九年而大妙與道合真即太上無欲以觀其妙也生則有為猶有私而不為者死則無人不然乃大公也死陰也人之死不死於死之日其來蓋有自矣而生陽也以為無自者不知死生同途陰陽一理惡乎適惡乎不適也在天有厯數之可按在地有圖書之可據天文地理甚為彰著也昭昭生於冥冥終無其終而始無其始故謂之無命不可謂之有命亦不可有倫生於無形體物不遺謂之無鬼不可不見不聞謂之有鬼亦不可罔兩生於影影生於形俯仰行止皆隨形也影外微陰非一故曰叟叟豫影自謂也豫雖有影而不知其所以然之故形之有影猶之蜩已化而甲在蛇已化而蛻在以此為比亦似之而非也火與日則影生陰與夜則影滅吾之所待者非火日耶而况乎又有所待者火日乎形體乎彼火日有來往吾亦與之為來往彼形體有強陽吾亦與之為強陽形影且為幻也况強陽亦非真也又何必問其孰為真乎孰為幻乎陽子遇老子於中道老子仰天而歎曰吾始以汝為可教今不可教也陽子至舍盥洗潄巾櫛膝行而前曰請問其所以不可教者何也老子曰善觀人者不於動容而於眉睫而睢睢盱盱目中無人人誰與之居者大白若辱不露一鋒頴也盛德若不足不矜一知識也吾教子止於此矣陽子斂容易色曰謹受教當其未受教之時此一陽子也公與妻胡為而執席執巾櫛舍者焬者胡為而避席避竈及既受教之後亦此一陽子也舍者胡為而與之爭席豈止不執席而已哉良由太上數語默化即良賈深藏若虛盛德不足若愚之意也可見道德揚於外不若藏於內與其使人知之者淺不若使人不知者深也陽子一言而頓悟易悟也哉雜篇讓王篇第二十八蘇長公謂讓王以下數篇非莊子所作豫謂中有數段非莊子不能作恐有漢儒竄入語不全是而亦不全非也其曰道之真以治身其緒餘以為國家其土苴以治天下乃莊子內聖外王之學三語可以蔽全部南華此篇厯引薄富貴而重生者安貧賤而樂志者第惟北人無擇卞隨瞀光三人藐天下寧赴淵而不悔為吾儒所不取不知此三人逆知今日有揖讓他日必有征誅有征誅必有篡弒有篡弒必有屠滅有屠滅必有改封建既改封建必有華犁夷庭夷亂中華之漸高士先覺故預赴淵以杜其漸耳即南華所謂絶聖棄智而民不亂剖斗折衡而民不爭之意也此等遠見非學有淵源而大有道氣者安足以語此後有聞風而興起者自伯夷叔齊而後不多見也堯以天下讓許由許由不受又讓於子州支父音甫支父字也即支伯也子州支父曰以我為天子猶之可也雖然我適有幽憂幽隱也猶云隱憂病只是為物纍耳之病方且治之未暇治天下也夫天下至重也而不以害其生又况他物乎惟無以天下為者可以託天下也無心於天下者而治天下方不為天下所纍舜讓天下於子州支伯子州支伯曰豫適有幽憂之病方且治之未暇治天下也故天下大器也而不以易生此有道者之所以異乎俗者也上言不以重務傷生此言不以外物而易吾生總重養生上所以為道德之書舜以天下讓善卷善卷曰余立於宇宙之中冬日衣皮毛夏日衣葛絺春耕種形足以勞動秋收斂身足以休食日出而作日入而息逍遙於天地之間而心意自得吾何以天下為哉悲夫子之不知豫也遂不受於是去而入深山莫知其處今常德府武陵縣南蒼山有善卷壇宋政和中賜號遁世高蹈先生郡守李燾為壇記壇之近仍有其墳自適其適故不適人之適舜以天下讓其友石戶之農石戶地名農農夫也石戶之農曰捲捲音權捲捲勤勞貌乎后之為人葆力之士也以舜之德為未至也葆力謂窮力以養人非以德者故德為未至於是夫負妻戴攜子夫以背負物妻以首戴物手攜其子乃隱士之風以入於海終身不反也太王亶父音甫居邠狄人攻之事之以皮帛而不受事之以犬馬而不受事之以珠玉而不受狄人之所求者土地也太王亶父曰與人之兄居而殺其弟與人之父居而殺其子吾不忍也子皆勉居矣為吾臣與為狄人臣奚以異且吾聞之不以所用養土地害所養人也因杖策而去之民相連而從之遂成國於岐山之下夫太王亶父可謂能尊生矣尊生以身為重外物為輕也能尊生者雖富貴不以養傷身雖貧賤不以利纍形有身不能無養有生不能無纍富貴者樂於養養過傷生貧賤者迫於利利失則纍形免此二患乃所謂尊生也今世之人居高官尊爵者皆重失之見利輕亡其身豈不惑哉越人三世弒其君王子搜患之逃乎丹穴南戴曰為丹穴而越國無君求王子搜不得從之丹穴王子搜不肯出越人薰之以艾乘以王輿王子搜援綏登車仰天而呼曰君乎君乎獨不可以舍我乎王子搜非惡為君也惡為君之患也若王子搜者可謂不以國傷生矣此固越人之所欲得為君也搜無意於國故可託以國韓魏相與爭侵地子華子魏人見昭僖侯韓侯昭僖侯有憂色子華子曰今使天下書銘誓約於君之前書之言曰左手攫音却之攘而取之也則右手廢斷而去之也右手攫之則左手廢然而攫之者必有天下君能攫之乎昭僖侯曰寡人不攫也子華子曰甚善自是觀之兩臂重於天下也身亦重於兩臂韓之輕於天下亦遠矣今之所爭者其輕於韓又遠君固愁身傷生以憂戚不得也僖侯曰善哉教寡人者衆矣未嘗得聞此言也子華子可謂知輕重矣攘其銘而可以有天下憂斷臂者且不攘之何則臂重而天下輕也韓輕於天下而韓之所爭又輕於韓乃以其故而愁身傷生是亦重於失一臂矣為至輕而傷至重可不謂惑乎魯君聞顏闔得道之人也使人以幣先焉顏闔守陋閭苴布之衣而自飯牛喂牛食也魯君之使者至顏闔自對之使者曰此顏闔之家與音余顏闔對曰此闔之家也使者致幣顏闔對曰恐聽者謬誤也謂誤聽也而遺使者罪不若審之使者還音旋反審之復來求之則不得已故若顏闔者真惡富貴者也富貴非可惡也亦顧其時何如耳如堯舜在御則廟堂之上不可無皋夔而猶然為顏闔之行吾恐其非惡富貴也或者祗以藏拙耳故曰道之真以治身其緒餘以為國家其土苴以治天下由此觀之帝王之功聖人之餘事也非所以完身養生也今世俗之君子多危身棄生以殉物豈不悲哉呂祖云萬物皆是假惟有一道真此真字學者不得草草讀過在天地為太極在人身為先天真一之氣自情竇開則真氣喪故玄門有採真之遊真以治身也其緒餘土苴則皆有為之法故聖人用之以治家國天下帝王之功聖人之餘事所謂粳粃糟粕陶鑄堯舜者土苴糞草也凡聖人之動作也必察其所以之與其所以為今且有人於此以隨侯之珠彈千仞之雀世必笑之是何也則其所用者重而所要者輕也夫生者豈特隨侯之重哉陸西星曰所以之謂心之所往所以為謂事之所為如人意在得雀則雖以珠彈而不顧世人笑之而彼不以為非也其所以之之者差也子列子窮容貌有飢色客有言之於鄭子陽者曰列禦寇蓋有道之士也居君之國而窮君無乃為不好士乎鄭子陽即令官遺之粟子列子見使者再拜而辭使者去子列子入其妻望之而拊音撫心曰妾聞為有道者之妻子皆得佚樂今有飢色君過而遺先生食先生不受豈不命邪子列子笑而謂之曰君非自知我也以人之言而遺我粟至其罪我也又且以人之言此吾所以不受也其卒民果作難而殺子陽子陽為人嚴酷舍人折弓畏子陽怒責因國人逐猘狗而殺子陽禍不及列子可謂有見幾之明者矣楚昭王失國屠羊説音悅走而從於昭王昭王反國將賞從者及屠羊説屠羊説曰大王失國説失屠羊大王反國説亦反屠羊臣之爵祿已復矣又何賞之有王曰強之屠羊説曰大王失國非臣之罪故不敢伏其誅大王反國非臣之功故不敢當其賞王曰見音現之屠羊説曰楚國之法必有重賞大功而後得見今臣之知不足以存國而勇不足以死寇吳軍入郢説畏難而避寇非故隨大王也今大王欲廢法毁約而見説此非臣之所以聞天下也王謂司馬子綦曰屠羊説居處卑賤而陳義甚高子其為我延之以三旌之位諸侯之三卿也屠羊説曰夫三旌之位吾知其貴於屠羊之肆也萬鍾之祿吾知其富於屠羊之利也然豈可以貪爵祿而使吾君有妄施之名乎説不敢當願復反吾屠羊之肆遂不受也居屠肆而守義若説者不當以屠羊目之矣原憲居魯環堵之室茨以生草蓋屋草不芟蓬戶不完桑以為樞而甕牖一室破甕為牖褐以為塞以褐衣塞牖上漏下溼匡坐而弦鳴琴也子貢乘大馬中紺而表素軒車不容巷往見原憲原憲華冠縰音洗履冠裂如花開曰華履不著根曰縰杖藜而應門子貢曰嘻先生何病原憲應之曰憲聞之無財謂之貧學而不能行謂之病今憲貧也非病也子貢逡音皺巡而有愧色原憲笑曰夫希世而行比周而友學以為人學當為已而反以為人教以為已教當為人而反以為已仁義之慝依仁義以為姦輿馬之飾憲不忍為也原憲所言語語皆規子貢也子貢即善辨亦不能不愧屈矣曾子居衛緼袍無表顔色腫噲虛浮之貌手足胼胝音支三日不舉火十年不製衣正冠而纓絶冠久而敝捉襟而肘見言袖之短納履而踵決見履之敝曳縰而歌商頌聲滿天地若出金石有節奏也天子不得臣諸侯不得友故養志者忘形養形者忘利致道者忘心矣忘形忘利凡有志者皆可能也至於忘心非心齋坐忘不能故下文云顔回孔子謂顔回曰回來家貧居卑胡不仕乎顔回對曰不願仕回有郭外之田五十畝足以給飦音堅糜也粥郭內之田十畝足以為絲麻鼓琴足以自娛所學夫子之道者足以自樂也回不願仕孔子愀然變容曰善哉回之意𨚑聞之知足者不以利自纍也足乎已無待於外也審自得者失之而不懼在我者有以自得則外物之失不足喜懼行修於內者無位而不怍不以人不知為愧𨚑誦之久矣今於回而後見之是𨚑之得也不知者以回之不仕為回之有所得而夫子用行舍藏與回同心故不曰回之得而曰𨚑之得也中山公子牟魏之公子封中山君名牟謂瞻子曰身在江海之上心居乎魏闕之下魏闕王之象魏門也志在富貴則不能忘奈何瞻子曰重生重生則利輕知生之為重則生之外無足重者中山公子牟曰雖知之未能自勝也牟雖知生可重物可輕然其心不能自勝也瞻子曰不能自勝則從神無惡乎不能自勝而強不從者此之謂重傷重傷之人無夀類矣瞻子教之曰汝不能勝則從之乎蓋人有元神有識神元神好清淨識神則見境生情所以學道之人先要降此識神不然則清淨之中不勝擾擾而元神惡之所不免矣夫我之元神不能以勝欲又強不從而使之從是謂重被其傷分明神受傷之甚故去人而死也魏牟萬乘之公子也其隱巖穴也難為於布衣之士雖未至乎道可謂有其意矣一念不起萬緣皆空而後真性始得牟以公子學道視韋布之士薰習猶深故勝之愈難所謂身雖隱而心不隱也孔子窮於陳蔡之間七日不火食藜羹不糝音傘不糝純菜而無米也顔色甚憊音敗而弦歌於室顔回擇菜子路子貢相與言曰夫子再逐於魯削迹於衛伐樹於宋窮於商周圍於陳蔡殺夫子者無罪籍凌轢之意夫子者無禁弦歌鼓琴未嘗絶音君子之無恥也若此乎顔回無以應入告孔子孔子推琴喟然而歎曰由與賜細人也召而來吾語之子路子貢入子路曰如此者可謂窮矣孔子曰是何言也君子通於道之謂通窮於道之謂窮今𨚑抱仁義之道以遭亂世之患其何窮之為故內省而不窮於道臨難而不失其德天寒既至霜雪既降吾是以知松柏之茂也陳蔡之隘於𨚑其幸乎孔子削然孤高之貌反琴復鼓琴而弦歌子路扢音訖然執干而舞子貢曰吾不知天之高也地之下也仰夫子之道如天地古之得道者窮亦樂通亦樂所樂非窮通也道德於此則窮通為寒暑風雨之序矣故許由娛於頴陽山名而共伯名和得乎𨚑首山名共伯修行及周厲王之難諸侯請以為天子即位十四年大旱屋焚卜于太陽兆曰厲王為崇召公乃立宣王共伯復歸於宗逍遙得意共山之首舜以天下讓其友北人無擇北人無擇曰異哉后之為人也居於畎畝之中而遊堯之門不若是而已又欲以其辱行漫我吾羞見之因自投清冷之淵不若是而已猶言不寧惟是此段居乎卞隨瞀光之首者以投淵為二人之望也湯將伐桀因卞隨而謀卞隨曰非吾事也湯曰孰可曰吾不知也湯又因瞀音務光而謀瞀光曰非吾事也湯曰孰可曰吾不知也湯曰伊尹何如曰強力忍垢徂兵須力弒君須忍辱吾不知其他也湯遂與伊尹謀伐桀克之以讓卞隨卞隨辭曰后之伐桀也謀乎我必以我為賊也勝桀而讓我必以我為貪也吾生乎亂世而無道之人再來漫我以其辱行吾不忍數音朔聞也乃自投稠音周在頴陽水而死湯又讓瞀光曰知者謀之武者遂之仁者居之古之道也吾子胡不立乎瞀光辭曰廢上非義也殺民非仁也人犯其難我享其利非廉也吾聞之曰非其義者不受其祿無道之世不踐其土况尊我乎吾不忍久見也乃負石而自沈於廬水按三自沈乃慕洗耳與汙牛口之風而過焉者也君子之所不取昔人謂三代之後士惟恐不好名孰知三代之前士有好名如此之甚者乎昔周之興有士二人處於孤竹曰伯夷叔齊二人相謂曰吾聞西方有人似有道者試往觀焉至於岐陽武王聞之使叔旦往見之與之盟曰加富二等倍其祿就官一列重其爵血牲而埋之二人相視而笑曰嘻異哉此非吾所謂道也昔者神農之有天下也時祀盡敬而不祈喜其於人也忠信盡治而無求焉樂與政為政樂與治為治不以人之壞自成也不以人之卑自高也不以遭時自利也不以人壞三段乃上聖至德之事作一冒下正明周之不然所以針萬世之為人臣者今周見殷之亂而遽為政上謀而下行貨上則用謀而下則用貨阻兵而保威阻撓人之兵以自固其威割牲而盟以為信不能以德為信而割牲以代之揚行以説衆不能見而民莫不説而必自陳功德以悅之殺伐以要利是推亂以易暴也推尊亂德之周以易暴虐之殷吾聞古之士遭治世不避其任遇亂世不為苟存今天下暗周德衰其並音傍乎周以塗塗炭吾身也不如避之以潔吾行二子北至於首陽之山遂餓而死焉若伯夷叔齊者其於富貴也苟可得已則必不賴高節戾行如管仲之事桓公魏徵之事太宗獨樂其志不事於世此二士之節也世至殷末臣弒其君者國有子弒其父者比肩篡逆之風將何底止故夷齊不餓於他山而餓於首陽者何也蓋君明臣良百姓熙皞陽舒用事之世也主暴臣逆世界愁苦陰慘用事之世也夷齊之餓首陽而死之心祈聖主當陽反斯世為唐虞回陰慘為陽舒耳豈止愧萬世天下為人臣之懷二心者復圭子曰此以讓王名篇輕富貴也蓋其所重者不在富貴而在生也人苟知生之為重即天子可藐天下可輕矣昔堯以天下讓許由而許由不受者不以天下之大入其耳也讓子州支父而支父不受者不以天下害其生也舜讓天下於子州支伯而支伯不受者不以天下易其生也以天下讓善卷而善卷逃入山者自適其適而不適人之適也又以天下讓石戶之農而農攜妻子以入於海者謂至德之士知有其身而不知有天下嗣是太王棄邠遷岐無以養人而害人不惟自尊其生且知百姓之生尊也惟尊生者可以富貴不以外物而賊生惟尊生者可以貧賤不以貪得而損生胡今人兩者胥失終身不解也越人三世弒其君王子搜逃乎丹穴迫而後起不得已而後為君非惡為君也惡為君之患也韓昭侯寧不有天下而不肯廢左右手者知兩臂重於天下也身又重於兩臂韓又輕於天下君胡為爭其所輕愁身傷生而不顧也顏闔不受魯君之幣使者復至而先逃此豈惟輕富貴且直惡之矣若顏闔者可謂得好惡之真也由此觀之萬物皆是幻惟有一道真此真乃人生先天真一之祖氣學者須尋侶伴訪仙師覓外護以返還此真氣乃可以長生久視若帝王之功家國天下之事業儒者以為奇覯而真人視之特緒餘與土苴耳完身養生者之所不屑也視富貴雖可欲也不啻如一雀生尤可欲也不啻如隨珠世人舍所重以徇所輕何異以隨侯之珠而彈千仞之雀乎列子不受鄭子陽之餽粟非惡粟也惡其不出己見而信人言以餽遺安知他日不以人言而罪我此其所以不受也故後鄭子陽之難作而禍亦不及焉楚昭王失國屠羊説從之遊後昭王返國賞及屠羊説詎知屠羊説之所見有超乎爵祿之外者曰大王失國彼失屠羊大王反國彼反屠羊以故業為爵祿而不以外加為爵祿若而人也不敢任受失國之罪故亦不敢任受反國之功耳昭王嘉其品欲常常而見之屠羊説以王為廢法而輕下士也不聞命焉王謂司馬子綦曰屠羊説居處卑賤而陳義甚高子為我延以三旌之位屠羊説曰以三旌較屠羊其貴賤懸矣以萬鍾較屠羊之利其貧富又懸矣然而終不可貪富貴而致吾君有妄施之名不受寧以屠羊終焉原憲居魯茅茨而桑樞甕牖而褐塞匡坐而絃歌其自得可知矣子貢軒車往見原憲曰噫先生何病原憲應之曰憲聞之無財之謂貧學而不能行之謂病今憲貧也非病也憲獨愧希世比周者學不能為已教不能為人借仁義以文其姦而飾輿馬以驕人者吾不忍也子貢其何詞以對曾子居衛袍緼形勞煙火希舉冠纓斷絶曳縰而歌商頌聲徹天滿天徹地滿地其聲鏘疑出於金其聲確又疑出於石天子得而慕之不得而臣之諸侯得而師之不得而友之故養形者忘利煉精還氣也養志者忘形煉氣還神也至於致道而忘心則煉神還虛矣孔子以顏回之貧而勸之仕不知回不知其貧也有負郭之田五十畝飦粥之所給郭內之田十畝絲麻之所資鼓琴足以自娛所學有夫子之道其樂在性天而不在仕進也孔子愀然變容曰善哉回之知足也不以利而傷行善哉回之自得也不以外失而有懼善哉回之內修也不以無位而取怍用行舍藏吾與回有同心不惟回之得而亦𨚑之得也中山魏公子牟慕道而居江海心猶未忘魏闕求禁止之術於瞻子瞻子曰子能知生之為重則外物皆輕矣胡牟明知之而以生與外物較其數不勝也瞻子曰夫人神好靜而欲牽之神不勝擾欲必為元神之所惡子強不從者而從之不能自勝一傷也強而抑之又一傷也故曰重傷重傷之人無夀類矣孔子窮於陳蔡七日不火食弦歌鼓琴未嘗絶音子路子貢以為君子之無恥孔子曰君子當其通時非通也通於道之謂通當其窮時非窮也窮於道之謂窮今𨚑有其道而無其遇何以為窮當窮而道在遇難而德見歲寒霜雪然後知松柏之茂也陳蔡之隘子以為憂而𨚑以為幸也孔子反琴弦歌如故子路執干而舞其所得猶淺也子貢乃撫然曰吾今而後始知夫子之道猶天地吾安知天之高也地之下也道之有窮通猶天地之有寒暑風雨古之得道者無往而不樂所樂非窮通也視窮通為寒暑風雨之序耳故許由娛於頴陽而共伯得乎𨚑首古之人又有甘窮死而不甘於通者一見於北人無擇謂居畎畝者胡為而遊巖廊羞受舜禪而寧投於清冷之淵再見於卞隨謂湯伐桀而與我謀必以我為賊也勝桀而讓我必以我為貪也乃自投稠水而死三見於瞀光以不義之祿為不可受無道之土為不可踐况肯尊居民上乎乃負石而沈於廬水若而人也非惟不知有窮通且不知有死生三人之心何心哉逆知揖讓者征誅之漸也放伐者篡弒之始也目不忍見耳不忍聞故以一死而挽愈趨愈下之頽風後有聞風興起者伯夷叔齊是也其始而之西周也以西周有有道之人也已而不受周之爵祿也猶不能忘情於神農之世祭盡敬而不祈福治盡信而無所求不以人之壞自成也則不利其壞可知不以人之卑自高也則不樂其卑可知不以遭時自利也則不願逢時又可知今周獨不然殷好亂而周好整殷無識而貨聚周用謀而財散殷人畔而心離周人聯而信結其作誓以要衆也征伐以市利也何為推尊亂德之周以易暴虐之殷乎獨不聞上古之士其遭治世也以一身任天下而不辭其遇亂世也欲苟存於旦夕而不忍吾與其傍周以辱吾身也何如遠避之以潔吾行乎於是逃之首陽之山遂餓而死焉二子之於富貴可已則已非為苦節不可貞也亦非恥為含垢以立虛名也身處商周之交世界缺陷君臣分絶吾欲以渺然之軀率天下諸侯西向返周為商力既有所不能吾欲隱忍以商臣而踐周之土食周之毛義又有所不可惟有死之一字可以贊化育扶綱常俾當時後世篡臣凛凛然而改心易慮則夷齊非聖之清也實聖之任也非啻聖之任也實聖之時也即至人上聖居夷齊之地處夷齊之時不得不為夷齊之餓也後有作者弗可及已雜篇盜跖第二十九意淺語弱展卷便知為漢儒所作古德喝佛罵祖為報深恩丹霞燒木佛以求舍利無乃效尤而過者乎首段詆毁帝王譏侮聖賢處無大意味中段託為滿苟得謂矯飾以全忠信不如直情之為愈末段託為知和不貪不廉之説平為福有餘為害之語可謂竊南華之皮相而未竊其精神識者以為何如孔子與柳下季為友姓展名獲字季禽居柳下諡惠至孔子生八十餘年至子路之死百五六十歲是寄言也柳下季之弟名曰盜跖盜跖從卒九千人橫行天下侵暴諸侯穴室樞戶穿人之屋啓人之戶樞驅人牛馬取人婦女貪得忘親不顧父母兄弟不祭先祖所過之邑大國守城小國入保萬民苦之孔子謂柳下季曰夫為人父者必能詔其子為人兄者必能教其弟若父不能詔其子兄不能教其弟則無貴父子兄弟之親矣今先生世之才士也弟為盜跖為天下害而弗能教也𨚑竊為先生羞之𨚑請為先生往説音稅之柳下季曰先生言為人父者必能詔其子為人兄者必能教其弟若子不聽父之詔弟不受兄之教雖今先生之辨將奈之何哉且跖之為人也心如涌泉意如飄風強足以拒敵辨足以飾非順其心則喜逆其心則怒易辱人以言先生必無往季言跖之強暴非禮義所能化誨孔子不聽顏回為馭子貢為右往見盜跖盜跖乃方休卒徒太山之陽膾人肝而餔日申時食也之孔子下車而前見謁者曰魯人孔𨚑聞將軍高義敬再拜謁者謁者入通盜跖聞之大怒目如明星髮上指冠曰此夫魯國之巧偽人孔𨚑非邪為我告之爾作言造語妄稱文武冠枝木之冠枝木之冠皮為冠謂華飾如枝繁也帶死牛之脅以牛皮為帶即革帶也多辭謬説不耕而食不織而衣搖脣鼓舌擅生是非以迷天下之主使天下學士不反其本妄作孝弟而徼幸於封侯富貴者也子之罪大極重疾走歸不然我將以子肝益書餔之膳孔子復通曰𨚑得幸於季謂與下季相親求以自適也願望履幕下一見於幕下而望其履也謁者復通盜跖曰使來前孔子趨而進避席反走再拜盜跖盜跖大怒兩展其足案劍瞋音甸目張目也聲如乳虎曰𨚑來前若所言順吾意則生逆吾心則死孔子曰𨚑聞之凡天下有三德生而長大美好無雙少長貴賤見而皆説音悅之此上德也知維天地知可以包羅天地天地不能出其知之外能辨諸物才能可辨名物此中德也勇悍果敢聚衆率兵此下德也凡人有此一德者足以南面稱孤矣今將軍兼此三者身長八尺二寸面目有光脣如激丹齒如齊貝音中黃鍾而名曰盜跖𨚑竊為將軍恥不取焉將軍有意聽臣請南使吳越北使齊魯東使宋衛西使晉楚使為將軍造大城數百里立數十萬戶之邑尊將軍為諸侯與天下更始罷兵休卒收養昆弟共祭先祖此聖人才士之行而天下之願也盜跖大怒曰𨚑來前夫可規以利而可諫以言者皆愚陋恆民之謂耳今長大美好人見而説之者此吾父母之遺德也𨚑雖不吾譽吾獨不自知邪且吾聞之好面譽人者亦好背而毀之今𨚑告我以大城衆民是欲規我以利而恆民畜我也安可長久也城之大者莫大乎天下矣堯舜有天下子孫無置錐之地湯武立為天子而後世絶滅非以其利大故邪且吾聞之古者禽獸多而人民少於是民皆巢居以避之晝拾橡栗暮棲木上故命之曰有巢氏之民古者民不知衣服夏多積薪冬則煬音樣之故命之曰知生之民神農之世卧則居居起則于于民知其母不知其父與麋鹿共處耕而食織而衣無有相害之心此至德之隆也然而黃帝不能致德與蚩尤戰於涿音卓鹿之野流血百里神農之後第八帝曰榆罔世蚩尤氏強與榆罔爭王逐榆罔榆罔與黃帝合謀擊殺蚩尤涿鹿之戰征伐之所自起也堯舜作立羣臣湯放其主武王殺音弒紂自是之後以強凌弱以衆暴寡湯武以來皆亂人之徒也今子修文武之道掌天下之辨以教後世縫衣縫掖之衣大袂單衣淺帶縫帶使淺狹矯言偽行以迷惑天下之主而欲求富貴焉盜莫大於子天下何故不謂子為盜𨚑而乃謂我為盜跖子以甘辭説音稅子路而使從之使子路去其危高也冠解其長劍而受教於子天下皆曰孔𨚑能止暴禁非其卒之也子路欲殺音弒衛君而事不成菹音葅於衛東門之上是子教之不至也詆毀夫子教人非子自謂才士聖人邪則再逐於魯削迹於衛窮於齊圍於陳蔡不容身於天下子教子路菹此患上無以為身下無以為人子之道豈足貴邪世之所高莫若黃帝黃帝尚不能全德而戰涿鹿之野流血百里堯不慈舜不孝禹偏枯湯放其主武王伐紂文王拘羑里此六子者世之所高也孰論之皆以利惑其真而強反其情性其行乃甚可羞也世之所謂賢士伯夷叔齊辭孤竹之君而餓死於首陽之山骨肉不葬鮑焦飾行非世抱木而死申徒狄諫而不聽負石自投於河為魚鱉所食介子推至忠也自割其股以食音嗣文公文公後背之子推怒而去抱木而燔音煩燒也死尾生與女子期於梁下女子不來水至不去抱梁柱而死此四者無異於磔音翟張其尸曰磔犬流豕言其身之自殺如殺犬豕也操瓢而乞者皆離名離麗也泥著於名也輕死不念本不知本真之性養夀命者也世之所謂忠臣者莫若王子比干伍子胥子胥沈音沉江比干剖心此二子者世謂忠臣也然卒為天下笑自上觀之至於子胥比干皆不足貴也𨚑之所以説音稅我者若告我以鬼事則我不能知也若告我以人事者不過此矣皆吾所聞知也今吾告子以人之情目欲視色耳欲聽聲口欲察味志氣欲盈人上夀百歲中夀八十下夀六十除病瘦死喪憂患其中開口而笑者一月之中不過四五日而已矣天與地無窮人死者有時操有時之具而託於無窮之間忽然無異騏驥之馳過隙也不能悅其志意養其夀命者皆非通道者也𨚑之所言皆吾之所棄也亟去走歸無復言之子之道狂狂汲汲詐巧虛偽事也非可以全真也奚足論哉孔子再拜趨走出門上車執轡三失目芒然無見色若死灰據軾低頭不能出氣歸到魯東門外適遇柳下季柳下季曰今者闕然數日不見車馬有行色得微往見跖邪孔子仰天而歎曰然柳下季曰跖得無逆汝意若前乎孔子曰然𨚑所謂無病而自炙也疾走料音聊虎頭扁音鞭虎須幾不免虎口哉須作鬚此戰國策士之言若莊子所作必能代夫子折伏盜跖而豈作此狀耶子張問於滿苟得亦是寓言之名但求苟得以滿其欲者子張學干祿故復託之曰盍不為行無行則不信不信則不任不任則不利故觀之名計之利而義真是也若棄名利反之於心則夫士之為行不可一日不為乎滿苟得曰無恥者富多信者顯夫名利之大者幾在無恥而信故觀之名計之利而信真是也若棄名利反之於心則夫士之為行抱其天乎滿苟得蓋亦盜跖之徒觀其寓言謂但求苟得以滿其欲者子張之意主於為名苟得之意主於為利盍不為行言汝何不修行以為名利之媒乎苟反於心豈真有見義之當然而不可一日不為者乎分明是為名利而修行也苟得則以為名利者不在於修行而在於無行故名利之大者其幾在無恥而多信故觀名計利而信其真在于是也若棄名利而反之心以自審則夫士之為行也豈真一無所為而抱其天乎抱如抱一之抱言與之相守而不離也子張曰昔者桀紂貴為天子富有天下今謂臧聚曰盜跖竊聚之人汝行如桀紂則有怍色有不服之心者小人所賤也仲尼墨翟窮為匹夫今謂宰相曰子行如仲尼墨翟則變容易色稱不足者士誠貴也故勢為天子未必貴也窮為匹夫未必賤也貴賤之分在行之美惡以臧聚而比之桀紂則怍以宰相而比之孔墨則辭可見勢為天子未必貴窮如匹夫未必賤士而能修則所貴在我如之何其不修耶滿苟得曰小盜者拘大盜者為諸侯盜賊之行人之所賤小盜則小利大盜則大利行之惡者果足賤乎不足賤乎諸侯之門義士存焉苟得以言行之貴賤卒無定論昔者桓公小白殺音弒兄入嫂而管仲為臣田成子常殺音弒君竊國而孔子受幣論則賤之行則下之則是言行之情悖戰於胸中也不亦拂乎故書曰孰惡孰美成者為首不成者為尾小白不義而管仲為之臣田常不義而孔子受其幣使夷吾孔子立論必賤二君之所為而行則臣而下之言與行大相悖戾也行之惡者果足賤乎子張曰子不為行即將疏戚無倫貴賤無義長幼無序五紀五倫六位君臣父子夫婦將何以為别乎滿苟得曰堯殺長子舜流母弟疏戚有倫乎湯放桀武王殺紂貴賤有義乎王季為適音的周公殺兄長幼有序乎儒者偽辭墨者兼愛五紀六位將有别乎且子正為名我正為利名利之實不順於理不監於道滿以仁義之名求得我但為利而已不假矯飾之名也為名為利皆非真實道理故不順不監吾曰與子訟於無約訟質成之意無約假設之名也曰小人殉財君子殉名其所以變其情易其性則異矣乃至於棄其所為而殉其所不為則一也殉利殉名雖清濁不同然舍其所當為而為其所不當為則一而已故曰無為小人反殉而天小人殉財必逆乎天既無為小人則必反殉乎天矣無為君子從天之理真君子必不背理而殉名若殉時而獲名則寧毋為此君子從天之理而不得名也若枉若直相為天極面觀四方與時消息人事之有枉直君子相之為天極之有陰陽四方之有生殺四時之有消息也雖堯舜之世不能皆直而無枉若是若非執而圓機獨成而意與道徘徊有枉直則君子因而是直非枉無成心也執圓機以為是非不隨世而是非故謂之獨成而意與道徘徊雖有是非也猶然無是非矣無轉而行不改其操無成而義不以一節立行將失而所為將失自然本真無赴而富無殉而成將棄而天趨赴於富求徇其成將失其自然之天矣比干剖心子胥抉音決眼忠之禍也直躬證父尾生溺死信之患也鮑子名焦立乾棄蔬而稿洛水之土申子不自理申徒狄抱甕之河廉之害也孔子不見母幼而失恃匡子不見父義之失也此上世之所傳下世之所語以為士者正其言必其行故服其殃離罹同其患也比干至此皆言立節尚行之患正謂以忠信廉義之言為實必期必也苟得之意謂矯飾以求利達不如直情之為愈無足問於知和曰人卒到底也未有不興名就利者彼富則人歸之歸則下之下則貴之夫見下貴者所以長生安體樂音洛意之道也今子獨無意焉知不足耶意知而力不能行耶故推正不忘耶無足志在興名就利以安體樂意此亦苟得之徒故知和告以富者貴積而能散惠衆周物貧人倚之以為命乃能全身無患耳陶朱三積三散意固如此以我一身而見人之下我貴我則安體樂意之道而子獨無意於富貴豈知有不足耶抑行有不力耶將故推正理以遏求富貴之心而不能忘耶知和曰今夫此人以為與己同時而生同鄉而處者以為夫絶俗過世之士焉是專無主正所以覽古今之時時變是非之分分別也與俗化世去至重棄至尊天爵以為其所為也此其所以論長生安體樂意之道不亦遠乎察其胸中無定主則隨俗治化同流合汙以媚世去其至重至尊之天爵以為儻來之名利豈長生安身樂心之道舍其重且貴而為世俗之為非以隨侯之珠彈千仞之雀乎慘怛之疾恬愈之安不監於體怵惕之恐欣歡之喜不監於心求富貴之人其身其心或安或否或悲或喜迷而不覺不能自見故曰不監知為為而不知所以為是以貴為天子富有天下而不免於患也知有人為而不知有天理雖至貴為天子猶有損身之患况其下乎無足曰夫富之於人無所不利窮美窮勢至人之所不得逮聖人之所不能及俠人之勇力而以為威強秉人之知謀以為明察因人之德以為賢良此設為貪者之言無足者謂其不知足也窮美極勢謂語其美利之極雖聖賢有所不能及何者無所用力而力者至焉無所用謀而謀者至焉無所用德而賢良者至焉皆富之利也非享國而嚴若君父富者無君父之尊而有君父之威嚴且夫聲色滋味權勢之於人心不待學而樂之體不待象而安之夫欲惡避就固不待師此人之性也天下雖非我孰能辭之夫聲色貨利與權勢人心樂而身安意向此性也以此為性正謂認賊作子天下之人雖不似我之貪著然亦未見其超然而獨辭者知和曰知者之為故動以百姓不違其度是以足而不爭無以為故不求有餘不足之分內外之辨不足故求之爭四處而不自以為貪有餘故辭之棄天下而不自以為廉在我有所不足則窮極四端而爭求之亦不以為貪謂求在我也德足有餘則身外之物皆辭之雖辭天下亦不以為廉謂棄其在外也廉貪之實非以迫外也反監之度勢為天子而不以貴驕人富有天下而不以財戲人計其患慮其反以為害於性故辭而不受也非以要名譽也陸西星曰有餘而棄不足而求貪廉之實非在外也反而監之天理自然之法度雖貴如天子富以天下直外物耳以儻寄之物驕人戲人豈常度哉故計其違度而慮其反害於性命辭而不受非要譽也堯舜為帝而雍非仁天下也不以美害生也雍揖遜也不以美名而害其身所謂有天下而不與也善卷許由得帝而不受非虛辭讓也不以事害己也此皆就其利辭其害而天下稱賢焉則可以有之彼非以興名譽也若此者可謂知利害之原審去就之義而天下稱賢焉則可以有是名而無黍矣然其有之也非以興名譽也聖人不自名而天下之名自歸之無足曰必恃其名苦體絶甘約養以持生則亦久病長厄而不死者也必恃賢知之名苦肢體絶甘旨儉約以養生縱得長生亦如久病長厄而不死者雖生何益知和曰平為福有餘為害者物莫不然而財其甚者也平則能保滿則必溢物皆然財為甚今富人耳營鐘鼓管籥之聲口嗛於芻豢醪醴之味以感其意遺忘其業可謂亂矣無足之意自安體樂意上來知和推諸物理以告之耳營於聲口嗛於味違其常度忘其本業可不謂亂乎賅礙溺於馮氣若負重行而上也可謂苦矣氣失其平或咽於上而為賅或泄於下而為溺行負重而登高可不謂苦乎貪財而取慰貪權而取竭靜居則溺體澤則馮可謂疾矣貪財以慰無窮之求貪權以竭天下之勢居靜則數溲而溺體澤則馮氣而悶可不謂疾乎為欲富就利故滿若堵耳而不知避且馮而不舍可謂辱矣積聚多財滿於阿堵暴於耳目而不知避馮於心志而不能舍可不謂辱乎馮恃也恃此以為誇也財積而無用服膺而不舍滿心戚醮求益而不止可謂憂矣滿心戚戚憔悴形神可不謂憂乎內則疑劫請之賊外則畏寇盜之害內周樓疏外不敢獨行可謂畏矣居則疑劫盜之至行則防殺傷之禍內則周其樓疏外則盛其僕御可不謂畏乎請取也疏窗也此六者天下之至害也富者犯此六害體亦不安意亦不樂矣皆遺忘而不知察及其患至求盡性竭財單以反一日之無故而不可得也此而尚不覺悟及禍患之成求盡其生理竭其財貨單求一日之無故不可得也故觀之名則不見求之利則不得繚意絶體而爭此不亦惑乎當此之際名利俱失纒縛其身心而爭此賈禍之物非惑而何此篇所設三段鄙而淺至其破市井之見語貨財之患亦有可觀處復圭子曰天下有聖狂雖兄弟不能以相及如柳下季之與盜跖是也以下季之聖百世之下聞風猶足以興起胡有一弟曰盜跖不能才養不才任其為盜聚卒橫行貪得忘親不顧父母兄弟不祭先祖諸侯震恐萬民愁苦孔子謂柳下季曰父詔其子兄教其弟理也今先生有一跖而不能誨𨚑請為先生説之柳下季曰先生所言乃父子兄弟之常也如季之所遇則兄弟之變也且跖之為人也強足以拒敵辨足以飾非可順而不可逆先生即往説亦無益也夫以聖人猶不能化其弟况中才而涉季世之末流安能奈不聽父詔之子不受兄教之弟何哉孔子不聽往見盜跖謁者入通盜跖曰此夫魯國之巧偽人孔𨚑非耶不耕而食不織而衣擅生是非妄作孝弟而徼幸於封侯富貴者也謁者復通孔子曰凡天下有三德生而長大美好少長貴賤見而皆悅此上德也知維天地能辨諸物此中德也勇悍果敢聚衆率兵此下德也今將軍兼此三者有意聽臣請為將軍帥天下諸侯為將軍造城數百里與天下更始罷兵休卒此天下之願也盜跖大怒曰好面譽人者亦好背而毁之今𨚑告我以大城衆民欲規我以利而恆民畜我也安可長久城之大者莫大乎天下堯舜湯武皆有天下而後世子孫今將何如有巢氏之民不知衣服神農之世民知其母不知其父耕食織衣無有相害之心今子修文武之道矯言偽行以迷惑天下之主盜莫大於子而乃謂我為盜跖何耶世之所高莫若黃帝黃帝尚無全德堯不慈舜不孝禹偏枯湯放主武伐紂文王拘此六子者其行甚可羞也夷齊餓鮑焦稿申徒狄沈介子推燔尾生溺比干剖子胥抉若告我以人事者不此過矣天地無窮人死有時操有限之時而託於無窮之間何異騏驥之過隙也𨚑之所言皆吾之所棄也奚足論哉孔子趨走出門歸到魯東門外柳下季曰跖得無逆汝意乎孔子曰𨚑所謂無病而自炙也疾走料虎頭扁虎鬚幾不免虎口哉子張問於滿苟得曰士惟修行則人信而任之不任則不利故名利皆假物也獨有一義真爾若棄名利而反之於心則士幾無行矣滿苟得曰藏垢納污者富行孚於人者顯無恥之人多為名利之魁如以旦晝之所為反於日夜之所息則士又無心矣子張曰以臧聚而比之桀紂則怍以宰相而比之孔墨則辭可見勢為天子未必貴也窮如匹夫未必賤也非以貴賤為貴賤乃以行之美惡為貴賤也滿苟得曰桓公小白田成子常士論所不齒而士行則下之故書曰孰惡孰美成者為首不成者為尾止論成敗不論美惡也子張曰子不為行必將混疏戚紊貴賤亂長幼五紀六位將安所分辨乎滿苟得曰長子可殺母弟可流堯舜安在疏戚有倫也桀可放紂可殺湯武安在貴戚有義也季子可適管叔可殺王季周公安在長幼有序也儒飾辭墨兼愛五紀六位安在有別也殉利殉名雖清濁不同然捨其所當為而為其所不當為則一而已故曰無為小人反殉乎天則易無為君子從天之理則難若枉若直自有天極若是若非自有圓機非獨成而意者安能與道徘徊無轉而行無成而義乎自古忠信皆有禍患廉義悉有害失况於士者規規於言行安能免其患也無足問於知和曰名利二字夫誰能解之使去而子獨無意於富貴豈知限之抑力制之而終難忘之耶知和曰今夫有人於此中無專主時有古今而我無古今分有是非我無是非和其光同其塵止知有世俗之為而體之若逸有不知心之悲喜迷而不覺雖至貴為天子猶有損身之患况其下乎無足曰富之於人無往不利若究竟富之美處與勢力至人讓能聖人遜通無勇力而勇力至無知謀而知謀集無懿德而懿德歸無君父之尊而有君父之威聲色權勢心不待學而樂焉欲惡避就兒不待師而辨焉知和曰知者明其有餘不足之分內外之辨天下之至足莫足於我故不爭天下之至無莫無於我故不求不足故求之非求其在人惟求其在我所爭在四端而不自以為貪有餘故棄之非棄其在我誠棄其在人雖捐天下而不自以為廉故以貪廉之實而反監之凡儻來之外物皆害性也古之人有辭天下而不受者善卷許由是也無足曰如必苦肢體以為高絶甘旨以養生則雖生猶死也知和曰平為福水平則不流有餘為害水滿必溢也物莫不然而財尤甚多聚者必多散也今富人窮其口耳之欲奢於意而荒於業則性亂矣氣失其和平之度逆於上而溺於下則情苦矣縱其貪於財勢之求溺於色而悶於氣則形疾矣聞知足者不辱聚財滿於阿堵知利而不知避能貪而不能舍不求辱而辱自至矣聞財行當如流水必欲積至於無用念茲在茲釋茲在茲知進而不知止無憂而戚憂必聚焉廣積招賊賄盛寇至居則嚴為防衛行則盛為僕御無畏而懼畏必集焉凡此六者而能先覺猶可救也及其患至雖傾宿昔之所積聚以利而易性此必不得之數也自古喪國喪家亡身亡命之儔往往坐此弊也哀哉一部南華專為性命而作此既以盜跖名篇吾以為跖不得盜之道也猶小盜也非大盜也陰符經云天地萬物之盜萬物人之盜人萬物之盜三盜既宜三才乃安故善為盜者盜天地陰陽之中氣以為人復盜先天祖一之氣以全生所謂掘地尋天是也莊老豈見不出此而乃區區如和之所云而已哉其為戰國策士之偽筆也又奚疑雜篇説劍第三十此篇即非莊子所作亦戰國時人文也漢儒無此筆力若為莊老手筆必云天地間有三尺之劍第一武夫之雄耳有純陽之劍非至人不能操也世人欲保全性命必自築基煉己始其名曰鑄劍劍成先斬自己妄念所謂魄滅則魂昌也而道乃成昔趙文王喜劍劍土夾門而客三千餘人日夜相擊於前死傷者歲百餘人好之不厭如是三年國衰諸侯謀之太子悝音里患之募左右曰孰能説音悅王之意止劍士者賜之千金左右曰莊子當能太子乃使人以千金奉莊子莊子弗受與使者俱往見太子曰太子何以教周賜周千金太子曰聞夫子明聖謹奉千金以幣從者以此為從者之奉天子弗受悝尚何敢言莊子曰聞太子所欲用周者欲絶王之喜好也使臣上説音稅大王而逆王意下不當太子則身刑而死周尚安所事金乎使臣上説音稅大王下當太子趙國何求而不得也太子曰然吾王所見唯劍士也莊子曰諾周善為劍太子曰然吾王所見劍士皆蓬頭突鬢謂不裏其頭故鬢髮皆突然而上垂冠束髮之冠低垂於會撮也曼胡之纓纓粗無文理者短後之衣衣短于後便作事也瞋目而語難瞋音甸勇士憤氣積於心胸言不利王乃悅之今夫子必儒服而見王事必大逆莊子曰請治劍服治劍服三日乃見太子太子乃與見王王脫白刃待之莊子入殿門不趨見王不拜王曰子欲何以教寡人使太子先曰臣聞大王喜劍故以劍見王王曰子之劍何能禁制曰臣之劍十步一人千里不留行王大説音悅曰天下無敵矣莊子曰夫為劍者示之以虛開之以利誘其進也後之以發先之以至鷙鳥將擊其勢必作也願得試之王曰夫子休就舍待命令設戲劍戲也請夫子王乃校劍士七日死傷者六十餘人得五六人使奉劍於殿下乃召莊子王曰今日試使士敦劍治劍也莊子曰望之久矣王曰夫子所御杖長短何如曰臣之所奉皆可然臣有三劍惟王所用請先言而後試王曰願聞三劍曰有天子劍有諸侯劍有庶人劍王曰天子之劍何如曰天子之劍以燕溪石城為鋒劍突也齊岱為鍔劍刃也晉魏為脊劍中厚處背也周宋為鐔劍口也韓魏為鋏劍把也包以四夷裏以四時繞以渤海帶以常山剌以五行論以刑德開以陰陽持以春夏行以秋冬此劍直之無前舉之無上案之無下運之無旁上決浮雲下絶地紀此劍一用匡諸侯天下服矣自燕溪齊岱以至勃海恆山喻天子之劍以天下為之自五行刑德以至下絶地紀喻神之無時無方也唯神人可以御神器故匡諸侯而天下服此天子之劍也文王芒然自失曰諸侯之劍何如曰諸侯之劍以知勇士為鋒以清廉士為鍔以賢良士為脊以忠直士為鐔以豪傑士為鋏諸侯以一國為劍言士者民之望也智勇居先故為鋒清廉居次故為鍔賢良國之幹故為脊忠直國之紀故為鐔豪傑所恃以行者故為鋏為國者觀其所以為鋒鍔鐔鋏者合與否則器之利不利國之安危可知矣此劍直之亦無前舉之亦無上案之亦無下運之亦無旁上法圓天以順三光下法方地以順四時中和民意以安四鄉此劍一用如雷霆之震也四封之內無不賓服而聽從君命者矣此諸侯之劍也王曰庶人之劍何如曰庶人之劍蓬頭窔鬢垂冠曼胡之纓短後之衣瞋目而語難相擊於前上斬頸領下決肝肺此庶人之劍無異於鬬雞一旦命已絶矣無所用於國事今大王有天子之位而好庶人之劍臣竊為大王薄之指趙文之所好而救其失有王請大之意王乃牽而上殿宰人上食王三環之三環其所上之食以示敬也莊子曰大王安坐定氣劍事已畢奏矣於是文王不出宮三月劍士皆服斃其處也復圭子曰天地間之武藝惟劍為長技有有形之劍歐冶所鑄制以金水配以柔剛萬里誅妖一電光也况吾身有無形之劍係天地之根陰陽之骨乃吾身之真金真水煅煉而成內斬三尸外滅百魔愚者以此劍殺其身真人以此劍飛其神何趙文王智不出此即喜劍何為哉門下有三千客止知擊剌之劍耳好之三年而國衰太子悝患之募左右曰孰能悅王之意止劍士者左右曰莊子當能乃以千金奉莊子與使者俱往見太子太子曰吾王所見惟劍士也莊子曰請治劍服治服三日太子乃與見王王曰子何能禁制曰臣之劍十步一人千里不留行王大悅曰天下無敵矣莊子曰夫為劍者示之以虛不敢輕擊剌也開之以利誘之使入也後之以發迫而後動也先之以至令其應接不暇也願得試之王校劍士七日得五六人乃召莊子王曰今日試使士敦劍莊子曰臣有三劍有天子劍有諸侯劍有庶人劍王曰天子之劍何如曰天子之劍以天下為之非金非錫非銅非鐵其鋒甚巨以燕溪石城為之其鍔甚鋭以齊岱為之其脊甚厚以晉魏為之其鐔甚利以周宋為之其鋏甚壯以韓魏為之非四夷在外不能包非四時在內不能裏渤海常山其繞帶也五行刑德其刺論也其開也以陰其闔也以陽前後畏威上下四旁披靡以此正萬邦何諸侯之不匡以此尅海內何天下之不服此天子之劍也若諸侯之劍非鏌鎁非干將其鋒不在劍而在智勇其鍔不在劍而在清廉其脊不在劍而在賢良忠直其劍之鐔也豪傑其劍之鋏也此劍所制不惟前無其前上無其上而下亦無下旁亦無旁上法圓天而與日月星爭光下法方地而與春夏秋冬並行中和民意而四鄰之民無不安堵此劍一揮如雷霆之震驚四封之諸侯無不賓服而從命矣此諸侯之劍也至於庶人之劍不知有劍術即劍法雖善其鋒甚易折也况劍法有善者有善之善者善者曰吾能制人之死命善之善者亦曰吾能制人之死命兩善相持一擊一刺必有一人失利而命殞於三尺矣果何補於國事劍事已畢矣大王以諸侯而好庶人之劍吾竊為大王不取也雜篇漁父第三十一此篇以全真為主身非天子諸侯大夫庶人四者之分則不可憂四者之憂獨有守真為無纍一真不惟可以保命亦可以動人天下至人為能下人不積不精不得其真大哉真乎人物所由以生死世人不務真而趨假者天下皆是也毋亦讀南華者有人而學南華者無人耶孔子遊乎緇帷黑林名之林休坐乎杏壇壇植有杏故云杏壇之上弟子讀書孔子弦歌鼓琴奏曲未半有漁父者下船而來鬚眉交白被髮揄音愈揮也袂音寐衣襟也行原以上距至也陸而止左手據膝右手持頤以聽漁父聞弦歌而聽欲以申其説也曲終而招子貢子路二人俱對對立客指孔子曰彼何為者也子路對曰魯之君子也客問其族子路對曰族孔氏客曰孔氏者何治也子路未應子貢對曰孔氏者性服忠信身行仁義飾禮樂選人倫揀選其理以教人上以忠於世主下以化於齊民平等之民將以利天下此孔氏之所治也又問曰有土之君與音余子貢曰非也侯王之佐與音余子貢曰非也客乃笑而還行言不告而去且行且言也曰仁則仁矣恐不免其身苦心勞形以危其真嗚呼遠哉其分於道也謂其離道之遠危真二字乃立言根宗子貢還報孔子孔子推琴而起曰其聖人與音余乃下求之至於澤畔方將杖拿撓也而引其船顧見孔子還鄉音向而立孔子反走退行數步而後進再拜而進客曰子將何求孔子曰曩者先生有緒言即微言也而去𨚑不肖未知所謂竊待於下風幸聞咳音核唾音叱之音以卒相𨚑也卒終也謂終其言以教我也摹寫逼真客曰嘻甚矣子真好學也孔子再拜而起曰𨚑少而修學以至於今六十九歲矣無所得聞至教敢不虛心客曰同類相從同聲相應固天之理也吾請釋吾之所有而經豫之所以子之所以者人事也以子之所以為子經略此下正經子之所以處天子諸侯大夫庶人此四者自正治之美也四者離位而亂莫大焉官治其職人憂其事乃無所陵離位相侵其事也一官各治一職人人各憂其所事不相陵奪也故田荒室露衣食不足徵賦不屬音燭謂不繼也妻妾不和長少無序庶人之憂也庶人有身者故以身為憂能不勝任官事不治行不清白羣下荒怠功美不有爵祿不持守也大夫之憂也廷無忠臣國家昏亂工技不巧貢職不美春秋後倫倫序也後倫謂朝覲失其序也不順天子諸侯之憂也諸侯以國為憂陰陽不和寒暑不時以傷庶物諸侯暴亂擅相攘伐以殘民人禮樂不節財用窮匱人倫不飭百姓淫亂天子有司之憂也天子以天下為憂今子既上無諸侯有司之勢而下無大臣職事之官而擅飾禮樂選人倫以化齊民不泰多事乎且人有八疵事有四患不可不察也非其事而事之謂之總非己事而強為之莫之顧而進之謂之佞不使之言而強進其言逞口才者希意道言謂之諂不擇是非而言謂之諛好言人之惡謂之讒析交離親謂之賊離析人之交親而賊害之稱譽詐偽以敗惡人謂之慝包藏禍心口佯以譽之而其實所以毁之使人墮其詐而不覺所謂口有蜜腹有劍也故不曰惡而曰慝乃惡之匿於心者不擇善否兩容顏適偷拔其所欲謂之險以顏色投人之所好曰顏適無善無否皆欲其悅已曰兩容揣人之所欲而濳引拔之以長其惡曰偷拔此八疵者外以亂人內以傷身君子不友明君不臣所謂四患者好經大事變更易常以挂功名謂之叨喜為非常之事以立莫大之功所謂叨也專知擅事侵人自用謂之貪專用私智獨擅其事侵他人之權而喜於自用者也見過不更聞諫愈甚謂之狠狠愎拒諫者人同於己則可不同於已雖善不善謂之矜他人有善以其不同己也亦以為不善此自矜誇者此四患也能去八疵無行四患而始可教已正所謂經子之所以者孔子愀然而歎再拜而起曰𨚑再逐於於魯削迹於衛伐樹於宋圍於陳蔡𨚑不知所失而離罹也此四謗者何也客悽然變容曰甚矣子之難悟也人有畏影惡迹而去之走者舉足愈數音朔而迹愈多走愈疾而影不離身自以為尚遲疾走不休絶力而死不知處陰以休影處靜以息迹處陰處靜以為進道之喻也愚亦甚矣子審仁義之問辨析仁義不同之理察同異之際是非之分也觀動靜之變隨時之宜適受與之度辭受之節理好惡之情和喜怒之節講明性情之理而幾於不免矣謹修而身愼守其真還以物與人則無所纍矣今不修之身而求之人不亦外乎漁父之意以夫子為人而不為己所以得謗孔子愀然曰請問何謂真客曰真者精誠之至也不精不誠不能動人故強哭者雖悲不哀強怒者雖嚴不威強親者雖笑不和狀假如畫人能辨假者方能辨真也真悲無聲而哀真怒未發而威真親未笑而和真在內者神動於外精誠在內而有諸己必能感動於外而通諸人是所以貴真也其用於人理也事親則慈孝事君則忠貞飲酒則歡樂處喪則悲哀忠貞以功為主飲酒以樂為主處喪以哀為主事親以適為主功成之美無一其迹矣功樂哀適四者俱全得主則不必有形迹事親以適不論所以矣飲酒以樂不選其具矣無擇味也處喪以哀無問其禮矣喪與其易寧戚之意禮者世俗之所為也真者所以受於天也自然不可易也禮者文飾于外故曰世俗之為真者天命自然之理故不可易故聖人法天貴真不拘於俗愚者反此不能法天而恤於人憂不與人合也不知貴真不知天爵之貴祿祿而受變於俗祿祿與碌碌同此亦同流合污之意故不足惜哉子之早湛音沈於人偽而晚聞大道也孔子又再拜而起曰今者𨚑得遇也若天幸然先生不羞而比之服役而身教之敢問舍所在究其居也請因受業而卒學大道客曰吾聞之可與往者與之至於妙道不可與往者不知其道愼勿與之身乃無咎子勉之吾去子矣吾去子矣乃刺船而去延緑葦間延迎顏淵還車子路授綏孔子不顧待水波定不聞拿音而後敢乘子路旁車而問曰由得為役久矣未嘗見夫子遇人如此其威也萬乘之主千乘之君見夫子未嘗不分庭抗禮夫子猶有倨音據傲之容今漁父音甫杖拿逆立而夫子曲要磬折再拜而應得無太甚乎門人皆怪夫子矣漁父何以得此乎孔子伏軾而歎曰甚矣由之難化也湛於禮義有間矣言其沈酣於禮義之學有日矣而朴鄙之心至今未去進吾語女夫遇長不敬失禮也見賢不尊不仁也彼非至人不能下人下人不精不得其真下人又必要精誠庶得真人之教益故長傷身人而未聞真人之教終身有損而無益惜哉不仁之於人也禍莫大焉而由獨擅之且道者萬物之所由也庶物失之者死得之者生為事逆之則敗順之則成故道之所在聖人尊之今漁父之於道可謂有矣吾敢不敬乎萬物之生死皆在一道之中吾尊其道所以敬之不尊敬則不足以得其真復圭子曰道之所在不廟廊而尊無江海而間自適其適吾以保全吾真而已昔孔子與弟子遊乎緇帷之林弦歌鼓琴奏曲未半有漁父者下船而來以聽曲終而招子貢子路客指孔子曰彼何為者也子貢曰孔氏者佩服忠信躬行仁義修飾禮樂明察人倫上有益於世主下默化乎齊民固非有土之君亦非侯王之佐客乃且行且言曰仁則仁矣吾恐其身之不免也丈夫惟心逸形適者而後其真不搖彼孔氏苦心勞形祇以危其真耳嗚呼其涉世日深者乃其與道日遠也子貢還報孔子孔子曰其聖人與乃下求之漁父引其船顧見孔子孔子再拜而進客曰子將何求孔子曰先生有緒言而去𨚑不肖未知所謂竊待於下風幸聞咳唾之音以卒相𨚑也客曰同類相從同聲相應固天之理也吾請釋去吾之所有而就子之所為者以經綸之可乎天下之人不過天子諸侯大夫庶人四者而已故田疇不治公私不給長少無別則庶人之憂官有曠職下猶懈怠績未就緒大夫之憂忠臣不在廷貢獻不供職天子未悅媚諸侯之憂也陰陽未燮理諸侯未懷柔人倫未整飭天子有司之憂也今子既非其人不在其位而謀其政毋乃泰多事乎且人有八疵事有四患不可不察也總佞諂諛讒賊慝險謂之八疵叨貪狠矜謂之四患人有八疵四患內外交病窮通之所疾也故必去此疵患而始可教已孔子愀然再拜曰𨚑之不得志於魯衛宋陳不知所失而離此四謗者何也客悽然變容曰甚矣子之難悟也人有畏影惡迹而去走者舉足愈數而迹愈多走愈疾而影不離身猶以為行之遲疾走不休絶力而死不知處陰可以休影處靜可以息迹愚亦甚矣今子之所審者人事也而幾於不免莫若謹修而身全吾形也愼守其真完吾性也人物還之人物何所適而為吾纍乎請問何謂真客曰真者精誠之至也不精不誠不能動人精誠不盡於哭怒笑而哭怒笑亦足露精誠之一端也強哭者雖悲不哀而徒悲不能令人戚也強怒者雖嚴不威而貌嚴不能令人畏也強親者雖笑不和而虛笑不能令人悅也故真悲無聲而哀真怒未發而威真親未笑而和故有其真於內者其神輒動於外君子之所以貴真也若人也以之事親必為慈孝之子以之事君必為忠貞之臣以之飲酒必為歡樂之賓以之處喪必為悲哀之主禮者世俗之所為也真者所以受於天也故聖人法天貴真不拘於俗惜哉子之早溺於人偽而晚聞大道也孔子曰敢問舍止所在客曰是吾徒之可與者吾與之同臻於妙道即無欲以觀其妙之妙也非吾徒不可與者愼勿輕與之以漏泄道妙庶免天譴乃刺船而去顏淵還車子路授綏孔子待水波定而後乘車子路問曰萬乘之君見夫子未嘗不分庭抗禮今漁父杖拿逆立而夫子曲要磬折漁父何以得此乎孔子伏軾而歎曰夫遇長不敬失禮也見賢不尊不仁也彼漁父若非至人不能下人而與之言妙道吾下人若不精不誠不能得真詮而身名之不全大哉道乎萬物之所由以生死人事之所由以成敗今漁父之聞道先乎吾吾非尊漁父也尊道也敢不敬乎雜篇列御寇第三十二此篇以韜晦為主故巧者勞而知者憂知道易勿言難中言人心之險不可測度有謙者有驕者有投淵而取珠者有衣文繡以入廟者有不奪彼而與此者前言無能者虛而遨遊末言愚者恃其所見止知用功於外亦見人非有知不能入道非無知不能得道耳列御寇之齊中道而反遇伯昏瞀音務人伯昏瞀人曰奚方道也而反曰吾驚焉見人感己即違道故驚也曰惡音烏乎驚曰吾嘗食於十將食漿同而五漿先饋以賣漿之家止取其半價而以其半餽之可謂敬賢矣列子驚之盛德若愚恐人知也伯昏瞀人曰若是則汝何為驚己曰夫內誠不解形諜成光以外鎮人心解化也列豫自謂誠積中而未化諜動也謂舉動不能光而不耀故人得而見之以鎮服我也至人不樂表見類如此使人輕乎貴老貴者老者人之所敬今移貴貴之心以貴老我是貴老居下而我反居上矣而𩐎音齎其所患𩐎積也積而久之名迹愈露必不能逃當世之患矣夫漿人特為食音嗣羡之貨多餘之嬴音盈其為利也薄其為權也輕而猶若是而况於萬乘之主乎身勞於國而知盡於事彼將任我以事而效我以功正𩐎所患處吾是以驚漿人以飲食之故求刀錐之利猶見而敬之况萬乘之主見之其有不以國從者乎此所以驚也伯昏瞀人曰善哉觀乎汝處已人將保汝矣無幾何而往則戶外之屨滿矣觀謂汝於此具隻眼矣處止也保師保也言汝止矣不必出遊也人將歸向於汝為師保矣未幾履滿戶外則從之者衆所謂保汝矣伯昏瞀人北面而立敦音頓𥪡也杖蹙之乎頤𥪡立其杖而拄之於頤也立有間不言而出賓者以告列子列子提屨跣而走古人席地而坐必脫屨而入急於迎瞀不暇穿也暨乎門曰先生既來曾不發藥乎謂不發言以救正我曰已矣吾固告汝曰人將保汝果保汝矣非汝能使人保汝而汝不能使人無保汝也而焉用之感豫出異也使人保汝易使人無保汝難汝焉用保為哉人之感動豫悅汝者由汝不能自晦卓異表見於外而致然也必且有感搖而本性又無謂也必且有所感發以動搖其本性無謂謂無人言之者與汝遊者又莫汝告也彼所小言盡人毒也莫覺莫悟何相孰也且與汝遊者莫能以大道之言而盡忠告細巧之言盡為人患汝又不自覺悟孰誰何也相問之詞言莫有能覺悟者何取其為相問也巧者勞而知者憂無能者無所求飽食而遨遊泛若不繫之舟虛而遨遊者也人之巧者必自勞智者必自苦惟為道日損者去智巧而無能故于外物無求飽食喜遊心無繫著而遊於無物之初也歸結在一虛字鄭人緩名也呻吟誦讀聲裘氏之地祗音支三年而緩為儒河潤九里河潤潤澤也得其儒道而澤及之廣澤及三族使其弟墨儒墨相與辨其父助翟父愛弟翟而助之十年而緩自殺其父夢之曰緩見夢於父使而子為墨者豫也闔胡嘗視其良良善也緩自謂也謂墨不良於儒欲父至墓視己既為秋柏之實矣謂既能自化為儒又化弟令墨弟由己化而不能順己己以良師而便怨死精誠之至故為秋柏之實夫造物者之報人也不報其人而報其人之天彼故使彼造物於人自有報應學懦學墨者人也學儒必性之近儒學墨必性近墨乃其人之天也故造物不以人之初學為報應而以儒成墨成之天為報應彼翟之學墨非緩使之也乃彼之性所使自近墨也夫人以己為有以異於人以賤其親緩美儒有親親之殺異於人之賤其親如路人者蓋指弟之學墨而言也齊人之井飲者相捽也故曰今之世皆緩也齊人即齊民猶言衆人也陸德明曰穿井者謂已有造泉之功而捽飲者不知泉之出乃天也緩以使弟墨為功而怨其父不知翟之能墨亦其天也今人凡有我相而市私恩者皆緩之徒也自是有德者以不知也而况有道者乎古者謂之遁天之刑至仁無恩上德不德尚不自知况有道乎不務道德而貪天功為己力則棄天矣棄天我之罪也故曰天刑聖人安其所安不安其所不安衆人安其所不安不安其所安所安者自然之理天也所不安者有為之迹人也莊子曰知道易勿言難知而不言所以之天也知而言之所以之人也古之人天而不人道者無心自然知之易勿言難難者謂忘言也知道而至忘言則與天為徒矣知道而未免於言則未離於人為矣古人純乎天而不人所以行不言之教也朱泘音乎漫學屠龍於支離益單音殫千金之家三年技成而無用其巧無龍可屠故巧無可用寓言道不可學學之至有伎倆則終無用矣聖人以必不必故無兵事之可必者猶以為不必故於人無所爭衆人以不必必之故多兵衆人行險僥幸以不可必之事為可必故多爭順於兵故行有求兵恃之則亡順於兵之道而行則有求矣兵者不祥之器不戢將自焚也小夫之知不離苞苴竿牘苞苴有苞裏也竿牘謂竹簡為書苞苴以遺竿牘以問遺問之具小知所殉敝精神乎蹇淺而欲兼濟道物太一形虛若是者迷惑於宇宙形纍不知太初小知之夫敝精神于蹇淺而欲與道合真遊乎太一之虛以彼之憧憧迷惑于宇宙之間為形纍耳寧知太初之無有哉太初即太一也彼至人者歸精神乎無始而甘冥乎無何有之鄉水流乎無形發泄乎太清悲哉乎汝為知在豪毛而不知大寧歸精神于無物之治安處乎無為之地其應物也如水之流過而不留物而能化至人之所為若此豪毛即小知也大寧即太初也此欲學者斷緣簡事意宋人有曹商者為宋王偃王使秦其往也得車數乘王説之王惠王説音悅益車百乘反於宋見莊子曰夫處窮閭厄巷困窘織屨稿項黃馘項無肉而稿瘦曰稿項耳不潤而黃薄曰黃馘者商之所短也一悟萬乘之坐而從車百乘者商之所長也莊子曰秦王有病召醫破癰潰痤者得車一乘舐痔者得車五乘所治愈下得車愈多子豈治其痔耶何得車之多也子行矣非莊老人品之高不能形容罵此輩如此子毒魯哀公問於顏闔曰吾以仲尼為貞幹貞楨通易以貞為事之幹猶云棟梁也國其有瘳乎曰殆哉圾乎仲尼方且飾羽而畫從事華辭以支為旨忍性以視民而不知不信受乎心宰乎神夫何足以上民以文物之美為飾以枝果之言為旨矯飾其自然之性以示民而不知其無實其心蓋已著於此其神蓋已主於此何足以長民乎彼宜汝與音余豫頤養也與音余誤而可矣今使民離實學偽非所以視民也為後世慮不若休之彼指夫子汝指哀公言謂彼有益於汝與必以彼為賢而養之則其誤猶之可也今以為貞幹則使民離其實而學為偽非所以視民也為後世慮不若休之言勿用也難治也施於人而不忘非天布也民難以有心治之也施惠於人而不能無心非天之雲行雨施布濩萬物而無心也商賈音古不齒雖以事齒之神者弗齒商賈有心求利固大道之所不齒雖因事偶有關涉間亦有齒之之時然有心求道亦聖神之所弗齒也為外刑者金與木也為內刑者動與過也宵人之離罹也外刑者金木訊音信之離內刑者陰陽食之夫免乎內外之刑者惟真人能之金謂斧木謂桎梏動謂心不靜而多過愆者金與木刑人之體故曰外動與過刑人之心故曰內宵人即晝人之過少夜人之過多也陰陽食之即內篇陰陽之患也真人則寂然而為緣於不得已內外之刑安能纍之孔子曰凡人心險於山川難於知天天猶有春秋冬夏旦暮之期人者厚貌深情故有貌願而益有長若不肖有順悁而達有堅而縵有緩而釬音漢故其就義若渴者其去義若熱人之情貌不可測度有外若謹愨而內質盈溢者有內挾偏長而外若不肖者有巽順儇急而類達者有外若堅持而內反纒繞者有外若和緩而內實釬急者有始進若鋭而終退反速者故君子遠使之而觀其忠近使之而觀其敬煩使之而觀其能卒焉問焉而觀其知急與之期而觀其信委之以財而觀其仁告之以危而觀其節醉之以酒而觀其則雜之以處而觀其色九徵至不肖人得矣凡此九徵者皆南華之緒餘土苴也君能倣此以用人而天下不足平矣正考父音甫宋之公族孔子十世祖一命士也而傴曲背再命大夫而僂曲腰三命卿也而俯身伏循牆而走不敢當路考父之謙如此孰敢不軌誰敢不取以為法如而夫凡夫者一命而呂巨驕矜貌再命而於車上儛乘車而軒儛三命而名諸父呼諸父以名孰協唐許孰能同唐時之許由哉德與之不協賊莫大乎德有心而心有睫及其有睫也而內視內視而敗矣有心為德未免害德德既有心復露之於眉脻而德愈偽矣然後從事內視欲以真易偽是秃而施髢祇見其敗而已凶德有五眼耳鼻舌心中德為首何謂中德中德也者有以自好也而呲音鄙其所不為者也言眼耳鼻舌之害不如中心之害故曰中德為首有以自好者言我有所能也以我之能而誚人之不能則此心又不可學道窮有八極極究言之謂八者窮之極也達有三必必決言之謂三者達之必也形有六府形謂六者表暴於外府藏蓄於中也美髯長大壯麗勇敢八者俱過人也因以是窮美貌修髯身長軀大氣壯詞麗勇力果敢因以是窮此箇病根全在過人上大扺過人者人恆忌之取於造物者多則造物亦必忌之此窮之所不免也緣循偃佒音鞅困畏不若人三者俱通達緣循不能自立之貌偃佒隨起隨倒之義心不能通曰困心有所歉曰畏三者之人俱不若人而𨚫有必達之理亦是必謙而受造物之益非謂八者皆窮而今之達者皆此三等人也知慧外通勇敢多怨仁義多責達生之情者傀達於知者肖達大命者隨達小命者遭知慧一府也則多明通於外勇敢一府也則取怨憤仁義一府也則多責任達生一府也則造於實際傀然而大解矣達知一府也則知天知人天之肖子也達命一府也大達則曰吾隨之小達則口吾遭之蓋遭猶有委命之意隨則無容心矣或問達生達命何所分别生則性也命則天也而氣數行乎其中矣文子曰道有知則亂德有心則險心有眼則眩何者有眼必有見學道者每患於無見而不知見為德之賤也釋氏説五種眼惟天眼肉眼在面慧眼法眼佛眼皆在心心眼者德之成此心眼者德之敗知其所以敗則知其所以成無二理也然則達於知者非眼乎而何以言肖曰老子不云乎夫道大似不肖若肖久矣其細人有見宋王者錫車十乘以其十乘驕稚其色驕如稚子莊子莊子曰河上有家貧恃緯蕭以織葦為業者而食者其子沒於淵得千金之珠其父謂其子曰取石來鍛音段碎其珠也之夫千金之珠必在九重之淵而驪音犁龍頷音𣵡下子能得珠者必遭其睡也使驪龍而寤子尚奚微之有哉言必為驪龍所攫無有遺類也今宋國之深非直九重之淵也宋王之猛非直驪龍也子能得車者必遭其睡也使宋王而寤子必韲粉矣喻人之求富貴皆危機也或聘於莊子莊子應其使曰子見夫犧牛乎衣以文繡食以芻菽及其牽而入於大音泰廟雖欲為孤犢其可得乎與彘龜之之喻同意莊子將死弟子欲厚葬之莊子曰吾以天地為棺槨以日月為連璧星辰為珠璣萬物為齎送吾葬具豈不備邪何以加此弟子曰吾恐鳥鳶之食夫子也莊子曰在上為鳥鳶食在下為螻蟻食奪彼與此何其偏也至人不有其身等為逆旅視猶旦暮夢幻泡影石火電光欲破生死關頭鳥鳶何疏螋蟻何親哉以不平平其平也不平以不徵徵其徵也不徵萬物之理本平我以不平之心平之則其平者亦不平矣萬物之理可驗我以不驗之心驗之則可驗者亦不驗矣陸西星曰巵言日出和以天倪則非不平之平矣寓言十九藉外論之重言十七以為耆艾則非不徵之徵矣明者誰為之使神者徵之且人之聰明誰為之使耶毋亦其天性之神自然之徵驗也夫明之不勝神也久矣而愚者恃其所見入於人其功外也不亦悲乎夫明與神何所分别第用明者以察察為明而神則無心先覺况愚者恃其所見則逞聰明矣入于人未免穿鑿知識上增知識其功夫全在外而乏內照安能反其性命之情哉是可悲也復圭子曰至人被褐懷玉其道愈高而其迹愈晦列御寇之齊驚於食漿之家使賣漿主人知其賢以一半餽遺必其鋒頴太露故人知貴之重之况萬乘之主必以彼為賢勞而不以國從者乎伯昏瞀人曰善哉觀乎汝能欲自晦則人將以汝為師保無所往而不可戶外之履常滿矣伯昏瞀人不言而出列子暨乎門曰先生既來曾不發一藥石之言乎伯昏瞀人曰使汝為師保易使汝不為師保難已不表異人孰感而豫之已不震撼人孰從而稱之知者不言莫汝告也言者不知又為人患也世有莫覺之人而後有大覺世有莫悟之人而後有大悟世有巧勞知憂之士而後有無知無能之士心曠神怡不以口食為纍泛若一虛舟而遨遊於宇宙者也其不令人喜亦不令人驚者乎有鄭人緩者學儒三年而道成蒙其澤者河潤九里仁及三族使其弟習學墨一日儒墨不相下其父助翟十年而緩自殺異日而緩見夢於父曰使而子為墨者豫也良莫良於儒吾之良不可見而精神已化為秋柏之實矣故視秋柏即視豫也夫學儒學墨者人也而所以學儒而儒學墨而墨者其人之天也造物不責成於人而責成其人天性之所近緩以使弟墨為功何異穿井者自矜其有造泉之勞至仁無恩上德不德况有道者乎人各有安有不安聖人安於天衆人安於人聖人不安於人衆人不安於天故曰知道易不言難知者不言天道遠也言者不知人道邇也所以古之人人也而與天為徒也大道尚自然不尚神奇朱泘漫學屠龍於支離益技成而無所用其巧君子不取也天下事有可必者有不可必者聖人寧盡其在人之可必而不敢必之於天衆人人事未盡以不必於已者而必之於天此其所以有招兵與不招兵之異也寧知兵不虛動也必有所求於人而不戢將自焚乎吾獨鄙夫末世小夫之知不離苞苴以相餽遺竿牘以相通問敝蹇淺之精神而欲行經濟萬物之道不知太一形虛無物也有物者安能物物上善若水至人返精神於無何有與水流乎無形發泄乎太清者何以異宋人有曹商者説秦王得車百乘誇於莊子曰夫以守困而安於稿項黃馘者商之所短也以立談而悟萬乘之主從車百乘者商之所長也莊子曰有人於此為秦王醫病一也破癰潰痊者得車不過一乘舐痔者得車百乘子非治其痔耶何得車之多也魯哀公問於顏闔曰吾以仲尼為貞幹國其有瘳乎顏闔曰君子與其貌勝情也不如實勝華也仲尼之為人文掩乎質枝葉傷乎本根若以為貞幹恐民已雕已琢難返其朴矣民之不可以有心治也猶施惠於人不可不忘也猶商賈之不見齒於有道也刑有內外金木之訊凡懷刑之君子俱能免之陰陽之患非真人能陶鑄陰陽者安能跳出其外而免之哉孔子曰山川猶可升而航也人心之險過之天猶可以步數推也人心之不測更難知焉天猶有四時旦暮之期人之厚貌深情安有定期哉故非遠使之不能觀其忠非近使之不能觀其敬非煩使之不能觀其能非卒然問焉不能觀其知急與之期則言易爽而信可見委之以財則守易奪而仁可徵告之以危則操易變而節可知醉之以酒人之所不暇檢點人而有法則者自不淆離之以色尤人之所不能強制者也而有道氣者自不亂九徵至則人之賢不肖得矣正考父爵彌高而彌下一命而傴再命而僂人猶或可能也至三命而俯循牆而走非甚盛德不可及也其孰敢不軌亦宜矣如凡夫職益升而氣益驕一命而自矜有呂巨之狀再命而於車上儛三命而名諸父其視許由不受堯禪者大懸絶矣何也德不可不為也又不可有心為也德不可不內視也待其露於眉睫而後內視恐真不勝偽祇見其敗耳凶德有五眼耳鼻舌心是也然四者之害不如中心之害故曰中德為首故君子不可不愼所好也八極之窮三必之達六府之不常一珠九淵之僅得所以喻處道應物之多端貪名逐利之多患也人能懲犧牛之不得為孤犢鑒治棺槨之疏烏鳶而親螻蟻也則必不奪彼而與此無人我相無衆生相無夀者相何非平者亦至有徵驗也若有人我衆生夀者相是持不平之心而平之愈不平矣是持不徵之心而徵之愈不徵矣且人之聰明誰不如我以我之神合人之神因以人之神徵我之神然則至人非用明也用神也離人入天故登彼岸雜篇天下第三十三此篇莊子後序也厯敘古今道術淵源之所自後列諸子而莊生自為一家末闢惠子其祟正之意見矣天下之治方術者多矣道術之局於一方者皆以其有為不可加矣又皆自以為至古之所謂道術者果惡音烏乎在曰無乎不在曰神何由降明何由出聖有所生王有所成皆原於一神謂人之本性降衷於天者明是人心之靈覺聖即內聖之德王即外王之業其用無乎不在其體原於至一此道術之大也下文曰宗曰精曰真即所謂一也不離於宗謂之天人以無為為宗畸於人而侔於天者曰天人不離於精謂之神人聚精會神出無入有與神相合不離於真謂之至人本真純粹無以復加故曰至人以天為宗以德為本以道為門兆於變化謂之聖人三句言天人神人至人之事以無為為體有為為用以上所謂具有內聖之德者也以仁為恩以義為理以禮為行以樂為和薰然慈仁謂之君子以仁義禮樂為事薰然納天下於慈仁之中神明而為聖即內聖之德首出而為王即外王之業君子也下言君子之業以法為分法謂法度有所區別曰分以名為表名謂名器有所標準日表以參為驗參者三也三生萬物以萬物為徵驗以稽為決考古以準今其數一二三四是也一二三四者五行之生數也不言五者以五為土旺於四季也百官以此相齒百官之相序者此也以事為常事有常職以衣食為主民有常業蕃息畜藏養民之政老弱狐寡為意恤民之政皆有以養民之理也蓋仁義禮樂皆失道而下之事賢人君子治世之法無過於此自此以下至此所謂外王之業民之理也古之人其備乎配神明醇天地育萬物和天下澤及百姓明於本數係於末度天德王道兼該並舉六通四辟小大精粗其運無乎不在古之道術其大如此所謂以其真治身而其土苴亦足以理天下其明而在厯數者舊法如帝王傳心之法世傳之史尚多有之其在於詩書禮樂者鄒魯之士搢紳先生多能明之詩以道音導下同志書以道事禮以道行樂以道和易以道陰陽春秋以道名分其數散於天下而設於中國者百家之學時或稱而道之有道之時道德一而異術不能鳴其在厯數者有司出其法國史記其迹散在六經者鄒魯之士能明之此皆古之道術在度數者先王以此施於政故百家衆技時或稱述之亦不出於道術之外以上設古之道術天下以下設後世之方術天下大亂賢聖不明道德不一剖而為三教分而為諸子百家天下多得一察焉以自好抱偏見以自矜譬如耳目鼻口皆有所明不能相通猶百家衆技也皆有所長時有所用雖然不該不遍音遍一曲之士也判天地之美天地有大美而判之析萬物之理萬物有成理而析之察古人之全觀古之人其備若彼寡能備於天地之美百家各執其一曲以自喜如耳目口鼻各適一用而不能兼純全之道備之者寡矣稱神明之容容指道之在外者而言是故內聖外王之道暗而不明鬱而不發天下之人各為其所欲焉以自為方悲天百家往而不反必不合矣後世之學者不幸不見天地之純古人之大體道術將為天下裂內聖體也外王用也道不明不發人各為所欲為迷而不反則知方術之多道術之裂也而朴始散而為器矣不侈於後世不靡於萬物不暉於度數以繩墨自矯而備世之急古之道術有在於是者墨翟宋大夫禽滑釐墨翟弟子聞其風而説音悅之此上論理此下即事以實之不道以侈不飾以靡不以禮樂度數為暉耀惟以繩墨自檢束而儉以備急用古之道術有如此者翟之徒乃聞而説之為之大過大過過於儉也已之大順已止也已止於儉嗇為順於人情也作為非樂命之曰節用非樂節用墨子書中篇名言其著書立教生不歌死無服墨子泛愛兼利而非鬬其道不怒又好學而博不異不與先王同毁古之禮樂養生送死皆主於薄以爭鬬為非以不怒為道推廣其説以為博主於不立異而亦與先王之道不同也此其所以毁古之禮樂黃帝有咸池堯有大章舜有大韶禹有大夏湯有大濩文王有辟音闢雍之樂武王周公作武古之喪禮貴賤有儀上下有等天子棺榔七重諸侯五重大夫三重士再重自黃帝以來禮樂皆有定則今墨子獨生不歌是毁樂死不服是毁禮桐棺三寸而無槨以為法式以此教人恐不愛人以此自行固不愛已未敗墨子道雖然歌而非歌哭而非哭樂而非樂是果類乎薄道固不可教人亦不可自處不必待其道之敗然當歌而不歌當哭而不哭當樂而不樂哀樂之不近人情如此是果同類者之所當為乎其生也勤其死也薄其道大觳音忽使人憂使人悲其行難為也恐其不可以為聖人之道反天下之心天下不堪墨子雖獨能任奈天下何離於天下其去王也遠矣生勤死薄其道太朴使人憂悲反天下之常墨子獨能任之如天下何非王天下之道也墨子稱道曰昔者禹之湮洪水決江河而通四夷九州也名川三百支川三千小者無數禹親自操橐音託耜而九糾同雜天下之川糾率庶工雜治天下之川腓音肥無月拔手音拔脛無毛沐甚風櫛疾雨置萬國禹大聖人也而形勞天下也如此使後世之墨者多以裘褐為衣以跂蹻為服木履曰跂麻履曰蹻服用也日夜不休以自苦為極曰不能如此非禹之道也不足謂墨相里里名勤人名之弟子五侯之徒散出於五侯之門南方之墨者苦獲一人已齒一人鄧陵子一人之屬俱誦墨經而倍譎音厥不同相謂別墨墨學之別派以堅白同異之辭相訾音紫相反而訾以觭音欺偶不仵音午之辭相應以巨子為聖人墨家號其道成者為巨子若儒家之碩儒皆願為之尸謂已乃墨學之別派相訾則相反相應則相合巨子者即法嗣也尸主也冀得為其後世至今不決絶也墨翟禽滑釐之意則是同於聖人之勤苦其行則非也為之太過已之太甚將使後世之黑者必自苦以腓無月拔手脛無毛相進而已矣亂之上也治之下也雖然墨子真天下之好也將求之不得也雖枯稿不舍也才士也夫不纍於俗不飾於物不苟於人不忮於衆願天下之安寧以活民命人我之養畢足而止以此白心古之道術有在於是者宋鈃音刑尹文皆齊宣王時人聞其風而説音悅之作為華山之冠華山上下均平作冠象之以自表接萬物以別宥為始別善惡宥不及語心之容形容此心以語人命名也之曰心之行以音而合歡心之用以和意而合歡於人以調海內請欲置之以為主見侮不辱救民之鬬禁攻寢兵救世之戰以此周行天下上説音稅下教雖天下不取強聒音括而不舍者也故曰上下見厭而強見也上下皆厭而強以此自見雖然其為人太多其自為太少曰請欲固置五升之飯足矣先生恐不得飽弟子雖飢不忘天下日夜不休曰我必得活哉圖傲乎救世之士哉為人意多自為意少雖忘食自苦以為天下而亦為之我豈必以此升斗求活哉蓋以矯夫託名救世而自利之人耳圖謀也傲矯之也曰君子不為苛察不以身假物以為無益於天下者明之不如已也苛察則非別宥矣故不為事事皆自為而不假借於人以自助以身無益於天下而求備於天下則不如其已也以禁攻寢兵為外以情欲寡淺為內其小大精粗其行適至是而止其學之大旨外之欲其戢兵內之欲其寡欲大概如此公而不黨易而無私決然無主不先立主意趣物而不兩萬物理趣歸於一致不顧於慮不謀於知於物無擇與之俱往古之道術有在於是者彭蒙田駢愼到音廣聞其風而説音悅之齊萬物以為首曰天能覆之而不能載之地能載之而不能覆之大道能包之而不能辨之知萬物皆有所可有所不可故曰選則不遍教則不至道則無遺者矣天地亦萬物中之一物故齊物而天地其首也天大地大道大皆有能有不能則知物之有可有不可矣若擇而選之則有不遍教而使之則教有不至與之同歸於道則道體物而未始有遺矣是故愼到棄知去已而緣不得已泠汰於物泠者清其濁汰者去其擾以為道理曰知不知雖知止作不知將薄知而後鄰傷之者也知識之開混沌之鑿鑿則傷矣故人皆曰知而我不知者將薄夫發知之後鄰於鑿混沌而傷之者也謑百係無恥髁音課獨行無任而笑天下之尚賢也縱脫無行而非天下之大聖謑髁縱脫皆無能之貌椎拍音魄輐音遠斷與物宛轉椎以拍之輐以斷之隨其材而斷之使各適其用舍是與非苟可以免不師知慮不知前後魏音危然而已矣無是非無知慮無先後魏然不動而已無他能也絶聖棄知故能魏然推而後行曳而後往若飄風之還若羽之旋若磨石之隧若風若羽若磨石與物宛轉而無心全而無非動靜無過未嘗有罪是何故夫無知之物無建已之患無用知之纍動靜不離於理是以終身無譽是以自全於世而無非動靜自如而無罪此何以故蓋物惟無知則無是已之患無容心之纍動靜皆順不離於理不求知於人惟無譽故無咎乃所以自全也故曰至於若無知之物而已無用賢聖夫塊不失道豪傑相與笑之曰愼到之道非生人之行而至死人之理適得怪焉田駢亦然學於彭蒙得不教焉故常自言曰人之處世何用聖賢之名但塊然如土而不失其常行之道彼豪傑笑之以為猶死人也適怪焉耳田駢學於彭蒙不待教誡而自相契合也彭蒙之師曰古之道人至於莫之是莫之非而已矣其風窢音域逆風過物之聲然惡可而言常反人不見觀而不免於魭音抗無圭角也斷其所謂道非道而所言之韙不免於非彭蒙田駢愼到不知道雖然槩乎皆嘗有聞者也古之有道者無是無非言而無言辟飄風之過其前窢然而已烏可而言烏不可而不言哉是以所見常與人相反而人不見取則不免宛轉遷就所言雖是而不免於世人之非僉曰田駢愼到不知道雖然槩乎其嘗有聞者也蓋世人雖以為非而莊子猶有取焉者也以本為精以物為粗以有積為不足淡然獨與神明居本謂道未謂器道器雖不相離而有精粗之别故以道為精以物為粗道未始有物有積則不足之心纍之故致虛極必至無積而止常守自然淡然與神明居已古之道術有在於是者關尹老聃聞其風而説之關令尹喜字公慶建之以常無有主之以太一以濡弱謙下為表以空虛不毁萬物為實建立也常無有即本也未始有始也太一即有始萬物之母也萬事萬化皆從此出故以為主道虛而用之或不盈是故以濡弱謙下為表焉表謂應事接物見之於外者道之用也物各歸根體自空虛毁壞萬物則斷滅頑空矣故不壞世用而成實相實即真空不空謂實相關尹曰在已無居形物自著其動若水其靜若鏡其應若響芴音忽乎若忘寂乎若清同焉者和得焉者失未嘗先人而常隨人居即住心也言已之心一無所住而形形物物莫非已心之所顯著所謂無所住而生其心者水之動鏡之靜空谷之響應皆無心者芴乎者恍惚中若有物而又無物也若清無所淆也以同於物為和以無所得為得未嘗先而常隨者迫而後動不得已而後起也老聃曰知其雄守其雌為天下溪知其白守其辱為天下谷人皆取先已獨取後曰受天下之垢人皆取實已獨取虛無藏也故有餘巋音魁然而有餘其行身也徐而不費無為也而笑巧人皆求福已獨曲全曰苟免於咎溪谷在下而能容所謂有容乃大也未嘗先人而常隨人即取先取後也受垢即知白守辱也不以實為實以虛民實所謂取虛也無藏而有餘即以有積為不足也舒徐容與常自儉嗇所謂不費也人皆以巧為巧已獨以無為為巧人皆以福為福已獨以無禍為福以深為根以約為紀曰堅則毁矣鋭則挫矣常寬容於物不削於人可謂至極關尹老聃乎古之博大真人哉根者根極之義紀法紀也觀其言曰古之為道者微妙玄通深不可測得非以深為根之謂乎治人事天莫如嗇所謂約也太剛則折太鋭則銼故常破其堅挫其鋭以容物為量而不過為刻削之行其道可謂至矣夫博大真人尊之之辭寂漠無形變化無常死與音余生與音余天地並與音余神明往與音余芒乎何之忽乎何適萬物畢羅莫足以歸古之道術有在於是者莊周聞其風而説音悅之清通無象往來無住以無相為宗以無為為行萬物一府死生同狀直與天地並神明俱芒乎不知何之芴乎不知所適古之道術在是南華聞而悅之以謬悠之説荒唐之言無端崖之辭時恣縱而不儻不以觭音羇見之也以天下為沈濁不可與莊語以巵言為曼衍以重言為真以寓言為廣虛遠曠大莫之終始故其言恣縱而不黨同於人不炫奇立異以自表見於已謂天下之沈溺混濁不可以端莊之言語之故因之以曼衍質之以重言廣之以寓言必以此三言者非我之罪不信我者之罪也獨與天地精神往來而不敖倪於萬物不譴是非以與世俗處天地無棄物與道為體者亦無棄物敖倪即傲睨也不敖倪則與物無競得者同於得失者同於失不譴是非而與世俗同處相安相忘而不知玄同之德有如此其書雖瑋而連犿音汴無傷也瓌瑋竒特之狀連犿相從之貌言其書雖若驚世駭俗而郤善體物情連環宛轉與物不違是以雖瓌瑋而不傷其辭雖參音參差音癡而諔音竹詭可觀辭雖抑揚參差不一而滑稽詭譎之中卻有深思可得之理故曰可觀彼其充實不可以已一書之中皆道理充塞世不可無者上與造物者遊而下與外死生無終始者為友其於本也宏大而闢深閎而肆其於宗也可謂調適而上遂矣與造物遊與無終始者友此等見解不出老氏所謂道術建之以常無有主之以太一者建之以常無有故其於本也宏大而闢深閎而肆主之以太一故其於宗也可謂調適而上遂矣宗主宰也調養也養性之功有作有為已而無為則自適矣上遂猶言上達也遂其上升之志而與天為徒矣雖然其應於化而解於物也其理不竭其來不蛻芒乎昧乎未之盡者順天地自然之化以解萬物之縣結所謂不壞世法而成實相者其理不竭其出無窮也其來不蛻謂形不待蛻而後解也此書深遠未易窺測可與諸者究難以芒昧之見盡其義也惠施多方其書五車其道舛駁其言也不中墨翟宋尹彭田愼到之徒猶為見道之一偏惠子則主於好辨而已多方猶云方言也多方未免誇多鬬靡其所閲之書雖有五車之名而其道則舛駁不合於道其言不中不當於理亦不能成一家也曆音厯物之意曰至大無外謂之大一至小無內謂之小一厯考其辨物之意曰大無外小無內似矣而又曰大一小一於一之中而有大小之分此便是同中之異異中之同啓辨端矣無厚不可積也其大千里無厚則薄積則厚矣積之不已其大可至千里是千里之大即無厚之積也此言大與小同也天與地卑山與澤平日方中方睨物方生方死天高地卑其位定矣而天道下濟亦可言卑山高澤深其象陳矣而山下有澤亦可言平日方中也而睨視之亦可謂睨物方生而歸根復命亦可謂死大同而與小同異此之謂小同異萬物畢同畢異此之謂大同異一物各具一太極大以成大小以成小此謂小同異萬物統體一太極統同之中有辨異者在此謂大同異蓋大不出小之積而合小亦可以為大則無同無異矣南方無窮而有窮今日適越而昔來連環可解也天地東南滙為巨浸芒手不知其涯岸不知既謂之方則滯於有形又地不足於東南不足非窮乎適越者啓行雖在今日而其神昔日已先往矣非今日適越而昔來乎連環所貫貫於無環非貫於環也若知環之所以連則識環之所以解釋氏參禪云猛虎項下金鈴誰人解得曰解鈴還用繫鈴人即此意我知天下之中央燕之北越之南是也泛愛萬物天地一體也惠施以此為大觀於天下而曉辨者天下之辨者相與樂之世之中央不知在何處然燕越人各以其所處為中則燕之北越之南亦可以為中矣天地雖大而以泛愛觀之則天地亦萬物中之一體耳惠施以此為大觀而曉天下之辨者天下人亦樂而宗之卵有毛雞三足郢有天下犬可以為羊毛生於卵中是卵有毛雞本兩足而必有主張是足者是為三足郢本侯國而僭王自郢始是有天下之號犬羊惟人所命若未有名稱之先而呼犬為羊亦可矣馬有卵丁子有尾火不熱山出口形之所託名之所寄皆假耳非真也故犬羊無定名胎卵無定形故烏可以有胎馬可以有卵也夫萬物無定形形無定稱在上為首在下為尾世人謂右行曲波為尾楚人呼蝦募為丁子今丁子二字雖左行曲波亦是也人知天下有溫泉而無寒火不知有蕭邱有涼焰又有火生之蟲則火不熱也山無口而空谷傳聲非口乎輪不展地目不見指不至至不絶龜長於蛇矩不方規不可以為圓不圍枘天下之物方則滯而不動圓則活而不滯輪圓也故不展地而行之速目不能自見指不能自指目目指指者至則指目不至窮絶矣蛇形雖長而短龜形雖短而命長規矩為方圓之至而其體則不方不圓者枘形圓而鑿形方枘雖在鑿之中而枘之旋轉非鑿可止故不圍枘圓即鑿之枘也飛鳥之景未嘗動也鏃矢之疾而有不行不止之時狗非犬黃馬驪牛三鳥飛於天影落於地但可謂鳥動而不可謂影動鏃矢之去雖疾其離弦則行其中鵠則止然離弦而未到不止也鵠而已中不行也非不行不止之時乎北人呼犬為細狗謂其身之瘦也而其實狗不可以為犬黃馬一也驪牛二也文始經曰形可合亦可分一夫一婦二也合之共生一子非合乎馬牛合可生一騾非黃馬驪牛三乎白狗黑孤駒未嘗有母失母一尺之捶音垂日取其半萬世不竭辨者以此與惠施相應終身無窮黑白之分一定也第白者易汙故曰白狗黑駒生於母言孤駒可謂有母乎一尺之捶不為長也其數之窮折而為二今日取其半明日取其半展轉數之則萬世不竭亦方寸之木可使高於岑樓意此皆學於惠子者推廣其説相與強辨無窮已者桓團公孫龍辨者之徒飾人之心易人之意能勝人之口不能服人之心辨者之囿也囿者聚天下之辨而不能剖也惠施日以其知與人之辨特與天下之辨者為怪此其抵音底也然惠施之口談自以為最賢曰天地其壯乎施存雄而無術施日以其辨與人相持而不相下競為譎詭以相勝其説大抵如此且自以為賢而曰天地為我壯其辨施知存雄而不能守雌無道術者也南方有倚人異人焉曰黃繚音了問天地所以不墜不陷風雨雷霆之故惠施不辭而應不慮而對遍為萬物説説而不休多而無已猶以為寡益之以怪以反人為實而欲以勝人為名是以與衆不適也施自恃其才辨之過人旁引曲證猶為不足益之怪誕以欺人耳目之所不及其説雖長而與衆不協也弱於德強於物其塗噢矣夫有德者必有言惠子徒以雄辨與物相競故日弱於德而強於物究竟於道亦終幽昧而不自明故曰噢音奧由天地之道觀惠施之能其猶一蚉一虻之勞者也其於物也何庸夫一尚可曰愈貴道幾矣由天地之無言觀惠施之多言何異蚊虻之聚聲成雷亦不能驚蟄而震動萬物也故曰其於物也何庸吾於其多言之中摘其一言而充之尚可使之不叛於道而曰愈於貴道者不幾於失惠子乎惠施不能以此自寧散於萬物而不厭卒以善辨為名惜乎惠施之才駘音殆蕩而不得逐萬物而不反是窮響以聲形與影競走也悲夫蓋貴道之人自以多言數窮為戒惠子不能以此道寧一其心志以其精神散於萬物而不厭其煩徒以善辨名惜乎其才而不能善用駘蕩而不得於心逐於而不反其本譬之響出於聲影出於形欲息響而振其聲欲息影乃與形競走不休也惠施學昧根原逐物生辨影響之見而已復圭子曰道何在乎混沌未開道在天地混沌既開道又在人散之為萬而統之於一神得之以降明得之以出內聖得之以生外王得之以成大哉一乎天下之治方術者雖多而未有不原於一者也世有天人倚之以為宗世有神人聚會其元精世有至人完保其真純世有聖人領略其道德失道德則仁義禮樂矣非君子烏能勝其任乎故有名法以整齊之有參稽以考證之官有常度民有常業天德王道兼該並舉有道之時道德一而異術不能鳴道之在歷數者有司守其法太史紀其實道之散在六經者鄒魯之儒接其統百家之學揚其波孰知道術每與治術相升降者也故天下大亂而道德亦不一矣得一察以自好之士猶耳目鼻口之不相通何以知天地之美萬物之理古人之全乎人各為其所欲為迷而不反方術之多道術之裂也於是有墨翟禽滑釐也者矯侈靡之風而過焉者也養生送死皆以薄為道倣上古禮樂未備之時而不與中古帝王之禮樂同其生不歌而死無服也使人憂悲反天下之常王天下者可如是乎奈何以禹自方不知禹當水土之未平不得不以身先天下而墨翟之時非禹之時也後有論墨經者以得其道者為巨子之聖人雖腓無胈脛無毛而不恤也則道之一裂也於是大宋鈃尹文也者好為人之風而甚焉者也作為華山之冠以自表别善惡宥不及上説其主以禁攻下教其民以寢兵其為人而不知自為也雖飢不忘天下未常苛察以求人亦不假物以自益謂戢兵猶為外而寡欲乃為內也其大小精粗總之有人無已之學也則道之又一裂也於是有彭蒙田駢愼到也者聞不慮不謀之學而往焉者也謂天地覆載猶不能兼豈萬物而無可不可其棄知去已也恐知為鑿混沌之竅也其笑天下之尚賢也恐有是非而適以啓爭也故必推而後行曳而後往寧為員毋為方求以自全足矣故故咎無譽雖其道不盡合於古人然無是無非言而無言猶有古意也不可因其不韙於人而謂其無所聞也則道之又一裂也豈知道無形也而未常無本末物有象也而不能離精粗天地間無有餘也故無積而常足惟至人獨往獨來與鬼神合其吉凶得道術之精神者其關尹老聃乎彼其道以無有為體太一為主濡弱謙下為表空虛不壤為實其心無物而能物物可動可靜非水之善下鏡之忘形不能狀之空谷之傳聲不能似之且清且和不失為得寧隨人而母先人寧守雌而母雄寧守辱而母白寧取虛而母取實不以多藏為有餘不以無積為不足不以有為為巧不以無為為拙人皆以福為福已獨以無咎為福自治不厭其深根而寧極治人不厭其簡約而易遵太剛則折堅可不破乎太鋭則鈍鋭可不挫乎其藏垢愈多其容物愈寬其道術可謂至極而莫以加矣關尹老子真古之博大真人哉嗣是有聞其風而興起者莊周是也以無相為宗無為為行萬物一府死生同狀知天下之言非悠謬而虛遠則荒唐而曠大非無端而莫終始則恣縱而不羈不可與莊語也故不得不託為巵言曼衍如草之繁曼必有根水之流衍必有源也天下凡物皆假其真獨有性命故託古大聖大賢之言以為重使人知性命之為真寓者寄也所言雖近而其旨則遠故不嫌於廣譬曲喻使人深思而自得其正意以天地為精神萬物為逆旅上與造化為徒而下與外死生者為友窮其本則弘而深究其宗則達而上奚必脫其形骸而後上升乎此可與諸者道難與芒昧之人言也道術至惠施豈止分裂且舛駁矣其言雖多而不中以大無外為大一小無內為小一猶近似也謂千里為無厚之積也可乎謂天有時而卑山有時而平亦近似也謂睨視為日方中也可乎物方生者為方死非無理也謂小同異者而淆於大同異也可乎無窮必有窮不必定在南方也身未至而神先往不必定適越也連環非五金之環乃人身中之玄牝其白如綿其連如環大修行人必知解此之環而後可以解脫惠子與莊子善亦道德而塗説也燕北越南可以為中而不必為天下之中萬物當愛不必泛愛也天地同體不必一體以為大觀也毛不生於毛而生於卵雞二足而有使足者存郢非天下而僭稱王則有天下犬羊無定名胎卵無定形首尾無定稱火有蟲則不熱矣山出泉則有口矣輪員也轉之速則不展地矣目不能自見指不能自指短長不以形則龜可使之長於蛇方圓亦不以形則規矩無方圓之體而有方圓之用鑿不必圍枘而無枘則不成其為鑿飛鳥有影第可謂之鳥動而不可謂之影動矢行甚疾而亦有不行不止之時同中有異故狗不可以為犬合中有分故黃馬驪牛三皎皎者易污則白狗可黑天下無無母之駒而孤駒則不可以言有母萬物無有不竭而以尺捶平折之日展其半則無窮盡之時此皆學於惠子者也亦猶桓團公孫龍止能以其辨勝人之口不能服人之心也惠子自以其善辨為最賢曰天地且為我辨生色止知守雄而不知守雌有道術者固如是乎觀其答黃繚之間天地所以不墜不陷風雨雷霆所以或翕或張也彼非知道者安能洞徹之而惠子何如人也矢口而對恣意而談止能欺人之耳目而不能屈人之心志出天地之無言觀惠施之多言何異聚蚊成雷而必不能震驚萬物也有其才而不能善用其才是欲息響而振聲欲息影而走形不知本也以強辨止辨亦猶是耳有道術者必不如是南華真經注疏傳神集後序復圭子曰千古以來知道德者未有不透南華南華者所以筌蹄道德也晚近文人不惟不究道德即南華真經四字鮮有知其説者先哲云湛為道德浮為英華也南華即道德之英華也又何以云真經天地以南北為經東西為緯丹經云天上太陰一月一度而與太陽會此常經也人間少陰一月一經而癸水至此真經也丹經又云度人須要真經度夫南者火也華亦火之精神也此南華在天為太陰晦王朔癸之火候在人為真經期前期後之火候莊老題為南華真經者所以點破流戊就已取坎填離之妙竅耳非得天仙口訣者安能知之非真有道氣者安肯信之彼其出入造化洞徹人物達生死之變明內聖外王之道以有物之後而追窮無物之始不過欲人知性命之淵源始覺天地間凡有形質者皆為幻惟有一道真耳胡為含齒之倫與搢紳先生悉戀戀朝露之滋潤不知人生寄蜉蝣於天地既無長繩繫白日當求大藥以引年自古神仙留有接命法第非大德大行之人知法財兩用者不可與口傳耳豫觀世儒止知為利祿以養臭腐不思化臭腐為神奇坐待無常之至甘就木而不悔者天下皆是也豫甚憫之故作南華之注其先哲所已注而可存者人事也十之一二其發前人所未發者性命也十之八九然於精神筋骨脈落尚未融貫故不得不作疏於各章之後疏者通也彼其精神有隱藏處吾為通而露之其筋骨有屈曲處吾為通而直之其脈落有間斷處吾為通而聯之俾後之讀南華者一展卷咸識上升之有路登彼岸之有筏即儒者有以諔譎議之者莫不翻然悟莊老思返有為於無為進仁義為道德乃還古之美意也曷常與吾儒異哉然則五經四書者世人之先師也道德南華者祖宗也二經注疏者子孫也子孫象貌不必盡肖祖宗然而精神血脈未常不肖者此可與真儒道難與俗儒言也崇禎十年八月將望日程以寧拜序
